@keyframes spin{to{transform:rotate(360deg);}}

.landing-hero{
  text-align:center;padding:120px 24px 48px;position:relative;overflow:hidden;min-height:90vh;display:flex;flex-direction:column;justify-content:center;
}
.landing-hero::before{display:none;}

/* ── Hero Background Image ─────────────────────────────────── */
.hero-bg-wrap{
  position:absolute;inset:0;z-index:0;overflow:hidden;
}
.hero-bg-img{
  width:100%;height:100%;object-fit:cover;object-position:center 40%;
  display:block;
}
.hero-bg-overlay{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 60% at center 45%, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.55) 40%, transparent 75%),
    linear-gradient(to bottom, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.10) 25%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.85) 75%, var(--page-bg, hsl(0 0% 4%)) 100%);
}
.hero-content-wrap{position:relative;z-index:2;will-change:transform,opacity;}
.landing-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:9999px;font-size:12px;font-weight:500;
  letter-spacing:0.02em;
  background:rgba(0,0,0,0.35);color:rgba(255,255,255,0.85);
  border:1px solid rgba(255,255,255,0.15);margin-bottom:24px;
  backdrop-filter:blur(12px);
}
.landing-badge:nth-child(1){color:var(--accent-cyan);background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.15);}
.landing-badge:nth-child(2){color:var(--accent-violet);background:rgba(179,136,255,0.06);border-color:rgba(179,136,255,0.15);}
.landing-badge:nth-child(3){color:var(--accent-rose);background:rgba(255,107,157,0.06);border-color:rgba(255,107,157,0.15);}
.landing-hero h1{
  font-family:'Inter',system-ui,sans-serif;font-size:clamp(36px,6vw,72px);font-weight:700;line-height:1.05;
  margin:0 0 20px;letter-spacing:-0.03em;
  color:#fff;
  background:none;-webkit-background-clip:unset;-webkit-text-fill-color:unset;background-clip:unset;
  text-wrap:balance;text-shadow:0 2px 30px rgba(0,0,0,0.6), 0 0 60px rgba(0,0,0,0.3);
}
.landing-hero h1 span{color:rgba(255,255,255,0.8);}
.landing-hero p{
  color:rgba(255,255,255,0.9);font-size:17px;line-height:1.7;max-width:600px;margin:0 auto 40px;
  font-weight:400;text-shadow:0 1px 20px rgba(0,0,0,0.5), 0 0 40px rgba(0,0,0,0.3);
}

/* CTA Row */
.landing-cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}

/* Primary CTA — micro1 pill style */
.landing-cta-primary-wrap{
  position:relative;border-radius:9999px;overflow:visible;padding:0;
}
.landing-cta-primary-wrap::before{display:none;}
.landing-cta-primary{
  position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border-radius:9999px;border:none;cursor:pointer;
  font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:500;
  background:hsl(0 0% 96%);color:hsl(0 0% 2%);
  transition:all .2s ease;
}
.landing-cta-primary:hover{background:hsl(0 0% 90%);transform:scale(1.03);box-shadow:0 0 50px rgba(0,229,255,0.15);}
.landing-cta-primary svg{flex-shrink:0;}

.landing-cta-secondary{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border-radius:9999px;cursor:pointer;
  font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:500;
  background:transparent;color:var(--text-secondary);
  border:1px solid var(--glass-border);
  transition:all .2s ease;
}
.landing-cta-secondary:hover{color:var(--text-primary);border-color:hsl(0 0% 30%);background:hsl(0 0% 5%);}

/* Section header */
.landing-section-header{margin-bottom:24px;}
.landing-section-pill{
  display:inline-block;padding:6px 16px;border-radius:9999px;font-size:12px;font-weight:500;
  background:rgba(0,229,255,0.06);color:var(--accent-cyan);
  border:1px solid rgba(0,229,255,0.15);margin-bottom:16px;
}
.landing-section-title{
  font-family:'Inter',system-ui,sans-serif;font-size:clamp(28px,4vw,48px);font-weight:700;
  color:var(--text-primary);text-align:left;margin:0;letter-spacing:-0.03em;line-height:1.1;
  text-wrap:balance;
}
.landing-section-title span{color:var(--text-secondary);}

/* Feature Cards — micro1 bento grid */
.landing-features{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  padding:0;margin-bottom:64px;
}
.landing-feature-card{
  position:relative;padding:32px;border-radius:var(--radius-lg);overflow:hidden;
  background:hsl(0 0% 5%);border:1px solid var(--glass-border);
  transition:all .7s ease;
  opacity:0;animation:fadeInUp .8s ease-out forwards;
}
.landing-feature-card:nth-child(1){animation-delay:.1s;}
.landing-feature-card:nth-child(2){animation-delay:.25s;}
.landing-feature-card:nth-child(3){animation-delay:.4s;}
.landing-feature-card:nth-child(4){animation-delay:.55s;}
.landing-feature-card:nth-child(5){animation-delay:.7s;}
.landing-feature-card:nth-child(6){animation-delay:.85s;}
.landing-feature-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom right,hsl(0 0% 96% / 0.05),transparent);
  opacity:0;transition:opacity .5s ease;pointer-events:none;
}
.landing-feature-card:hover{
  border-color:hsl(0 0% 30%);
  background:hsl(0 0% 8%);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.landing-feature-card:hover::after{opacity:1;}
/* Per-card accent colors */
.landing-feature-card:nth-child(1):hover{border-color:rgba(0,229,255,0.25);box-shadow:0 0 40px rgba(0,229,255,0.06),0 8px 32px rgba(0,0,0,0.3);}
.landing-feature-card:nth-child(2):hover{border-color:rgba(179,136,255,0.25);box-shadow:0 0 40px rgba(179,136,255,0.06),0 8px 32px rgba(0,0,0,0.3);}
.landing-feature-card:nth-child(3):hover{border-color:rgba(255,107,157,0.25);box-shadow:0 0 40px rgba(255,107,157,0.06),0 8px 32px rgba(0,0,0,0.3);}
.landing-feature-card:nth-child(4):hover{border-color:rgba(105,240,174,0.25);box-shadow:0 0 40px rgba(105,240,174,0.06),0 8px 32px rgba(0,0,0,0.3);}
.landing-feature-card:nth-child(5):hover{border-color:rgba(255,215,64,0.25);box-shadow:0 0 40px rgba(255,215,64,0.06),0 8px 32px rgba(0,0,0,0.3);}
.landing-feature-card:nth-child(6):hover{border-color:rgba(179,136,255,0.25);box-shadow:0 0 40px rgba(179,136,255,0.06),0 8px 32px rgba(0,0,0,0.3);}
.landing-feature-card .card-decorative{
  position:absolute;bottom:-32px;right:-32px;width:128px;height:128px;border-radius:50%;
  background:hsl(0 0% 96% / 0.02);transition:all .5s ease;pointer-events:none;
}
.landing-feature-card:hover .card-decorative{transform:scale(1.5);}
.landing-feature-card:nth-child(1):hover .card-decorative{background:rgba(0,229,255,0.04);}
.landing-feature-card:nth-child(2):hover .card-decorative{background:rgba(179,136,255,0.04);}
.landing-feature-card:nth-child(3):hover .card-decorative{background:rgba(255,107,157,0.04);}
.landing-feature-card:nth-child(4):hover .card-decorative{background:rgba(105,240,174,0.04);}
.landing-feature-card:nth-child(5):hover .card-decorative{background:rgba(255,215,64,0.04);}
.landing-feature-card:nth-child(6):hover .card-decorative{background:rgba(179,136,255,0.04);}
.landing-feature-icon{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;flex-shrink:0;
  background:hsl(0 0% 10%);border:1px solid var(--glass-border);
  transition:all .5s ease;
}
.landing-feature-card:hover .landing-feature-icon{
  background:hsl(0 0% 14%);border-color:hsl(0 0% 28%);
}
.landing-feature-card:nth-child(1) .landing-feature-icon{color:var(--accent-cyan);}
.landing-feature-card:nth-child(1):hover .landing-feature-icon{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.2);box-shadow:0 0 20px rgba(0,229,255,0.1);}
.landing-feature-card:nth-child(2) .landing-feature-icon{color:var(--accent-violet);}
.landing-feature-card:nth-child(2):hover .landing-feature-icon{background:rgba(179,136,255,0.08);border-color:rgba(179,136,255,0.2);box-shadow:0 0 20px rgba(179,136,255,0.1);}
.landing-feature-card:nth-child(3) .landing-feature-icon{color:var(--accent-rose);}
.landing-feature-card:nth-child(3):hover .landing-feature-icon{background:rgba(255,107,157,0.08);border-color:rgba(255,107,157,0.2);box-shadow:0 0 20px rgba(255,107,157,0.1);}
.landing-feature-card:nth-child(4) .landing-feature-icon{color:var(--accent-emerald);}
.landing-feature-card:nth-child(4):hover .landing-feature-icon{background:rgba(105,240,174,0.08);border-color:rgba(105,240,174,0.2);box-shadow:0 0 20px rgba(105,240,174,0.1);}
.landing-feature-card:nth-child(5) .landing-feature-icon{color:var(--accent-amber);}
.landing-feature-card:nth-child(5):hover .landing-feature-icon{background:rgba(255,215,64,0.08);border-color:rgba(255,215,64,0.2);box-shadow:0 0 20px rgba(255,215,64,0.1);}
.landing-feature-card:nth-child(6) .landing-feature-icon{color:var(--accent-violet);}
.landing-feature-card:nth-child(6):hover .landing-feature-icon{background:rgba(179,136,255,0.08);border-color:rgba(179,136,255,0.2);box-shadow:0 0 20px rgba(179,136,255,0.1);}
.landing-feature-card h3{
  font-family:'Inter',system-ui,sans-serif;font-size:17px;font-weight:600;color:var(--text-primary);margin:0 0 8px;
  display:flex;align-items:center;gap:6px;
}
.landing-feature-card h3 .arrow-icon{
  color:var(--text-tertiary);opacity:0;transition:all .3s ease;
}
.landing-feature-card:hover h3 .arrow-icon{opacity:1;transform:translate(2px,-2px);}
.landing-feature-card p{font-size:14px;line-height:1.6;color:var(--text-secondary);margin:0;}

/* Workflow Steps — horizontal numbered flow */
.landing-workflow{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0;
  opacity:0;animation:fadeInUp .8s ease-out .4s forwards;
}
.landing-workflow-step{
  text-align:center;padding:28px 20px;border-radius:var(--radius-lg);
  background:hsl(0 0% 5%);border:1px solid var(--glass-border);
  position:relative;transition:border-color .3s ease;
}
.landing-workflow-step:hover{border-color:hsl(0 0% 22%);}
.landing-workflow-step:nth-child(1):hover{border-color:rgba(0,229,255,0.2);}
.landing-workflow-step:nth-child(2):hover{border-color:rgba(179,136,255,0.2);}
.landing-workflow-step:nth-child(3):hover{border-color:rgba(105,240,174,0.2);}
.landing-workflow-step:nth-child(4):hover{border-color:rgba(255,107,157,0.2);}
.landing-workflow-step::after{
  content:'\2192';position:absolute;right:-14px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--text-tertiary);
}
.landing-workflow-step:last-child::after{display:none;}
.landing-step-num{
  width:40px;height:40px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-family:'Inter',system-ui,sans-serif;font-size:16px;font-weight:700;
  background:hsl(0 0% 96%);color:hsl(0 0% 2%);margin-bottom:16px;
}
.landing-workflow-step:nth-child(1) .landing-step-num{background:var(--accent-cyan);color:#000;}
.landing-workflow-step:nth-child(2) .landing-step-num{background:var(--accent-violet);color:#000;}
.landing-workflow-step:nth-child(3) .landing-step-num{background:var(--accent-emerald);color:#000;}
.landing-workflow-step:nth-child(4) .landing-step-num{background:var(--accent-rose);color:#000;}
.landing-workflow-step h4{
  font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:600;color:var(--text-primary);margin:0 0 8px;
}
.landing-workflow-step p{font-size:13px;line-height:1.5;color:var(--text-secondary);margin:0;}

/* Scroll indicator */
.landing-scroll-hint{
  display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:48px;
  opacity:0;animation:fadeIn .6s ease-out 1.5s forwards;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.landing-scroll-hint span{font-size:12px;color:var(--text-tertiary);}
.landing-scroll-pill{
  width:20px;height:32px;border-radius:9999px;border:1px solid hsl(0 0% 25%);
  display:flex;align-items:flex-start;justify-content:center;padding-top:6px;
}
.landing-scroll-dot{
  width:4px;height:8px;border-radius:9999px;background:var(--text-tertiary);
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}

/* Responsive */
@media(max-width:1200px){.landing-features{grid-template-columns:repeat(2,1fr);}.landing-workflow{grid-template-columns:repeat(2,1fr);}.landing-workflow-step:nth-child(2)::after{display:none;}}
@media(max-width:768px){.landing-features{grid-template-columns:1fr;}.landing-workflow{grid-template-columns:1fr;}.landing-workflow-step::after{display:none;}}


/* ══════ AI FEATURES STYLES ══════ */
.ask-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(var(--glass-blur));margin-bottom:16px;transition:border-color .2s;}
.ask-bar:focus-within{border-color:var(--accent-cyan);}
.ask-bar input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:13px;font-family:Inter,sans-serif;}
.ask-bar input::placeholder{color:var(--text-tertiary);}
.ask-bar button{padding:6px 16px;border-radius:var(--radius-sm);background:var(--accent-cyan);color:#000;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:opacity .15s;}
.ask-bar button:hover{opacity:0.85;}
.ask-suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;margin-top:-8px;}
.ask-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-xl);background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:Inter,sans-serif;transition:all .18s ease;line-height:1.3;}
.ask-chip:hover{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.25);color:var(--text-primary);}
.ask-chip svg{flex-shrink:0;opacity:0.5;}
.ask-chip:hover svg{opacity:0.8;}
.ask-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:4px;}
.ask-stat-card{padding:14px 16px;border-radius:var(--radius-sm);background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.12);text-align:center;}
.ask-stat-value{font-size:22px;font-weight:700;color:var(--accent-cyan);font-family:Inter,sans-serif;letter-spacing:-0.02em;}
.ask-stat-label{font-size:11px;color:var(--text-tertiary);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;}
.ask-answer-card{padding:14px 18px;border-radius:var(--radius-md);background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.12);margin-bottom:16px;font-size:13px;color:var(--text-primary);line-height:1.6;animation:fadeSlideIn .3s ease;}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.confidence-badge{display:inline-block;padding:2px 8px;border-radius:var(--radius-xl);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-left:8px;}
.confidence-badge.high{background:rgba(105,240,174,0.12);color:var(--accent-emerald);}
.confidence-badge.medium{background:rgba(255,215,64,0.12);color:var(--accent-amber);}
.confidence-badge.low{background:rgba(255,107,157,0.12);color:var(--accent-rose);}
.ai-insights-card{padding:20px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(var(--glass-blur));margin-bottom:20px;}
.ai-insights-card .ai-card-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px;font-weight:600;color:var(--text-primary);}
.insight-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--glass-border);font-size:13px;color:var(--text-secondary);line-height:1.5;}
.insight-item:last-child{border-bottom:none;}
.insight-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.insight-type-dot.trend{background:var(--accent-cyan);}
.insight-type-dot.outlier{background:var(--accent-rose);}
.insight-type-dot.correlation{background:var(--accent-violet);}
.insight-type-dot.pattern{background:var(--accent-amber);}
.ai-caption{font-size:12px;font-style:italic;color:var(--text-secondary);padding:8px 12px;border-left:3px solid var(--accent-cyan);margin:8px 16px 16px;line-height:1.5;opacity:0.85;}
.forecast-btn{padding:4px 12px;border-radius:var(--radius-xl);background:rgba(179,136,255,0.1);border:1px solid rgba(179,136,255,0.2);color:var(--accent-violet);font-size:11px;font-weight:500;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;}
.forecast-btn:hover{background:rgba(179,136,255,0.2);}
.data-quality-card{padding:20px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(var(--glass-blur));margin-bottom:20px;}
.quality-score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 16px;}
.quality-issue{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--glass-border);font-size:12px;color:var(--text-secondary);}
.quality-issue:last-child{border-bottom:none;}
.quality-issue-type{padding:2px 8px;border-radius:var(--radius-xl);font-size:10px;font-weight:600;text-transform:uppercase;background:rgba(255,107,157,0.1);color:var(--accent-rose);}
.data-chat-page{display:flex;flex-direction:column;height:calc(100vh - 120px);}
.data-chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.data-chat-msg{max-width:80%;padding:12px 16px;border-radius:var(--radius-md);font-size:13px;line-height:1.5;animation:fadeSlideIn .2s ease;}
.data-chat-msg.user{align-self:flex-end;background:var(--accent-cyan);color:#000;border-bottom-right-radius:4px;}
.data-chat-msg.assistant{align-self:flex-start;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-primary);border-bottom-left-radius:4px;}
.data-chat-input-wrap{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);backdrop-filter:blur(var(--glass-blur));}
.data-chat-input-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:13px;font-family:Inter,sans-serif;}
.data-chat-input-wrap input::placeholder{color:var(--text-tertiary);}
.nl-filter-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--radius-sm);background:var(--glass-bg);border:1px solid var(--glass-border);margin-bottom:12px;font-size:12px;}
.nl-filter-bar:focus-within{border-color:var(--accent-violet);}
.nl-filter-bar input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:12px;font-family:Inter,sans-serif;}
.nl-filter-bar input::placeholder{color:var(--text-tertiary);}
.ai-usage-card{padding:20px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(var(--glass-blur));margin-top:20px;max-width:640px;}
.usage-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;margin:10px 0;}
.usage-bar-fill{height:100%;border-radius:4px;background:var(--accent-cyan);transition:width .5s ease;}
.anomaly-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-xl);background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.2);color:var(--accent-rose);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;}
.anomaly-badge:hover{background:rgba(255,107,157,0.2);}
.anomaly-detail{padding:10px 14px;border-radius:var(--radius-sm);background:rgba(255,107,157,0.04);border:1px solid rgba(255,107,157,0.1);font-size:12px;color:var(--text-secondary);margin:8px 16px;line-height:1.5;display:none;}
.anomaly-detail.open{display:block;animation:fadeSlideIn .2s ease;}
.action-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-xl);background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;}
.action-chip:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-bright);color:var(--text-primary);}
.ki-explain-box{padding:14px;border-radius:var(--radius-sm);background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.1);margin-top:12px;font-size:12px;line-height:1.6;color:var(--text-secondary);}
.ki-recs-list{list-style:none;padding:0;margin:12px 0 0;}
.ki-recs-list li{padding:8px 0;border-bottom:1px solid var(--glass-border);font-size:12px;color:var(--text-secondary);line-height:1.5;}
.ki-recs-list li:last-child{border-bottom:none;}
.ki-recs-list .rec-priority{display:inline-block;padding:1px 6px;border-radius:var(--radius-xl);font-size:9px;font-weight:600;text-transform:uppercase;margin-right:6px;}
.ki-recs-list .rec-priority.high{background:rgba(255,107,157,0.1);color:var(--accent-rose);}
.ki-recs-list .rec-priority.medium{background:rgba(255,215,64,0.1);color:var(--accent-amber);}
.ki-recs-list .rec-priority.low{background:rgba(105,240,174,0.1);color:var(--accent-emerald);}
.col-desc-table{width:100%;border-collapse:collapse;font-size:12px;}
.col-desc-table th{text-align:left;padding:8px 10px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-size:10px;border-bottom:1px solid var(--glass-border);}
.col-desc-table td{padding:8px 10px;color:var(--text-secondary);border-bottom:1px solid var(--glass-border);}
.col-desc-table td:first-child{color:var(--text-primary);font-weight:500;}
.ai-loading{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-tertiary);}
.ai-loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-cyan);animation:aiPulse 1.2s ease infinite;}
.ai-loading-dot:nth-child(2){animation-delay:0.2s;}
.ai-loading-dot:nth-child(3){animation-delay:0.4s;}
@keyframes aiPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* Theme overrides for AI features */
body.theme-light .ask-bar{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.1);}
body.theme-light .ask-bar input{color:#1a1a2e;}
body.theme-light .ask-answer-card{background:rgba(0,100,200,0.04);border-color:rgba(0,100,200,0.12);}
body.theme-light .ask-chip{background:rgba(255,255,255,0.8);border-color:rgba(0,0,0,0.1);color:#4a4a6a;}
body.theme-light .ask-chip:hover{background:rgba(8,145,178,0.08);border-color:rgba(8,145,178,0.3);color:#1a1a2e;}
body.theme-light .ask-stat-card{background:rgba(8,145,178,0.06);border-color:rgba(8,145,178,0.12);}
body.theme-light .ask-stat-value{color:#0891b2;}
body.theme-light .ai-insights-card{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.08);}
body.theme-light .insight-item{border-color:rgba(0,0,0,0.06);}
body.theme-light .data-chat-msg.assistant{background:rgba(255,255,255,0.9);border-color:rgba(0,0,0,0.08);}
body.theme-light .data-chat-input-wrap{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.1);}
body.theme-light .nl-filter-bar{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.1);}
body.theme-light .ai-usage-card{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.08);}
body.theme-light .usage-bar{background:rgba(0,0,0,0.06);}
body.theme-light .action-chip{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.1);}
body.theme-light .action-chip:hover{background:#fff;border-color:rgba(0,0,0,0.15);}
body.theme-light .ki-explain-box{background:rgba(0,100,200,0.04);border-color:rgba(0,100,200,0.1);}
body.theme-light .col-desc-table td{color:#4a4a6a;}
body.theme-light .col-desc-table td:first-child{color:#1a1a2e;}

/* ── Ask AI popup on chart cards ── */
.ask-ai-btn{padding:4px 12px;border-radius:var(--radius-xl);background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.18);color:var(--accent-cyan);font-size:11px;font-weight:500;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px;}
.ask-ai-btn:hover{background:rgba(0,229,255,0.18);}
.ask-ai-btn svg{flex-shrink:0;}
.ask-ai-popup{display:none;position:fixed;width:380px;max-width:calc(100vw - 40px);max-height:60vh;overflow-y:auto;background:hsl(0 0% 8% / 0.97);backdrop-filter:blur(24px);border:1px solid var(--glass-border-bright);border-radius:var(--radius-md);box-shadow:0 8px 32px rgba(0,0,0,0.45);padding:16px;z-index:310;animation:fadeInUp .15s ease both;}
.ask-ai-popup.open{display:block;}
.ask-ai-popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ask-ai-popup-title{font-size:12px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px;}
.ask-ai-popup-close{background:none;border:none;color:var(--text-tertiary);cursor:pointer;padding:2px;line-height:1;font-size:18px;transition:color .15s;}
.ask-ai-popup-close:hover{color:var(--text-primary);}
.ask-ai-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.ask-ai-chip{padding:4px 10px;border-radius:9999px;background:hsl(0 0% 12%);border:1px solid var(--glass-border);color:var(--text-secondary);font-size:11px;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;white-space:nowrap;}
.ask-ai-chip:hover{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.25);color:var(--text-primary);}
.ask-ai-input-row{display:flex;gap:6px;margin-bottom:10px;}
.ask-ai-input-row input{flex:1;padding:6px 10px;border-radius:8px;background:hsl(0 0% 10%);border:1px solid var(--glass-border);color:var(--text-primary);font-size:12px;font-family:Inter,sans-serif;outline:none;transition:border-color .15s;}
.ask-ai-input-row input:focus{border-color:var(--accent-cyan);}
.ask-ai-input-row input::placeholder{color:var(--text-tertiary);}
.ask-ai-input-row button{padding:6px 12px;border-radius:8px;background:var(--accent-cyan);border:none;color:hsl(0 0% 4%);font-size:11px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:opacity .15s;white-space:nowrap;}
.ask-ai-input-row button:hover{opacity:0.85;}
.ask-ai-response{font-size:12px;line-height:1.6;color:var(--text-secondary);}
.ask-ai-response p{margin:0 0 8px;}
.ask-ai-highlights{list-style:none;padding:0;margin:8px 0 0;}
.ask-ai-highlights li{position:relative;padding:3px 0 3px 14px;font-size:11px;color:var(--text-secondary);line-height:1.5;}
.ask-ai-highlights li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent-cyan);}
body.theme-light .ask-ai-popup{background:rgba(255,255,255,0.97);border-color:rgba(0,0,0,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.12);}
body.theme-light .ask-ai-popup-close{color:#999;}
body.theme-light .ask-ai-popup-close:hover{color:#333;}
body.theme-light .ask-ai-chip{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.08);color:#4a4a6a;}
body.theme-light .ask-ai-chip:hover{background:rgba(8,145,178,0.08);border-color:rgba(8,145,178,0.25);color:#1a1a2e;}
body.theme-light .ask-ai-input-row input{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.1);color:#1a1a2e;}

</style>
</head>

function sparkSVG(color) {
  const rgb = colorRgba[color];
  const pts = Array.from({length:8}, () => 5 + Math.random() * 30);
  const step = 200/7;
  let path = `M0 ${40-pts[0]}`;
  for (let i=1;i<pts.length;i++) path += ` Q${step*i - step/2} ${40-pts[i-1]} ${step*i} ${40-pts[i]}`;
  return `<svg viewBox="0 0 200 40" preserveAspectRatio="none">
    <defs><linearGradient id="sg${color}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="rgba(${rgb},0.3)"/><stop offset="100%" stop-color="rgba(${rgb},0)"/></linearGradient></defs>
    <path d="${path} V40 H0 Z" fill="url(#sg${color})"/><path d="${path}" fill="none" stroke="var(${colorMap[color]})" stroke-width="2" stroke-linecap="round"/></svg>`;
}

function initHeroParallax() {
  const heroEl = document.querySelector('.landing-hero');
  const contentWrap = heroEl && heroEl.querySelector('.hero-content-wrap');
  if (!heroEl) return;

  // ── Scroll parallax ────────────────────────────────────────
  const handleScroll = () => {
    const rect = heroEl.getBoundingClientRect();
    const heroH = heroEl.offsetHeight;
    const scrolled = Math.max(0, -rect.top);
    const progress = Math.min(1, scrolled / heroH);
    if (contentWrap) {
      contentWrap.style.transform = 'translateY(' + (-scrolled * 0.35) + 'px)';
      contentWrap.style.opacity = Math.max(0, 1 - progress * 1.5);
    }
  };
  window.addEventListener('scroll', handleScroll, { passive: true });
  handleScroll();

  App._heroNetworkCleanup = () => {
    window.removeEventListener('scroll', handleScroll);
  };
}

function renderAnalytics() {
  const ec = App.excelChartConfig;
  const hasData = App.hasExcelData && ec.chartPlan && ec.chartPlan.length > 0;
  let statsHTML = '', chartsHTML = '';

  if (hasData) {
    // Smart metric stats row — exclude date/index/time columns
    const metrics = (ec.metrics || []).filter(m => { const meta = ec.colMeta[m]; if (!meta) return false; if (meta.isDate || meta.isIndex) return false; const low = m.toLowerCase(); if (/^(month|year|quarter|week|day|date|time|timestamp|period|epoch)s?$/i.test(low) || /_(id|key)$/i.test(low)) return false; return true; });
    const mColors = ['cyan', 'violet', 'emerald', 'amber'];
    const nStatCols = Math.min(metrics.length + 1, 4);
    statsHTML = `<div class="stats-grid" style="grid-template-columns:repeat(${nStatCols},minmax(0,1fr));margin-bottom:24px">
      <div class="glass-panel" style="padding:20px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent-cyan);margin-bottom:8px">Total Records</div>
        <div style="font-weight:700;font-size:28px;font-family:Inter">${App.excelData.rows.length.toLocaleString()}</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:6px">${App.excelData.headers.length} columns detected</div></div>
      ${metrics.slice(0, 3).map((m, i) => {
        const vals = ec.colMeta[m].vals;
        const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
        const max = Math.max(...vals); const min = Math.min(...vals);
        const sum = vals.reduce((a,b)=>a+b,0);
        return '<div class="glass-panel" style="padding:20px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var('+colorMap[mColors[i+1]]+');margin-bottom:8px">'+m.replace(/_/g,' ')+'</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">' +
          '<div><span style="color:var(--text-tertiary)">Avg</span><div style="font-weight:600;font-size:18px;margin-top:2px">'+avg.toLocaleString('en-US',{maximumFractionDigits:1})+'</div></div>' +
          '<div><span style="color:var(--text-tertiary)">Sum</span><div style="font-weight:600;font-size:18px;margin-top:2px">'+sum.toLocaleString('en-US',{maximumFractionDigits:0})+'</div></div>' +
          '<div><span style="color:var(--text-tertiary)">Min</span><div style="font-weight:600;font-size:16px;margin-top:2px">'+min.toLocaleString('en-US',{maximumFractionDigits:1})+'</div></div>' +
          '<div><span style="color:var(--text-tertiary)">Max</span><div style="font-weight:600;font-size:16px;margin-top:2px">'+max.toLocaleString('en-US',{maximumFractionDigits:1})+'</div></div></div></div>';
      }).join('')}</div>`;

    // Chart grid from chartPlan
    chartsHTML = `<div id="crossFilterBar" class="cross-filter-bar" style="display:none"></div>` +
      `<div style="display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:24px">
      ${ec.chartPlan.map((chart, i) => {
        const curType = chart._userType || chart.type;
        const curColor = chart._userColor || chart.color || 'cyan';
        const desc = (chart.desc || '').replace(/'/g, '&#39;');
        const isLine = (curType === 'line');
        return '<div class="glass-panel" style="position:relative"><div class="panel-header"><h2 class="panel-title">' + chart.title + '</h2>' +
          '<div style="display:flex;align-items:center;gap:6px">' +
          '<span id="anomalyBadge' + i + '"></span>' +
          (isLine ? '<button class="forecast-btn" id="forecastBtn' + i + '" onclick="handleForecast(' + i + ')">Forecast</button>' : '') +
          '<button class="ask-ai-btn" onclick="openAskAiModal(\'analytics\',' + i + ',event)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Ask AI</button>' +
          '</div></div>' +
          '<div class="anomaly-detail" id="anomalyDetail'+i+'"></div>' +
          '<div class="chart-info-bar visible" id="chartInfo'+i+'">' + desc + '</div>' +
          '<div class="drill-breadcrumb" id="drillBreadcrumb'+i+'"></div>' +
          '<div class="chart-container" style="height:280px"><canvas id="analyticsChart'+i+'"></canvas></div>' +
          (chart.series && chart.series.length > 0 ? '<div class="chart-legend">' + chart.series.map(function(s) {
            return '<span class="legend-item"><span class="legend-dot" style="background:'+getColorHex(s.color)+'"></span>'+s.name+'</span>';
          }).join('') + '</div>' : '') +
          '<div class="ai-caption" id="aiCaption'+i+'"></div>' +
          (isLine ? '<div id="forecastNote'+i+'" style="display:none;font-size:11px;color:var(--accent-violet);padding:4px 16px 12px;font-style:italic"></div>' : '') +
          '</div>';
      }).join('')}
    </div>`;
  }
  const customChartsHTML = App.customCharts && App.customCharts.length > 0 ? `<div style="margin-bottom:24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-family:Inter;font-size:16px;font-weight:600">Your Custom Charts</h2><div style="display:flex;align-items:center;gap:12px"><span style="font-size:12px;color:var(--text-tertiary)">${App.customCharts.length} chart${App.customCharts.length>1?'s':''}</span><button onclick="clearAllCustomCharts()" style="font-size:11px;padding:5px 14px;border-radius:8px;background:rgba(255,107,157,0.08);border:1px solid rgba(255,107,157,0.18);color:var(--accent-rose);cursor:pointer;transition:all .15s;font-family:Inter,sans-serif;font-weight:500" onmouseover="this.style.background='rgba(255,107,157,0.18)'" onmouseout="this.style.background='rgba(255,107,157,0.08)'">Clear All</button></div></div><div style="display:grid;grid-template-columns:1fr;gap:20px">${App.customCharts.map((c,i) => {
    const desc = (c.desc || 'Custom chart created via Chart Assistant.').replace(/'/g, '&#39;');
    return '<div class="glass-panel" style="position:relative"><div class="panel-header"><h2 class="panel-title">'+c.title+'</h2>' +
      '<div style="display:flex;gap:6px;align-items:center">' +
      '<button class="ask-ai-btn" onclick="openAskAiModal(\'custom\',' + i + ',event)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Ask AI</button>' +
      '<button class="chart-info-btn" onclick="removeCustomChart('+i+')" title="Delete chart" style="color:var(--accent-rose);opacity:0.6;transition:opacity .15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
      '</div></div>' +
      '<div class="chart-info-bar visible" id="customInfo'+i+'">' + desc + '</div>' +
      '<div class="chart-container" style="height:280px"><canvas id="customChart'+i+'"></canvas></div>' +
      (c.series && c.series.length > 0 ? '<div class="chart-legend">' + c.series.map(s => {
        return '<span class="legend-item"><span class="legend-dot" style="background:'+getColorHex(s.color)+'"></span>'+s.name+'</span>';
      }).join('') + '</div>' : '') +
      '</div>';
  }).join('')}</div></div>` : '';

  const askBarHTML = hasData ? `<div class="ask-bar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="askDataInput" placeholder="Ask anything about your data..." onkeydown="if(event.key==='Enter')handleAskData()"><button onclick="handleAskData()">Ask</button></div><div id="askSuggestions" class="ask-suggestions"></div><div id="askDataAnswer" class="ask-answer-card" style="display:none"></div>` : '';
  const briefingHTML = hasData ? `<div class="ai-insights-card" id="aiBriefingCard"></div>` : '';
  const suggestionsHTML = hasData ? `<div id="aiSuggestionsCard" style="margin-bottom:20px"></div>` : '';

  return `<div class="page-header"><div><h1 class="page-title">Analytics</h1><p class="page-subtitle">${hasData ? 'Smart charts generated from your uploaded data.' : 'Detailed performance metrics and trends.'}</p></div>
    <div class="header-actions">${App.excelData ? '<button class="btn btn-ghost" onclick="quickSaveProject()" style="margin-right:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save</button><button class="btn btn-ghost" onclick="openPanel(\'chartAssistant\')" style="margin-right:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg> Chart Assistant</button>' : ''}</div></div>
  ${askBarHTML}${briefingHTML}${suggestionsHTML}${statsHTML}${customChartsHTML}${chartsHTML}

async function loadSubscriptionPlans() {
  try {
    const resp = await fetch('/api/billing/plans');
    const data = await resp.json();
    if (!data.plans) return;

    let currentPlanCode = 'free';
    const token = localStorage.getItem('genbi-auth-token');
    if (token) {
      try {
        const subResp = await fetch('/api/billing/subscription', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const subData = await subResp.json();
        if (subData.plan) currentPlanCode = subData.plan.plan_code;
      } catch(e) {}
    }

    const grid = document.getElementById('subscriptionPlansGrid');
    if (!grid) return;

    const planColors = { free: '--text-secondary', pro: '--accent-cyan', business: '--accent-violet' };
    grid.innerHTML = data.plans.map(p => {
      const isCurrent = p.code === currentPlanCode;
      const price = p.price_cents === 0 ? 'Free' : '$' + (p.price_cents / 100).toFixed(0) + '/mo';
      const borderColor = isCurrent ? `var(${planColors[p.code] || '--glass-border-bright'})` : 'var(--glass-border)';
      const btnHtml = isCurrent
        ? '<div style="font-size:11px;color:var(--accent-emerald);font-weight:600;margin-top:10px">Current Plan</div>'
        : `<button class="btn ${p.code === 'free' ? 'btn-ghost' : 'btn-primary'}" style="width:100%;margin-top:10px;font-size:12px;padding:8px" onclick="switchPlan('${p.code}')">${p.code === 'free' ? 'Downgrade' : (currentPlanCode === 'free' ? 'Upgrade' : 'Switch')}</button>`;
      return `<div style="padding:16px;border-radius:var(--radius-md);border:1px solid ${borderColor};background:${isCurrent ? 'rgba(255,255,255,0.03)' : 'transparent'};text-align:center">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">${p.name}</div>
        <div style="font-size:22px;font-weight:700;color:var(${planColors[p.code] || '--text-primary'})">${price}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">${p.description || ''}</div>
        ${btnHtml}
      </div>`;
    }).join('');
  } catch(e) {
    console.error('Failed to load subscription plans:', e);
  }
}

const _checkSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
const _xSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

const _featureLabels = {
  ai_queries: 'AI chats / month',
  document_uploads: 'Document uploads / month',
  custom_charts: 'Custom charts',
  export: 'Export (PNG / PDF / CSV)',
  saved_projects: 'Saved projects',
  priority_support: 'Priority support',
};

function _renderPricingCard(plan, currentPlanCode) {
  const isFeatured = plan.code === 'pro';
  const isCurrent = plan.code === currentPlanCode;
  const price = plan.price_cents === 0
    ? '<span class="pricing-price-free">$0</span>'
    : `<span class="pricing-price">$${(plan.price_cents / 100).toFixed(0)}<span>/mo</span></span>`;

  const featureOrder = ['ai_queries', 'document_uploads', 'custom_charts', 'export', 'saved_projects', 'priority_support'];
  const features = featureOrder.map(fk => {
    const ent = plan.entitlements[fk];
    if (!ent) return '';
    const enabled = ent.is_enabled;
    const limit = ent.limit_value;
    const icon = enabled ? _checkSvg : _xSvg;
    const cls = enabled ? '' : ' class="disabled"';
    let label = _featureLabels[fk] || fk;
    if (enabled && limit !== null && limit !== undefined) {
      label = `${limit} ${label.toLowerCase()}`;
    } else if (enabled && limit === null) {
      label = `Unlimited ${label.toLowerCase()}`;
    }
    return `<li${cls}>${icon} ${label}</li>`;
  }).join('');

  let btnLabel = 'Get Started';
  let btnClass = '';
  let btnDisabled = '';
  let btnAction = `switchPlan('${plan.code}')`;

  if (isCurrent) {
    btnLabel = 'Current Plan';
    btnDisabled = ' disabled';
    btnAction = '';
  } else if (plan.code === 'free') {
    if (currentPlanCode === 'free') {
      btnLabel = 'Free Forever';
      btnDisabled = ' disabled';
      btnAction = '';
    } else {
      btnLabel = 'Downgrade to Free';
      btnClass = '';
      btnAction = `switchPlan('free')`;
    }
  } else {
    const planOrder = { free: 0, pro: 1, business: 2 };
    const isUpgrade = (planOrder[plan.code] || 0) > (planOrder[currentPlanCode] || 0);
    btnLabel = isUpgrade ? `Upgrade to ${plan.name}` : `Switch to ${plan.name}`;
    btnClass = ' primary';
  }

  return `<div class="pricing-card${isFeatured ? ' featured' : ''}">
    <div class="pricing-plan-name">${plan.name}</div>
    <div class="pricing-plan-desc">${plan.description || ''}</div>
    ${price}
    <div class="pricing-divider"></div>
    <ul class="pricing-features">${features}</ul>
    <button class="pricing-btn${btnClass}"${btnDisabled}${btnAction ? ` onclick="${btnAction}"` : ''}>${btnLabel}</button>
  </div>`;
}

async function switchPlan(planCode) {
  const token = localStorage.getItem('genbi-auth-token');
  if (!token) {
    window.location.href = '/signup';
    return;
  }

  // Confirm downgrade to free
  if (planCode === 'free') {
    if (!confirm('Downgrade to Free? You\'ll keep your current plan until the end of the billing period.')) return;
  }

  try {
    const resp = await fetch('/api/billing/switch-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ plan_code: planCode }),
    });
    const data = await resp.json();
    if (data.error) {
      toast(data.error, 'error');
      return;
    }
    // Stripe redirect (Checkout or Billing Portal)
    if (data.redirect_url) {
      window.location.href = data.redirect_url;
      return;
    }
    // Immediate result (mock mode or cancel)
    const msg = data.message || 'Plan updated successfully!';
    toast(msg, 'success');
    if (App.currentPage === 'pricing') navigate('pricing');
    else if (App.currentPage === 'subscription') navigate('subscription');
    else if (App.currentPage === 'settings') navigate('settings');
  } catch(e) {
    toast('Plan switch failed. Please try again.', 'error');
  }
}

// ── Billing success polling (after Stripe redirect) ────────────────────
async function pollBillingSuccess(maxAttempts) {
  const token = localStorage.getItem('genbi-auth-token');
  if (!token) return;
  const max = maxAttempts || 15;
  let attempts = 0;
  const poll = async () => {
    attempts++;
    try {
      const resp = await fetch('/api/billing/subscription', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await resp.json();
      const status = data.subscription?.status;
      const planCode = data.plan?.plan_code;
      if (status === 'active' && planCode !== 'free') {
        const el = document.getElementById('billingSuccessStatus');
        if (el) el.innerHTML = '<div style="color:var(--accent-emerald);font-size:16px;font-weight:600">Payment confirmed! Redirecting...</div>';
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
        return;
      }
    } catch(e) {}
    if (attempts < max) {
      setTimeout(poll, 2000);
    } else {
      const el = document.getElementById('billingSuccessStatus');
      if (el) el.innerHTML = '<div style="color:var(--accent-amber)">Still processing. Check your <a href="/dashboard" style="color:var(--accent-cyan);text-decoration:underline">dashboard</a> in a moment.</div>';
    }
  };
  poll();
}

async function billingCancel() {
  const token = localStorage.getItem('genbi-auth-token');
  if (!token) return;
  if (!confirm('Cancel your subscription? You\'ll keep access until the end of your billing period.')) return;
  try {
    const resp = await fetch('/api/billing/cancel', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const data = await resp.json();
    if (data.error) { toast(data.error, 'error'); return; }
    toast('Subscription will cancel at end of period.', 'success');
    navigate('subscription');
  } catch(e) { toast('Failed to cancel.', 'error'); }
}

async function billingResume() {
  const token = localStorage.getItem('genbi-auth-token');
  if (!token) return;
  try {
    const resp = await fetch('/api/billing/resume', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const data = await resp.json();
    if (data.error) { toast(data.error, 'error'); return; }
    toast('Subscription resumed!', 'success');
    navigate('subscription');
  } catch(e) { toast('Failed to resume.', 'error'); }
}

async function loadBillingSection() {
  const token = localStorage.getItem('genbi-auth-token');
  const badge = document.getElementById('billingBadge');
  const content = document.getElementById('billingContent');
  if (!badge || !content) return;

  if (!token) {
    badge.innerHTML = '<span class="billing-plan-badge free">Free</span>';
    content.innerHTML = `<p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px">Sign in to manage your subscription.</p>
      <button class="btn btn-primary" onclick="window.location.href='/login'">Log in</button>`;
    return;
  }

  try {
    const resp = await fetch('/api/billing/subscription', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    if (resp.status === 401) {
      // Token expired — prompt re-login
      badge.innerHTML = '<span class="billing-plan-badge free">Free</span>';
      content.innerHTML = `<p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px">Your session has expired. Please sign in again to view your subscription.</p>
        <button class="btn btn-primary" onclick="window.location.href='/login'">Sign in</button>`;
      return;
    }
    const planCode = data.plan ? data.plan.plan_code : 'free';
    const planName = data.plan ? data.plan.plan_name : 'Free';
    const sub = data.subscription;
    const usage = data.usage || {};

    badge.innerHTML = `<span class="billing-plan-badge ${planCode}">${planName}</span>`;

    let html = '';

    // Usage rows with circular progress rings
    const features = [
      { key: 'ai_queries', label: 'AI Chats', desc: 'AI-powered insights, explanations & recommendations', color: '#818cf8' },
      { key: 'document_uploads', label: 'Document Uploads', desc: 'Upload Excel files for analysis', color: '#60a5fa' },
      { key: 'custom_charts', label: 'Custom Charts', desc: 'Create and save personalized chart configurations', color: '#34d399' },
      { key: 'export', label: 'Exports', desc: 'Download charts as PNG, PDF, or CSV', color: '#fbbf24' },
      { key: 'saved_projects', label: 'Saved Projects', desc: 'Organize your analyses into projects', color: '#f472b6' },
    ];
    html += '<div style="display:flex;flex-direction:column;gap:0;margin-bottom:20px">';
    features.forEach((f, i) => {
      const u = usage[f.key];
      const enabled = u && u.is_enabled;
      const current = u ? (u.current_usage || 0) : 0;
      const limit = (u && u.limit_value !== undefined) ? u.limit_value : null;
      const unlimited = enabled && limit === null;
      const disabled = !enabled;
      const remaining = disabled ? 0 : (unlimited ? null : Math.max(0, (limit || 0) - current));
      const pct = disabled ? 100 : (unlimited ? 0 : (limit > 0 ? Math.min(100, (current / limit) * 100) : 0));
      const ringPct = disabled ? 0 : (unlimited ? 0 : pct);
      const circumference = 2 * Math.PI * 18;
      const dashOffset = circumference - (ringPct / 100) * circumference;
      const ringColor = disabled ? '#4b5563' : f.color;
      const trackColor = disabled ? 'rgba(75,85,99,0.15)' : (ringColor + '22');
      let valueText, statusText, statusColor;
      if (disabled) {
        valueText = '—'; statusText = 'Pro plan'; statusColor = 'var(--text-tertiary)';
      } else if (unlimited) {
        valueText = '∞'; statusText = 'Unlimited'; statusColor = f.color;
      } else {
        valueText = remaining; statusText = current + ' of ' + limit + ' used'; statusColor = 'var(--text-tertiary)';
      }
      const border = i < features.length - 1 ? 'border-bottom:1px solid var(--glass-border);' : '';
      html += `<div style="display:flex;align-items:center;gap:16px;padding:16px 0;${border}">
        <div style="flex-shrink:0;position:relative;width:48px;height:48px">
          <svg width="48" height="48" viewBox="0 0 48 48" style="transform:rotate(-90deg)">
            <circle cx="24" cy="24" r="18" fill="none" stroke="${trackColor}" stroke-width="3.5"/>
            <circle cx="24" cy="24" r="18" fill="none" stroke="${ringColor}" stroke-width="3.5"
              stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
              stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/>
          </svg>
          <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${disabled ? '14px' : (String(valueText).length > 2 ? '11px' : '14px')};font-weight:700;color:${disabled ? 'var(--text-tertiary)' : 'var(--text-primary)'}">${valueText}</span>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:2px">${f.label}</div>
          <div style="font-size:11px;color:var(--text-tertiary);line-height:1.3">${f.desc}</div>
        </div>
        <div style="flex-shrink:0;text-align:right">
          ${disabled
            ? '<span style="font-size:11px;padding:3px 8px;border-radius:10px;background:rgba(139,92,246,0.1);color:#a78bfa">Upgrade</span>'
            : '<span style="font-size:12px;color:' + statusColor + '">' + statusText + '</span>'
          }
        </div>
      </div>`;
    });
    html += '</div>';

    // Subscription info
    if (sub && planCode !== 'free') {
      const endDate = new Date(sub.current_period_end).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      if (sub.cancel_at_period_end) {
        html += `<p style="font-size:13px;color:var(--accent-rose);margin:16px 0 12px">Cancels on ${endDate}</p>
          <button class="btn btn-primary" onclick="billingResume()">Resume Subscription</button>`;
      } else {
        html += `<p style="font-size:13px;color:var(--text-tertiary);margin:16px 0 12px">Renews on ${endDate}</p>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost" onclick="navigate('pricing')">Change Plan</button>
            <button class="btn btn-ghost" style="color:var(--accent-rose);border-color:rgba(239,68,68,0.3)" onclick="billingCancel()">Cancel</button>
          </div>`;
      }
    } else {
      html += `<div style="margin-top:16px"><button class="btn btn-primary" onclick="navigate('pricing')">Upgrade Plan</button></div>`;
    }

    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = '<p style="font-size:13px;color:var(--text-tertiary)">Could not load billing info.</p>';

function renderKIList() {
  let items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return '<div style="text-align:center;padding:40px 0;color:var(--text-tertiary);font-size:13px">Click "Analyze" to discover key influencers</div>';
  const isIncDir = App.kiState.direction === 'increase';
  // Filter by search query
  const q = (App.kiState.searchQuery || '').toLowerCase();
  if (q) {
    items = items.filter(inf => inf.factor.toLowerCase().includes(q) || String(inf.value).toLowerCase().includes(q) || (inf.explanation || '').toLowerCase().includes(q));
  }
  // Sort: pinned first, then by impact
  items.sort((a, b) => {
    const aPinned = isKIPinned(a.factor, a.value) ? 1 : 0;
    const bPinned = isKIPinned(b.factor, b.value) ? 1 : 0;
    if (aPinned !== bPinned) return bPinned - aPinned;
    return isIncDir ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue;
  });
  const maxMult = Math.max(...items.map(inf => Math.abs(inf.multiplier - 1)));
  return items.map((inf, i) => {
    const allIdx = App.kiState.influencers.indexOf(inf);
    const barPct = maxMult > 0 ? (Math.abs(inf.multiplier - 1) / maxMult) * 100 : 50;
    const isInc = inf.direction === 'increase';
    const barGrad = isInc ? 'linear-gradient(90deg,#00b482,#20c997,#69f0ae)' : 'linear-gradient(90deg,#b42850,#D13438,#ff6b9d)';
    const multLabel = isInc ? inf.multiplier.toFixed(2) + 'x higher' : inf.multiplier.toFixed(2) + 'x lower';
    const conf = computeKIConfidence(inf);
    const pinned = isKIPinned(inf.factor, inf.value);
    return '<div class="ki-item' + (allIdx === App.kiState.selectedIdx ? ' selected' : '') + '" onclick="selectKIItem('+allIdx+')">' +
      '<div class="ki-item-header"><span class="ki-item-factor">' + kiLabel(inf.factor, inf.value) + '</span>' +
      '<span style="display:flex;align-items:center;gap:4px">' +
        '<span class="ki-item-mult ' + inf.direction + '">' + multLabel + '</span>' +
        '<span class="ki-confidence ' + conf + '">' + conf + '</span>' +
        '<button class="ki-pin-btn' + (pinned ? ' pinned' : '') + '" onclick="event.stopPropagation();toggleKIPin(\'' + inf.factor.replace(/'/g,"\\'") + '\',\'' + String(inf.value).replace(/'/g,"\\'") + '\')">★</button>' +
      '</span></div>' +
      '<div class="ki-item-desc">' + (inf.explanation || 'When ' + inf.factor.replace(/_/g,' ') + ' is ' + inf.value + ', ' + App.kiState.metric.replace(/_/g,' ') + ' is ' + multLabel) + '</div>' +
      '<div class="ki-bar-track"><div class="ki-bar-fill" style="width:' + barPct + '%;background:' + barGrad + '"></div></div></div>';
  }).join('');
}

function kiLabel(factor, value) {
  const f = factor.replace(/_/g, ' ');
  const v = String(value);
  if (f === v || f.toLowerCase() === v.toLowerCase()) return f;
  return f + ' = ' + v;
}

function filterKIList(query) {
  App.kiState.searchQuery = query;
  const listEl = document.getElementById('kiList');
  if (listEl) listEl.innerHTML = renderKIList();
}

function computeKIConfidence(inf) {
  const count = inf.count || 0;
  const effect = Math.abs(inf.multiplier - 1);
  if (count >= 30 && effect > 0.25) return 'high';
  if (count >= 10 && effect > 0.15) return 'medium';
  return 'low';
}

function isKIPinned(factor, value) {
  return App.kiState.pins.some(p => p.factor === factor && p.value === value);
}

function toggleKIPin(factor, value) {
  const idx = App.kiState.pins.findIndex(p => p.factor === factor && p.value === value);
  if (idx >= 0) App.kiState.pins.splice(idx, 1);
  else App.kiState.pins.push({ factor, value });
  localStorage.setItem('genbi_ki_pins', JSON.stringify(App.kiState.pins));
  const listEl = document.getElementById('kiList');
  if (listEl) listEl.innerHTML = renderKIList();
}

}

// Resolve the actual column name for a factor — handles cases where AI
// returns a value as the factor name (e.g. factor="Vaccines" when the
// real column is "Therapeutic_Area" which contains value "Vaccines").
function resolveKIFactorCol(factor, value) {
  if (!App.excelData) return factor;
  const headers = App.excelData.headers;
  // 1. Exact match — factor is already a valid column name
  if (headers.includes(factor)) return factor;
  // 2. Try with underscores replaced by spaces and vice-versa
  const alt = factor.includes('_') ? factor.replace(/_/g, ' ') : factor.replace(/ /g, '_');
  if (headers.includes(alt)) return alt;
  // 3. Factor is actually a value — find the column that contains it
  const rows = App.excelData.rows;
  const ec = App.excelChartConfig;
  const cats = ec ? (ec.categoricals || []) : headers;
  for (const col of cats) {
    for (let i = 0; i < Math.min(rows.length, 200); i++) {
      if (String(rows[i][col] || '').trim() === String(value || factor).trim()) return col;
    }
  }
  return factor;
}

function drawKIFactorChart() {
  const canvas = document.getElementById('kiFactorChart');
  if (!canvas) return;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf || !App.excelData) return;
  const metric = App.kiState.metric;
  const factor = resolveKIFactorCol(inf.factor, inf.value);
  const rows = App.excelData.rows;

  // Compute avg metric for each value of this factor
  const groups = {};
  rows.forEach(r => {
    const v = String(r[factor] || '').trim();
    if (!v) return;
    if (!groups[v]) groups[v] = [];
    groups[v].push(parseFloat(r[metric]) || 0);
  });
  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k, value: v.reduce((a,b) => a+b, 0) / v.length
  })).sort((a,b) => b.value - a.value);
  entries = entries.slice(0, 12); // limit

  const labels = entries.map(e => e.label);
  const data = entries.map(e => Math.round(e.value * 100) / 100);

  // Highlight the selected value
  const highlightIdx = labels.indexOf(inf.value);
  const isInc = inf.direction === 'increase';
  animateBarChart(canvas, labels, data, isInc ? 'cyan' : 'rose', {
    suffix: '', xLabel: factor.replace(/_/g,' '), yLabel: metric.replace(/_/g,' '),
    _highlightIdx: highlightIdx
  });
}

function drawKIOverviewChart(canvas, animate) {
  if (!canvas) return;
  if (canvas._kiAnimId) { cancelAnimationFrame(canvas._kiAnimId); canvas._kiAnimId = null; }
  const items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return;

  // Sort: increase = highest avgWhenTrue first, decrease = lowest first
  const isInc = App.kiState.direction === 'increase';
  items.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;

  const padL = 180, padR = 70, padT = 20, padB = 30;
  const cw = w - padL - padR, ch = h - padT - padB;
  const overallAvg = items[0]?.overallAvg || 0;

  const allVals = items.map(inf => inf.avgWhenTrue);
  allVals.push(overallAvg);
  const maxVal = Math.ceil(Math.max(...allVals) * 1.15 / 10) * 10 || 100;

  const barH = Math.min(28, Math.max(14, (ch - (items.length - 1) * 6) / items.length));
  const gap = Math.min(6, (ch - items.length * barH) / Math.max(items.length - 1, 1));
  const totalH = items.length * barH + (items.length - 1) * gap;
  const startY = padT + (ch - totalH) / 2;

  function drawFrame(progress) {
    ctx.clearRect(0, 0, w, h);

    // Grid lines
    for (let i = 0; i <= 4; i++) {
      const x = padL + (cw / 4) * i;
      ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
      ctx.moveTo(x, padT); ctx.lineTo(x, h - padB); ctx.stroke();
      ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'center';
      ctx.fillText(Math.round((maxVal / 4) * i).toLocaleString(), x, h - padB + 14);
    }

    // Overall avg reference line
    const avgX = padL + (overallAvg / maxVal) * cw;
    ctx.globalAlpha = progress;
    ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.3); ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]); ctx.moveTo(avgX, padT - 4); ctx.lineTo(avgX, h - padB + 4); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = chartTextColor(0.5); ctx.font = '500 10px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Overall Avg: ' + overallAvg.toLocaleString('en-US',{maximumFractionDigits:0}), avgX, padT - 6);
    ctx.globalAlpha = 1;

    // Bars
    items.forEach((inf, i) => {
      // Stagger each bar slightly
      const stagger = animate ? Math.max(0, Math.min(1, (progress - i * 0.04) / 0.7)) : 1;
      const easedP = 1 - Math.pow(1 - stagger, 3); // ease-out cubic
      const y = startY + i * (barH + gap);
      const fullBarW = (inf.avgWhenTrue / maxVal) * cw;
      const barW = fullBarW * easedP;
      const r = Math.min(3, barH / 2);
      const isSelected = App.kiState.influencers.indexOf(inf) === App.kiState.selectedIdx;
      const alpha = isSelected ? 0.95 : 0.70;

      // Bar with gradient colors
      if (barW > 0.5) {
        const grad = ctx.createLinearGradient(padL, 0, padL + barW, 0);
        if (isInc) {
          // Teal → Emerald → Bright green gradient
          grad.addColorStop(0, 'rgba(0,180,130,' + (alpha * 0.35) + ')');
          grad.addColorStop(0.5, 'rgba(32,201,151,' + (alpha * 0.7) + ')');
          grad.addColorStop(1, 'rgba(105,240,174,' + alpha + ')');
        } else {
          // Deep rose → Red → Warm coral gradient
          grad.addColorStop(0, 'rgba(180,40,80,' + (alpha * 0.35) + ')');
          grad.addColorStop(0.5, 'rgba(209,52,56,' + (alpha * 0.7) + ')');
          grad.addColorStop(1, 'rgba(255,107,157,' + alpha + ')');
        }
        ctx.beginPath();
        ctx.moveTo(padL, y); ctx.lineTo(padL + barW - r, y);
        ctx.quadraticCurveTo(padL + barW, y, padL + barW, y + r);
        ctx.lineTo(padL + barW, y + barH - r);
        ctx.quadraticCurveTo(padL + barW, y + barH, padL + barW - r, y + barH);
        ctx.lineTo(padL, y + barH); ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();

        if (isSelected) {
          const glowRgb = isInc ? '105,240,174' : '255,107,157';
          ctx.save(); ctx.shadowColor = 'rgba(' + glowRgb + ',0.35)'; ctx.shadowBlur = 12; ctx.fill(); ctx.restore();
          ctx.strokeStyle = 'rgba(' + glowRgb + ',0.5)'; ctx.lineWidth = 1; ctx.stroke();
        }
      }

      // Label (left side) — always visible
      ctx.fillStyle = chartTextColor(isSelected ? 0.95 : 0.6);
      ctx.font = (isSelected ? '500 ' : '') + '11px Inter'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      const lbl = kiLabel(inf.factor, inf.value);
      const truncLbl = lbl.length > 24 ? lbl.substring(0, 23) + '..' : lbl;
      ctx.fillText(truncLbl, padL - 8, y + barH / 2);

      // Value (right of bar) — fade in with bar
      const valRgb = isInc ? '105,240,174' : '255,107,157';
      ctx.globalAlpha = easedP;
      ctx.fillStyle = 'rgba(' + valRgb + ',' + (isSelected ? 1 : 0.75) + ')';
      ctx.font = (isSelected ? 'bold ' : '') + '11px Inter'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      const multLabel = inf.multiplier.toFixed(2) + 'x';
      ctx.fillText(inf.avgWhenTrue.toLocaleString('en-US',{maximumFractionDigits:0}) + ' (' + multLabel + ')', padL + barW + 8, y + barH / 2);
      ctx.globalAlpha = 1;
    });

    ctx.textBaseline = 'alphabetic';
  }

  if (animate) {
    const dur = 700;
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / dur);
      drawFrame(t);
      if (t < 1) canvas._kiAnimId = requestAnimationFrame(tick);
      else canvas._kiAnimId = null;
    }
    canvas._kiAnimId = requestAnimationFrame(tick);
  } else {
    drawFrame(1);
  }

  // Store hit areas for click interaction
  canvas._kiItems = items;
  canvas._kiLayout = { startY, barH, gap };
  if (!canvas._hasKIEvents) {
    canvas._hasKIEvents = true;
    canvas.addEventListener('click', function(e) {
      const r = canvas.getBoundingClientRect();
      const my = e.clientY - r.top;
      const sorted = canvas._kiItems;
      const layout = canvas._kiLayout;
      if (!sorted || !layout) return;
      for (let i = 0; i < sorted.length; i++) {
        const y = layout.startY + i * (layout.barH + layout.gap);
        if (my >= y && my <= y + layout.barH) {
          const allIdx = App.kiState.influencers.indexOf(sorted[i]);
          selectKIItem(allIdx);
          drawKIOverviewChart(canvas, false);
          return;
        }
      }
    });
  }
}

function runKeyInfluencers() {
  if (!App.hasExcelData || !App.kiState.metric) return;
  App.kiState._animateNext = true;
  const ec = App.excelChartConfig;
  const metric = App.kiState.metric;
  const rows = App.excelData.rows;

  // Show loading overlay and disable button
  App.kiState.loading = true;
  const btn = document.getElementById('kiRunBtn');
  if (btn) { btn.textContent = 'Analyzing...'; btn.disabled = true; }
  showKILoading();

  // Compute grouped averages for the prompt / local fallback
  const overallVals = rows.map(r => parseFloat(r[metric]) || 0);
  const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;
  const cats = ec.categoricals || [];
  const groupedAvgs = {};
  cats.forEach(cat => {
    const groups = {};
    rows.forEach(r => {
      const v = String(r[cat] || '').trim();
      if (!v) return;
      if (!groups[v]) groups[v] = [];
      groups[v].push(parseFloat(r[metric]) || 0);
    });
    groupedAvgs[cat] = {};
    Object.entries(groups).forEach(([val, vals]) => {
      groupedAvgs[cat][val] = { avg: vals.reduce((a,b)=>a+b,0)/vals.length, count: vals.length };
    });
  });

  if (isLoggedIn()) {
    // AI-powered analysis
    const colMetaClean = {};
    Object.entries(ec.colMeta).forEach(([k, v]) => {
      colMetaClean[k] = { ...v, vals: undefined, uniqueVals: v.uniqueVals?.slice(0,15) };
    });
    const token = localStorage.getItem('genbi-auth-token');

    fetch('/api/key-influencers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        metric,
        columns: App.excelData.headers,
        colMeta: colMetaClean,
        summary: {
          rowCount: rows.length,
          [metric]: { avg: overallAvg, min: Math.min(...overallVals), max: Math.max(...overallVals) },
          groupedAvgs
        }
      })
    })
    .then(r => r.json())
    .then(data => {
      App.kiState.loading = false;
      hideKILoading();
      if (data.error) {
        toast(data.error, 'error');
        computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      } else {
        App.kiState.influencers = data.influencers || [];
        App.kiState.selectedIdx = -1;
      }
      navigate('influencers');
    })
    .catch(err => {
      App.kiState.loading = false;
      hideKILoading();
      toast('AI request failed, using local analysis. ' + err.message, 'info');
      computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      navigate('influencers');
    });
  } else {
    // Local fallback — brief delay so the loading animation is visible
    setTimeout(() => {
      computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      App.kiState.loading = false;
      hideKILoading();
      navigate('influencers');
    }, 1200);
  }
}

function computeLocalInfluencers(metric, overallAvg, groupedAvgs) {
  const influencers = [];
  Object.entries(groupedAvgs).forEach(([col, groups]) => {
    Object.entries(groups).forEach(([val, stats]) => {
      if (stats.count < 2) return; // skip tiny groups
      const mult = overallAvg > 0 ? stats.avg / overallAvg : 1;
      if (Math.abs(mult - 1) < 0.10) return; // skip insignificant
      influencers.push({
        factor: col,
        value: val,
        direction: mult >= 1 ? 'increase' : 'decrease',
        avgWhenTrue: Math.round(stats.avg * 100) / 100,
        overallAvg: Math.round(overallAvg * 100) / 100,
        multiplier: Math.round(mult * 100) / 100,
        count: stats.count,
        explanation: 'When ' + col.replace(/_/g,' ') + ' is ' + val + ', average ' + metric.replace(/_/g,' ') + ' is ' + (mult >= 1 ? (mult.toFixed(2) + 'x higher') : (mult.toFixed(2) + 'x lower')) + ' than overall.'
      });
    });
  });

  // Sort by absolute deviation from 1.0
  influencers.sort((a, b) => Math.abs(b.multiplier - 1) - Math.abs(a.multiplier - 1));
  App.kiState.influencers = influencers.slice(0, 10);
  App.kiState.selectedIdx = -1;
}

function drawKIWaterfallChart() {
  const canvas = document.getElementById('kiWaterfallChart');
  if (!canvas) return;
  const items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return;
  const isInc = App.kiState.direction === 'increase';
  items.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);
  const overallAvg = items[0]?.overallAvg || 0;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const padL = 30, padR = 20, padT = 30, padB = 80;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Build waterfall data: start with overall avg, each factor adds its delta
  const wfData = [{ label: 'Overall Avg', value: overallAvg, isTotal: true }];
  let running = overallAvg;
  items.slice(0, 8).forEach(inf => {
    const delta = inf.avgWhenTrue - overallAvg;
    wfData.push({ label: kiLabel(inf.factor, inf.value), value: delta, start: running, isTotal: false });
    running += delta;
  });
  wfData.push({ label: 'Combined', value: running, isTotal: true });

  const allVals = [];
  let run2 = overallAvg;
  wfData.forEach(d => {
    if (d.isTotal) { allVals.push(d.value); }
    else { allVals.push(run2); allVals.push(run2 + d.value); run2 += d.value; }
  });
  const minVal = Math.min(0, ...allVals) * 0.9;
  const maxVal = Math.max(...allVals) * 1.15 || 100;
  const range = maxVal - minVal;

  const barW = Math.min(40, (cw - (wfData.length - 1) * 4) / wfData.length);
  const gap = 4;
  const totalW = wfData.length * barW + (wfData.length - 1) * gap;
  const startX = padL + (cw - totalW) / 2;

  ctx.clearRect(0, 0, w, h);
  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    const val = maxVal - (range / 4) * i;
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(val).toLocaleString(), padL - 4, y + 3);
  }

  let runStart = overallAvg;
  wfData.forEach((d, i) => {
    const x = startX + i * (barW + gap);
    let barTop, barBot;
    if (d.isTotal) {
      barTop = padT + ((maxVal - d.value) / range) * ch;
      barBot = padT + ((maxVal - 0) / range) * ch;
      ctx.fillStyle = 'rgba(150,150,150,0.5)';
    } else {
      const top = Math.max(d.start, d.start + d.value);
      const bot = Math.min(d.start, d.start + d.value);
      barTop = padT + ((maxVal - top) / range) * ch;
      barBot = padT + ((maxVal - bot) / range) * ch;
      ctx.fillStyle = d.value >= 0 ? 'rgba(16,124,16,0.7)' : 'rgba(209,52,56,0.7)';
      runStart += d.value;
    }
    const bh = Math.max(2, barBot - barTop);
    const r2 = Math.min(3, bh / 2);
    ctx.beginPath(); ctx.moveTo(x + r2, barTop); ctx.lineTo(x + barW - r2, barTop); ctx.quadraticCurveTo(x + barW, barTop, x + barW, barTop + r2); ctx.lineTo(x + barW, barTop + bh - r2); ctx.quadraticCurveTo(x + barW, barTop + bh, x + barW - r2, barTop + bh); ctx.lineTo(x + r2, barTop + bh); ctx.quadraticCurveTo(x, barTop + bh, x, barTop + bh - r2); ctx.lineTo(x, barTop + r2); ctx.quadraticCurveTo(x, barTop, x + r2, barTop); ctx.closePath();
    ctx.fill();

    // Value label
    ctx.fillStyle = chartTextColor(0.6); ctx.font = '500 10px Inter'; ctx.textAlign = 'center';
    const valStr = d.isTotal ? Math.round(d.value).toLocaleString() : (d.value >= 0 ? '+' : '') + Math.round(d.value).toLocaleString();
    ctx.fillText(valStr, x + barW / 2, barTop - 4);

    // X label (rotated)
    ctx.save();
    ctx.translate(x + barW / 2, h - padB + 8);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    const lbl = d.label.length > 18 ? d.label.slice(0, 16) + '..' : d.label;
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });
}

function drawKIScatterChart() {
  const canvas = document.getElementById('kiScatterChart');
  if (!canvas || !App.excelData) return;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf) return;
  const metric = App.kiState.metric;
  const factor = resolveKIFactorCol(inf.factor, inf.value);
  const rows = App.excelData.rows;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const padL = 50, padR = 30, padT = 20, padB = 80;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Collect unique factor values and metric values
  const factorVals = [];
  const points = [];
  rows.forEach(r => {
    const fv = String(r[factor] || '').trim();
    const mv = parseFloat(r[metric]);
    if (!fv || isNaN(mv)) return;
    if (!factorVals.includes(fv)) factorVals.push(fv);
    points.push({ fv, mv, fvIdx: factorVals.indexOf(fv) });
  });
  // Update indices after all values collected
  points.forEach(p => p.fvIdx = factorVals.indexOf(p.fv));

  // Limit to 10 categories max; keep the highlighted value always visible
  let displayVals = factorVals.slice(0, 10);
  if (!displayVals.includes(inf.value) && factorVals.includes(inf.value)) {
    displayVals[displayVals.length - 1] = inf.value;
  }
  const displayPoints = points.filter(p => displayVals.includes(p.fv));
  displayPoints.forEach(p => p.fvIdx = displayVals.indexOf(p.fv));

  if (displayPoints.length === 0) return;
  const minY = Math.min(...displayPoints.map(p => p.mv));
  const maxY = Math.max(...displayPoints.map(p => p.mv)) || 1;
  const rangeY = maxY - minY || 1;

  ctx.clearRect(0, 0, w, h);
  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    const val = maxY - (rangeY / 4) * i;
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0), padL - 6, y + 3);
  }

  // Overall avg reference line
  const clampedAvg = Math.max(minY, Math.min(maxY, inf.overallAvg));
  const avgY = padT + ((maxY - clampedAvg) / rangeY) * ch;
  ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.3); ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]); ctx.moveTo(padL, avgY); ctx.lineTo(w - padR, avgY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'left';
  ctx.fillText('Avg: ' + inf.overallAvg.toFixed(0), w - padR + 2, avgY + 3);

  // Column dividers + dots
  const colW = cw / Math.max(displayVals.length, 1);
  // Light vertical separators
  displayVals.forEach((fv, i) => {
    const x = padL + i * colW;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
  });

  // Draw dots with jitter (seeded per-point for stable rendering)
  displayPoints.forEach((p, pi) => {
    const jitter = ((pi * 2654435761 >>> 0) % 1000) / 1000 - 0.5; // deterministic jitter
    const x = padL + p.fvIdx * colW + colW / 2 + jitter * colW * 0.5;
    const y = padT + ((maxY - p.mv) / rangeY) * ch;
    const isHighlight = p.fv === inf.value;
    ctx.beginPath(); ctx.arc(x, y, isHighlight ? 4.5 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = isHighlight ? 'rgba(0,229,255,0.85)' : 'rgba(150,150,150,0.25)';
    ctx.fill();
    if (isHighlight) { ctx.strokeStyle = 'rgba(0,229,255,0.4)'; ctx.lineWidth = 1; ctx.stroke(); }
  });

  // X-axis labels — rotated -45°
  displayVals.forEach((fv, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + ch + 10;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = fv === inf.value ? 'rgba(0,229,255,0.9)' : chartTextColor(0.45);
    ctx.font = (fv === inf.value ? '600 ' : '') + '10px Inter';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    const lbl = fv.length > 14 ? fv.slice(0, 12) + '..' : fv;
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });
}

// ── A6: Sensitivity Slider ──
function updateKISensitivity(pct) {
  const el = document.getElementById('kiSensePct');
  const res = document.getElementById('kiSenseResult');
  if (el) el.textContent = pct;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf || !res) return;
  const newAvg = inf.overallAvg + (pct / 100) * (inf.avgWhenTrue - inf.overallAvg);
  const changePct = inf.overallAvg > 0 ? ((newAvg - inf.overallAvg) / inf.overallAvg * 100).toFixed(1) : 0;
  res.innerHTML = 'Projected avg: <strong>' + newAvg.toLocaleString('en-US', {maximumFractionDigits:1}) + '</strong> <span style="color:' + (changePct >= 0 ? '#107C10' : '#D13438') + '">(' + (changePct >= 0 ? '+' : '') + changePct + '%)</span>';
}

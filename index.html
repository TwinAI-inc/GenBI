function insertColName(col) {
  const input = document.getElementById('assistantInput');
  if (input) { input.value += col + ' '; input.focus(); }
}

function useExamplePrompt(btn) {
  const input = document.getElementById('assistantInput');
  if (!input) return;
  input.value = btn.textContent.trim();
  sendAssistantMsg();
}

function clearAllCustomCharts() {
  if (!App.customCharts || App.customCharts.length === 0) return;
  App.customCharts = [];
  App.assistantMessages = [];
  navigate('analytics');
  setTimeout(() => drawCustomCharts(), 200);
  toast('All custom charts cleared', 'info');
}

function buildSmartExamples() {
  const ec = App.excelChartConfig;
  if (!ec || !ec.colMeta || Object.keys(ec.colMeta).length === 0) {
    return ['Revenue trends over time','Top categories by total','Compare metrics across groups','Distribution breakdown by type']
      .map(p => '<button class="assistant-prompt-chip" onclick="useExamplePrompt(this)">'+p+'</button>').join('');
  }

  // Filter to meaningful columns only — skip IDs, indexes, keys
  const skipPattern = /\b(id|key|code|index|row|number|no)\b/i;
  const metrics = (ec.metrics || []).filter(m => !skipPattern.test(m));
  const cats = (ec.categoricals || []).filter(c => {
    if (skipPattern.test(c)) return false;
    const meta = ec.colMeta[c];
    // Good categories: 2-15 unique values, not just single values
    return meta && meta.uniqueCount >= 2 && meta.uniqueCount <= 15;
  });
  const dates = Object.keys(ec.colMeta).filter(h => ec.colMeta[h].isDate);
  const fmt = s => s.replace(/_/g, ' ');

  // Rank metrics by business value — revenue/cost/profit first, scores/rates second
  const metricRank = m => {
    const l = m.toLowerCase();
    if (/revenue|sales|income|profit/.test(l)) return 0;
    if (/cost|expense|spend|price/.test(l)) return 1;
    if (/margin|roi|npv/.test(l)) return 2;
    if (/score|rate|percent|share/.test(l)) return 3;
    return 4;
  };
  metrics.sort((a, b) => metricRank(a) - metricRank(b));

  // Rank categories — prefer product/name/region/type over stage/status
  const catRank = c => {
    const l = c.toLowerCase();
    if (/product|name|brand/.test(l)) return 0;
    if (/region|area|country|location/.test(l)) return 1;
    if (/category|type|class|therapeutic/.test(l)) return 2;
    if (/stage|status|level|risk/.test(l)) return 3;
    return 4;
  };
  cats.sort((a, b) => catRank(a) - catRank(b));

  const prompts = [];
  const m1 = metrics[0]; // primary metric (e.g. Revenue)
  const m2 = metrics.length > 1 ? metrics[1] : null; // secondary metric (e.g. Cost)
  const c1 = cats[0]; // primary category (e.g. Product Name)
  const c2 = cats.length > 1 ? cats[1] : null; // secondary category
  const d1 = dates[0]; // primary date column

  // 1) Multi-line trend — most insightful: shows how each category performs over time
  if (d1 && m1 && c1) {
    prompts.push(fmt(m1) + ' trend by ' + fmt(c1));
  }

  // 2) Bar chart — rank categories by primary metric to see top/bottom performers
  if (c1 && m1) {
    prompts.push('Top ' + fmt(c1) + ' by total ' + fmt(m1));
  }

  // 3) Pie/donut — show market share or distribution by category
  if (c1 && m2) {
    prompts.push(fmt(m2) + ' share by ' + fmt(c1));
  } else if (c2 && m1) {
    prompts.push(fmt(m1) + ' breakdown by ' + fmt(c2));
  }

  // 4) Comparison — average of a score/rate metric by category for benchmarking
  if (m2 && c1) {
    const rateMetric = metrics.find(m => /score|rate|percent|margin|compliance|roi/i.test(m));
    if (rateMetric) {
      const cat = c2 || c1;
      prompts.push('Average ' + fmt(rateMetric) + ' by ' + fmt(cat));
    } else {
      prompts.push('Compare ' + fmt(m1) + ' vs ' + fmt(m2) + ' by ' + fmt(c1));
    }
  }

  // Ensure exactly 4 — fill with sensible fallbacks
  if (prompts.length < 4 && d1 && m1) prompts.push(fmt(m1) + ' trend over time');
  if (prompts.length < 4 && c2 && m1) prompts.push(fmt(m1) + ' by ' + fmt(c2));
  if (prompts.length < 4 && m2) prompts.push('Distribution of ' + fmt(m2));
  if (prompts.length < 4) prompts.push('Show me the key insights');

  return [...new Set(prompts)].slice(0, 4)
    .map(p => '<button class="assistant-prompt-chip" onclick="useExamplePrompt(this)">'+p+'</button>').join('');
}

function sendAssistantMsg() {
  const input = document.getElementById('assistantInput');
  const text = input?.value?.trim();
  if (!text) return;
  const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  App.assistantMessages.push({ role: 'user', text, time });
  const msgs = document.getElementById('assistantMessages');
  msgs.insertAdjacentHTML('beforeend', '<div class="chat-msg sent">' + text + '<div class="chat-msg-time">' + time + '</div></div>');
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;

  if (!App.excelData) {
    addAssistantReply('Please upload a dataset first (Excel or CSV) so I can create charts from your data.');
    return;
  }

  if (isLoggedIn()) {
    // AI-powered mode
    const ec = App.excelChartConfig;
    const sampleRows = App.excelData.rows.slice(0, 3);
    const token = localStorage.getItem('genbi-auth-token');

    // Check if this is a modify intent with a focused chart
    if (isModifyIntent(text) && App._focusedChart) {
      const fc = App._focusedChart;
      const focusedChart = getChartForAskAi(fc.source, fc.idx);
      if (!focusedChart) {
        addAssistantReply('The selected chart is no longer available. Please click the &#9889; menu on a chart first.');
        return;
      }
      addAssistantReply('<span style="color:var(--accent-amber)">Modifying chart...</span>', true);
      fetch('/api/chart-modify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          message: text,
          currentChart: {
            chartType: focusedChart._userType || focusedChart.type || 'bar',
            xCol: focusedChart.xCol || '',
            yCol: focusedChart.yCol || '',
            aggFn: focusedChart.aggFn || 'sum',
            color: focusedChart._userColor || focusedChart.color || 'cyan',
            title: focusedChart.title || '',
            groupCol: focusedChart.groupCol || null
          },
          columns: App.excelData.headers,
          sampleRows,
          colMeta: ec.colMeta || {}
        })
      })
      .then(r => r.json())
      .then(data => {
        removeThinkingMsg();
        if (data.error) { addAssistantReply(data.error); return; }
        const ok = applyChartModification(fc.source, fc.idx, data);
        if (ok) {
          addAssistantReply('&#10003; Updated <strong>' + (data.title || focusedChart.title) + '</strong>' + (data.explanation ? ': ' + data.explanation : ''));
        } else {
          addAssistantReply('Could not apply the modification. Try rephrasing your request.');
        }
      })
      .catch(err => {
        removeThinkingMsg();
        addAssistantReply('Connection error: ' + err.message);
      });
      return;
    }

    if (isModifyIntent(text) && !App._focusedChart) {
      addAssistantReply('Please click the &#9889; menu on a chart first to select it, then ask me to modify it.');
      return;
    }

    // Create new chart (existing behavior)
    addAssistantReply('<span style="color:var(--accent-amber)">Thinking...</span>', true);
    fetch('/api/chart-assist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        message: text,
        columns: App.excelData.headers,
        sampleRows,
        colMeta: ec.colMeta || {}
      })
    })
    .then(r => r.json())
    .then(data => {
      removeThinkingMsg();
      if (data.error) {
        addAssistantReply(data.error);
        return;
      }
      // Build chart from AI response
      const chart = buildChartFromAI(data);
      if (chart) {
        chart.desc = data.explanation || '';
        // Duplicate check: same type + xCol + yCol + aggFn
        const isDup = App.customCharts.some(c => c.type === chart.type && c.xCol === chart.xCol && c.yCol === chart.yCol && (c.aggFn || 'sum') === (chart.aggFn || 'sum'));
        if (isDup) {
          addAssistantReply('This chart already exists: <strong>' + data.title + '</strong>. Scroll up to see it on the Analytics page.');
          return;
        }
        App.customCharts.unshift(chart);
        addAssistantReply('Created ' + data.chartType + ' chart: <strong>' + data.title + '</strong>' + (data.explanation ? '<br><span style="font-size:11px;color:var(--text-tertiary)">' + data.explanation + '</span>' : ''));
        if (App.currentPage === 'analytics') {
          navigate('analytics');
          setTimeout(() => drawCustomCharts(), 200);
        }
      } else {
        addAssistantReply('Could not build the chart. Try rephrasing your request.');
      }
    })
    .catch(err => {
      removeThinkingMsg();
      addAssistantReply('Connection error: ' + err.message + '. Make sure the server is running.');
    });
  } else {
    // Fallback: keyword-based parsing
    setTimeout(() => {
      const result = parseChartRequest(text);
      if (result.error) {
        addAssistantReply(result.error);
      } else {
        const rc = result.chart;
        const isDup = App.customCharts.some(c => c.type === rc.type && c.xCol === rc.xCol && c.yCol === rc.yCol && (c.aggFn || 'sum') === (rc.aggFn || 'sum'));
        if (isDup) {
          addAssistantReply('This chart already exists: <strong>' + rc.title + '</strong>. Scroll up to see it on the Analytics page.');
          return;
        }
        App.customCharts.unshift(rc);
        addAssistantReply(result.message);
        if (App.currentPage === 'analytics') {
          navigate('analytics');
          setTimeout(() => drawCustomCharts(), 200);
        }
      }
    }, 400);
  }
}

function addAssistantReply(text, isThinking) {
  const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (!isThinking) App.assistantMessages.push({ role: 'assistant', text, time });
  const msgs = document.getElementById('assistantMessages');
  if (msgs) {
    msgs.insertAdjacentHTML('beforeend', '<div class="chat-msg received' + (isThinking ? ' thinking-msg' : '') + '">' + text + '<div class="chat-msg-time">' + time + '</div></div>');
    msgs.scrollTop = msgs.scrollHeight;
  }
}

function removeThinkingMsg() {
  const msgs = document.getElementById('assistantMessages');
  if (msgs) {
    const thinking = msgs.querySelector('.thinking-msg');
    if (thinking) thinking.remove();
  }
}

function buildChartFromAI(aiResponse) {
  const rows = App.excelData.rows;
  const ec = App.excelChartConfig;
  const { chartType, xCol, yCol, aggFn, title, groupCol } = aiResponse;

  // Donut with single column (yCol is null)
  if (chartType === 'donut' && xCol && !yCol) {
    const counts = {};
    rows.forEach(r => { const v = String(r[xCol] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e[0]);
    const data = topN.map(e => e[1]);
    if (rest.length > 0) { labels.push('Other (' + rest.length + ')'); data.push(rest.reduce((s, e) => s + e[1], 0)); }
    return { type: 'donut', title, labels, data, color: 'multi' };
  }

  if (!xCol) return null;

  // Multi-series line chart when groupCol is present
  if (chartType === 'line' && groupCol && yCol) {
    const fn = aggFn || 'sum';
    const seriesColors = linePalettes['GenBI'];
    // Collect data grouped by groupCol and xCol
    const grouped = {}; // { groupVal: { xVal: [numbers] } }
    const groupTotals = {}; // { groupVal: totalValue } for ranking
    rows.forEach(r => {
      const gv = String(r[groupCol] || '').trim();
      const xv = String(r[xCol] || '').trim();
      if (!gv || !xv) return;
      if (!grouped[gv]) grouped[gv] = {};
      if (!grouped[gv][xv]) grouped[gv][xv] = [];
      grouped[gv][xv].push(parseFloat(r[yCol]) || 0);
      groupTotals[gv] = (groupTotals[gv] || 0) + (parseFloat(r[yCol]) || 0);
    });
    // Top 6 groups by total value
    const topGroups = Object.entries(groupTotals)
      .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
      .slice(0, 6)
      .map(e => e[0]);
    // Collect all unique x-labels (union across groups), sorted chronologically
    const allLabelsSet = new Set();
    topGroups.forEach(g => { if (grouped[g]) Object.keys(grouped[g]).forEach(x => allLabelsSet.add(x)); });
    const _datePat = ec.colMeta[xCol] && ec.colMeta[xCol].datePattern;
    const allLabels = Array.from(allLabelsSet).sort((a, b) => {
      if (_datePat) { const da = parseDateValue(a, _datePat), db = parseDateValue(b, _datePat); if (da && db) return da - db; }
      return a.localeCompare(b);
    });
    // Build series
    const series = topGroups.map((g, i) => {
      const data = allLabels.map(x => {
        const vals = (grouped[g] && grouped[g][x]) || [];
        if (vals.length === 0) return 0;
        if (fn === 'count') return vals.length;
        if (fn === 'avg') return vals.reduce((a, b) => a + b, 0) / vals.length;
        if (fn === 'max') return Math.max(...vals);
        return vals.reduce((a, b) => a + b, 0); // sum
      });
      return { name: g, data, color: seriesColors[i % seriesColors.length] };
    });
    return {
      type: 'line',
      title,
      labels: allLabels,
      series,
      data: null, // null signals multi-series mode
      color: 'cyan',
      suffix: '',
      xLabel: xCol.replace(/_/g, ' '),
      yLabel: yCol ? yCol.replace(/_/g, ' ') : 'Count'
    };
  }

  // Aggregate data (single series)
  const groups = {};
  rows.forEach(r => {
    const key = String(r[xCol] || '').trim();
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    if (yCol) groups[key].push(parseFloat(r[yCol]) || 0);
    else groups[key].push(1);
  });

  const fn = aggFn || 'sum';
  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k,
    value: fn === 'count' ? v.length : fn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length : fn === 'max' ? Math.max(...v) : v.reduce((a, b) => a + b, 0)
  }));

  const isDateAxis = ec.colMeta[xCol]?.isDate;
  if (isDateAxis || chartType === 'line') {
    const _dp = ec.colMeta[xCol]?.datePattern;
    entries.sort((a, b) => {
      if (_dp) { const da = parseDateValue(a.label, _dp), db = parseDateValue(b.label, _dp); if (da && db) return da - db; }
      return a.label.localeCompare(b.label);
    });
  } else {
    entries.sort((a, b) => b.value - a.value);
    entries = entries.slice(0, 15);
  }

  if (chartType === 'donut') {
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e.label);
    const data = topN.map(e => e.value);
    if (rest.length > 0) { labels.push('Other'); data.push(rest.reduce((s, e) => s + e.value, 0)); }
    return { type: 'donut', title, labels, data, color: 'multi' };
  }

  const colorNames = ['cyan', 'violet', 'emerald', 'amber', 'rose'];
  return {
    type: chartType || 'bar',
    title,
    labels: entries.map(e => e.label),
    data: entries.map(e => e.value),
    color: colorNames[App.customCharts.length % colorNames.length],
    suffix: '',
    xLabel: xCol.replace(/_/g, ' '),
    yLabel: yCol ? yCol.replace(/_/g, ' ') : 'Count'
  };
}

function _filterChartLabels(labels, data, series, fromVal, toVal) {
  // Find start/end indices by substring match against the existing (correctly ordered) labels
  if (!labels || labels.length === 0) return null;
  var startIdx = -1, endIdx = -1;
  for (var i = 0; i < labels.length; i++) {
    var lbl = String(labels[i]).toLowerCase();
    if (startIdx === -1 && fromVal && lbl.indexOf(fromVal) !== -1) startIdx = i;
    if (toVal && lbl.indexOf(toVal) !== -1) endIdx = i;
  }
  // Fallback: if exact substring not found, try prefix match
  if (startIdx === -1 && fromVal) {
    for (var j = 0; j < labels.length; j++) {
      if (String(labels[j]).toLowerCase() >= fromVal) { startIdx = j; break; }
    }
  }
  if (endIdx === -1 && toVal) {
    for (var k = labels.length - 1; k >= 0; k--) {
      if (String(labels[k]).toLowerCase() <= toVal + '\uffff') { endIdx = k; break; }
    }
  }
  if (startIdx === -1) startIdx = 0;
  if (endIdx === -1) endIdx = labels.length - 1;
  if (startIdx > endIdx) return null;

  var result = { labels: labels.slice(startIdx, endIdx + 1) };
  if (data) result.data = data.slice(startIdx, endIdx + 1);
  if (series) {
    result.series = series.map(function(s) {
      return Object.assign({}, s, { data: s.data.slice(startIdx, endIdx + 1) });
    });
  }
  return result;
}

function applyChartModification(source, idx, aiResponse) {
  var chart, canvasId;
  if (source === 'analytics') {
    chart = App.excelChartConfig.chartPlan[idx];
    canvasId = 'analyticsChart' + idx;
  } else {
    chart = (App.customCharts || [])[idx];
    canvasId = 'customChart' + idx;
  }
  if (!chart) return false;

  // Save original data so we can filter from the full dataset (not a previously filtered subset)
  if (!chart._origLabels && chart.labels) chart._origLabels = chart.labels.slice();
  if (!chart._origData && chart.data) chart._origData = chart.data.slice();
  if (!chart._origSeries && chart.series) chart._origSeries = JSON.parse(JSON.stringify(chart.series));

  // Check if structural change (xCol/yCol/aggFn changed) — need to rebuild data
  var structuralChange = (aiResponse.xCol && aiResponse.xCol !== chart.xCol)
    || (aiResponse.yCol && aiResponse.yCol !== chart.yCol)
    || (aiResponse.aggFn && aiResponse.aggFn !== (chart.aggFn || 'sum'));

  if (structuralChange) {
    var rebuilt = buildChartFromAI(aiResponse);
    if (!rebuilt) return false;
    Object.keys(rebuilt).forEach(function(k) { chart[k] = rebuilt[k]; });
    // Save new originals after structural rebuild
    chart._origLabels = chart.labels ? chart.labels.slice() : null;
    chart._origData = chart.data ? chart.data.slice() : null;
    chart._origSeries = chart.series ? JSON.parse(JSON.stringify(chart.series)) : null;
    if (aiResponse.color && aiResponse.color !== 'multi') {
      chart.color = aiResponse.color;
      chart._userColor = aiResponse.color;
    }
    if (aiResponse.title) chart.title = aiResponse.title;
  } else {
    // Simple property changes (type, color, title)
    if (aiResponse.chartType) { chart.type = aiResponse.chartType; chart._userType = aiResponse.chartType; }
    if (aiResponse.color) { chart.color = aiResponse.color; chart._userColor = aiResponse.color; }
    if (aiResponse.title) chart.title = aiResponse.title;
  }

  // Apply filterRange on the ORIGINAL (full) data to avoid cumulative slicing
  if (aiResponse.filterRange) {
    var fr = aiResponse.filterRange;
    var fromVal = String(fr.from || '').toLowerCase();
    var toVal = String(fr.to || '').toLowerCase();
    if (fromVal || toVal) {
      var srcLabels = chart._origLabels || chart.labels;
      var srcData = chart._origData || chart.data;
      var srcSeries = chart._origSeries || chart.series;
      var filtered = _filterChartLabels(srcLabels, srcData, srcSeries, fromVal, toVal);
      if (filtered) {
        chart.labels = filtered.labels;
        if (filtered.data) chart.data = filtered.data;
        if (filtered.series) chart.series = filtered.series;
      }
    }
  }

  // Apply sort only for non-time-series charts (don't scramble chronological order)
  if (aiResponse.sort && chart.labels && chart.data && !chart.series) {
    var chartType = chart._userType || chart.type || 'bar';
    var isTimeSeries = chartType === 'line' || chartType === 'area';
    if (!isTimeSeries) {
      var sortDir = aiResponse.sort;
      var indices = chart.labels.map(function(_, i) { return i; });
      if (sortDir === 'asc') indices.sort(function(a, b) { return chart.data[a] - chart.data[b]; });
      else if (sortDir === 'desc') indices.sort(function(a, b) { return chart.data[b] - chart.data[a]; });
      chart.labels = indices.map(function(i) { return chart.labels[i]; });
      chart.data = indices.map(function(i) { return chart.data[i]; });
    }
  }

  // Re-render the chart
  var canvas = document.getElementById(canvasId);
  if (canvas) {
    canvas._hasChartEvents = false;
    canvas._chartHit = null;
    canvas._lockedW = null;
    canvas._lockedH = null;
    canvas._lastHover = -1;
    if (canvas._animFrame) { cancelAnimationFrame(canvas._animFrame); canvas._animFrame = null; }
    var tt = document.getElementById('chartTooltip');
    if (tt) tt.classList.remove('visible');
    animateChartFromPlan(canvas, chart, 0);
  }
  // Update the title in the DOM if present
  var card = canvas ? canvas.closest('.glass-panel') : null;
  if (card && aiResponse.title) {
    var titleEl = card.querySelector('.panel-title');
    if (titleEl) titleEl.textContent = aiResponse.title;
  }
  return true;
}

function parseChartRequest(text) {
  const headers = App.excelData.headers;
  const rows = App.excelData.rows;
  const lower = text.toLowerCase();

  // Detect chart type
  let chartType = 'bar';
  if (/\bline\b|trend|over time|timeline/i.test(text)) chartType = 'line';
  else if (/\bdonut\b|\bpie\b|breakdown|distribution|share|split/i.test(text)) chartType = 'donut';
  else if (/\bbar\b|compare|comparison|ranking|top/i.test(text)) chartType = 'bar';

  // Fuzzy column matching: score each header by word overlap with query
  function scoreCol(query, header) {
    const qWords = query.toLowerCase().replace(/[_\-]/g, ' ').split(/\s+/).filter(w => w.length > 1);
    const hWords = header.toLowerCase().replace(/[_\-]/g, ' ').split(/\s+/).filter(w => w.length > 1);
    if (qWords.length === 0 || hWords.length === 0) return 0;
    let matched = 0;
    for (const hw of hWords) {
      if (qWords.some(qw => qw.includes(hw) || hw.includes(qw))) matched++;
    }
    if (matched === 0) return 0;
    // Use the better of: query coverage or header coverage, weighted by match count
    return Math.max(matched / hWords.length, matched / qWords.length) * matched;
  }

  function findCol(txt) {
    let best = null, bestScore = 0;
    for (const h of headers) {
      const s = scoreCol(txt, h);
      if (s > bestScore) { best = h; bestScore = s; }
    }
    return bestScore >= 0.5 ? best : null;
  }

  // Try to figure out X (group-by / label) and Y (metric / value)
  const ec = App.excelChartConfig;
  let xCol = null, yCol = null, aggFn = 'sum';

  // Detect aggregation
  if (/\bavg\b|\baverage\b|\bmean\b/i.test(text)) aggFn = 'avg';
  else if (/\bmax\b|\bmaximum\b|\bhighest\b/i.test(text)) aggFn = 'max';
  else if (/\bcount\b|\bnumber of\b|\bhow many\b/i.test(text)) aggFn = 'count';
  else if (/\bsum\b|\btotal\b/i.test(text)) aggFn = 'sum';

  // Parse structure: "Y by/over/vs X"
  const byMatch = text.match(/(.+?)\s+(?:by|per|grouped?\s*by|for each)\s+(.+)/i);
  const vsMatch = text.match(/(.+?)\s+(?:vs\.?|versus|against|compared?\s*to)\s+(.+)/i);
  const overMatch = text.match(/(.+?)\s+(?:over)\s+(.+)/i);

  // Strip chart-type keywords from the extracted phrases
  function stripNoise(s) {
    return s.replace(/\b(bar|line|donut|pie|chart|graph|show|plot|create|make|of|the|a|an|me)\b/gi, '').trim();
  }

  if (byMatch) {
    const yPhrase = stripNoise(byMatch[1]);
    const xPhrase = stripNoise(byMatch[2]);
    yCol = findCol(yPhrase);
    xCol = findCol(xPhrase);
  } else if (vsMatch) {
    const p1 = stripNoise(vsMatch[1]);
    const p2 = stripNoise(vsMatch[2]);
    yCol = findCol(p1);
    xCol = findCol(p2);
  } else if (overMatch) {
    const yPhrase = stripNoise(overMatch[1]);
    const xPhrase = stripNoise(overMatch[2]);
    yCol = findCol(yPhrase);
    xCol = findCol(xPhrase);
  }

  // If structured parse didn't find both, try matching all columns from the full text
  if (!yCol || !xCol) {
    const allScored = headers.map(h => ({ col: h, score: scoreCol(stripNoise(text), h) }))
      .filter(s => s.score >= 0.5).sort((a, b) => b.score - a.score);
    const metricsFound = allScored.filter(s => ec.colMeta[s.col]?.isMetric);
    const catsFound = allScored.filter(s => ec.colMeta[s.col]?.isCategorical || ec.colMeta[s.col]?.isDate);
    const namesFound = allScored.filter(s => !ec.colMeta[s.col]?.isMetric && !ec.colMeta[s.col]?.isIndex);
    if (!yCol) yCol = metricsFound[0]?.col || null;
    if (!xCol) xCol = catsFound[0]?.col || namesFound[0]?.col || null;
    // Avoid xCol === yCol
    if (xCol === yCol && metricsFound.length > 1) xCol = catsFound[0]?.col || null;
    if (xCol === yCol) xCol = null;
  }

  // Donut only needs one column
  if (chartType === 'donut' && !yCol && xCol) {
    // Count distribution of xCol
    const counts = {};
    rows.forEach(r => { const v = String(r[xCol] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e[0]);
    const data = topN.map(e => e[1]);
    if (rest.length > 0) { labels.push('Other (' + rest.length + ')'); data.push(rest.reduce((s, e) => s + e[1], 0)); }
    const title = xCol.replace(/_/g, ' ') + ' Breakdown';
    return { chart: { type: 'donut', title, labels, data, color: 'multi' }, message: 'Created donut chart: <strong>' + title + '</strong>' };
  }

  if (chartType === 'donut' && yCol && xCol) {
    // Aggregate yCol by xCol and show as donut
    const groups = {};
    rows.forEach(r => { const k = String(r[xCol] || '').trim(); if (!k) return; if (!groups[k]) groups[k] = []; groups[k].push(parseFloat(r[yCol]) || 0); });
    const entries = Object.entries(groups).map(([k, v]) => [k, aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length : aggFn === 'max' ? Math.max(...v) : v.reduce((a, b) => a + b, 0)]).sort((a, b) => b[1] - a[1]);
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e[0]);
    const data = topN.map(e => e[1]);
    if (rest.length > 0) { labels.push('Other'); data.push(rest.reduce((s, e) => s + e[1], 0)); }
    const title = yCol.replace(/_/g, ' ') + ' by ' + xCol.replace(/_/g, ' ');
    return { chart: { type: 'donut', title, labels, data, color: 'multi' }, message: 'Created donut chart: <strong>' + title + '</strong>' };
  }

  if (!yCol && !xCol) {
    return { error: 'I couldn\'t find matching columns in your data. Try using exact column names like: <strong>' + headers.slice(0, 5).map(h => h.replace(/_/g, ' ')).join('</strong>, <strong>') + '</strong>...' };
  }

  if (!xCol && yCol) {
    // Single metric - try using first categorical or date as X
    xCol = ec.categoricals[0] || ec.dates[0] || null;
    if (!xCol) {
      return { error: 'I found the metric <strong>' + yCol.replace(/_/g, ' ') + '</strong> but need a category or date column to group by. Try: "' + yCol.replace(/_/g, ' ') + ' by [column name]"' };
    }
  }

  if (!yCol && xCol && ec.colMeta[xCol]?.isMetric) {
    // Both are metrics or X is actually a metric - swap logic
    yCol = xCol;
    xCol = ec.categoricals[0] || ec.dates[0];
  }

  if (!yCol) {
    aggFn = 'count';
    yCol = xCol;
  }

  // Build chart data by aggregating
  const isDateAxis = ec.colMeta[xCol]?.isDate;
  const groups = {};
  rows.forEach(r => {
    const key = String(r[xCol] || '').trim();
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    groups[key].push(parseFloat(r[yCol]) || 0);
  });

  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k,
    value: aggFn === 'count' ? v.length : aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length : aggFn === 'max' ? Math.max(...v) : v.reduce((a, b) => a + b, 0)
  }));

  if (isDateAxis || chartType === 'line') {
    const _dp = ec.colMeta[xCol]?.datePattern;
    entries.sort((a, b) => {
      if (_dp) { const da = parseDateValue(a.label, _dp), db = parseDateValue(b.label, _dp); if (da && db) return da - db; }
      return a.label.localeCompare(b.label);
    });
    chartType = chartType === 'donut' ? 'line' : chartType;
    if (chartType !== 'bar') chartType = 'line';
  } else {
    entries.sort((a, b) => b.value - a.value);
    entries = entries.slice(0, 15);
  }

  const aggLabel = aggFn === 'count' ? 'Count' : aggFn === 'avg' ? 'Avg' : aggFn === 'max' ? 'Max' : 'Total';
  const title = aggLabel + ' ' + yCol.replace(/_/g, ' ') + ' by ' + xCol.replace(/_/g, ' ');
  const colorNames = ['cyan', 'violet', 'emerald', 'amber', 'rose'];
  const chart = {
    type: chartType,
    title,
    labels: entries.map(e => e.label),
    data: entries.map(e => e.value),
    color: colorNames[App.customCharts.length % colorNames.length],
    suffix: '',
    xLabel: xCol.replace(/_/g, ' '),
    yLabel: (aggFn === 'count' ? 'Count' : yCol.replace(/_/g, ' '))
  };

  return { chart, message: 'Created ' + chartType + ' chart: <strong>' + title + '</strong>' };
}

function initDropZone() {
  const zone = $('#dropZone'), input = $('#fileInput');
  if(!zone || !input) return;
  ['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.remove('dragover'); }));
  zone.addEventListener('drop', ev => handleFiles(ev.dataTransfer.files));
  input.addEventListener('change', ev => handleFiles(ev.target.files));
}

function showUploadProgress(fileName) {
  const zone = $('#dropZone');
  const modalBody = $('#uploadModalBody');
  const body = (modalBody && modalBody.children.length > 0) ? modalBody : (zone ? zone.parentElement : null);
  if (!body) return;
  // Hide drop zone, show progress
  if (zone) zone.style.display = 'none';
  let prog = document.getElementById('uploadProgress');
  if (!prog) {
    body.insertAdjacentHTML('afterbegin',
      '<div class="upload-progress active" id="uploadProgress">' +
      '<div class="upload-spinner"></div>' +
      '<div class="upload-progress-text">Processing your data...</div>' +
      '<div class="upload-progress-file" id="uploadFileName"></div>' +
      '<div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadFill"></div></div>' +
      '</div>' +
      '<div class="upload-success" id="uploadSuccess">' +
      '<div class="upload-success-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#69f0ae" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
      '<div class="upload-success-text" id="uploadSuccessText">Data loaded successfully!</div>' +

  }

function showUploadSuccess(rowCount, fileName) {
  const prog = document.getElementById('uploadProgress');
  const succ = document.getElementById('uploadSuccess');
  const fill = document.getElementById('uploadFill');
  if (fill) fill.style.width = '100%';

    if (prog) prog.classList.remove('active');

      const sub = document.getElementById('uploadSuccessSub');

      const modalOverlay = $('#uploadModalOverlay');
      if (modalOverlay && modalOverlay.classList.contains('open')) closeUploadModal();
      navigate('analytics');
    }, 1200);
  }, 400);
}

function loadSampleDataset() {
  const months = ['2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07','2024-08','2024-09','2024-10','2024-11','2024-12'];
  const channels = ['Direct Sales','Online','Partner','Enterprise'];
  const segments = ['Small Business','Mid-Market','Enterprise','Startup'];
  const reps = ['Sarah Chen','James Rivera','Priya Patel','Marcus Johnson','Elena Voss','David Kim'];
  const rows = [];
  // Growth curve: revenue trends up through the year
  months.forEach((month, mi) => {
    channels.forEach(channel => {
      segments.forEach(segment => {
        // Realistic base: Enterprise/Direct = high, Startup/Online = lower
        const chBase = { 'Direct Sales': 85000, 'Online': 42000, 'Partner': 58000, 'Enterprise': 120000 }[channel];
        const segMult = { 'Small Business': 0.5, 'Mid-Market': 0.8, 'Enterprise': 1.6, 'Startup': 0.35 }[segment];
        const seasonality = 1 + 0.15 * Math.sin((mi - 2) * Math.PI / 6); // peak in Q2/Q4
        const growth = 1 + mi * 0.025; // 2.5% monthly growth
        const revenue = Math.round(chBase * segMult * seasonality * growth * (0.85 + Math.random() * 0.3));
        const deals = Math.round(3 + Math.random() * 12);
        const avgDealSize = Math.round(revenue / deals);
        const winRate = Math.round((35 + Math.random() * 45) * 10) / 10;
        const customerCount = Math.round(deals * winRate / 100 * (1 + Math.random()));
        const churnRate = Math.round((2 + Math.random() * 8) * 10) / 10;
        const rep = reps[Math.floor(Math.random() * reps.length)];
        rows.push({
          Month: month,
          Channel: channel,
          Segment: segment,
          Sales_Rep: rep,
          Revenue: revenue,
          Deals_Closed: deals,
          Avg_Deal_Size: avgDealSize,
          Win_Rate_Pct: winRate,
          New_Customers: customerCount,
          Churn_Rate_Pct: churnRate,
          Cost_of_Sales: Math.round(revenue * (0.2 + Math.random() * 0.15)),
          Profit: Math.round(revenue * (0.55 + Math.random() * 0.2))
        });
      });
    });
  });
  App.excelData = { headers: Object.keys(rows[0]), rows: rows };
  App.hasExcelData = true;
  App.uploadedFiles.push({ name: 'acme_corp_sales_2024.csv', size: rows.length * 120, type: 'text/csv' });
  autoMapExcelData(rows);
  navigate('analytics');
  toast('Loaded Acme Corp Sales 2024 — ' + rows.length + ' rows, 12 columns', 'success');
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    App.uploadedFiles.push({ name: file.name, size: file.size, type: file.type });
    const ext = file.name.split('.').pop().toLowerCase();
    if(['xlsx','xls','csv'].includes(ext)) {
      showUploadProgress(file.name);
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          let json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

          // ── FIX: Detect __EMPTY headers (title rows before actual data) ──
          if (json.length > 0) {
            const firstHeaders = Object.keys(json[0]);
            const hasEmpty = firstHeaders.some(h => /^__EMPTY/.test(h) || h === '');
            if (hasEmpty) {
              const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
              let headerIdx = -1;
              for (let ri = 0; ri < Math.min(raw.length, 20); ri++) {
                const row = raw[ri];
                const nonEmpty = row.filter(v => v !== '' && v !== null && v !== undefined);
                // Header row: ≥3 non-empty string cells and majority are strings
                if (nonEmpty.length >= 3 && nonEmpty.filter(v => typeof v === 'string').length >= nonEmpty.length * 0.7) {
                  headerIdx = ri; break;
                }
              }
              if (headerIdx >= 0) {
                const hdrs = raw[headerIdx].map((h, ci) => {
                  if (!h && h !== 0) return null;
                  return String(h).replace(/[\r\n]+/g, ' ').trim();
                });
                // Build cleaned rows from data below header
                const cleaned = [];
                for (let ri = headerIdx + 1; ri < raw.length; ri++) {
                  const row = raw[ri];
                  const hasData = row.some(v => v !== '' && v !== null && v !== undefined);
                  if (!hasData) continue;
                  const obj = {};
                  hdrs.forEach((h, ci) => { if (h) obj[h] = row[ci] !== undefined ? row[ci] : ''; });
                  cleaned.push(obj);
                }
                if (cleaned.length > 0) json = cleaned;
              }
            }
            // Also clean any remaining newlines in headers
            if (json.length > 0) {
              const rawHeaders = Object.keys(json[0]);
              const needsClean = rawHeaders.some(h => /[\r\n]/.test(h));
              if (needsClean) {
                json = json.map(row => {
                  const obj = {};
                  rawHeaders.forEach(h => { obj[h.replace(/[\r\n]+/g, ' ').trim()] = row[h]; });
                  return obj;
                });
              }
            }
          }

          if(json.length > 0) {
            App.excelData = { headers: Object.keys(json[0]), rows: json, sheetName: wb.SheetNames[0] };
            App.dashChartIdx = 0;
            // Clear AI caches on new data
            App._cachedInsights = null; App._cachedAnomalies = null; App._cachedQuality = null;
            App._cachedDescriptions = null; App._cachedSuggestions = null;
            App._forecastCache = {}; App._narrativeCache = {};
            autoMapExcelData(json);
            renderUploadPreview();
            showUploadSuccess(json.length, file.name);
          }
        } catch(err) {
          toast('Error reading file: ' + err.message, 'error');
          closeUploadModal();
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      toast(`Uploaded "${file.name}"`, 'success');
      setTimeout(() => closeUploadModal(), 800);
    }
  });
  renderUploadFileList();
}

function autoMapExcelData(rows) {
  if(!rows.length) return;
  const allHeaders = Object.keys(rows[0]);
  const sample = rows.slice(0, Math.min(rows.length, 30));

  // ── CLASSIFY EVERY COLUMN ──
  const colMeta = {};
  allHeaders.forEach(h => {
    const vals = rows.map(r => r[h]).filter(v => v !== '' && v !== null && v !== undefined);
    const numCount = vals.filter(v => !isNaN(parseFloat(v))).length;
    const isNumeric = numCount > vals.length * 0.8;
    const uniqueVals = [...new Set(vals.map(String))];
    const uniqueRatio = uniqueVals.length / Math.max(vals.length, 1);

    // Detect index/id columns: sequential integers, named id/index/#, or text IDs like "P101"
    const isNamedId = /\b(id|index|#|row|sr|sno|s\.no|serial|number|code|sku)\b/i.test(h.trim());
    const isIndex = (isNumeric && (
      isNamedId ||
      /^[0-9.]+$/.test(String(h).trim()) ||
      (uniqueRatio > 0.9 && vals.length > 10 && vals.every((v,i) => i === 0 || parseFloat(v) >= parseFloat(vals[i-1])))
    )) || (!isNumeric && isNamedId && uniqueRatio > 0.85);

    // Detect categorical: text with few unique values (not IDs)
    const isCategorical = !isNumeric && !isIndex && uniqueVals.length <= Math.max(20, vals.length * 0.3) && uniqueVals.length >= 2;

    // Detect date — by name AND by values
    const isDateByName = /date|month|year|week|day|time|period|quarter/i.test(h);
    const datePattern = !isNumeric ? detectDateByValues(vals) : null;
    const isDate = isDateByName || !!datePattern;

    // Detect meaningful metric (numeric but not index/id)
    const isMetric = isNumeric && !isIndex;

    colMeta[h] = { isNumeric, isIndex, isCategorical, isDate, isMetric, uniqueVals, uniqueCount: uniqueVals.length,
      vals: isMetric ? rows.map(r => parseFloat(r[h]) || 0) : null,
      datePattern: datePattern || null
    };
  });

  // ── EXTRACT COLUMNS BY TYPE ──
  const metrics = allHeaders.filter(h => colMeta[h].isMetric);
  const categoricals = allHeaders.filter(h => colMeta[h].isCategorical);
  const dates = allHeaders.filter(h => colMeta[h].isDate);
  const indices = allHeaders.filter(h => colMeta[h].isIndex);

  // ── BUILD SMART CHART PLAN ──
  const chartPlan = [];
  const barColors = ['cyan','violet','emerald','amber','rose'];
  const usedTypes = { bar: 0, line: 0, donut: 0 };
  const maxCharts = 6;

  // Helper: aggregate metric by category
  function aggByCategory(cat, metric, aggFn) {
    const groups = {};
    rows.forEach(r => {
      const key = String(r[cat] || '').trim();
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(parseFloat(r[metric]) || 0);
    });
    return Object.entries(groups).map(([k, v]) => ({
      label: k,
      value: aggFn === 'sum' ? v.reduce((a, b) => a + b, 0) :
             aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length :
             aggFn === 'count' ? v.length : Math.max(...v)
    })).sort((a, b) => b.value - a.value);
  }

  // Helper: aggregate metric over time (with date-aware sorting)
  function aggOverTime(dateCol, metric, aggFn) {
    const groups = {};
    rows.forEach(r => {
      const key = String(r[dateCol] || '').trim();
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(parseFloat(r[metric]) || 0);
    });
    const pat = colMeta[dateCol] && colMeta[dateCol].datePattern;
    return Object.entries(groups).sort((a, b) => {
      if (pat) {
        const da = parseDateValue(a[0], pat), db = parseDateValue(b[0], pat);
        if (da && db) return da - db;
      }
      return a[0].localeCompare(b[0]);
    }).map(([k, v]) => ({
      label: k,
      value: aggFn === 'sum' ? v.reduce((a, b) => a + b, 0) :
             aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length :
             v.length
    }));
  }

  const dateCol = dates[0] || null;
  const nameCol = allHeaders.find(h => !colMeta[h].isNumeric && !colMeta[h].isIndex && !colMeta[h].isDate &&
    /name|product|item|title|description|label/i.test(h));
  const donutCats = categoricals.filter(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 10);

  // Rank metrics by business relevance
  const metricPriority = [/revenue|sales|income/i, /cost|expense|margin/i, /profit|npv|roi/i, /score|rate|compliance/i, /count|total|amount|value/i];
  function rankMetric(m) { const idx = metricPriority.findIndex(r => r.test(m)); return idx >= 0 ? idx : metricPriority.length; }
  const rankedMetrics = [...metrics].sort((a, b) => rankMetric(a) - rankMetric(b));

  // Pick primary and secondary metrics
  const primaryMetric = rankedMetrics[0] || null;
  const secondaryMetric = rankedMetrics.find(m => m !== primaryMetric) || null;

  // Find best categorical for bar charts: needs 3+ bars with non-zero values
  function bestBarCat(metric) {
    const candidates = categoricals
      .filter(c => colMeta[c].uniqueCount >= 3 && colMeta[c].uniqueCount <= 15)
      .map(c => {
        const agg = aggByCategory(c, metric, /score|rate|compliance|avg|percent/i.test(metric) ? 'avg' : 'sum');
        const nonZero = agg.filter(a => a.value > 0);
        return { col: c, agg: nonZero, count: nonZero.length };
      })
      .filter(x => x.count >= 3)
      .sort((a, b) => b.count - a.count);
    return candidates[0] || null;
  }

  // Find best categorical for multi-line: needs 2-6 unique values with data across time
  function bestLineCat(dateC, metric) {
    if (!dateC) return null;
    return categoricals
      .filter(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 6)
      .find(c => {
        // Check that at least 2 groups have non-zero data
        const groups = {};
        rows.forEach(r => {
          const gv = String(r[c] || '').trim();
          if (!gv) return;
          groups[gv] = (groups[gv] || 0) + (parseFloat(r[metric]) || 0);
        });
        return Object.values(groups).filter(v => v > 0).length >= 2;
      }) || null;
  }

  const usedCombos = new Set();

  // ── CHART 1: MULTI-LINE — Primary metric over time by category ──
  // Most insightful chart: shows trends broken down by category
  if (dateCol && primaryMetric) {
    const lineCat = bestLineCat(dateCol, primaryMetric);
    if (lineCat) {
      const seriesColors = linePalettes['GenBI'];
      const isRate = /score|rate|compliance|avg|percent/i.test(primaryMetric);
      const fn = isRate ? 'avg' : 'sum';
      // Group data
      const grouped = {};
      const groupTotals = {};
      rows.forEach(r => {
        const gv = String(r[lineCat] || '').trim();
        const xv = String(r[dateCol] || '').trim();
        if (!gv || !xv) return;
        if (!grouped[gv]) grouped[gv] = {};
        if (!grouped[gv][xv]) grouped[gv][xv] = [];
        grouped[gv][xv].push(parseFloat(r[primaryMetric]) || 0);
        groupTotals[gv] = (groupTotals[gv] || 0) + (parseFloat(r[primaryMetric]) || 0);
      });
      const topGroups = Object.entries(groupTotals).filter(e => e[1] > 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1])).slice(0, 6).map(e => e[0]);
      const allLabelsSet = new Set();
      topGroups.forEach(g => { if (grouped[g]) Object.keys(grouped[g]).forEach(x => allLabelsSet.add(x)); });
      const datePat = colMeta[dateCol] && colMeta[dateCol].datePattern;
      const allLabels = Array.from(allLabelsSet).sort((a, b) => {
        if (datePat) { const da = parseDateValue(a, datePat), db = parseDateValue(b, datePat); if (da && db) return da - db; }
        return a.localeCompare(b);
      });
      if (allLabels.length >= 3 && topGroups.length >= 2) {
        const series = topGroups.map((g, i) => {
          const data = allLabels.map(x => {
            const vals = (grouped[g] && grouped[g][x]) || [];
            if (vals.length === 0) return 0;
            return fn === 'avg' ? vals.reduce((a, b) => a + b, 0) / vals.length : vals.reduce((a, b) => a + b, 0);
          });
          return { name: g, data, color: seriesColors[i % seriesColors.length] };
        });
        // Compute insight from aggregated data
        const monthTotals = allLabels.map((lbl, li) => series.reduce((s, sr) => s + (sr.data[li] || 0), 0));
        let peakIdx = 0, lowIdx = 0;
        monthTotals.forEach((v, i) => { if (v > monthTotals[peakIdx]) peakIdx = i; if (v < monthTotals[lowIdx]) lowIdx = i; });
        const trendDir = monthTotals[monthTotals.length - 1] >= monthTotals[0] ? 'an upward' : 'a downward';
        const metricLabel = primaryMetric.replace(/_/g, ' ');
        const isCurrency = /revenue|sales|cost|expense|price|profit|income/i.test(primaryMetric);
        const fmtInsight = (v) => isCurrency ? '$' + formatNumber(v, {abbreviate: true, decimals: 1}) : formatNumber(v, {abbreviate: true, decimals: 1});
        const insightText = metricLabel + ' peaked at ' + fmtInsight(monthTotals[peakIdx]) + ' in ' + allLabels[peakIdx] +
          ', with a low of ' + fmtInsight(monthTotals[lowIdx]) + ' in ' + allLabels[lowIdx] +
          ', showing ' + trendDir + ' trend overall.';

        chartPlan.push({
          type: 'stacked', title: metricLabel + ' Trend by ' + lineCat.replace(/_/g, ' '),
          labels: allLabels, series, data: null, color: 'cyan', suffix: '',
          xCol: dateCol, yCol: primaryMetric, groupCol: lineCat, aggFn: fn,
          xLabel: dateCol.replace(/_/g, ' '), yLabel: metricLabel,
          desc: insightText
        });
        usedCombos.add(dateCol + '|' + primaryMetric);
      }
    }
  }

  // ── CHART 2: BAR — Primary or secondary metric by a good category ──
  if (chartPlan.length < maxCharts && primaryMetric) {
    // Try nameCol first (e.g. "Top Products by Revenue"), then other categoricals
    const barInfo = bestBarCat(primaryMetric);
    if (barInfo && !usedCombos.has(barInfo.col + '|' + primaryMetric)) {
      const isRate = /score|rate|compliance|avg|percent/i.test(primaryMetric);
      const agg = barInfo.agg.slice(0, 10);
      chartPlan.push({ type: 'bar',
        title: (nameCol && barInfo.col === nameCol ? 'Top ' : '') + primaryMetric.replace(/_/g, ' ') + ' by ' + barInfo.col.replace(/_/g, ' '),
        labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'cyan', suffix: '',
        xLabel: barInfo.col.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
        desc: 'Compares ' + (isRate ? 'average ' : 'total ') + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' across ' + barInfo.col.replace(/_/g, ' ').toLowerCase() + '.'
      });
      usedCombos.add(barInfo.col + '|' + primaryMetric);
    }
  }

  // ── CHART 3: DONUT — Revenue/metric share by a category ──
  if (chartPlan.length < maxCharts && donutCats.length > 0) {
    const donutMetric = secondaryMetric || primaryMetric;
    const donutCat = donutCats.find(c => donutMetric && !usedCombos.has(c + '|' + donutMetric)) || donutCats[0];
    if (donutMetric) {
      const isRate = /score|rate|compliance|avg|percent/i.test(donutMetric);
      const agg = aggByCategory(donutCat, donutMetric, isRate ? 'avg' : 'sum').filter(a => a.value > 0);
      if (agg.length >= 2) {
        const topN = agg.slice(0, 8);
        const rest = agg.slice(8);
        const dLabels = topN.map(a => a.label);
        const dData = topN.map(a => a.value);
        if (rest.length > 0) { dLabels.push('Other (' + rest.length + ')'); dData.push(rest.reduce((s, a) => s + a.value, 0)); }
        chartPlan.push({ type: 'donut',
          title: donutMetric.replace(/_/g, ' ') + ' by ' + donutCat.replace(/_/g, ' '),
          labels: dLabels, data: dData, color: 'multi',
          desc: 'Shows each ' + donutCat.replace(/_/g, ' ').toLowerCase() + '\'s share of ' + donutMetric.replace(/_/g, ' ').toLowerCase() + '.'
        });
      }
    } else {
      const counts = {};
      rows.forEach(r => { const v = String(r[donutCat] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      chartPlan.push({ type: 'donut', title: donutCat.replace(/_/g, ' ') + ' Breakdown',
        labels: sorted.slice(0,8).map(e => e[0]), data: sorted.slice(0,8).map(e => e[1]), color: 'multi',
        desc: 'Shows the proportion of records in each ' + donutCat.replace(/_/g, ' ').toLowerCase() + ' category.'
      });
    }
  }

  // ── FALLBACK: When no charts built (no categoricals/dates), use name/label column ──
  if (chartPlan.length === 0 && metrics.length > 0) {
    // Find a label column: name-like text, or any non-metric non-index column, or index column as last resort
    const labelCol = nameCol
      || allHeaders.find(h => !colMeta[h].isMetric && !colMeta[h].isIndex && !colMeta[h].isDate)
      || indices[0] || allHeaders.find(h => !colMeta[h].isMetric);

    if (labelCol) {
      // Chart 1: Top items by primary metric (bar)
      if (primaryMetric) {
        const items = rows.map(r => ({ label: String(r[labelCol] || '').trim(), value: parseFloat(r[primaryMetric]) || 0 }))
          .filter(a => a.label && a.value > 0)
          .sort((a, b) => b.value - a.value).slice(0, 10);
        if (items.length >= 2) {
          chartPlan.push({ type: 'bar',
            title: 'Top ' + primaryMetric.replace(/_/g, ' ') + ' by ' + labelCol.replace(/_/g, ' '),
            labels: items.map(a => a.label), data: items.map(a => a.value), color: 'cyan', suffix: '',
            xLabel: labelCol.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
            desc: 'Shows ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranked by ' + labelCol.replace(/_/g, ' ').toLowerCase() + '.'
          });
        }
      }

      // Chart 2: Secondary metric bar chart
      if (secondaryMetric && chartPlan.length < 3) {
        const items = rows.map(r => ({ label: String(r[labelCol] || '').trim(), value: parseFloat(r[secondaryMetric]) || 0 }))
          .filter(a => a.label && a.value > 0)
          .sort((a, b) => b.value - a.value).slice(0, 10);
        if (items.length >= 2) {
          chartPlan.push({ type: 'bar',
            title: 'Top ' + secondaryMetric.replace(/_/g, ' ') + ' by ' + labelCol.replace(/_/g, ' '),
            labels: items.map(a => a.label), data: items.map(a => a.value), color: 'violet', suffix: '',
            xLabel: labelCol.replace(/_/g, ' '), yLabel: secondaryMetric.replace(/_/g, ' '),
            desc: 'Shows ' + secondaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranked by ' + labelCol.replace(/_/g, ' ').toLowerCase() + '.'
          });
        }
      }

      // Chart 3: Donut of metric distribution (bucket into ranges)
      if (primaryMetric && chartPlan.length < 3) {
        const vals = rows.map(r => parseFloat(r[primaryMetric]) || 0).filter(v => v > 0);
        if (vals.length >= 5) {
          const sorted = [...vals].sort((a, b) => a - b);
          const q1 = sorted[Math.floor(sorted.length * 0.33)];
          const q2 = sorted[Math.floor(sorted.length * 0.66)];
          const buckets = { Low: 0, Medium: 0, High: 0 };
          vals.forEach(v => { if (v <= q1) buckets.Low++; else if (v <= q2) buckets.Medium++; else buckets.High++; });
          chartPlan.push({ type: 'donut',
            title: primaryMetric.replace(/_/g, ' ') + ' Distribution',
            labels: Object.keys(buckets), data: Object.values(buckets), color: 'multi',
            desc: 'Shows the distribution of records across low, medium, and high ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranges.'
          });
        }
      }
    }
  }

  // ── SMART CHART SELECTION: Build candidate pool, rank by insight value, pick best 3-4 ──
  const candidates = [];

  // CANDIDATE: Heatmap — 2 categoricals cross-tab (high insight density)
  if (categoricals.length >= 2 && primaryMetric) {
    const hmX = dates[0] || categoricals.find(c => colMeta[c].uniqueCount >= 3 && colMeta[c].uniqueCount <= 12);
    const hmY = categoricals.find(c => c !== hmX && colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 8);
    if (hmX && hmY) {
      const xLabels = [...new Set(rows.map(r => String(r[hmX]||'').trim()))].filter(Boolean).sort();
      const yLabels = [...new Set(rows.map(r => String(r[hmY]||'').trim()))].filter(Boolean).sort();
      if (xLabels.length >= 3 && yLabels.length >= 2) {
        const matrix = yLabels.map(yl => xLabels.map(xl => {
          const matched = rows.filter(r => String(r[hmX]||'').trim() === xl && String(r[hmY]||'').trim() === yl);
          if (!matched.length) return 0;
          const isRate = /score|rate|avg|percent/i.test(primaryMetric);
          const vals = matched.map(r => parseFloat(r[primaryMetric]) || 0);
          return isRate ? vals.reduce((a,b)=>a+b,0)/vals.length : vals.reduce((a,b)=>a+b,0);
        }));
        candidates.push({ type: 'heatmap', insight: 9, title: primaryMetric.replace(/_/g,' ') + ': ' + hmY.replace(/_/g,' ') + ' × ' + hmX.replace(/_/g,' '),
          labels: xLabels, yLabels, matrix, color: 'cyan',
          desc: 'Heatmap showing ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' intensity across ' + hmY.replace(/_/g,' ').toLowerCase() + ' and ' + hmX.replace(/_/g,' ').toLowerCase() + '.' });
      }
    }
  }

  // CANDIDATE: Scatter — correlation between 2 metrics
  if (metrics.length >= 2) {
    const scX = primaryMetric;
    const scY = metrics.find(m => m !== scX && !/id|index|key/i.test(m));
    if (scX && scY) {
      candidates.push({ type: 'scatter', insight: 8, title: scX.replace(/_/g,' ') + ' vs ' + scY.replace(/_/g,' '),
        labels: [], data: rows.map(r => parseFloat(r[scX]) || 0), xData: rows.map(r => parseFloat(r[scX]) || 0), yData: rows.map(r => parseFloat(r[scY]) || 0),
        color: 'violet', xLabel: scX.replace(/_/g,' '), yLabel: scY.replace(/_/g,' '),
        desc: 'Scatter showing correlation between ' + scX.replace(/_/g,' ').toLowerCase() + ' and ' + scY.replace(/_/g,' ').toLowerCase() + '.' });
    }
  }

  // CANDIDATE: Gauge — rate/percent/score KPI
  const rateMet = metrics.find(m => /rate|percent|pct|score|satisfaction|compliance|yield|roi|margin/i.test(m));
  if (rateMet) {
    const vals = colMeta[rateMet].vals;
    const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
    const isPercent = /percent|pct|rate/i.test(rateMet);
    candidates.push({ type: 'gauge', insight: 6, title: 'Avg ' + rateMet.replace(/_/g, ' '),
      labels: [rateMet], data: [avg], value: avg, color: 'cyan',
      min: 0, max: isPercent ? 100 : Math.ceil(Math.max(...vals) * 1.2),
      desc: 'Gauge showing average ' + rateMet.replace(/_/g, ' ').toLowerCase() + '.' });
  }

  // CANDIDATE: Boxplot — distribution analysis
  if (primaryMetric && categoricals.length > 0) {
    const bpCat = categoricals.find(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 8);
    if (bpCat) {
      const groups = {};
      rows.forEach(r => { const k = String(r[bpCat]||'').trim(); if (!k) return; if (!groups[k]) groups[k] = []; groups[k].push(parseFloat(r[primaryMetric]) || 0); });
      const boxes = Object.entries(groups).filter(([,v]) => v.length >= 3).map(([label, vals]) => {
        vals.sort((a,b) => a - b);
        const q1 = vals[Math.floor(vals.length * 0.25)], median = vals[Math.floor(vals.length * 0.5)], q3 = vals[Math.floor(vals.length * 0.75)];
        const iqr = q3 - q1;
        return { label, q1, median, q3, whiskerLow: Math.max(vals[0], q1 - 1.5 * iqr), whiskerHigh: Math.min(vals[vals.length-1], q3 + 1.5 * iqr) };
      });
      if (boxes.length >= 2) {
        candidates.push({ type: 'boxplot', insight: 7, title: primaryMetric.replace(/_/g,' ') + ' Distribution by ' + bpCat.replace(/_/g,' '),
          boxes, color: 'amber', labels: boxes.map(b => b.label), data: boxes.map(b => b.median),
          desc: 'Box plot showing statistical distribution of ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' per ' + bpCat.replace(/_/g,' ').toLowerCase() + '.' });
      }
    }
  }

  // CANDIDATE: Candlestick — OHLC stock data
  if (dateCol) {
    const oCol = allHeaders.find(h => /^open$/i.test(h.trim()));
    const hCol = allHeaders.find(h => /^high$/i.test(h.trim()));
    const lCol = allHeaders.find(h => /^low$/i.test(h.trim()));
    const cCol = allHeaders.find(h => /^close$/i.test(h.trim()));
    if (oCol && hCol && lCol && cCol) {
      const grouped = {};
      rows.forEach(r => { const dt = String(r[dateCol]||'').trim(); if (!dt) return; if (!grouped[dt]) grouped[dt] = {o:[],h:[],l:[],c:[]}; grouped[dt].o.push(parseFloat(r[oCol])||0); grouped[dt].h.push(parseFloat(r[hCol])||0); grouped[dt].l.push(parseFloat(r[lCol])||0); grouped[dt].c.push(parseFloat(r[cCol])||0); });
      const pat = colMeta[dateCol] && colMeta[dateCol].datePattern;
      const candles = Object.entries(grouped).sort((a,b) => { if (pat) { const da = parseDateValue(a[0],pat), db = parseDateValue(b[0],pat); if (da && db) return da - db; } return a[0].localeCompare(b[0]); })
        .map(([dt, g]) => ({ label: dt, open: g.o[g.o.length-1], high: Math.max(...g.h), low: Math.min(...g.l), close: g.c[g.c.length-1] }));
      if (candles.length >= 5) {
        candidates.push({ type: 'candlestick', insight: 10, title: 'Price Chart (OHLC)',
          candles, labels: candles.map(c => c.label), data: candles.map(c => c.close), color: 'emerald',
          desc: 'Candlestick chart showing Open-High-Low-Close price action over time.' });
      }
    }
  }

  // CANDIDATE: Treemap — many-category proportional view
  if (primaryMetric) {
    const tmCat = categoricals.find(c => colMeta[c].uniqueCount >= 5 && colMeta[c].uniqueCount <= 30);
    if (tmCat) {
      const agg = aggByCategory(tmCat, primaryMetric, /score|rate|avg|percent/i.test(primaryMetric) ? 'avg' : 'sum').filter(a => a.value > 0).slice(0, 20);
      if (agg.length >= 5) {
        candidates.push({ type: 'treemap', insight: 5, title: primaryMetric.replace(/_/g,' ') + ' by ' + tmCat.replace(/_/g,' '),
          labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'multi',
          desc: 'Treemap showing proportional ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' by ' + tmCat.replace(/_/g,' ').toLowerCase() + '.' });
      }
    }
  }

  // CANDIDATE: Radar — multi-metric profile
  if (metrics.length >= 4 && categoricals.length > 0) {
    const radarCat = categoricals.find(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 6);
    if (radarCat) {
      const topGroup = rows.reduce((acc, r) => { const k = String(r[radarCat] || '').trim(); acc[k] = (acc[k]||0)+1; return acc; }, {});
      const bestGroup = Object.entries(topGroup).sort((a,b)=>b[1]-a[1])[0];
      if (bestGroup) {
        const groupRows = rows.filter(r => String(r[radarCat]||'').trim() === bestGroup[0]);
        const radarMetrics = metrics.slice(0, 6);
        const radarData = radarMetrics.map(m => { const v = groupRows.map(r => parseFloat(r[m]) || 0); return v.reduce((a,b)=>a+b,0) / v.length; });
        candidates.push({ type: 'radar', insight: 4, title: bestGroup[0] + ' — Metric Profile',
          labels: radarMetrics.map(m => m.replace(/_/g, ' ')), data: radarData, color: 'emerald',
          desc: 'Radar showing ' + bestGroup[0] + ' across ' + radarMetrics.length + ' metrics.' });
      }
    }
  }

  // ── RANK & PICK: Sort candidates by insight score, ensure type variety, pick best to add after core 3 ──
  candidates.sort((a, b) => b.insight - a.insight);
  const usedChartTypes = new Set(chartPlan.map(c => c.type));
  let added = 0;
  for (const cand of candidates) {
    if (chartPlan.length >= 4) break;
    if (usedChartTypes.has(cand.type)) continue; // ensure variety
    chartPlan.push(cand);
    usedChartTypes.add(cand.type);
    added++;
  }

  // Hard limit: 4 charts max for clean dashboard
  chartPlan.splice(4);

  // Store original column references for cross-filter rebuilds
  chartPlan.forEach(chart => {
    if (chart.xLabel) chart._origXCol = allHeaders.find(h => h.replace(/_/g,' ') === chart.xLabel) || chart.xLabel.replace(/ /g,'_');
    if (chart.yLabel) chart._origYCol = allHeaders.find(h => h.replace(/_/g,' ') === chart.yLabel) || chart.yLabel.replace(/ /g,'_');
    chart._origAggFn = chart.title.startsWith('Avg') ? 'avg' : chart.title.startsWith('Max') ? 'max' : 'sum';
  });

  // Store detected column types for data table icons
  const colTypes = {};
  allHeaders.forEach(h => { colTypes[h] = detectColumnType(h, colMeta[h]); });

  App.excelChartConfig = { colMeta, colTypes, metrics, categoricals, dates, indices, chartPlan,
    labelCol: categoricals[0] || dates[0] || nameCol || indices[0] || null,
    dataCols: metrics.slice(0,2), numericCols: metrics,
    labelCols: [...categoricals, ...dates, ...(nameCol ? [nameCol] : [])] };
  App.hasExcelData = true;
  App.drillStates = {}; // Reset drill states on new data

  if(App.chartInterval) { clearInterval(App.chartInterval); App.chartInterval = null; }

  // ── SMART STAT CARDS ──
  // Card 1: Total records
  App.stats.revenue.value = rows.length;
  App.stats.revenue.label = 'Total Records';
  App.stats.revenue.format = 'number';
  App.stats.revenue.color = 'cyan';
  App.stats.revenue.trend = 0;

  // Card 2: first metric average
  if(metrics[0]) {
    const v = colMeta[metrics[0]].vals;
    const avg = v.reduce((a,b)=>a+b,0)/v.length;
    App.stats.users.value = Math.round(avg * 100) / 100;
    App.stats.users.label = 'Avg ' + metrics[0].replace(/_/g, ' ');
    App.stats.users.format = 'number';
    App.stats.users.color = 'violet';
    const mid = Math.floor(v.length/2);
    const h1 = v.slice(0,mid).reduce((a,b)=>a+b,0)/mid;
    const h2 = v.slice(mid).reduce((a,b)=>a+b,0)/(v.length-mid);
    App.stats.users.trend = h1>0 ? Math.round((h2-h1)/h1*1000)/10 : 0;
  }

  // Card 3: unique categories, or unique labels, or total metrics
  if(categoricals[0]) {
    App.stats.uptime.value = colMeta[categoricals[0]].uniqueCount;
    App.stats.uptime.label = 'Unique ' + categoricals[0].replace(/_/g, ' ') + 's';
    App.stats.uptime.format = 'number';
    App.stats.uptime.color = 'emerald';
    App.stats.uptime.trend = 0;
  } else {
    // Fallback: count unique items in the first text/name column, or show metric count
    const nameCol = allHeaders.find(h => !colMeta[h].isNumeric && !colMeta[h].isIndex && !colMeta[h].isDate);
    if (nameCol) {
      const uniq = new Set(rows.map(r => String(r[nameCol]||'').trim()).filter(Boolean));
      App.stats.uptime.value = uniq.size;
      App.stats.uptime.label = 'Unique ' + nameCol.replace(/_/g, ' ') + 's';
    } else {
      App.stats.uptime.value = metrics.length;
      App.stats.uptime.label = 'Data Metrics';
    }
    App.stats.uptime.format = 'number';
    App.stats.uptime.color = 'emerald';
    App.stats.uptime.trend = 0;
  }

  // Card 4: second metric max or second categorical count
  if(metrics[1]) {
    const v = colMeta[metrics[1]].vals;
    App.stats.tasks.value = Math.max(...v);
    App.stats.tasks.label = 'Max ' + metrics[1].replace(/_/g, ' ');
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  } else if(categoricals[1]) {
    App.stats.tasks.value = colMeta[categoricals[1]].uniqueCount;
    App.stats.tasks.label = 'Unique ' + categoricals[1].replace(/_/g, ' ') + 's';
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  } else {
    App.stats.tasks.value = allHeaders.length;
    App.stats.tasks.label = 'Total Columns';
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  }
}

function initCounters() {
  $$('.stat-value').forEach(el => {
    const target = el.textContent;
    const fmt = el.dataset.format;
    if(!fmt) return;
    const numStr = target.replace(/[$,%]/g,'').replace(/,/g,'');
    const num = parseFloat(numStr);
    if(isNaN(num)) return;
    el.textContent = fmt==='currency'?'$0':fmt==='percent'?'0.0%':'0';
    const start = performance.now();
    function update(now) {
      const p = Math.min((now-start)/1200, 1);
      const eased = 1-Math.pow(1-p,3);
      el.textContent = formatValue(num*eased, fmt);
      if(p<1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  });
}

  boolean: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
};

function detectColumnType(colName, meta) {
  if (!meta) return { type: 'text', icon: COL_TYPE_ICONS.text };
  const low = (colName || '').toLowerCase().replace(/[_\s]+/g, '');
  if (meta.isIndex) return { type: 'id', icon: COL_TYPE_ICONS.id };
  if (meta.isDate) return { type: 'date', icon: COL_TYPE_ICONS.date };
  if (/email|mail/i.test(low)) return { type: 'email', icon: COL_TYPE_ICONS.email };
  if (/country|city|state|region|location|address|zip|postal|lat|lng|longitude|latitude/i.test(low)) return { type: 'geo', icon: COL_TYPE_ICONS.geo };
  if (meta.isMetric) {
    if (/revenue|sales|cost|price|profit|income|salary|wage|budget|spend|fee|amount/i.test(low)) return { type: 'currency', icon: COL_TYPE_ICONS.currency };
    if (/percent|pct|rate|ratio|margin/i.test(low)) return { type: 'percent', icon: COL_TYPE_ICONS.percent };
    return { type: 'numeric', icon: COL_TYPE_ICONS.numeric };
  }
  if (meta.isCategorical) return { type: 'category', icon: COL_TYPE_ICONS.category };
  // Check for boolean
  if (meta.uniqueVals && meta.uniqueVals.length <= 3) {
    const boolVals = meta.uniqueVals.map(v => String(v).toLowerCase());
    if (boolVals.every(v => ['true','false','yes','no','0','1','y','n'].includes(v))) return { type: 'boolean', icon: COL_TYPE_ICONS.boolean };
  }
  return { type: 'text', icon: COL_TYPE_ICONS.text };
}

function formatCellValue(val, colType) {
  if (val === undefined || val === null || val === '') return '<span style="opacity:0.2">—</span>';
  if (colType.type === 'currency') return formatNumber(Number(val), { currency: true, abbreviate: false, decimals: 2 });
  if (colType.type === 'percent') return Number(val).toFixed(1);
  if (colType.type === 'numeric') return typeof val === 'number' ? formatNumber(val, { abbreviate: false, decimals: val % 1 ? 2 : 0 }) : val;
  return String(val);
}

function renderExcelPreview() {
  if (!App.excelData) return '';
  const d = App.excelData;
  const ec = App.excelChartConfig;
  const maxRows = Math.min(d.rows.length, 50);
  // Detect column types
  const colTypes = {};
  d.headers.forEach(h => { colTypes[h] = detectColumnType(h, ec ? ec.colMeta[h] : null); });

  const thHTML = d.headers.map(h => {
    const ct = colTypes[h];
    const typeBadge = '<span class="col-type-icon" title="' + ct.type + '">' + ct.icon + '</span>';
    return '<th>' + typeBadge + h.replace(/_/g, ' ') + '</th>';
  }).join('');

  const tbHTML = d.rows.slice(0, maxRows).map(r =>
    '<tr>' + d.headers.map(h => {
      const ct = colTypes[h];
      const cls = ct.type === 'numeric' || ct.type === 'currency' || ct.type === 'percent' ? ' class="col-numeric"' : ct.type === 'date' ? ' class="col-date"' : '';
      return '<td' + cls + '>' + formatCellValue(r[h], ct) + '</td>';
    }).join('') + '</tr>'
  ).join('');

  const typeStats = {};
  d.headers.forEach(h => { const t = colTypes[h].type; typeStats[t] = (typeStats[t] || 0) + 1; });
  const typeSummary = Object.entries(typeStats).map(([t, c]) => c + ' ' + t).join(' · ');

  return `<div class="glass-panel" style="margin-top:20px"><div class="panel-header" style="flex-wrap:wrap;gap:8px">
    <h2 class="panel-title">Data Preview</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:11px;color:var(--text-tertiary)">${formatNumber(d.rows.length, {abbreviate:false})} rows · ${d.headers.length} cols</span>
      <span style="font-size:10px;color:var(--text-tertiary);opacity:0.6">${typeSummary}</span>
    </div></div>
    <div class="data-table-wrap" style="max-height:320px;overflow-y:auto"><table class="data-table"><thead><tr>${thHTML}</tr></thead><tbody>${tbHTML}</tbody></table></div>
    ${d.rows.length > 50 ? '<p style="text-align:center;padding:8px;font-size:11px;color:var(--text-tertiary)">Showing 50 of ' + formatNumber(d.rows.length, {abbreviate:false}) + ' rows</p>' : ''}</div>`;
}

function renderKIList() {
  let items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return '<div style="text-align:center;padding:40px 0;color:var(--text-tertiary);font-size:13px">Click "Analyze" to discover key influencers</div>';
  const isIncDir = App.kiState.direction === 'increase';
  // Filter by search query
  const q = (App.kiState.searchQuery || '').toLowerCase();
  if (q) {
    items = items.filter(inf => inf.factor.toLowerCase().includes(q) || String(inf.value).toLowerCase().includes(q) || (inf.explanation || '').toLowerCase().includes(q));
  }
  // Sort: pinned first, then by impact
  items.sort((a, b) => {
    const aPinned = isKIPinned(a.factor, a.value) ? 1 : 0;
    const bPinned = isKIPinned(b.factor, b.value) ? 1 : 0;
    if (aPinned !== bPinned) return bPinned - aPinned;
    return isIncDir ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue;
  });
  return items.map((inf, i) => {
    const allIdx = App.kiState.influencers.indexOf(inf);
    const isInc = inf.direction === 'increase';
    const multLabel = isInc ? inf.multiplier.toFixed(2) + 'x higher' : inf.multiplier.toFixed(2) + 'x lower';
    const conf = computeKIConfidence(inf);
    const pinned = isKIPinned(inf.factor, inf.value);
    return '<div class="ki-item' + (allIdx === App.kiState.selectedIdx ? ' selected' : '') + '" onclick="selectKIItem('+allIdx+')">' +
      '<div class="ki-item-header"><span class="ki-item-factor">' + kiLabel(inf.factor, inf.value) + '</span>' +
      '<span style="display:flex;align-items:center;gap:4px">' +
        '<span class="ki-item-mult ' + inf.direction + '">' + multLabel + '</span>' +
        '<span class="ki-confidence ' + conf + '">' + conf + '</span>' +
        '<button class="ki-pin-btn' + (pinned ? ' pinned' : '') + '" onclick="event.stopPropagation();toggleKIPin(\'' + inf.factor.replace(/'/g,"\\'") + '\',\'' + String(inf.value).replace(/'/g,"\\'") + '\')">★</button>' +
      '</span></div>' +
      '<div class="ki-item-desc">' + (inf.explanation || 'When ' + inf.factor.replace(/_/g,' ') + ' is ' + inf.value + ', ' + App.kiState.metric.replace(/_/g,' ') + ' is ' + multLabel) + '</div></div>';
  }).join('');
}

function kiLabel(factor, value) {
  const f = factor.replace(/_/g, ' ');
  const v = String(value);
  if (f === v || f.toLowerCase() === v.toLowerCase()) return f;
  return f + ' = ' + v;
}

function filterKIList(query) {
  App.kiState.searchQuery = query;
  const listEl = document.getElementById('kiList');
  if (listEl) listEl.innerHTML = renderKIList();
}

function computeKIConfidence(inf) {
  const count = inf.count || 0;
  const effect = Math.abs(inf.multiplier - 1);
  if (count >= 30 && effect > 0.25) return 'high';
  if (count >= 10 && effect > 0.15) return 'medium';
  return 'low';
}

function isKIPinned(factor, value) {
  return App.kiState.pins.some(p => p.factor === factor && p.value === value);
}

function toggleKIPin(factor, value) {
  const idx = App.kiState.pins.findIndex(p => p.factor === factor && p.value === value);
  if (idx >= 0) App.kiState.pins.splice(idx, 1);
  else App.kiState.pins.push({ factor, value });
  localStorage.setItem('genbi_ki_pins', JSON.stringify(App.kiState.pins));
  const listEl = document.getElementById('kiList');
  if (listEl) listEl.innerHTML = renderKIList();
}

// Resolve the actual column name for a factor — handles cases where AI
// returns a value as the factor name (e.g. factor="Vaccines" when the
// real column is "Therapeutic_Area" which contains value "Vaccines").
function resolveKIFactorCol(factor, value) {
  if (!App.excelData) return factor;
  const headers = App.excelData.headers;
  // 1. Exact match — factor is already a valid column name
  if (headers.includes(factor)) return factor;
  // 2. Try with underscores replaced by spaces and vice-versa
  const alt = factor.includes('_') ? factor.replace(/_/g, ' ') : factor.replace(/ /g, '_');
  if (headers.includes(alt)) return alt;
  // 3. Factor is actually a value — find the column that contains it
  const rows = App.excelData.rows;
  const ec = App.excelChartConfig;
  const cats = ec ? (ec.categoricals || []) : headers;
  for (const col of cats) {
    for (let i = 0; i < Math.min(rows.length, 200); i++) {
      if (String(rows[i][col] || '').trim() === String(value || factor).trim()) return col;
    }
  }
  return factor;
}

function drawKIFactorChart() {
  const canvas = document.getElementById('kiFactorChart');
  if (!canvas) return;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf || !App.excelData) return;
  const metric = App.kiState.metric;
  const factor = resolveKIFactorCol(inf.factor, inf.value);
  const rows = App.excelData.rows;

  // Compute avg metric for each value of this factor
  const groups = {};
  rows.forEach(r => {
    const v = String(r[factor] || '').trim();
    if (!v) return;
    if (!groups[v]) groups[v] = [];
    groups[v].push(parseFloat(r[metric]) || 0);
  });
  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k, value: v.reduce((a,b) => a+b, 0) / v.length
  })).sort((a,b) => b.value - a.value);
  entries = entries.slice(0, 12); // limit

  const labels = entries.map(e => e.label);
  const data = entries.map(e => Math.round(e.value * 100) / 100);

  // Highlight the selected value
  const highlightIdx = labels.indexOf(inf.value);
  const isInc = inf.direction === 'increase';
  animateBarChart(canvas, labels, data, isInc ? 'cyan' : 'rose', {
    suffix: '', xLabel: factor.replace(/_/g,' '), yLabel: metric.replace(/_/g,' '),
    _highlightIdx: highlightIdx
  });
}

function drawKIOverviewChart(canvas, animate) {
  if (!canvas) return;
  if (canvas._kiAnimId) { cancelAnimationFrame(canvas._kiAnimId); canvas._kiAnimId = null; }
  const items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return;

  // Sort: increase = highest avgWhenTrue first, decrease = lowest first
  const isInc = App.kiState.direction === 'increase';
  items.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;

  const padL = 180, padR = 70, padT = 20, padB = 30;
  const cw = w - padL - padR, ch = h - padT - padB;
  const overallAvg = items[0]?.overallAvg || 0;

  const allVals = items.map(inf => inf.avgWhenTrue);
  allVals.push(overallAvg);
  const maxVal = Math.ceil(Math.max(...allVals) * 1.15 / 10) * 10 || 100;

  const barH = Math.min(28, Math.max(14, (ch - (items.length - 1) * 6) / items.length));
  const gap = Math.min(6, (ch - items.length * barH) / Math.max(items.length - 1, 1));
  const totalH = items.length * barH + (items.length - 1) * gap;
  const startY = padT + (ch - totalH) / 2;

  function drawFrame(progress) {
    ctx.clearRect(0, 0, w, h);

    // Grid lines
    for (let i = 0; i <= 4; i++) {
      const x = padL + (cw / 4) * i;
      ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
      ctx.moveTo(x, padT); ctx.lineTo(x, h - padB); ctx.stroke();
      ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'center';
      ctx.fillText(Math.round((maxVal / 4) * i).toLocaleString(), x, h - padB + 14);
    }

    // Overall avg reference line
    const avgX = padL + (overallAvg / maxVal) * cw;
    ctx.globalAlpha = progress;
    ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.3); ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]); ctx.moveTo(avgX, padT - 4); ctx.lineTo(avgX, h - padB + 4); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = chartTextColor(0.5); ctx.font = '500 10px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Overall Avg: ' + overallAvg.toLocaleString('en-US',{maximumFractionDigits:0}), avgX, padT - 6);
    ctx.globalAlpha = 1;

    // Bars
    items.forEach((inf, i) => {
      // Stagger each bar slightly
      const stagger = animate ? Math.max(0, Math.min(1, (progress - i * 0.04) / 0.7)) : 1;
      const easedP = 1 - Math.pow(1 - stagger, 3); // ease-out cubic
      const y = startY + i * (barH + gap);
      const fullBarW = (inf.avgWhenTrue / maxVal) * cw;
      const barW = fullBarW * easedP;
      const r = Math.min(3, barH / 2);
      const isSelected = App.kiState.influencers.indexOf(inf) === App.kiState.selectedIdx;
      const alpha = isSelected ? 0.95 : 0.70;

      // Bar with gradient colors
      if (barW > 0.5) {
        const grad = ctx.createLinearGradient(padL, 0, padL + barW, 0);
        if (isInc) {
          // Teal → Emerald → Bright green gradient
          grad.addColorStop(0, 'rgba(0,180,130,' + (alpha * 0.35) + ')');
          grad.addColorStop(0.5, 'rgba(32,201,151,' + (alpha * 0.7) + ')');
          grad.addColorStop(1, 'rgba(105,240,174,' + alpha + ')');
        } else {
          // Deep rose → Red → Warm coral gradient
          grad.addColorStop(0, 'rgba(180,40,80,' + (alpha * 0.35) + ')');
          grad.addColorStop(0.5, 'rgba(209,52,56,' + (alpha * 0.7) + ')');
          grad.addColorStop(1, 'rgba(255,107,157,' + alpha + ')');
        }
        ctx.beginPath();
        ctx.moveTo(padL, y); ctx.lineTo(padL + barW - r, y);
        ctx.quadraticCurveTo(padL + barW, y, padL + barW, y + r);
        ctx.lineTo(padL + barW, y + barH - r);
        ctx.quadraticCurveTo(padL + barW, y + barH, padL + barW - r, y + barH);
        ctx.lineTo(padL, y + barH); ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();

        if (isSelected) {
          const glowRgb = isInc ? '105,240,174' : '255,107,157';
          ctx.save(); ctx.shadowColor = 'rgba(' + glowRgb + ',0.35)'; ctx.shadowBlur = 12; ctx.fill(); ctx.restore();
          ctx.strokeStyle = 'rgba(' + glowRgb + ',0.5)'; ctx.lineWidth = 1; ctx.stroke();
        }
      }

      // Label (left side) — always visible
      ctx.fillStyle = chartTextColor(isSelected ? 0.95 : 0.6);
      ctx.font = (isSelected ? '500 ' : '') + '11px Inter'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      const lbl = kiLabel(inf.factor, inf.value);
      const truncLbl = lbl.length > 24 ? lbl.substring(0, 23) + '..' : lbl;
      ctx.fillText(truncLbl, padL - 8, y + barH / 2);

      // Value (right of bar) — fade in with bar
      const valRgb = isInc ? '105,240,174' : '255,107,157';
      ctx.globalAlpha = easedP;
      ctx.fillStyle = 'rgba(' + valRgb + ',' + (isSelected ? 1 : 0.75) + ')';
      ctx.font = (isSelected ? 'bold ' : '') + '11px Inter'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      const multLabel = inf.multiplier.toFixed(2) + 'x';
      ctx.fillText(inf.avgWhenTrue.toLocaleString('en-US',{maximumFractionDigits:0}) + ' (' + multLabel + ')', padL + barW + 8, y + barH / 2);
      ctx.globalAlpha = 1;
    });

    ctx.textBaseline = 'alphabetic';
  }

  if (animate) {
    const dur = 700;
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / dur);
      drawFrame(t);
      if (t < 1) canvas._kiAnimId = requestAnimationFrame(tick);
      else canvas._kiAnimId = null;
    }
    canvas._kiAnimId = requestAnimationFrame(tick);
  } else {
    drawFrame(1);
  }

  // Store hit areas for click interaction
  canvas._kiItems = items;
  canvas._kiLayout = { startY, barH, gap };
  if (!canvas._hasKIEvents) {
    canvas._hasKIEvents = true;
    canvas.addEventListener('click', function(e) {
      const r = canvas.getBoundingClientRect();
      const my = e.clientY - r.top;
      const sorted = canvas._kiItems;
      const layout = canvas._kiLayout;
      if (!sorted || !layout) return;
      for (let i = 0; i < sorted.length; i++) {
        const y = layout.startY + i * (layout.barH + layout.gap);
        if (my >= y && my <= y + layout.barH) {
          const allIdx = App.kiState.influencers.indexOf(sorted[i]);
          selectKIItem(allIdx);
          drawKIOverviewChart(canvas, false);
          return;
        }
      }
    });
  }
}

function runKeyInfluencers() {
  if (!App.hasExcelData || !App.kiState.metric) return;
  App.kiState._animateNext = true;
  const ec = App.excelChartConfig;
  const metric = App.kiState.metric;
  const rows = App.excelData.rows;

  // Show loading overlay and disable button
  App.kiState.loading = true;
  const btn = document.getElementById('kiRunBtn');
  if (btn) { btn.textContent = 'Analyzing...'; btn.disabled = true; }
  showKILoading();

  // Compute grouped averages for the prompt / local fallback
  const overallVals = rows.map(r => parseFloat(r[metric]) || 0);
  const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;
  const cats = ec.categoricals || [];
  const groupedAvgs = {};
  cats.forEach(cat => {
    const groups = {};
    rows.forEach(r => {
      const v = String(r[cat] || '').trim();
      if (!v) return;
      if (!groups[v]) groups[v] = [];
      groups[v].push(parseFloat(r[metric]) || 0);
    });
    groupedAvgs[cat] = {};
    Object.entries(groups).forEach(([val, vals]) => {
      groupedAvgs[cat][val] = { avg: vals.reduce((a,b)=>a+b,0)/vals.length, count: vals.length };
    });
  });

  if (isLoggedIn()) {
    // AI-powered analysis
    const colMetaClean = {};
    Object.entries(ec.colMeta).forEach(([k, v]) => {
      colMetaClean[k] = { ...v, vals: undefined, uniqueVals: v.uniqueVals?.slice(0,15) };
    });
    const token = localStorage.getItem('genbi-auth-token');

    fetch('/api/key-influencers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        metric,
        columns: App.excelData.headers,
        colMeta: colMetaClean,
        summary: {
          rowCount: rows.length,
          [metric]: { avg: overallAvg, min: Math.min(...overallVals), max: Math.max(...overallVals) },
          groupedAvgs
        }
      })
    })
    .then(r => r.json())
    .then(data => {
      App.kiState.loading = false;
      hideKILoading();
      if (data.error) {
        toast(data.error, 'error');
        computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      } else {
        App.kiState.influencers = data.influencers || [];
        App.kiState.selectedIdx = -1;
      }
      navigate('influencers');
    })
    .catch(err => {
      App.kiState.loading = false;
      hideKILoading();
      toast('AI request failed, using local analysis. ' + err.message, 'info');
      computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      navigate('influencers');
    });
  } else {
    // Local fallback — brief delay so the loading animation is visible
    setTimeout(() => {
      computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      App.kiState.loading = false;
      hideKILoading();
      navigate('influencers');
    }, 1200);
  }
}

function computeLocalInfluencers(metric, overallAvg, groupedAvgs) {
  const influencers = [];
  Object.entries(groupedAvgs).forEach(([col, groups]) => {
    Object.entries(groups).forEach(([val, stats]) => {
      if (stats.count < 2) return; // skip tiny groups
      const mult = overallAvg > 0 ? stats.avg / overallAvg : 1;
      if (Math.abs(mult - 1) < 0.10) return; // skip insignificant
      influencers.push({
        factor: col,
        value: val,
        direction: mult >= 1 ? 'increase' : 'decrease',
        avgWhenTrue: Math.round(stats.avg * 100) / 100,
        overallAvg: Math.round(overallAvg * 100) / 100,
        multiplier: Math.round(mult * 100) / 100,
        count: stats.count,
        explanation: 'When ' + col.replace(/_/g,' ') + ' is ' + val + ', average ' + metric.replace(/_/g,' ') + ' is ' + (mult >= 1 ? (mult.toFixed(2) + 'x higher') : (mult.toFixed(2) + 'x lower')) + ' than overall.'
      });
    });
  });

  // Sort by absolute deviation from 1.0
  influencers.sort((a, b) => Math.abs(b.multiplier - 1) - Math.abs(a.multiplier - 1));
  App.kiState.influencers = influencers.slice(0, 10);
  App.kiState.selectedIdx = -1;
}

function drawKIWaterfallChart() {
  const canvas = document.getElementById('kiWaterfallChart');
  if (!canvas) return;
  const items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return;
  const isInc = App.kiState.direction === 'increase';
  items.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);
  const overallAvg = items[0]?.overallAvg || 0;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const padL = 30, padR = 20, padT = 30, padB = 80;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Build waterfall data: start with overall avg, each factor adds its delta
  const wfData = [{ label: 'Overall Avg', value: overallAvg, isTotal: true }];
  let running = overallAvg;
  items.slice(0, 8).forEach(inf => {
    const delta = inf.avgWhenTrue - overallAvg;
    wfData.push({ label: kiLabel(inf.factor, inf.value), value: delta, start: running, isTotal: false });
    running += delta;
  });
  wfData.push({ label: 'Combined', value: running, isTotal: true });

  const allVals = [];
  let run2 = overallAvg;
  wfData.forEach(d => {
    if (d.isTotal) { allVals.push(d.value); }
    else { allVals.push(run2); allVals.push(run2 + d.value); run2 += d.value; }
  });
  const minVal = Math.min(0, ...allVals) * 0.9;
  const maxVal = Math.max(...allVals) * 1.15 || 100;
  const range = maxVal - minVal;

  const barW = Math.min(40, (cw - (wfData.length - 1) * 4) / wfData.length);
  const gap = 4;
  const totalW = wfData.length * barW + (wfData.length - 1) * gap;
  const startX = padL + (cw - totalW) / 2;

  ctx.clearRect(0, 0, w, h);
  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    const val = maxVal - (range / 4) * i;
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(val).toLocaleString(), padL - 4, y + 3);
  }

  let runStart = overallAvg;
  wfData.forEach((d, i) => {
    const x = startX + i * (barW + gap);
    let barTop, barBot;
    if (d.isTotal) {
      barTop = padT + ((maxVal - d.value) / range) * ch;
      barBot = padT + ((maxVal - 0) / range) * ch;
      ctx.fillStyle = 'rgba(150,150,150,0.5)';
    } else {
      const top = Math.max(d.start, d.start + d.value);
      const bot = Math.min(d.start, d.start + d.value);
      barTop = padT + ((maxVal - top) / range) * ch;
      barBot = padT + ((maxVal - bot) / range) * ch;
      ctx.fillStyle = d.value >= 0 ? 'rgba(16,124,16,0.7)' : 'rgba(209,52,56,0.7)';
      runStart += d.value;
    }
    const bh = Math.max(2, barBot - barTop);
    const r2 = Math.min(3, bh / 2);
    ctx.beginPath(); ctx.moveTo(x + r2, barTop); ctx.lineTo(x + barW - r2, barTop); ctx.quadraticCurveTo(x + barW, barTop, x + barW, barTop + r2); ctx.lineTo(x + barW, barTop + bh - r2); ctx.quadraticCurveTo(x + barW, barTop + bh, x + barW - r2, barTop + bh); ctx.lineTo(x + r2, barTop + bh); ctx.quadraticCurveTo(x, barTop + bh, x, barTop + bh - r2); ctx.lineTo(x, barTop + r2); ctx.quadraticCurveTo(x, barTop, x + r2, barTop); ctx.closePath();
    ctx.fill();

    // Value label
    ctx.fillStyle = chartTextColor(0.6); ctx.font = '500 10px Inter'; ctx.textAlign = 'center';
    const valStr = d.isTotal ? Math.round(d.value).toLocaleString() : (d.value >= 0 ? '+' : '') + Math.round(d.value).toLocaleString();
    ctx.fillText(valStr, x + barW / 2, barTop - 4);

    // X label (rotated)
    ctx.save();
    ctx.translate(x + barW / 2, h - padB + 8);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    const lbl = d.label.length > 18 ? d.label.slice(0, 16) + '..' : d.label;
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });
}

function drawKIScatterChart() {
  const canvas = document.getElementById('kiScatterChart');
  if (!canvas || !App.excelData) return;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf) return;
  const metric = App.kiState.metric;
  const factor = resolveKIFactorCol(inf.factor, inf.value);
  const rows = App.excelData.rows;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const padL = 50, padR = 30, padT = 20, padB = 80;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Collect unique factor values and metric values
  const factorVals = [];
  const points = [];
  rows.forEach(r => {
    const fv = String(r[factor] || '').trim();
    const mv = parseFloat(r[metric]);
    if (!fv || isNaN(mv)) return;
    if (!factorVals.includes(fv)) factorVals.push(fv);
    points.push({ fv, mv, fvIdx: factorVals.indexOf(fv) });
  });
  // Update indices after all values collected
  points.forEach(p => p.fvIdx = factorVals.indexOf(p.fv));

  // Limit to 10 categories max; keep the highlighted value always visible
  let displayVals = factorVals.slice(0, 10);
  if (!displayVals.includes(inf.value) && factorVals.includes(inf.value)) {
    displayVals[displayVals.length - 1] = inf.value;
  }
  const displayPoints = points.filter(p => displayVals.includes(p.fv));
  displayPoints.forEach(p => p.fvIdx = displayVals.indexOf(p.fv));

  if (displayPoints.length === 0) return;
  const minY = Math.min(...displayPoints.map(p => p.mv));
  const maxY = Math.max(...displayPoints.map(p => p.mv)) || 1;
  const rangeY = maxY - minY || 1;

  ctx.clearRect(0, 0, w, h);
  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    const val = maxY - (rangeY / 4) * i;
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0), padL - 6, y + 3);
  }

  // Overall avg reference line
  const clampedAvg = Math.max(minY, Math.min(maxY, inf.overallAvg));
  const avgY = padT + ((maxY - clampedAvg) / rangeY) * ch;
  ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.3); ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]); ctx.moveTo(padL, avgY); ctx.lineTo(w - padR, avgY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'left';
  ctx.fillText('Avg: ' + inf.overallAvg.toFixed(0), w - padR + 2, avgY + 3);

  // Column dividers + dots
  const colW = cw / Math.max(displayVals.length, 1);
  // Light vertical separators
  displayVals.forEach((fv, i) => {
    const x = padL + i * colW;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
  });

  // Draw dots with jitter (seeded per-point for stable rendering)
  displayPoints.forEach((p, pi) => {
    const jitter = ((pi * 2654435761 >>> 0) % 1000) / 1000 - 0.5; // deterministic jitter
    const x = padL + p.fvIdx * colW + colW / 2 + jitter * colW * 0.5;
    const y = padT + ((maxY - p.mv) / rangeY) * ch;
    const isHighlight = p.fv === inf.value;
    ctx.beginPath(); ctx.arc(x, y, isHighlight ? 4.5 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = isHighlight ? 'rgba(0,229,255,0.85)' : 'rgba(150,150,150,0.25)';
    ctx.fill();
    if (isHighlight) { ctx.strokeStyle = 'rgba(0,229,255,0.4)'; ctx.lineWidth = 1; ctx.stroke(); }
  });

  // X-axis labels — rotated -45°
  displayVals.forEach((fv, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + ch + 10;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = fv === inf.value ? 'rgba(0,229,255,0.9)' : chartTextColor(0.45);
    ctx.font = (fv === inf.value ? '600 ' : '') + '10px Inter';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    const lbl = fv.length > 14 ? fv.slice(0, 12) + '..' : fv;
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });
}

// ── A6: Sensitivity Slider ──
function updateKISensitivity(pct) {
  const el = document.getElementById('kiSensePct');
  const res = document.getElementById('kiSenseResult');
  if (el) el.textContent = pct;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf || !res) return;
  const newAvg = inf.overallAvg + (pct / 100) * (inf.avgWhenTrue - inf.overallAvg);
  const changePct = inf.overallAvg > 0 ? ((newAvg - inf.overallAvg) / inf.overallAvg * 100).toFixed(1) : 0;
  res.innerHTML = 'Projected avg: <strong>' + newAvg.toLocaleString('en-US', {maximumFractionDigits:1}) + '</strong> <span style="color:' + (changePct >= 0 ? '#107C10' : '#D13438') + '">(' + (changePct >= 0 ? '+' : '') + changePct + '%)</span>';
}

// ── A8: Copy Insight as Text ──
function copyKIInsight() {
  const dirItems = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (dirItems.length === 0) { toast('No influencers to copy', 'error'); return; }
  const isInc = App.kiState.direction === 'increase';
  dirItems.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);
  const top = dirItems[0];
  let text = 'Key Influencers Analysis for ' + (App.kiState.metric || '').replace(/_/g, ' ') + ' (' + App.kiState.direction + ')\n\n';
  text += 'Strongest factor: ' + top.factor + '=' + top.value + ' (' + top.multiplier.toFixed(2) + 'x ' + (isInc ? 'higher' : 'lower') + ')\n\n';
  dirItems.forEach((inf, i) => {
    text += (i + 1) + '. ' + inf.factor + '=' + inf.value + ' → ' + inf.multiplier.toFixed(2) + 'x ' + (inf.direction === 'increase' ? 'higher' : 'lower') + ' (avg: ' + (typeof inf.avgWhenTrue === 'number' ? inf.avgWhenTrue.toFixed(1) : inf.avgWhenTrue) + ')\n';
  });
  text += '\nOverall avg: ' + (top.overallAvg || 0).toFixed(1);
  navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard', 'success')).catch(() => toast('Copy failed', 'error'));
}

// ── B2: Interaction Effects ──
async function runKIInteractions() {
  const tabContent = document.getElementById('kiTabContent');
  if (!tabContent || !App.excelData) return;
  const metric = App.kiState.metric;
  const rows = App.excelData.rows;
  const topInfs = App.kiState.influencers.slice(0, 5);
  if (topInfs.length < 2) { var rc = document.getElementById('kiTabResults') || tabContent; rc.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">Need at least 2 influencers for interaction analysis.</div>'; return; }

  // Compute cross-tab averages locally
  const overallVals = rows.map(r => parseFloat(r[metric]) || 0);
  const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;
  const crossTab = [];
  for (let i = 0; i < topInfs.length; i++) {
    for (let j = i + 1; j < topInfs.length; j++) {
      const inf1 = topInfs[i], inf2 = topInfs[j];
      const matchRows = rows.filter(r => String(r[inf1.factor] || '').trim() === inf1.value && String(r[inf2.factor] || '').trim() === inf2.value);
      if (matchRows.length < 2) continue;
      const vals = matchRows.map(r => parseFloat(r[metric]) || 0);
      const combinedAvg = vals.reduce((a,b) => a+b, 0) / vals.length;
      crossTab.push({ factor1: inf1.factor, value1: inf1.value, factor2: inf2.factor, value2: inf2.value, combinedAvg, count: matchRows.length });
    }
  }

  var resContainer = document.getElementById('kiTabResults') || tabContent;
  if (!isLoggedIn()) {
    renderKIInteractionsLocal(resContainer, crossTab, overallAvg);
    return;
  }

  try {
    const data = await fetchAI('/api/ki-interactions', {
      metric,
      crossTabData: crossTab,
      overallAvg,
      singleFactorInfluencers: topInfs.map(inf => ({ factor: inf.factor, value: inf.value, multiplier: inf.multiplier, avgWhenTrue: inf.avgWhenTrue }))
    });
    App.kiState.interactions = data.interactions || [];
    renderKIInteractionsAI(resContainer);
  } catch(e) {
    renderKIInteractionsLocal(resContainer, crossTab, overallAvg);
  }
}

function renderKIInteractionsLocal(container, crossTab, overallAvg) {
  if (crossTab.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No significant interaction pairs found.</div>'; return; }
  crossTab.sort((a, b) => Math.abs(b.combinedAvg - overallAvg) - Math.abs(a.combinedAvg - overallAvg));
  container.innerHTML = crossTab.slice(0, 8).map(ct => {
    const mult = overallAvg > 0 ? (ct.combinedAvg / overallAvg).toFixed(2) : '?';
    const dir = ct.combinedAvg >= overallAvg ? 'higher' : 'lower';
    return '<div class="ki-interaction-card"><div class="ki-int-factors">' + ct.factor1.replace(/_/g,' ') + '=' + ct.value1 + ' AND ' + ct.factor2.replace(/_/g,' ') + '=' + ct.value2 + '</div>' +
      '<div class="ki-int-effect">' + App.kiState.metric.replace(/_/g,' ') + ' is <strong>' + mult + 'x ' + dir + '</strong> (' + ct.count + ' data points, avg: ' + ct.combinedAvg.toFixed(1) + ')</div></div>';
  }).join('');
}

function renderKIInteractionsAI(container) {
  const ints = App.kiState.interactions;
  if (!ints || ints.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No significant interactions found.</div>'; return; }
  container.innerHTML = ints.map(int => {
    const synergy = int.synergy || 'additive';
    return '<div class="ki-interaction-card"><div class="ki-int-factors">' + (int.factor1 || '').replace(/_/g,' ') + '=' + (int.value1 || '') + ' AND ' + (int.factor2 || '').replace(/_/g,' ') + '=' + (int.value2 || '') + '</div>' +
      '<div class="ki-int-effect">' + (int.explanation || 'Combined multiplier: ' + (int.combinedMultiplier || '?') + 'x') + '</div>' +
      '<span class="ki-int-synergy ' + synergy + '">' + synergy + '</span></div>';
  }).join('');
}

async function runKISegmentCompare() {
  const sel = document.getElementById('kiSegmentSelect');
  const results = document.getElementById('kiSegmentResults');
  if (!sel || !results || !sel.value) { toast('Select a segment column first', 'info'); return; }
  const segCol = sel.value;
  results.innerHTML = aiLoadingHTML('segLoader');

  const ec = App.excelChartConfig;
  const metric = App.kiState.metric;
  const rows = App.excelData.rows;
  const overallVals = rows.map(r => parseFloat(r[metric]) || 0);
  const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;

  // Group by segment, then compute per-segment influencer analysis
  const segGroups = {};
  rows.forEach(r => {
    const sv = String(r[segCol] || '').trim();
    if (!sv) return;
    if (!segGroups[sv]) segGroups[sv] = [];
    segGroups[sv].push(r);
  });

  const segmentData = {};
  Object.entries(segGroups).slice(0, 6).forEach(([segVal, segRows]) => {
    const cats = ec.categoricals.filter(c => c !== segCol);
    const groupedAvgs = {};
    cats.forEach(cat => {
      const groups = {};
      segRows.forEach(r => {
        const v = String(r[cat] || '').trim();
        if (!v) return;
        if (!groups[v]) groups[v] = [];
        groups[v].push(parseFloat(r[metric]) || 0);
      });
      groupedAvgs[cat] = {};
      Object.entries(groups).forEach(([val, vals]) => {
        groupedAvgs[cat][val] = { avg: vals.reduce((a,b)=>a+b,0)/vals.length, count: vals.length };
      });
    });
    segmentData[segVal] = groupedAvgs;
  });

  if (!isLoggedIn()) {
    renderKISegmentsLocal(results, segmentData, overallAvg, segCol);
    return;
  }

  try {
    const data = await fetchAI('/api/ki-segment-compare', { metric, segmentColumn: segCol, segmentData, overallAvg });
    App.kiState.segments = data;
    renderKISegmentsAI(results);
  } catch(e) {
    renderKISegmentsLocal(results, segmentData, overallAvg, segCol);
  }
}

function renderKISegmentsLocal(container, segmentData, overallAvg, segCol) {
  let html = '<div class="ki-segment-cols">';
  Object.entries(segmentData).forEach(([segVal, groupedAvgs]) => {
    html += '<div class="ki-segment-col"><h4>' + segCol.replace(/_/g,' ') + ' = ' + segVal + '</h4>';
    // Find top drivers per segment
    const drivers = [];
    Object.entries(groupedAvgs).forEach(([col, groups]) => {
      Object.entries(groups).forEach(([val, stats]) => {
        if (stats.count < 2) return;
        const mult = overallAvg > 0 ? stats.avg / overallAvg : 1;
        if (Math.abs(mult - 1) < 0.10) return;
        drivers.push({ factor: col, value: val, multiplier: mult, avg: stats.avg, count: stats.count });
      });
    });
    drivers.sort((a, b) => Math.abs(b.multiplier - 1) - Math.abs(a.multiplier - 1));
    drivers.slice(0, 5).forEach(d => {
      const dir = d.multiplier >= 1 ? 'increase' : 'decrease';
      html += '<div style="padding:6px 0;border-bottom:1px solid var(--glass-border);font-size:12px"><span style="color:var(--text-primary)">' + d.factor.replace(/_/g,' ') + '=' + d.value + '</span> <span class="ki-item-mult ' + dir + '" style="font-size:11px">' + d.multiplier.toFixed(2) + 'x</span></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderKISegmentsAI(container) {
  const data = App.kiState.segments;
  if (!data || !data.segments) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No segment data.</div>'; return; }
  let html = '<div class="ki-segment-cols">';
  data.segments.forEach(seg => {
    html += '<div class="ki-segment-col"><h4>' + (seg.segment || '') + '</h4>';
    (seg.topDrivers || []).slice(0, 5).forEach(d => {

      html += '<div style="padding:6px 0;border-bottom:1px solid var(--glass-border);font-size:12px"><span style="color:var(--text-primary)">' + (d.factor || '').replace(/_/g,' ') + '=' + (d.value || '') + '</span> <span class="ki-item-mult ' + (d.direction || 'increase') + '" style="font-size:11px">' + (d.multiplier || 0).toFixed(2) + 'x</span>' + (isShared ? '<span class="ki-segment-shared">shared</span>' : '') + '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  if (data.shared && data.shared.length) {
    html += '<div style="margin-top:12px;font-size:12px;color:var(--text-secondary)"><strong>Shared drivers:</strong> ' + data.shared.map(s => s.factor + '=' + s.value).join(', ') + '</div>';
  }
  container.innerHTML = html;
}

// ── B4: Time-Based Influencers ──
async function runKITemporal() {
  const tabContent = document.getElementById('kiTabContent');
  if (!tabContent || !App.excelData) return;
  const ec = App.excelChartConfig;
  const dateCol = Object.entries(ec.colMeta || {}).find(([k, v]) => v.isDate);
  if (!dateCol) { var rc = document.getElementById('kiTabResults') || tabContent; rc.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No date column detected.</div>'; return; }

  const metric = App.kiState.metric;
  const rows = App.excelData.rows;
  const dcName = dateCol[0];

  // Split rows into periods (quarters)
  const periodRows = {};
  rows.forEach(r => {
    const d = new Date(r[dcName]);
    if (isNaN(d.getTime())) return;
    const q = 'Q' + (Math.floor(d.getMonth() / 3) + 1) + ' ' + d.getFullYear();
    if (!periodRows[q]) periodRows[q] = [];
    periodRows[q].push(r);
  });

  const periodsData = {};
  const cats = ec.categoricals || [];
  Object.entries(periodRows).forEach(([period, pRows]) => {
    const overallVals = pRows.map(r => parseFloat(r[metric]) || 0);
    const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;
    const drivers = [];
    cats.forEach(cat => {
      const groups = {};
      pRows.forEach(r => {
        const v = String(r[cat] || '').trim();
        if (!v) return;
        if (!groups[v]) groups[v] = [];
        groups[v].push(parseFloat(r[metric]) || 0);
      });
      Object.entries(groups).forEach(([val, vals]) => {
        if (vals.length < 2) return;
        const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
        const mult = overallAvg > 0 ? avg / overallAvg : 1;
        if (Math.abs(mult - 1) >= 0.10) drivers.push({ factor: cat, value: val, multiplier: mult, avg, count: vals.length });
      });
    });
    drivers.sort((a, b) => Math.abs(b.multiplier - 1) - Math.abs(a.multiplier - 1));
    periodsData[period] = { overallAvg, topDrivers: drivers.slice(0, 5) };
  });

  var resContainer = document.getElementById('kiTabResults') || tabContent;
  if (!isLoggedIn()) {
    renderKITemporalLocal(resContainer, periodsData);
    return;
  }

  try {
    const data = await fetchAI('/api/ki-temporal', { metric, dateColumn: dcName, periodsData });
    App.kiState.temporal = data;
    renderKITemporalAI(resContainer);
  } catch(e) {
    renderKITemporalLocal(resContainer, periodsData);
  }
}

function renderKITemporalLocal(container, periodsData) {
  const periods = Object.entries(periodsData).sort((a, b) => a[0].localeCompare(b[0]));
  if (periods.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No time periods found.</div>'; return; }
  container.innerHTML = '<div class="ki-temporal-timeline">' + periods.map(([period, pd]) => {

// ── B5: Root Cause Chains ──
async function handleRootCauseChain(idx) {
  const container = document.getElementById('kiRootCauseBox');
  if (!container) return;
  if (!isLoggedIn()) { container.innerHTML = aiNoAuthHTML(); container.style.display = 'block'; return; }
  container.innerHTML = aiLoadingHTML('rootCauseLoader');
  container.style.display = 'block';
  try {
    const inf = App.kiState.influencers[idx];
    if (!inf) { container.style.display = 'none'; return; }
    const ec = App.excelChartConfig;
    const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), 8000));
    const data = await Promise.race([
      fetchAI('/api/ki-root-cause', {
        factor: inf.factor, value: inf.value, metric: App.kiState.metric,
        multiplier: inf.multiplier, avgWhenTrue: inf.avgWhenTrue, overallAvg: inf.overallAvg, count: inf.count,
        columns: App.excelData ? App.excelData.headers.slice(0, 15) : []
      }),
      timeoutPromise
    ]);
    if (!data || !data.chain || data.chain.length === 0) { container.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary)">No root cause analysis available.</div>'; return; }
    // Render as a visual flow diagram on canvas + compact action card
    const chain = data.chain;
    container.innerHTML = '<div style="height:' + (chain.length * 90 + 30) + 'px;position:relative"><canvas id="kiRootCanvas" style="width:100%;height:100%"></canvas></div>' +
      (data.rootAction ? '<div style="margin-top:10px;padding:10px 14px;border-radius:10px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);display:flex;align-items:flex-start;gap:10px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span style="font-size:12px;color:var(--text-primary);line-height:1.5">' + data.rootAction + '</span></div>' : '');
    setTimeout(() => drawRootCauseCanvas(chain, inf), 30);
  } catch(e) {
    if (e.message === 'NO_KEY') { container.innerHTML = aiNoAuthHTML(); return; }
    // Fallback: build a local root cause chain from the data we have
    const pctDiff = inf.overallAvg > 0 ? Math.round(((inf.avgWhenTrue - inf.overallAvg) / inf.overallAvg) * 100) : 0;
    const dir = pctDiff >= 0 ? 'higher' : 'lower';
    const chain = [
      { level: 1, cause: kiLabel(inf.factor, inf.value) + ' shifts ' + App.kiState.metric.replace(/_/g,' ') + ' ' + Math.abs(pctDiff) + '% ' + dir },
      { level: 2, cause: inf.count + ' data points with avg ' + (typeof inf.avgWhenTrue === 'number' ? inf.avgWhenTrue.toFixed(1) : inf.avgWhenTrue) + ' vs overall ' + (typeof inf.overallAvg === 'number' ? inf.overallAvg.toFixed(1) : inf.overallAvg) },
      { level: 3, cause: 'Multiplier of ' + inf.multiplier.toFixed(2) + 'x suggests strong ' + (pctDiff >= 0 ? 'positive' : 'negative') + ' association' }
    ];
    container.innerHTML = '<div style="height:' + (chain.length * 90 + 30) + 'px;position:relative"><canvas id="kiRootCanvas" style="width:100%;height:100%"></canvas></div>';
    setTimeout(() => drawRootCauseCanvas(chain, inf), 30);
  }
}

// ── Root Cause visual flow canvas ──
function drawRootCauseCanvas(chain, inf) {
  const canvas = document.getElementById('kiRootCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const isLight = isLightBg();

  const nodeH = 56, gap = 30, padX = 24;
  const nodeW = w - padX * 2;
  const totalH = chain.length * nodeH + (chain.length - 1) * gap;
  const startY = (h - totalH) / 2;

  const colors = ['#00e5ff', '#b388ff', '#ff6b9d'];
  const bgColors = ['rgba(0,229,255,0.08)', 'rgba(179,136,255,0.08)', 'rgba(255,107,157,0.08)'];
  const borderColors = ['rgba(0,229,255,0.25)', 'rgba(179,136,255,0.25)', 'rgba(255,107,157,0.25)'];
  const icons = ['Effect', 'Mechanism', 'Root Cause'];

  // Animate in
  const dur = 600;
  const startTime = performance.now();
  function frame(now) {
    const elapsed = now - startTime;
    ctx.clearRect(0, 0, w, h);

    chain.forEach((step, i) => {
      const t = Math.max(0, Math.min(1, (elapsed - i * 150) / dur));
      const ease = 1 - Math.pow(1 - t, 3);
      const y = startY + i * (nodeH + gap);
      const alpha = ease;
      const slideX = (1 - ease) * 30;

      // Connector arrow from previous node
      if (i > 0 && alpha > 0) {
        const prevY = startY + (i - 1) * (nodeH + gap) + nodeH;
        const midX = w / 2;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.moveTo(midX, prevY + 2); ctx.lineTo(midX, y - 2);
        ctx.stroke();
        ctx.setLineDash([]);
        // Arrow head
        ctx.fillStyle = colors[i] || colors[0];
        ctx.beginPath();
        ctx.moveTo(midX - 5, y - 6); ctx.lineTo(midX + 5, y - 6); ctx.lineTo(midX, y - 1); ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Node card
      ctx.globalAlpha = alpha;
      const nx = padX + slideX, nw = nodeW - slideX;
      const r = 10;

      // Background
      ctx.fillStyle = bgColors[i] || bgColors[0];
      ctx.beginPath();
      ctx.moveTo(nx + r, y); ctx.lineTo(nx + nw - r, y); ctx.quadraticCurveTo(nx + nw, y, nx + nw, y + r);
      ctx.lineTo(nx + nw, y + nodeH - r); ctx.quadraticCurveTo(nx + nw, y + nodeH, nx + nw - r, y + nodeH);
      ctx.lineTo(nx + r, y + nodeH); ctx.quadraticCurveTo(nx, y + nodeH, nx, y + nodeH - r);
      ctx.lineTo(nx, y + r); ctx.quadraticCurveTo(nx, y, nx + r, y); ctx.closePath();
      ctx.fill();

      // Border
      ctx.strokeStyle = borderColors[i] || borderColors[0];
      ctx.lineWidth = 1;
      ctx.stroke();

      // Left accent bar
      ctx.fillStyle = colors[i] || colors[0];
      ctx.beginPath();
      ctx.moveTo(nx, y + r); ctx.lineTo(nx, y + nodeH - r);
      ctx.quadraticCurveTo(nx, y + nodeH, nx + r, y + nodeH);
      ctx.lineTo(nx + r, y); ctx.quadraticCurveTo(nx, y, nx, y + r);
      ctx.closePath();
      ctx.globalAlpha = alpha * 0.6;
      ctx.fill();
      ctx.globalAlpha = alpha;

      // Level badge
      const badge = icons[i] || ('Level ' + (i + 1));
      ctx.fillStyle = colors[i] || colors[0];
      ctx.font = '600 9px Inter';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(badge.toUpperCase(), nx + 18, y + 10);

      // Cause text — truncated to fit
      const causeText = step.cause || '';
      ctx.fillStyle = isLight ? '#1a1a2e' : '#f0f0f0';
      ctx.font = '500 12px Inter';
      ctx.textBaseline = 'top';
      // Word-wrap into max 2 lines
      const maxTextW = nw - 30;
      const words = causeText.split(' ');
      let line = '', lineY = y + 26, lineNum = 0;
      for (let wi = 0; wi < words.length && lineNum < 2; wi++) {
        const test = line + (line ? ' ' : '') + words[wi];
        if (ctx.measureText(test).width > maxTextW && line) {
          ctx.fillText(lineNum === 1 && wi < words.length - 1 ? line + '...' : line, nx + 18, lineY);
          lineY += 15; lineNum++; line = words[wi];
        } else { line = test; }
      }
      if (lineNum < 2 && line) ctx.fillText(line, nx + 18, lineY);

      ctx.globalAlpha = 1;
    });

    if (elapsed < dur + chain.length * 150) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ── Simple markdown → HTML for AI responses ──
function simpleMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*\s/g, '&bull; ')
    .replace(/\n/g, '<br>');
}

// CHART ENGINE

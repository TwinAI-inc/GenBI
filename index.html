// Convert Excel serial date numbers to readable dates
function fmtChartLabel(l){var n=Number(l);if(!isNaN(n)&&n>30000&&n<70000&&n===Math.floor(n)){var d=new Date(1899,11,30);d.setDate(d.getDate()+n);var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[d.getMonth()]+' '+d.getFullYear();}return l;}

function drawChart(canvas, datasets, labels, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  // Use locked size if available (prevents hover resize feedback loop)
  const w = canvas._lockedW || canvas.parentElement.getBoundingClientRect().width;
  const h = canvas._lockedH || canvas.parentElement.getBoundingClientRect().height;
  canvas._lockedW = w; canvas._lockedH = h;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const padL=44, padR=16, padT=16, padB=32;
  const cw = w-padL-padR, ch = h-padT-padB;
  let maxVal = 0;
  datasets.forEach(ds => ds.data.forEach(v => { if(v>maxVal) maxVal=v; }));
  maxVal = Math.ceil(maxVal/10)*10 || 100;

  const th = getThemeChartOpts();

  // Grid — themed
  for(let i=0;i<=4;i++){
    const y=padT+(ch/4)*i;
    ctx.beginPath(); ctx.strokeStyle = th.gridColor || chartGridColor(); ctx.lineWidth = th.gridWidth;
    if (th.gridDash && th.gridDash.length) ctx.setLineDash(th.gridDash);
    ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = chartTextColor(th.textAlpha); ctx.font = th.labelFont; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxVal, 4, i, opts.suffix || ''),padL-10,y+4);
  }
  // Executive: vertical grid lines too
  if (th.gridVertical && labels) {
    const step = cw / (labels.length - 1);
    for (let i = 0; i < labels.length; i++) {
      const x = padL + step * i;
      ctx.beginPath(); ctx.strokeStyle = th.gridColor || chartGridColor(); ctx.lineWidth = th.gridWidth * 0.7;
      ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
    }
  }
  if(labels){ctx.fillStyle=chartTextColor(th.textAlpha);ctx.font=th.labelFont;ctx.textAlign='center';const step=cw/(labels.length-1);const nth=labels.length>12?Math.ceil(labels.length/8):labels.length>8?2:1;labels.forEach((l,i)=>{if(i%nth===0||i===labels.length-1){var txt=fmtChartLabel(l);ctx.fillText(th.labelCaps?String(txt).toUpperCase():txt,padL+step*i,h-8);}});}

  // Helper: draw smooth bezier path through points
  function drawSmoothPath(ctx, pts) {
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i - 1], curr = pts[i];
      const cpx = (prev.x + curr.x) / 2;
      ctx.bezierCurveTo(cpx, prev.y, cpx, curr.y, curr.x, curr.y);
    }
  }
  function drawStraightPath(ctx, pts) {
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  }

  datasets.forEach(ds => {
    const pts = ds.data.map((v,i)=>({x:padL+(cw/(ds.data.length-1))*i, y:padT+ch-(v/maxVal)*ch}));
    const drawPath = th.lineSmooth ? drawSmoothPath : drawStraightPath;
    const strokeClr = ds.stroke || 'rgba(0,229,255,0.9)';
    const baseRgb = ds.stroke ? ds.stroke.match(/[\d.]+/g)?.slice(0,3).join(',') : '0,229,255';

    // Area fill
    const grad = ctx.createLinearGradient(0, padT, 0, padT + ch);
    grad.addColorStop(0, ds.fillTop || 'rgba(' + baseRgb + ',' + th.areaGradientTop + ')');
    grad.addColorStop(1, ds.fillBot || 'rgba(' + baseRgb + ',' + th.areaGradientBot + ')');
    ctx.beginPath(); drawPath(ctx, pts);
    ctx.lineTo(pts[pts.length-1].x, padT+ch); ctx.lineTo(pts[0].x, padT+ch); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    // Line stroke — Liquid Glass: double-stroke glow; Executive: crisp thin; Modern: clean medium
    if (th.lineGlow > 0) {
      // Outer glow stroke
      ctx.beginPath(); drawPath(ctx, pts);
      ctx.strokeStyle = 'rgba(' + baseRgb + ',0.15)'; ctx.lineWidth = th.lineWidth + 6; ctx.lineCap = th.lineCap; ctx.stroke();
    }
    ctx.beginPath(); drawPath(ctx, pts);
    ctx.strokeStyle = strokeClr; ctx.lineWidth = th.lineWidth; ctx.lineCap = th.lineCap;
    if (th.lineGlow > 0) { ctx.save(); ctx.shadowColor = 'rgba(' + baseRgb + ',0.5)'; ctx.shadowBlur = th.lineGlow; ctx.stroke(); ctx.restore(); }
    else { ctx.stroke(); }

    // Dots
    const showDots = th.dotAlways || (datasets.length <= 1 && pts.length <= 12);
    if (showDots && th.dotRadius > 0) {
      pts.forEach((p, pi) => {
        // Halo (Liquid Glass)
        if (th.dotHalo) {
          ctx.beginPath(); ctx.arc(p.x, p.y, th.dotHaloRadius, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(' + baseRgb + ',' + th.dotHaloAlpha + ')'; ctx.fill();
        }
        // Dot
        ctx.beginPath(); ctx.arc(p.x, p.y, th.dotRadius, 0, Math.PI*2);
        ctx.fillStyle = ds.dotColor || strokeClr; ctx.fill();
        // Liquid Glass: white ring on dot
        if (th.style === 'liquid') {
          ctx.beginPath(); ctx.arc(p.x, p.y, th.dotRadius + 1, 0, Math.PI*2);
          ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();
        }
      });
    }
    // Executive: direct value labels at peaks/troughs instead of dots
    if (th.directLabels && pts.length <= 20) {
      ctx.font = th.valueFont; ctx.textAlign = 'center'; ctx.fillStyle = chartTextColor(0.5);
      pts.forEach((p, pi) => {
        const isPeak = (pi === 0 || ds.data[pi] >= ds.data[pi-1]) && (pi === ds.data.length-1 || ds.data[pi] >= ds.data[pi+1]);
        const isTrough = (pi === 0 || ds.data[pi] <= ds.data[pi-1]) && (pi === ds.data.length-1 || ds.data[pi] <= ds.data[pi+1]);
        if (isPeak || isTrough || pi === 0 || pi === pts.length - 1) {
          ctx.fillText(formatNumber(ds.data[pi], {abbreviate:true, decimals: ds.data[pi] >= 1e6 ? 1 : 0}), p.x, p.y + (isPeak ? -8 : 14));
        }
      });
    }
  });
  // Axis labels
  if(opts.xLabel){ctx.fillStyle=chartTextColor(0.35);ctx.font='500 ' + th.labelFont;ctx.textAlign='center';ctx.fillText(th.labelCaps?opts.xLabel.toUpperCase():opts.xLabel,padL+cw/2,h-1);}
  if(opts.yLabel){ctx.save();ctx.fillStyle=chartTextColor(0.35);ctx.font='500 ' + th.labelFont;ctx.textAlign='center';ctx.translate(10,padT+ch/2);ctx.rotate(-Math.PI/2);ctx.fillText(th.labelCaps?opts.yLabel.toUpperCase():opts.yLabel,0,0);ctx.restore();}
}

function drawBarChart(canvas, labels, data, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas._lockedW || canvas.parentElement.getBoundingClientRect().width;
  const h = canvas._lockedH || canvas.parentElement.getBoundingClientRect().height;
  canvas._lockedW = w; canvas._lockedH = h;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const padL = 52, padR = 16, padT = 20, padB = 52;
  const cw = w - padL - padR, ch = h - padT - padB;
  const maxVal = Math.ceil(Math.max(...data) * 1.15 / 10) * 10 || 100;
  const barColors = opts.barColors; // optional array of color names for per-bar coloring
  const rgb = barColors ? getColorRgb(barColors[0] || colorName) : getColorRgb(colorName);
  const highlightIdx = opts._highlightIdx !== undefined ? opts._highlightIdx : -1;
  const th = getThemeChartOpts();

  // Grid lines + Y labels — themed
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = th.gridColor || chartGridColor(); ctx.lineWidth = th.gridWidth;
    if (th.gridDash && th.gridDash.length) ctx.setLineDash(th.gridDash);
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = chartTextColor(th.textAlpha); ctx.font = th.labelFont; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxVal, 4, i, opts.suffix || ''), padL - 10, y + 4);
  }
  // Executive: vertical grid
  if (th.gridVertical) {
    const step = cw / labels.length;
    for (let i = 0; i <= labels.length; i++) {
      const x = padL + step * i;
      ctx.beginPath(); ctx.strokeStyle = th.gridColor || chartGridColor(); ctx.lineWidth = th.gridWidth * 0.6;
      ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
    }
  }

  // Bars — completely different shape per style
  const wideRatio = th.barWideRatio || 0.5;
  const gap = th.style === 'executive' ? Math.max(2, cw / labels.length * 0.08) : Math.max(4, Math.min(10, cw / labels.length * 0.2));
  const barW = th.style === 'executive'
    ? Math.max(10, (cw / labels.length) * wideRatio)
    : Math.max(8, Math.min(48, (cw - gap * (labels.length + 1)) / labels.length));
  const totalW = labels.length * barW + (labels.length - 1) * gap;
  const startX = padL + (cw - totalW) / 2;
  const hitAreas = [];

  data.forEach((val, i) => {
    const barRgb = barColors ? getColorRgb(barColors[i % barColors.length]) : rgb;
    const barH = (val / maxVal) * ch;
    const x = startX + i * (barW + gap);
    const y = padT + ch - barH;
    const isHover = i === highlightIdx;
    const alpha = isHover ? 1 : (highlightIdx >= 0 ? 0.35 : th.barAlpha);

    if (th.style === 'liquid') {
      // Liquid Glass: vibrant gradient bars on warm dark background
      const r = Math.min(barW / 2, th.barRadius);
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, padT + ch); ctx.lineTo(x, padT + ch);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      // Vibrant gradient fill — bright at top, deeper at bottom
      const grad = ctx.createLinearGradient(0, y, 0, padT + ch);
      grad.addColorStop(0, 'rgba(' + barRgb + ',' + alpha + ')');
      grad.addColorStop(0.6, 'rgba(' + barRgb + ',' + (alpha * 0.6) + ')');
      grad.addColorStop(1, 'rgba(' + barRgb + ',' + (alpha * 0.15) + ')');
      ctx.fillStyle = grad; ctx.fill();
      // Warm glow shadow
      ctx.save(); ctx.shadowColor = 'rgba(' + barRgb + ',0.2)'; ctx.shadowBlur = th.barGlow; ctx.fill(); ctx.restore();
      // Hover: brighter fill
      if (isHover) {
        ctx.save(); ctx.shadowColor = 'rgba(' + barRgb + ',0.4)'; ctx.shadowBlur = 16;
        ctx.fillStyle = 'rgba(' + barRgb + ',0.15)'; ctx.fill(); ctx.restore();
      }
    } else if (th.style === 'pastel') {
      // Pastel: clean rounded bars, flat solid fills, no shadow
      const r = Math.min(th.barRadius, barW / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, padT + ch); ctx.lineTo(x, padT + ch);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(' + barRgb + ',' + alpha + ')'; ctx.fill();
      if (isHover) {
        ctx.fillStyle = 'rgba(' + barRgb + ',' + Math.min(1, alpha + 0.1) + ')'; ctx.fill();
      }
    } else if (th.style === 'executive') {
      // Executive: sharp rectangle, solid matte fill, no gradient
      ctx.fillStyle = 'rgba(' + barRgb + ',' + alpha + ')';
      ctx.fillRect(x, y, barW, barH);
      if (isHover) {
        ctx.fillStyle = 'rgba(' + barRgb + ',' + Math.min(1, alpha + 0.15) + ')';
        ctx.fillRect(x, y, barW, barH);
      }
    } else {
      // Modern: rounded top, clean gradient, no heavy shadow
      const r = Math.min(th.barRadius, barW / 2);
      const grad = ctx.createLinearGradient(0, y, 0, padT + ch);
      grad.addColorStop(0, 'rgba(' + barRgb + ',' + alpha + ')');
      grad.addColorStop(1, 'rgba(' + barRgb + ',' + (alpha * th.barGradientShift) + ')');
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, padT + ch); ctx.lineTo(x, padT + ch);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();
      if (isHover) { ctx.strokeStyle = 'rgba(' + barRgb + ',0.5)'; ctx.lineWidth = 1; ctx.stroke(); }
    }
    hitAreas.push({ x, y, w: barW, h: barH, label: labels[i], value: val, barRgb });

    // Value on top — themed font
    const valAlpha = isHover ? 1 : (highlightIdx >= 0 ? 0.3 : 0.8);
    ctx.fillStyle = th.style === 'executive' ? chartTextColor(valAlpha) : 'rgba(' + barRgb + ',' + valAlpha + ')';
    ctx.font = (isHover ? 'bold ' : '') + th.valueFont; ctx.textAlign = 'center';
    const vText = typeof val === 'number' ? formatNumber(val, {abbreviate: val >= 1e4, decimals: val >= 1e6 ? 1 : (val % 1 ? 1 : 0)}) : String(val);
    ctx.fillText(vText, x + barW / 2, y - 6);

    // X label — themed font, executive uses CAPS
    ctx.fillStyle = chartTextColor(isHover ? 0.8 : th.textAlpha);
    ctx.font = (isHover ? '500 ' : '') + '10px ' + th.fontFamily; ctx.textAlign = 'center';
    let lbl = String(fmtChartLabel(labels[i]));
    lbl = lbl.length > 9 ? lbl.substring(0, 8) + '..' : lbl;
    if (th.labelCaps) lbl = lbl.toUpperCase();
    ctx.save(); ctx.translate(x + barW / 2, padT + ch + 14);
    if (labels.length > 7) ctx.rotate(-0.45);
    ctx.fillText(lbl, 0, 0); ctx.restore();
  });

  // Axis labels — themed
  if (opts.xLabel) {
    ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 ' + th.labelFont; ctx.textAlign = 'center';
    ctx.fillText(th.labelCaps ? opts.xLabel.toUpperCase() : opts.xLabel, padL + cw / 2, h - 2);
  }
  if (opts.yLabel) {
    ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 ' + th.labelFont; ctx.textAlign = 'center';
    ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2);
    ctx.fillText(th.labelCaps ? opts.yLabel.toUpperCase() : opts.yLabel, 0, 0); ctx.restore();
  }

  // Store hit areas + redraw info for interactivity (strip _highlightIdx so mouseleave resets clean)
  const cleanOpts = Object.assign({}, opts); delete cleanOpts._highlightIdx;
  canvas._chartHit = { type: 'bar', areas: hitAreas, colorName, rgb, barColors, labels, data, opts: cleanOpts };
  if (!canvas._hasChartEvents) {
    canvas._hasChartEvents = true;
    canvas.addEventListener('mousemove', handleBarHover);
    canvas.addEventListener('mouseleave', handleChartLeave);
    canvas.addEventListener('click', handleChartClick);
  }
}

function drawDonutChart(canvas, labels, data, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas._lockedW || canvas.parentElement.getBoundingClientRect().width;
  const h = canvas._lockedH || canvas.parentElement.getBoundingClientRect().height;
  canvas._lockedW = w; canvas._lockedH = h;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const total = data.reduce((a, b) => a + b, 0);
  if (total === 0) return;
  const highlightIdx = opts._highlightIdx !== undefined ? opts._highlightIdx : -1;

  const th = getThemeChartOpts();
  const cx = w * 0.36, cy = h / 2;
  const outerR = Math.min(cx - 16, cy - 16, 100);
  const innerR = outerR * th.donutInnerRatio;
  const isPBI = document.body.classList.contains('theme-powerbi');
  const defaultColors = isPBI ? [
    { fill: 'rgba(17,141,255,0.85)', rgb: '17,141,255' },
    { fill: 'rgba(253,180,21,0.85)', rgb: '253,180,21' },
    { fill: 'rgba(117,9,133,0.85)', rgb: '117,9,133' },
    { fill: 'rgba(16,124,16,0.85)', rgb: '16,124,16' },
    { fill: 'rgba(209,52,56,0.85)', rgb: '209,52,56' },
    { fill: 'rgba(0,120,212,0.8)', rgb: '0,120,212' },
    { fill: 'rgba(232,140,0,0.8)', rgb: '232,140,0' },
    { fill: 'rgba(73,130,5,0.8)', rgb: '73,130,5' },
  ] : [
    { fill: 'rgba(0,229,255,0.8)', rgb: '0,229,255' },
    { fill: 'rgba(179,136,255,0.8)', rgb: '179,136,255' },
    { fill: 'rgba(255,107,157,0.8)', rgb: '255,107,157' },
    { fill: 'rgba(105,240,174,0.8)', rgb: '105,240,174' },
    { fill: 'rgba(255,215,64,0.8)', rgb: '255,215,64' },
    { fill: 'rgba(0,176,255,0.7)', rgb: '0,176,255' },
    { fill: 'rgba(255,145,0,0.7)', rgb: '255,145,0' },
    { fill: 'rgba(156,204,101,0.7)', rgb: '156,204,101' },
  ];
  let segColors = defaultColors;
  if (opts.paletteColors) {
    segColors = opts.paletteColors.map(hex => {
      const rgb = hexToRgb(hex);
      return { fill: 'rgba(' + rgb + ',0.85)', rgb: rgb };
    });
  } else if (opts.baseColor) {
    const rgb = getColorRgb(opts.baseColor);
    const parts = rgb.split(',').map(Number);
    segColors = [1, 0.7, 0.5, 0.35, 0.8, 0.55, 0.45, 0.65].map((f, i) => {
      const r = Math.round(parts[0] * f + 255 * (1 - f));
      const g = Math.round(parts[1] * f + 255 * (1 - f));
      const b = Math.round(parts[2] * f + 255 * (1 - f));
      return { fill: 'rgba(' + r + ',' + g + ',' + b + ',0.85)', rgb: r + ',' + g + ',' + b };
    });
  }

  const sweepProgress = opts._sweepProgress !== undefined ? opts._sweepProgress : 1;
  const totalSweep = Math.PI * 2 * sweepProgress;

  const segments = [];
  let angle = -Math.PI / 2;
  let drawnAngle = 0;
  data.forEach((val, i) => {
    const fullSlice = (val / total) * Math.PI * 2;
    const remaining = totalSweep - drawnAngle;
    if (remaining <= 0.001) { segments.push({ startAngle: angle, endAngle: angle, label: labels[i], value: val, color: segColors[i % segColors.length] }); return; }
    const slice = Math.min(fullSlice, remaining);
    drawnAngle += slice;
    const c = segColors[i % segColors.length];
    const isHover = i === highlightIdx;
    const explode = isHover ? 6 : 0;
    const midAngle = angle + slice / 2;
    const ex = explode * Math.cos(midAngle), ey = explode * Math.sin(midAngle);
    const dimAlpha = (highlightIdx >= 0 && !isHover) ? 0.3 : 0.8;

    ctx.save();
    ctx.translate(ex, ey);
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, angle, angle + slice);
    ctx.arc(cx, cy, innerR, angle + slice, angle, true);
    ctx.closePath();
    ctx.fillStyle = 'rgba(' + c.rgb + ',' + dimAlpha + ')'; ctx.fill();
    if (isHover || th.donutGlow) { ctx.shadowColor = 'rgba(' + c.rgb + ',' + (isHover ? 0.5 : 0.2) + ')'; ctx.shadowBlur = isHover ? 20 : (th.donutGlow ? 10 : 0); ctx.fill(); }
    ctx.restore();
    // Segment gap — themed
    ctx.beginPath();
    ctx.arc(cx, cy, outerR + 1, angle + slice - th.donutGap, angle + slice + th.donutGap);
    ctx.arc(cx, cy, innerR - 1, angle + slice + th.donutGap, angle + slice - th.donutGap, true);
    ctx.closePath(); ctx.fillStyle = isPBI ? '#ffffff' : isLightBg() ? '#f4f4f8' : '#050505'; ctx.fill();

    segments.push({ startAngle: angle, endAngle: angle + slice, label: labels[i], value: val, color: c });
    angle += slice;
  });

  // Center text — themed font
  const centerFont = th.fontFamily;
  ctx.textBaseline = 'middle';
  if (highlightIdx >= 0) {
    const seg = segments[highlightIdx];
    const pct = ((seg.value / total) * 100).toFixed(1);
    ctx.fillStyle = chartTextColor(0.95); ctx.font = 'bold 20px ' + centerFont; ctx.textAlign = 'center';
    ctx.fillText(formatNumber(seg.value, {abbreviate: seg.value >= 1e4}), cx, cy - 10);
    ctx.fillStyle = chartTextColor(0.5); ctx.font = '11px ' + centerFont;
    ctx.fillText(seg.label + ' · ' + pct + '%', cx, cy + 10);
  } else {
    ctx.fillStyle = chartTextColor(0.9); ctx.font = 'bold 24px ' + centerFont; ctx.textAlign = 'center';
    ctx.fillText(formatNumber(total, {abbreviate: total >= 1e4}), cx, cy - 6);
    ctx.fillStyle = chartTextColor(0.35); ctx.font = '11px ' + centerFont;
    ctx.fillText('Total', cx, cy + 14);
  }

  // Legend
  const legX = w * 0.64, legStartY = cy - (labels.length * 24) / 2;
  labels.forEach((label, i) => {
    const y = legStartY + i * 24;
    const c = segColors[i % segColors.length];
    const pct = ((data[i] / total) * 100).toFixed(1);
    const isHover = i === highlightIdx;
    const alpha = (highlightIdx >= 0 && !isHover) ? 0.3 : 1;
    ctx.fillStyle = 'rgba(' + c.rgb + ',' + alpha + ')';
    ctx.fillRect(legX, y, 12, 12);
    ctx.fillStyle = chartTextColor(isHover ? 0.95 : 0.6);
    ctx.font = (isHover ? '500 ' : '') + '12px Inter'; ctx.textAlign = 'left';
    const lblTrunc = label.length > 16 ? label.substring(0, 15) + '..' : label;
    ctx.fillText(lblTrunc + ' (' + pct + '%)', legX + 18, y + 10);
  });

  // Store interactivity data
  canvas._chartHit = { type: 'donut', cx, cy, outerR, innerR, segments, labels, data };
  if (!canvas._hasChartEvents) {
    canvas._hasChartEvents = true;
    canvas.addEventListener('mousemove', handleDonutHover);
    canvas.addEventListener('mouseleave', handleChartLeave);
    canvas.addEventListener('click', handleChartClick);
  }
}

// ── HORIZONTAL BAR CHART ──
function drawHorizontalBarChart(canvas, labels, data, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas._lockedW || canvas.parentElement.getBoundingClientRect().width;
  const h = canvas._lockedH || canvas.parentElement.getBoundingClientRect().height;
  canvas._lockedW = w; canvas._lockedH = h;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const padL = 80, padR = 24, padT = 20, padB = 36;
  const cw = w - padL - padR, ch = h - padT - padB;
  const maxVal = Math.ceil(Math.max(...data) * 1.15 / 10) * 10 || 100;
  const barColors = opts.barColors;
  const rgb = barColors ? getColorRgb(barColors[0] || colorName) : getColorRgb(colorName);
  const highlightIdx = opts._highlightIdx !== undefined ? opts._highlightIdx : -1;

  // Vertical grid lines + X labels
  for (let i = 0; i <= 4; i++) {
    const x = padL + (cw / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(formatTickLabel(maxVal, 4, 4 - i, opts.suffix || ''), x, h - padB + 16);
  }

  // Bars (horizontal)
  const gap = Math.max(3, Math.min(8, ch / labels.length * 0.15));
  const barH = Math.max(6, Math.min(36, (ch - gap * (labels.length + 1)) / labels.length));
  const totalH = labels.length * barH + (labels.length - 1) * gap;
  const startY = padT + (ch - totalH) / 2;
  const hitAreas = [];

  data.forEach((val, i) => {
    const barRgb = barColors ? getColorRgb(barColors[i % barColors.length]) : rgb;
    const barW = (val / maxVal) * cw;
    const y = startY + i * (barH + gap);
    const x = padL;
    const r = Math.min(4, barH / 2);
    const isHover = i === highlightIdx;
    const alpha = isHover ? 1 : (highlightIdx >= 0 ? 0.35 : 0.85);
    const grad = ctx.createLinearGradient(x, 0, x + barW, 0);
    grad.addColorStop(0, 'rgba(' + barRgb + ',' + (alpha * 0.4) + ')');
    grad.addColorStop(1, 'rgba(' + barRgb + ',' + alpha + ')');
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, y + barH - r);
    ctx.quadraticCurveTo(x + barW, y + barH, x + barW - r, y + barH);
    ctx.lineTo(x, y + barH);
    ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    if (isHover) {
      ctx.save(); ctx.shadowColor = 'rgba(' + barRgb + ',0.5)'; ctx.shadowBlur = 18; ctx.fill(); ctx.restore();
      ctx.strokeStyle = 'rgba(' + barRgb + ',0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
    } else {
      ctx.save(); ctx.shadowColor = 'rgba(' + barRgb + ',0.15)'; ctx.shadowBlur = 8; ctx.fill(); ctx.restore();
    }
    hitAreas.push({ x, y, w: barW, h: barH, label: labels[i], value: val, barRgb });

    // Value at end of bar
    const valAlpha = isHover ? 1 : (highlightIdx >= 0 ? 0.3 : 0.9);
    ctx.fillStyle = 'rgba(' + barRgb + ',' + valAlpha + ')'; ctx.font = (isHover ? 'bold ' : '') + '10px Inter'; ctx.textAlign = 'left';
    const vText = typeof val === 'number' ? formatNumber(val, {abbreviate: val >= 1e4, decimals: val >= 1e6 ? 1 : (val % 1 ? 1 : 0)}) : String(val);
    ctx.fillText(vText, x + barW + 6, y + barH / 2 + 3);

    // Y label (left side)
    ctx.fillStyle = chartTextColor(isHover ? 0.8 : 0.3);
    ctx.font = (isHover ? '500 ' : '') + '10px Inter'; ctx.textAlign = 'right';
    var rawLbl = String(fmtChartLabel(labels[i]));
    const lbl = rawLbl.length > 10 ? rawLbl.substring(0, 9) + '..' : rawLbl;
    ctx.fillText(lbl, padL - 8, y + barH / 2 + 3);
  });

  // Axis labels
  if (opts.xLabel) {
    ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(opts.xLabel, padL + cw / 2, h - 2);
  }
  if (opts.yLabel) {
    ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center';
    ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2);
    ctx.fillText(opts.yLabel, 0, 0); ctx.restore();
  }

  const cleanOpts = Object.assign({}, opts); delete cleanOpts._highlightIdx;
  canvas._chartHit = { type: 'hbar', areas: hitAreas, colorName, rgb, barColors, labels, data, opts: cleanOpts };
  if (!canvas._hasChartEvents) {
    canvas._hasChartEvents = true;
    canvas.addEventListener('mousemove', handleHbarHover);
    canvas.addEventListener('mouseleave', handleChartLeave);
    canvas.addEventListener('click', handleChartClick);
  }
}

// ── AREA CHART ──
function drawAreaChart(canvas, datasets, labels, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const padL = 44, padR = 16, padT = 16, padB = 32;
  const cw = w - padL - padR, ch = h - padT - padB;
  let maxVal = 0;
  datasets.forEach(ds => ds.data.forEach(v => { if (v > maxVal) maxVal = v; }));
  maxVal = Math.ceil(maxVal / 10) * 10 || 100;

  // Grid lines + Y labels
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxVal, 4, i, opts.suffix || ''), padL - 10, y + 4);
  }

  // X labels
  if (labels) {
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'center';
    const step = cw / (labels.length - 1);
    const nth = labels.length > 12 ? Math.ceil(labels.length / 8) : labels.length > 8 ? 2 : 1;
    labels.forEach((l, i) => {
      if (i % nth === 0 || i === labels.length - 1) ctx.fillText(fmtChartLabel(l), padL + step * i, h - 8);
    });
  }

  // Draw each series as filled area (no dots)
  datasets.forEach(ds => {
    const pts = ds.data.map((v, i) => ({
      x: padL + (cw / (ds.data.length - 1)) * i,
      y: padT + ch - (v / maxVal) * ch
    }));
    // Area fill with heavier opacity
    const grad = ctx.createLinearGradient(0, padT, 0, padT + ch);
    grad.addColorStop(0, ds.fillTop || 'rgba(0,229,255,0.35)');
    grad.addColorStop(1, ds.fillBot || 'rgba(0,229,255,0.03)');
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[pts.length - 1].x, padT + ch); ctx.lineTo(pts[0].x, padT + ch);
    ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    // Line on top
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.strokeStyle = ds.stroke || 'rgba(0,229,255,0.9)'; ctx.lineWidth = ds.lineWidth || 2; ctx.lineCap = 'round'; ctx.stroke();
  });

  // Axis labels
  if (opts.xLabel) { ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.fillText(opts.xLabel, padL + cw / 2, h - 1); }
  if (opts.yLabel) { ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2); ctx.fillText(opts.yLabel, 0, 0); ctx.restore(); }
}

// ── STACKED BAR CHART ──
function drawStackedBarChart(canvas, labels, seriesData, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const padL = 58, padR = 16, padT = 20, padB = 64;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Calculate max stacked total
  const totals = labels.map((_, i) => seriesData.reduce((sum, s) => sum + (s.data[i] || 0), 0));
  const maxVal = Math.ceil(Math.max(...totals) * 1.15 / 10) * 10 || 100;
  const highlightIdx = opts._highlightIdx !== undefined ? opts._highlightIdx : -1;
  const highlightSeries = opts._highlightSeries !== undefined ? opts._highlightSeries : -1;
  const isCurrencyAxis = /revenue|sales|cost|expense|price|profit|income/i.test(opts.yLabel || '');

  // Grid + Y labels
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    const tickVal = maxVal - (maxVal / 4) * i;
    const tickLabel = (isCurrencyAxis ? '$' : '') + formatTickLabel(maxVal, 4, i, opts.suffix || '');
    ctx.fillText(tickLabel, padL - 10, y + 4);
  }

  // Bars
  const gap = Math.max(4, Math.min(10, cw / labels.length * 0.2));
  const barW = Math.max(8, Math.min(48, (cw - gap * (labels.length + 1)) / labels.length));
  const totalW = labels.length * barW + (labels.length - 1) * gap;
  const startX = padL + (cw - totalW) / 2;
  const hitAreas = [];

  labels.forEach((label, li) => {
    let cumY = padT + ch; // bottom of chart
    seriesData.forEach((series, si) => {
      const val = series.data[li] || 0;
      const segH = (val / maxVal) * ch;
      const x = startX + li * (barW + gap);
      const y = cumY - segH;
      const sRgb = getColorRgb(series.color);
      const isHover = li === highlightIdx && (highlightSeries < 0 || si === highlightSeries);
      const dimmed = highlightIdx >= 0 && !isHover;
      const alpha = isHover ? 1 : (dimmed ? 0.3 : 0.8);
      const r = (si === seriesData.length - 1) ? Math.min(3, barW / 2) : 0;

      ctx.beginPath();
      if (r > 0) {
        ctx.moveTo(x + r, y); ctx.lineTo(x + barW - r, y);
        ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      } else {
        ctx.moveTo(x, y); ctx.lineTo(x + barW, y);
      }
      ctx.lineTo(x + barW, cumY); ctx.lineTo(x, cumY);
      if (r > 0) {
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(' + sRgb + ',' + alpha + ')'; ctx.fill();
      if (isHover) {
        ctx.save(); ctx.shadowColor = 'rgba(' + sRgb + ',0.5)'; ctx.shadowBlur = 14; ctx.fill(); ctx.restore();
      }
      hitAreas.push({ x, y, w: barW, h: segH, label, value: val, seriesIdx: si, seriesName: series.name, barRgb: sRgb, barIdx: li });
      cumY -= segH;
    });

    // X label
    ctx.fillStyle = chartTextColor(li === highlightIdx ? 0.8 : 0.3);
    ctx.font = (li === highlightIdx ? '500 ' : '') + '10px Inter'; ctx.textAlign = 'center';
    var fLabel = String(fmtChartLabel(label));
    const lbl = fLabel.length > 9 ? fLabel.substring(0, 8) + '..' : fLabel;
    const lx = startX + li * (barW + gap) + barW / 2;
    ctx.save(); ctx.translate(lx, padT + ch + 14);
    if (labels.length > 7) ctx.rotate(-0.45);
    ctx.fillText(lbl, 0, 0); ctx.restore();
  });

  // Mini legend at bottom
  const legY = h - 18;
  let legX = padL;
  seriesData.forEach((series) => {
    const sRgb = getColorRgb(series.color);
    ctx.fillStyle = 'rgba(' + sRgb + ',0.9)';
    ctx.fillRect(legX, legY - 4, 8, 8);
    ctx.fillStyle = chartTextColor(0.5); ctx.font = '10px Inter'; ctx.textAlign = 'left';
    ctx.fillText(series.name, legX + 12, legY + 3);
    legX += ctx.measureText(series.name).width + 24;
  });

  // Axis labels
  if (opts.xLabel) { ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.fillText(opts.xLabel, padL + cw / 2, h - padB + 30); }
  if (opts.yLabel) { ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2); ctx.fillText(opts.yLabel, 0, 0); ctx.restore(); }

  const cleanOpts = Object.assign({}, opts); delete cleanOpts._highlightIdx; delete cleanOpts._highlightSeries;
  canvas._chartHit = { type: 'stacked', areas: hitAreas, seriesData, labels, opts: cleanOpts };
  if (!canvas._hasChartEvents) {
    canvas._hasChartEvents = true;
    canvas.addEventListener('mousemove', handleStackedBarHover);
    canvas.addEventListener('mouseleave', handleChartLeave);
    canvas.addEventListener('click', handleChartClick);
  }
}

// ── SCATTER CHART ──
function drawScatterChart(canvas, xData, yData, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas._lockedW || canvas.parentElement.getBoundingClientRect().width;
  const h = canvas._lockedH || canvas.parentElement.getBoundingClientRect().height;
  canvas._lockedW = w; canvas._lockedH = h;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const padL = 52, padR = 16, padT = 20, padB = 52;
  const cw = w - padL - padR, ch = h - padT - padB;
  const rgb = getColorRgb(colorName);
  const highlightIdx = opts._highlightIdx !== undefined ? opts._highlightIdx : -1;

  // Auto-scale axes
  const xMin = Math.min(...xData), xMax = Math.max(...xData);
  const yMin = Math.min(...yData), yMax = Math.max(...yData);
  const xRange = (xMax - xMin) || 1;
  const yRange = (yMax - yMin) || 1;
  const xPad = xRange * 0.1, yPad = yRange * 0.1;
  const xLo = xMin - xPad, xHi = xMax + xPad;
  const yLo = yMin - yPad, yHi = yMax + yPad;

  // Grid + axis labels
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    const yVal = yHi - ((yHi - yLo) / 4) * i;
    ctx.fillText(yVal % 1 ? yVal.toFixed(1) : Math.round(yVal), padL - 10, y + 4);

    const x = padL + (cw / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'center';
    const xVal = xLo + ((xHi - xLo) / 4) * i;
    ctx.fillText(xVal % 1 ? xVal.toFixed(1) : Math.round(xVal), x, h - padB + 16);
  }

  // Dots
  const points = [];
  xData.forEach((xv, i) => {
    const px = padL + ((xv - xLo) / (xHi - xLo)) * cw;
    const py = padT + ch - ((yData[i] - yLo) / (yHi - yLo)) * ch;
    points.push({ px, py, xVal: xv, yVal: yData[i] });
    const isHover = i === highlightIdx;
    const alpha = isHover ? 1 : (highlightIdx >= 0 ? 0.25 : 0.8);
    // Glow
    ctx.beginPath(); ctx.arc(px, py, isHover ? 12 : 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',' + (alpha * 0.15) + ')'; ctx.fill();
    // Dot
    ctx.beginPath(); ctx.arc(px, py, isHover ? 6 : 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',' + alpha + ')'; ctx.fill();
    if (isHover) {
      ctx.save(); ctx.shadowColor = 'rgba(' + rgb + ',0.6)'; ctx.shadowBlur = 16; ctx.fill(); ctx.restore();
    }
  });

  // Axis labels
  if (opts.xLabel) { ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.fillText(opts.xLabel, padL + cw / 2, h - 2); }
  if (opts.yLabel) { ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2); ctx.fillText(opts.yLabel, 0, 0); ctx.restore(); }

  const cleanOpts = Object.assign({}, opts); delete cleanOpts._highlightIdx;
  canvas._chartHit = { type: 'scatter', points, xData, yData, colorName, rgb, opts: cleanOpts, labels: opts._labels || [] };
  if (!canvas._hasChartEvents) {
    canvas._hasChartEvents = true;
    canvas.addEventListener('mousemove', handleScatterHover);
    canvas.addEventListener('mouseleave', handleChartLeave);
    canvas.addEventListener('click', handleChartClick);
  }
}

// ── GAUGE CHART ──
function drawGaugeChart(canvas, value, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h * 0.58;
  const radius = Math.min(cx - 30, cy - 20, 110);
  const lineW = Math.max(12, radius * 0.15);
  const minVal = opts.min || 0, maxVal = opts.max || 100;
  const pct = Math.max(0, Math.min(1, (value - minVal) / (maxVal - minVal)));
  const startAngle = Math.PI * 0.75;
  const endAngle = Math.PI * 2.25;
  const sweep = opts._sweepProgress != null ? opts._sweepProgress : 1;
  const valueAngle = startAngle + (endAngle - startAngle) * pct * sweep;

  const th = getThemeChartOpts();
  const rgb = getColorRgb(opts.color || 'cyan');

  // Background arc — subtle track
  ctx.beginPath();
  ctx.arc(cx, cy, radius, startAngle, endAngle);
  ctx.strokeStyle = th.style === 'liquid' ? 'rgba(255,255,255,0.06)' : chartGridColor();
  ctx.lineWidth = lineW; ctx.lineCap = 'round'; ctx.stroke();

  // Value arc — gradient with glow
  if (pct > 0) {
    const grad = ctx.createConicGradient(startAngle, cx, cy) || ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
    // Fallback: linear gradient
    const linGrad = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
    linGrad.addColorStop(0, 'rgba(' + rgb + ',0.5)');
    linGrad.addColorStop(0.5, 'rgba(' + rgb + ',0.9)');
    linGrad.addColorStop(1, 'rgba(' + rgb + ',1)');
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, valueAngle);
    ctx.strokeStyle = linGrad; ctx.lineWidth = lineW; ctx.lineCap = 'round';
    // Glow effect
    if (th.style === 'liquid' || th.lineGlow > 0) {
      ctx.save(); ctx.shadowColor = 'rgba(' + rgb + ',0.4)'; ctx.shadowBlur = 12; ctx.stroke(); ctx.restore();
    } else { ctx.stroke(); }

    // Dot indicator at current position (like the reference image)
    const dotX = cx + radius * Math.cos(valueAngle);
    const dotY = cy + radius * Math.sin(valueAngle);
    ctx.beginPath(); ctx.arc(dotX, dotY, lineW * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(dotX, dotY, lineW * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',1)'; ctx.fill();
  }

  // Center value — large display number
  const fontFam = th.fontFamily;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillStyle = chartTextColor(0.95);
  ctx.font = 'bold ' + Math.max(24, radius * 0.4) + 'px ' + fontFam;
  ctx.fillText(formatNumber(value * sweep, { abbreviate: value >= 1e4, decimals: value % 1 ? 1 : 0 }), cx, cy - 8);
  // Label below value
  if (opts.label) {
    ctx.fillStyle = 'rgba(' + rgb + ',0.7)'; ctx.font = '500 12px ' + fontFam;
    ctx.fillText(opts.label, cx, cy + radius * 0.3);
  }
  // Min / Max
  ctx.fillStyle = chartTextColor(0.2); ctx.font = '10px Inter';
  const minX = cx + (radius + 16) * Math.cos(startAngle);
  const minY = cy + (radius + 16) * Math.sin(startAngle);
  ctx.fillText(formatNumber(minVal, {abbreviate:true}), minX, minY);
  const maxX = cx + (radius + 16) * Math.cos(endAngle);
  const maxY = cy + (radius + 16) * Math.sin(endAngle);
  ctx.fillText(formatNumber(maxVal, {abbreviate:true}), maxX, maxY);
}

// ── BUBBLE CHART (extends scatter with sized circles) ──
function drawBubbleChart(canvas, xData, yData, sizeData, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const padL = 52, padR = 24, padT = 20, padB = 44;
  const cw = w - padL - padR, ch = h - padT - padB;
  const xLo = Math.min(...xData), xHi = Math.max(...xData) || 1;
  const yLo = Math.min(...yData), yHi = Math.max(...yData) || 1;
  const sMax = Math.max(...sizeData) || 1;
  const rgb = getColorRgb(colorName);

  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    const yVal = yHi - ((yHi - yLo) / 4) * i;
    ctx.fillText(formatNumber(yVal, {abbreviate:true, decimals:1}), padL - 10, y + 4);
  }

  // Bubbles
  const maxR = Math.min(cw, ch) * 0.08;
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;
  const count = Math.ceil(progress * xData.length);
  for (let i = 0; i < count; i++) {
    const px = padL + ((xData[i] - xLo) / (xHi - xLo || 1)) * cw;
    const py = padT + (1 - (yData[i] - yLo) / (yHi - yLo || 1)) * ch;
    const r = Math.max(4, (sizeData[i] / sMax) * maxR);
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',0.5)'; ctx.fill();
    ctx.strokeStyle = 'rgba(' + rgb + ',0.8)'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  if (opts.xLabel) { ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.fillText(opts.xLabel, padL + cw / 2, h - 2); }
  if (opts.yLabel) { ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2); ctx.fillText(opts.yLabel, 0, 0); ctx.restore(); }
}

// ── LOLLIPOP CHART ──
function drawLollipopChart(canvas, labels, data, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const padL = 52, padR = 16, padT = 20, padB = 52;
  const cw = w - padL - padR, ch = h - padT - padB;
  const maxVal = Math.ceil(Math.max(...data) * 1.15 / 10) * 10 || 100;
  const rgb = getColorRgb(colorName);

  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxVal, 4, i, opts.suffix || ''), padL - 10, y + 4);
  }

  // Stems + dots
  const gap = Math.max(4, Math.min(10, cw / labels.length * 0.2));
  const spacing = (cw - gap * 2) / labels.length;
  const dotR = Math.min(6, Math.max(3, spacing * 0.15));

  data.forEach((val, i) => {
    const barH = (val / maxVal) * ch;
    const x = padL + gap + spacing * i + spacing / 2;
    const yTop = padT + ch - barH;
    const yBase = padT + ch;
    // Stem line
    ctx.beginPath(); ctx.moveTo(x, yBase); ctx.lineTo(x, yTop);
    ctx.strokeStyle = 'rgba(' + rgb + ',0.4)'; ctx.lineWidth = 2; ctx.stroke();
    // Dot
    ctx.beginPath(); ctx.arc(x, yTop, dotR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',0.9)'; ctx.fill();
    ctx.save(); ctx.shadowColor = 'rgba(' + rgb + ',0.3)'; ctx.shadowBlur = 8; ctx.fill(); ctx.restore();
    // Value
    ctx.fillStyle = 'rgba(' + rgb + ',0.8)'; ctx.font = '10px Inter'; ctx.textAlign = 'center';
    ctx.fillText(formatNumber(val, {abbreviate: val >= 1e4, decimals:0}), x, yTop - dotR - 5);
    // X label
    ctx.fillStyle = chartTextColor(0.3); ctx.font = '10px Inter';
    var fL = String(fmtChartLabel(labels[i]));
    const lbl = fL.length > 9 ? fL.substring(0, 8) + '..' : fL;
    ctx.save(); ctx.translate(x, padT + ch + 14);
    if (labels.length > 7) ctx.rotate(-0.45);
    ctx.fillText(lbl, 0, 0); ctx.restore();
  });

  if (opts.xLabel) { ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.fillText(opts.xLabel, padL + cw / 2, h - 2); }
  if (opts.yLabel) { ctx.save(); ctx.fillStyle = chartTextColor(0.35); ctx.font = '500 11px Inter'; ctx.textAlign = 'center'; ctx.translate(10, padT + ch / 2); ctx.rotate(-Math.PI / 2); ctx.fillText(opts.yLabel, 0, 0); ctx.restore(); }
}

// ── FUNNEL CHART ──
function drawFunnelChart(canvas, labels, data, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);

  const padT = 20, padB = 16, padL = 30, padR = 30;
  const ch = h - padT - padB;
  const maxW = w - padL - padR;
  const maxVal = Math.max(...data) || 1;
  const n = data.length;
  const segH = ch / n;
  const gap = Math.max(2, segH * 0.06);
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;
  const isPBI = document.body.classList.contains('theme-powerbi');
  const palette = isPBI
    ? ['17,141,255','253,180,21','117,9,133','16,124,16','209,52,56','0,120,212','232,140,0','73,130,5']
    : ['0,229,255','179,136,255','105,240,174','255,215,64','255,107,157','56,189,248','129,140,248','251,146,60'];

  const count = Math.ceil(progress * n);
  for (let i = 0; i < count; i++) {
    const topW = (data[i] / maxVal) * maxW;
    const botW = (i < n - 1) ? (data[i + 1] / maxVal) * maxW : topW * 0.7;
    const y = padT + i * segH;
    const rgb = palette[i % palette.length];
    const cx = w / 2;

    ctx.beginPath();
    ctx.moveTo(cx - topW / 2, y + gap);
    ctx.lineTo(cx + topW / 2, y + gap);
    ctx.lineTo(cx + botW / 2, y + segH - gap);
    ctx.lineTo(cx - botW / 2, y + segH - gap);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, y, 0, y + segH);
    grad.addColorStop(0, 'rgba(' + rgb + ',0.85)');
    grad.addColorStop(1, 'rgba(' + rgb + ',0.6)');
    ctx.fillStyle = grad; ctx.fill();

    // Label + value
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillStyle = chartTextColor(0.95); ctx.font = '500 12px Inter';
    ctx.fillText(labels[i], cx, y + segH / 2 - 7);
    ctx.fillStyle = chartTextColor(0.6); ctx.font = '11px Inter';
    ctx.fillText(formatNumber(data[i], {abbreviate:true}), cx, y + segH / 2 + 9);

    // Conversion rate
    if (i > 0 && data[i - 1] > 0) {
      const rate = ((data[i] / data[i - 1]) * 100).toFixed(0);
      ctx.fillStyle = chartTextColor(0.25); ctx.font = '10px Inter'; ctx.textAlign = 'right';
      ctx.fillText(rate + '%', cx - topW / 2 - 8, y + gap + 8);
    }
  }
}

// ── WATERFALL CHART ──
function drawWaterfallChart(canvas, labels, data, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const padL = 52, padR = 16, padT = 20, padB = 52;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Compute running totals
  const running = []; let total = 0;
  data.forEach((v, i) => { total += v; running.push({ start: total - v, end: total, value: v }); });
  const allVals = running.flatMap(r => [r.start, r.end]);
  const minV = Math.min(0, ...allVals), maxV = Math.max(...allVals) || 100;
  const range = maxV - minV || 1;
  const scale = ch / range;
  const posRgb = getColorRgb('emerald'), negRgb = getColorRgb('rose'), totRgb = getColorRgb(colorName);

  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxV, 4, i, '', minV), padL - 10, y + 4);
  }

  const gap = Math.max(3, Math.min(8, cw / labels.length * 0.15));
  const barW = Math.max(8, Math.min(44, (cw - gap * (labels.length + 1)) / labels.length));
  const totalW = labels.length * barW + (labels.length - 1) * gap;
  const startX = padL + (cw - totalW) / 2;

  data.forEach((val, i) => {
    const r = running[i];
    const yTop = padT + (maxV - Math.max(r.start, r.end)) * scale;
    const yBot = padT + (maxV - Math.min(r.start, r.end)) * scale;
    const barH = Math.max(2, yBot - yTop);
    const x = startX + i * (barW + gap);
    const rgb = i === data.length - 1 ? totRgb : (val >= 0 ? posRgb : negRgb);
    const grad = ctx.createLinearGradient(0, yTop, 0, yBot);
    grad.addColorStop(0, 'rgba(' + rgb + ',0.85)'); grad.addColorStop(1, 'rgba(' + rgb + ',0.5)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    const cr = Math.min(3, barW / 2);
    ctx.moveTo(x + cr, yTop); ctx.lineTo(x + barW - cr, yTop); ctx.quadraticCurveTo(x + barW, yTop, x + barW, yTop + cr);
    ctx.lineTo(x + barW, yBot); ctx.lineTo(x, yBot); ctx.lineTo(x, yTop + cr); ctx.quadraticCurveTo(x, yTop, x + cr, yTop);
    ctx.fill();
    // Connector line
    if (i < data.length - 1) {
      ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.1); ctx.lineWidth = 1; ctx.setLineDash([3,3]);
      ctx.moveTo(x + barW, padT + (maxV - r.end) * scale); ctx.lineTo(startX + (i+1) * (barW + gap), padT + (maxV - r.end) * scale);
      ctx.stroke(); ctx.setLineDash([]);
    }
    // Value
    ctx.fillStyle = 'rgba(' + rgb + ',0.8)'; ctx.font = '10px Inter'; ctx.textAlign = 'center';
    ctx.fillText((val >= 0 ? '+' : '') + formatNumber(val, {abbreviate:true}), x + barW / 2, yTop - 5);
    // X label
    ctx.fillStyle = chartTextColor(0.3); ctx.font = '10px Inter';
    var fL2 = String(fmtChartLabel(labels[i]));
    const lbl = fL2.length > 9 ? fL2.substring(0, 8) + '..' : fL2;
    ctx.save(); ctx.translate(x + barW / 2, padT + ch + 14);
    if (labels.length > 7) ctx.rotate(-0.45);
    ctx.fillText(lbl, 0, 0); ctx.restore();
  });
}

// ── RADAR / SPIDER CHART ──
function drawRadarChart(canvas, labels, data, colorName, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(cx, cy) - 40;
  const n = labels.length;
  if (n < 3) return;
  const maxVal = Math.max(...data) * 1.15 || 100;
  const rgb = getColorRgb(colorName);
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;

  // Grid rings
  for (let ring = 1; ring <= 4; ring++) {
    const r = (ring / 4) * radius;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
      const px = cx + r * Math.cos(angle), py = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1; ctx.stroke();
  }

  // Axis lines + labels
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const px = cx + radius * Math.cos(angle), py = cy + radius * Math.sin(angle);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py);
    ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1; ctx.stroke();
    const lx = cx + (radius + 16) * Math.cos(angle), ly = cy + (radius + 16) * Math.sin(angle);
    ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lbl = String(labels[i]).length > 10 ? String(labels[i]).substring(0,9) + '..' : String(labels[i]);
    ctx.fillText(lbl, lx, ly);
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const angle = (Math.PI * 2 / n) * idx - Math.PI / 2;
    const val = (data[idx] / maxVal) * radius * progress;
    const px = cx + val * Math.cos(angle), py = cy + val * Math.sin(angle);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(' + rgb + ',0.15)'; ctx.fill();
  ctx.strokeStyle = 'rgba(' + rgb + ',0.8)'; ctx.lineWidth = 2; ctx.stroke();

  // Dots
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const val = (data[i] / maxVal) * radius * progress;
    const px = cx + val * Math.cos(angle), py = cy + val * Math.sin(angle);
    ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',1)'; ctx.fill();
  }
}

function animateRadarChart(canvas, labels, data, colorName, opts = {}) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 800; const start = performance.now();
  (function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - t, 3);

    if (t < 1) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

// ── HEATMAP CHART ──
function drawHeatmapChart(canvas, chart, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const xLabels = chart.labels || [];
  const yLabels = chart.yLabels || [];
  const matrix = chart.matrix || [];
  if (!xLabels.length || !yLabels.length) return;
  const padL = 70, padR = 16, padT = 20, padB = 50;
  const cw = w - padL - padR, ch = h - padT - padB;
  const cellW = cw / xLabels.length, cellH = ch / yLabels.length;
  const allVals = matrix.flat().filter(v => v != null);
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const range = maxV - minV || 1;
  const rgb = getColorRgb(chart.color || 'cyan');
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;

  yLabels.forEach((yl, yi) => {
    xLabels.forEach((xl, xi) => {
      if (yi + xi >= (xLabels.length + yLabels.length) * progress) return;
      const val = matrix[yi] && matrix[yi][xi] != null ? matrix[yi][xi] : 0;
      const norm = (val - minV) / range;
      const alpha = 0.1 + norm * 0.8;
      ctx.fillStyle = 'rgba(' + rgb + ',' + alpha + ')';
      ctx.fillRect(padL + xi * cellW + 1, padT + yi * cellH + 1, cellW - 2, cellH - 2);
      if (cellW > 30 && cellH > 20) {
        ctx.fillStyle = norm > 0.6 ? 'rgba(255,255,255,0.9)' : chartTextColor(0.6);
        ctx.font = '10px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(formatNumber(val, {abbreviate:true, decimals:0}), padL + xi * cellW + cellW / 2, padT + yi * cellH + cellH / 2);
      }
    });
    // Y label
    ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const yl2 = String(yl).length > 8 ? String(yl).substring(0,7)+'..' : String(yl);
    ctx.fillText(yl2, padL - 8, padT + yi * cellH + cellH / 2);
  });
  // X labels
  xLabels.forEach((xl, xi) => {
    ctx.fillStyle = chartTextColor(0.4); ctx.font = '10px Inter'; ctx.textAlign = 'center';
    const xl2 = String(xl).length > 8 ? String(xl).substring(0,7)+'..' : String(xl);
    ctx.save(); ctx.translate(padL + xi * cellW + cellW / 2, padT + ch + 12);
    if (xLabels.length > 8) ctx.rotate(-0.45);
    ctx.fillText(xl2, 0, 0); ctx.restore();
  });
}

function animateHeatmapChart(canvas, chart) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 800; const start = performance.now();
  (function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    drawHeatmapChart(canvas, chart, { _sweepProgress: 1 - Math.pow(1 - t, 3) });
    if (t < 1) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

// ── BOXPLOT CHART ──
function drawBoxplotChart(canvas, chart, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const boxes = chart.boxes || [];
  if (!boxes.length) return;
  const padL = 52, padR = 16, padT = 20, padB = 52;
  const cw = w - padL - padR, ch = h - padT - padB;
  const allVals = boxes.flatMap(b => [b.whiskerLow || b.q1, b.whiskerHigh || b.q3]);
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const range = maxV - minV || 1;
  const scale = ch / range;
  const rgb = getColorRgb(chart.color || 'cyan');
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;

  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxV, 4, i, '', minV), padL - 10, y + 4);
  }

  const boxW = Math.min(48, (cw - 20) / boxes.length * 0.6);
  const spacing = cw / boxes.length;

  boxes.forEach((b, i) => {
    if (i >= Math.ceil(boxes.length * progress)) return;
    const x = padL + spacing * i + spacing / 2;
    const mapY = v => padT + (maxV - v) * scale;
    const wLow = mapY(b.whiskerLow != null ? b.whiskerLow : b.q1);
    const wHigh = mapY(b.whiskerHigh != null ? b.whiskerHigh : b.q3);
    const yQ1 = mapY(b.q1), yQ3 = mapY(b.q3), yMed = mapY(b.median);

    // Whisker line
    ctx.beginPath(); ctx.moveTo(x, wHigh); ctx.lineTo(x, wLow);
    ctx.strokeStyle = 'rgba(' + rgb + ',0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
    // Whisker caps
    ctx.beginPath(); ctx.moveTo(x - boxW * 0.3, wHigh); ctx.lineTo(x + boxW * 0.3, wHigh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x - boxW * 0.3, wLow); ctx.lineTo(x + boxW * 0.3, wLow); ctx.stroke();
    // Box (Q1 to Q3)
    ctx.fillStyle = 'rgba(' + rgb + ',0.2)';
    ctx.fillRect(x - boxW / 2, yQ3, boxW, yQ1 - yQ3);
    ctx.strokeStyle = 'rgba(' + rgb + ',0.7)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(x - boxW / 2, yQ3, boxW, yQ1 - yQ3);
    // Median
    ctx.beginPath(); ctx.moveTo(x - boxW / 2, yMed); ctx.lineTo(x + boxW / 2, yMed);
    ctx.strokeStyle = 'rgba(' + rgb + ',1)'; ctx.lineWidth = 2; ctx.stroke();
    // Label
    ctx.fillStyle = chartTextColor(0.3); ctx.font = '10px Inter'; ctx.textAlign = 'center';
    ctx.fillText(b.label || '', x, padT + ch + 14);
  });
}

  const dur = 700; const start = performance.now();

// ── TREEMAP CHART ──
function drawTreemapChart(canvas, labels, data, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const pad = 8;
  const total = data.reduce((a, b) => a + b, 0) || 1;
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;
  const palette = ['0,229,255','179,136,255','105,240,174','255,215,64','255,107,157','56,189,248','129,140,248','251,146,60','45,212,191','163,230,53'];

  // Simple squarified treemap (horizontal slicing)
  const items = labels.map((l, i) => ({ label: l, value: data[i], rgb: palette[i % palette.length] }))
    .sort((a, b) => b.value - a.value);
  const count = Math.ceil(items.length * progress);
  const rects = [];
  let cx = pad, cy = pad, cw = w - pad * 2, ch = h - pad * 2;
  let remaining = total;
  for (let i = 0; i < count; i++) {
    const ratio = items[i].value / remaining;
    remaining -= items[i].value;
    let rw, rh;
    if (cw >= ch) { rw = cw * ratio; rh = ch; } else { rw = cw; rh = ch * ratio; }
    rects.push({ x: cx, y: cy, w: rw, h: rh, ...items[i] });
    if (cw >= ch) { cx += rw; cw -= rw; } else { cy += rh; ch -= rh; }
  }

  rects.forEach(r => {
    const grad = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
    grad.addColorStop(0, 'rgba(' + r.rgb + ',0.7)'); grad.addColorStop(1, 'rgba(' + r.rgb + ',0.4)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    const cr = Math.min(6, r.w / 4, r.h / 4);
    ctx.moveTo(r.x + cr, r.y); ctx.lineTo(r.x + r.w - cr, r.y); ctx.quadraticCurveTo(r.x + r.w, r.y, r.x + r.w, r.y + cr);
    ctx.lineTo(r.x + r.w, r.y + r.h - cr); ctx.quadraticCurveTo(r.x + r.w, r.y + r.h, r.x + r.w - cr, r.y + r.h);
    ctx.lineTo(r.x + cr, r.y + r.h); ctx.quadraticCurveTo(r.x, r.y + r.h, r.x, r.y + r.h - cr);
    ctx.lineTo(r.x, r.y + cr); ctx.quadraticCurveTo(r.x, r.y, r.x + cr, r.y);
    ctx.fill();
    // Border
    ctx.strokeStyle = isLightBg() ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
    // Label
    if (r.w > 40 && r.h > 25) {
      ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.font = 'bold ' + Math.max(9, Math.min(13, r.w / 8)) + 'px Inter';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const lbl = r.label.length > Math.floor(r.w / 7) ? r.label.substring(0, Math.floor(r.w / 7) - 1) + '..' : r.label;

      ctx.fillText(formatNumber(r.value, {abbreviate:true}), r.x + r.w / 2, r.y + r.h / 2 + 8);
    }
  });
}

function animateTreemapChart(canvas, labels, data, opts = {}) {

}

// ── CANDLESTICK CHART ──
function drawCandlestickChart(canvas, chart, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const candles = chart.candles || [];
  if (!candles.length) return;
  const padL = 52, padR = 16, padT = 20, padB = 44;
  const cw = w - padL - padR, ch = h - padT - padB;
  const allVals = candles.flatMap(c => [c.high, c.low]);
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const range = maxV - minV || 1;
  const scale = ch / range;
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;

  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillStyle = chartTextColor(0.25); ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText(formatTickLabel(maxV, 4, i, '', minV), padL - 10, y + 4);
  }

  const candleW = Math.min(24, (cw - 10) / candles.length * 0.7);
  const spacing = cw / candles.length;
  const count = Math.ceil(candles.length * progress);

  for (let i = 0; i < count; i++) {
    const c = candles[i];
    const x = padL + spacing * i + spacing / 2;
    const mapY = v => padT + (maxV - v) * scale;
    const isUp = c.close >= c.open;
    const rgb = isUp ? getColorRgb('emerald') : getColorRgb('rose');
    // Wick
    ctx.beginPath(); ctx.moveTo(x, mapY(c.high)); ctx.lineTo(x, mapY(c.low));
    ctx.strokeStyle = 'rgba(' + rgb + ',0.6)'; ctx.lineWidth = 1; ctx.stroke();
    // Body
    const bodyTop = mapY(Math.max(c.open, c.close));
    const bodyBot = mapY(Math.min(c.open, c.close));
    ctx.fillStyle = 'rgba(' + rgb + ',' + (isUp ? 0.7 : 0.8) + ')';
    ctx.fillRect(x - candleW / 2, bodyTop, candleW, Math.max(1, bodyBot - bodyTop));
    // X label
    if (c.label && (candles.length < 20 || i % Math.ceil(candles.length / 10) === 0)) {
      ctx.fillStyle = chartTextColor(0.3); ctx.font = '9px Inter'; ctx.textAlign = 'center';
      ctx.fillText(String(c.label).substring(0, 8), x, padT + ch + 12);
    }
  }
}

function animateCandlestickChart(canvas, chart) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 700; const start = performance.now();
  (function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    drawCandlestickChart(canvas, chart, { _sweepProgress: 1 - Math.pow(1 - t, 3) });
    if (t < 1) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

// ── SANKEY DIAGRAM ──
function drawSankeyChart(canvas, chart, opts = {}) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  const flows = chart.flows || [];
  if (!flows.length) return;
  const padL = 30, padR = 30, padT = 20, padB = 20;
  const cw = w - padL - padR, ch = h - padT - padB;
  const progress = opts._sweepProgress != null ? opts._sweepProgress : 1;

  // Gather unique nodes per side
  const sources = [...new Set(flows.map(f => f.source))];
  const targets = [...new Set(flows.map(f => f.target))];
  const srcTotals = {}; sources.forEach(s => { srcTotals[s] = flows.filter(f => f.source === s).reduce((a, f) => a + f.value, 0); });
  const tgtTotals = {}; targets.forEach(t => { tgtTotals[t] = flows.filter(f => f.target === t).reduce((a, f) => a + f.value, 0); });
  const totalFlow = flows.reduce((a, f) => a + f.value, 0) || 1;
  const nodeW = 16, gap = 8;
  const palette = ['0,229,255','179,136,255','105,240,174','255,215,64','255,107,157','56,189,248','129,140,248','251,146,60'];

  // Position source nodes
  const srcH = ch - gap * (sources.length - 1);
  let srcY = padT;
  const srcPos = {};
  sources.forEach((s, i) => {
    const nh = Math.max(10, (srcTotals[s] / totalFlow) * srcH);
    srcPos[s] = { x: padL, y: srcY, h: nh, rgb: palette[i % palette.length] };
    srcY += nh + gap;
  });

  // Position target nodes
  const tgtH = ch - gap * (targets.length - 1);
  let tgtY = padT;
  const tgtPos = {};
  targets.forEach((t, i) => {
    const nh = Math.max(10, (tgtTotals[t] / totalFlow) * tgtH);
    tgtPos[t] = { x: padL + cw - nodeW, y: tgtY, h: nh, rgb: palette[(sources.length + i) % palette.length] };
    tgtY += nh + gap;
  });

  // Draw flows
  const srcOffsets = {}; sources.forEach(s => srcOffsets[s] = 0);
  const tgtOffsets = {}; targets.forEach(t => tgtOffsets[t] = 0);
  const flowCount = Math.ceil(flows.length * progress);

  flows.slice(0, flowCount).forEach(f => {
    const sp = srcPos[f.source], tp = tgtPos[f.target];
    if (!sp || !tp) return;
    const fh = (f.value / totalFlow) * Math.min(srcH, tgtH);
    const sy = sp.y + srcOffsets[f.source], ty = tp.y + tgtOffsets[f.target];
    srcOffsets[f.source] += fh; tgtOffsets[f.target] += fh;

    ctx.beginPath();
    const sx = padL + nodeW, tx = padL + cw - nodeW;
    const cpx = (sx + tx) / 2;
    ctx.moveTo(sx, sy); ctx.bezierCurveTo(cpx, sy, cpx, ty, tx, ty);
    ctx.lineTo(tx, ty + fh); ctx.bezierCurveTo(cpx, ty + fh, cpx, sy + fh, sx, sy + fh);
    ctx.closePath();
    ctx.fillStyle = 'rgba(' + sp.rgb + ',0.2)'; ctx.fill();
  });

  // Draw nodes
  Object.entries(srcPos).forEach(([name, p]) => {
    ctx.fillStyle = 'rgba(' + p.rgb + ',0.8)';
    ctx.fillRect(p.x, p.y, nodeW, p.h);
    ctx.fillStyle = chartTextColor(0.6); ctx.font = '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(name, p.x - 4, p.y + p.h / 2 + 3);
  });
  Object.entries(tgtPos).forEach(([name, p]) => {
    ctx.fillStyle = 'rgba(' + p.rgb + ',0.8)';
    ctx.fillRect(p.x, p.y, nodeW, p.h);
    ctx.fillStyle = chartTextColor(0.6); ctx.font = '10px Inter'; ctx.textAlign = 'left';
    ctx.fillText(name, p.x + nodeW + 4, p.y + p.h / 2 + 3);
  });
}

function animateSankeyChart(canvas, chart) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 900; const start = performance.now();
  (function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    drawSankeyChart(canvas, chart, { _sweepProgress: 1 - Math.pow(1 - t, 3) });
    if (t < 1) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

function handleDonutHover(e) {
  const canvas = e.currentTarget;
  const hit = canvas._chartHit;
  if (!hit || hit.type !== 'donut') return;
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const dx = mx - hit.cx, dy = my - hit.cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  let found = -1;
  if (dist >= hit.innerR && dist <= hit.outerR) {
    let angle = Math.atan2(dy, dx);
    if (angle < -Math.PI / 2) angle += Math.PI * 2;
    for (let i = 0; i < hit.segments.length; i++) {
      let sa = hit.segments[i].startAngle, ea = hit.segments[i].endAngle;
      if (angle >= sa && angle < ea) { found = i; break; }
    }
  }
  if (found !== canvas._lastHover) {
    canvas._lastHover = found;
    drawDonutChart(canvas, hit.labels, hit.data, { _highlightIdx: found });
    const tt = document.getElementById('chartTooltip');

      const seg = hit.segments[found];

        '<div class="tt-row"><span class="tt-row-label">Value</span><span class="tt-row-value">' + fmtVal + '</span></div>' +

  } else if (found >= 0) {

function handleChartLeave(e) {
  const canvas = e.currentTarget;

  canvas._lastHover = -1;

  document.getElementById('chartTooltip').classList.remove('visible');

  else if (hit.type === 'multiline') {

function handleMultiLineHover(e) {
  const canvas = e.currentTarget;
  const hit = canvas._chartHit;
  if (!hit || hit.type !== 'multiline') return;
  const chart = hit.chart;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const w = rect.width;
  const padL = 44, padR = 16;
  const cw = w - padL - padR;
  const nLabels = chart.labels.length;
  if (nLabels < 2) return;
  const step = cw / (nLabels - 1);
  let idx = Math.round((mx - padL) / step);
  idx = Math.max(0, Math.min(nLabels - 1, idx));

  // Redraw chart with crosshair
  const datasets = chart.series.map(s => {
    const clr = getColorRgb(s.color);
    return { data: s.data, stroke: 'rgba('+clr+',0.9)', lineWidth: 2,
      fillTop: 'rgba('+clr+',0.06)', fillBot: 'rgba('+clr+',0)',
      dotColor: 'rgba('+clr+',1)', dotGlow: 'rgba('+clr+',0.15)' };
  });
  const opts = { suffix: chart.suffix||'', xLabel: chart.xLabel||'', yLabel: chart.yLabel||'', _crosshairIdx: idx };
  drawChart(canvas, datasets, chart.labels, opts);

  // Draw vertical crosshair line
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const padT = 16, padB = 32, h = rect.height, ch = h - padT - padB;
  const xPos = padL + step * idx;
  ctx.beginPath();
  ctx.strokeStyle = isLightBg() ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.moveTo(xPos, padT);
  ctx.lineTo(xPos, padT + ch);
  ctx.stroke();
  ctx.setLineDash([]);

  // Highlight dots at crosshair position
  let maxVal = 0;
  datasets.forEach(ds => ds.data.forEach(v => { if (v > maxVal) maxVal = v; }));
  maxVal = Math.ceil(maxVal / 10) * 10 || 100;
  chart.series.forEach((s, si) => {
    const clr = getColorRgb(s.color);
    const val = s.data[idx];
    const yPos = padT + ch - (val / maxVal) * ch;
    ctx.beginPath(); ctx.arc(xPos, yPos, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + clr + ',1)'; ctx.fill();
    ctx.beginPath(); ctx.arc(xPos, yPos, 9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + clr + ',0.2)'; ctx.fill();
  });

  // Show tooltip
  const tt = document.getElementById('chartTooltip');
  const xLabel = chart.xLabel || 'Period';
  const yLabel = chart.yLabel || 'Value';
  const totalAtIdx = chart.series.reduce((s, sr) => s + sr.data[idx], 0);
  // Sort series by value at this index (highest first) for the tooltip
  const sorted = chart.series.map(s => ({ ...s, val: s.data[idx] })).sort((a, b) => b.val - a.val);
  let seriesRows = '';
  sorted.forEach(s => {
    const dot = getColorHex(s.color);
    const pct = totalAtIdx > 0 ? ((s.val / totalAtIdx) * 100).toFixed(1) : '0';
    seriesRows += '<div class="tt-row"><span class="tt-row-label"><span class="tt-dot" style="background:'+dot+'"></span>' + s.name + '</span><span class="tt-row-value">' + s.val.toLocaleString('en-US', {maximumFractionDigits:2}) + '<span class="tt-pct">(' + pct + '%)</span></span></div>';
  });
  tt.innerHTML =
    '<div class="tt-header">' + xLabel + ': ' + chart.labels[idx] + '</div>' +
    '<div class="tt-body">' +
    '<div class="tt-row" style="margin-bottom:6px"><span class="tt-row-label">Total ' + yLabel + '</span><span class="tt-row-value">' + totalAtIdx.toLocaleString('en-US', {maximumFractionDigits:2}) + '</span></div>' +
    '<div class="tt-divider"></div>' +
    seriesRows +
    '</div>';
  _posTooltip(tt, e);
  tt.classList.add('visible');
}

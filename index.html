function initDropZone() {
  const zone = $('#dropZone'), input = $('#fileInput');
  if(!zone || !input) return;
  ['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.remove('dragover'); }));
  zone.addEventListener('drop', ev => handleFiles(ev.dataTransfer.files));
  input.addEventListener('change', ev => handleFiles(ev.target.files));
}

function showUploadProgress(fileName) {
  const zone = $('#dropZone');
  const modalBody = $('#uploadModalBody');
  const body = (modalBody && modalBody.children.length > 0) ? modalBody : (zone ? zone.parentElement : null);
  if (!body) return;
  // Hide drop zone, show progress
  if (zone) zone.style.display = 'none';
  let prog = document.getElementById('uploadProgress');
  if (!prog) {
    body.insertAdjacentHTML('afterbegin',
      '<div class="upload-progress active" id="uploadProgress">' +
      '<div class="upload-spinner"></div>' +
      '<div class="upload-progress-text">Processing your data...</div>' +
      '<div class="upload-progress-file" id="uploadFileName"></div>' +
      '<div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadFill"></div></div>' +
      '</div>' +
      '<div class="upload-success" id="uploadSuccess">' +
      '<div class="upload-success-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#69f0ae" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
      '<div class="upload-success-text" id="uploadSuccessText">Data loaded successfully!</div>' +
      '<div class="upload-success-sub" id="uploadSuccessSub"></div>' +
      '</div>');
    prog = document.getElementById('uploadProgress');
  }
  prog.classList.add('active');
  document.getElementById('uploadSuccess').classList.remove('active');
  const fn = document.getElementById('uploadFileName');
  if (fn) fn.textContent = fileName;
  // Animate progress bar
  const fill = document.getElementById('uploadFill');
  if (fill) { fill.style.width = '0%'; setTimeout(() => fill.style.width = '60%', 50); }
}

function showUploadSuccess(rowCount, fileName) {
  const prog = document.getElementById('uploadProgress');
  const succ = document.getElementById('uploadSuccess');
  const fill = document.getElementById('uploadFill');
  if (fill) fill.style.width = '100%';
  setTimeout(() => {
    if (prog) prog.classList.remove('active');
    if (succ) {
      succ.classList.add('active');
      const txt = document.getElementById('uploadSuccessText');
      const sub = document.getElementById('uploadSuccessSub');
      if (txt) txt.textContent = rowCount + ' rows loaded successfully!';
      if (sub) sub.textContent = fileName;
    }
    // Auto-close after showing success
    setTimeout(() => {
      const modalOverlay = $('#uploadModalOverlay');
      if (modalOverlay && modalOverlay.classList.contains('open')) closeUploadModal();
      navigate('analytics');
    }, 1200);
  }, 400);
}

function loadSampleDataset() {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const regions = ['North','South','East','West'];
  const products = ['Widget A','Widget B','Gadget X','Gadget Y'];
  const rows = [];
  months.forEach(month => {
    regions.forEach(region => {
      const base = (regions.indexOf(region) + 1) * 2000 + Math.random() * 3000;
      const product = products[Math.floor(Math.random() * products.length)];
      const revenue = Math.round(base + Math.random() * 5000);
      const units = Math.round(50 + Math.random() * 200);
      const margin = Math.round((15 + Math.random() * 35) * 10) / 10;
      rows.push({ Month: month, Region: region, Product: product, Revenue: revenue, Units: units, Profit_Margin: margin });
    });
  });
  App.excelData = { headers: Object.keys(rows[0]), rows: rows };
  App.hasExcelData = true;
  App.uploadedFiles.push({ name: 'sample_sales_data.csv', size: 2400, type: 'text/csv' });
  autoMapExcelData(rows);
  navigate('analytics');
  toast('Sample dataset loaded — 48 rows, 6 columns', 'success');
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    App.uploadedFiles.push({ name: file.name, size: file.size, type: file.type });
    const ext = file.name.split('.').pop().toLowerCase();
    if(['xlsx','xls','csv'].includes(ext)) {
      showUploadProgress(file.name);
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          let json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

          // ── FIX: Detect __EMPTY headers (title rows before actual data) ──
          if (json.length > 0) {
            const firstHeaders = Object.keys(json[0]);
            const hasEmpty = firstHeaders.some(h => /^__EMPTY/.test(h) || h === '');
            if (hasEmpty) {
              const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
              let headerIdx = -1;
              for (let ri = 0; ri < Math.min(raw.length, 20); ri++) {
                const row = raw[ri];
                const nonEmpty = row.filter(v => v !== '' && v !== null && v !== undefined);
                // Header row: ≥3 non-empty string cells and majority are strings
                if (nonEmpty.length >= 3 && nonEmpty.filter(v => typeof v === 'string').length >= nonEmpty.length * 0.7) {
                  headerIdx = ri; break;
                }
              }
              if (headerIdx >= 0) {
                const hdrs = raw[headerIdx].map((h, ci) => {
                  if (!h && h !== 0) return null;
                  return String(h).replace(/[\r\n]+/g, ' ').trim();
                });
                // Build cleaned rows from data below header
                const cleaned = [];
                for (let ri = headerIdx + 1; ri < raw.length; ri++) {
                  const row = raw[ri];
                  const hasData = row.some(v => v !== '' && v !== null && v !== undefined);
                  if (!hasData) continue;
                  const obj = {};
                  hdrs.forEach((h, ci) => { if (h) obj[h] = row[ci] !== undefined ? row[ci] : ''; });
                  cleaned.push(obj);
                }
                if (cleaned.length > 0) json = cleaned;
              }
            }
            // Also clean any remaining newlines in headers
            if (json.length > 0) {
              const rawHeaders = Object.keys(json[0]);
              const needsClean = rawHeaders.some(h => /[\r\n]/.test(h));
              if (needsClean) {
                json = json.map(row => {
                  const obj = {};
                  rawHeaders.forEach(h => { obj[h.replace(/[\r\n]+/g, ' ').trim()] = row[h]; });
                  return obj;
                });
              }
            }
          }

          if(json.length > 0) {
            App.excelData = { headers: Object.keys(json[0]), rows: json, sheetName: wb.SheetNames[0] };
            App.dashChartIdx = 0;
            // Clear AI caches on new data
            App._cachedInsights = null; App._cachedAnomalies = null; App._cachedQuality = null;
            App._cachedDescriptions = null; App._cachedSuggestions = null;
            App._forecastCache = {}; App._narrativeCache = {};
            autoMapExcelData(json);
            renderUploadPreview();
            showUploadSuccess(json.length, file.name);
          }
        } catch(err) {
          toast('Error reading file: ' + err.message, 'error');
          closeUploadModal();
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      toast(`Uploaded "${file.name}"`, 'success');
      setTimeout(() => closeUploadModal(), 800);
    }
  });
  renderUploadFileList();
}

function autoMapExcelData(rows) {
  if(!rows.length) return;
  const allHeaders = Object.keys(rows[0]);
  const sample = rows.slice(0, Math.min(rows.length, 30));

  // ── CLASSIFY EVERY COLUMN ──
  const colMeta = {};
  allHeaders.forEach(h => {
    const vals = rows.map(r => r[h]).filter(v => v !== '' && v !== null && v !== undefined);
    const numCount = vals.filter(v => !isNaN(parseFloat(v))).length;
    const isNumeric = numCount > vals.length * 0.8;
    const uniqueVals = [...new Set(vals.map(String))];
    const uniqueRatio = uniqueVals.length / Math.max(vals.length, 1);

    // Detect index/id columns: sequential integers, named id/index/#, or text IDs like "P101"
    const isNamedId = /\b(id|index|#|row|sr|sno|s\.no|serial|number|code|sku)\b/i.test(h.trim());
    const isIndex = (isNumeric && (
      isNamedId ||
      /^[0-9.]+$/.test(String(h).trim()) ||
      (uniqueRatio > 0.9 && vals.length > 10 && vals.every((v,i) => i === 0 || parseFloat(v) >= parseFloat(vals[i-1])))
    )) || (!isNumeric && isNamedId && uniqueRatio > 0.85);

    // Detect categorical: text with few unique values (not IDs)
    const isCategorical = !isNumeric && !isIndex && uniqueVals.length <= Math.max(20, vals.length * 0.3) && uniqueVals.length >= 2;

    // Detect date
    const isDate = /date|month|year|week|day|time|period|quarter/i.test(h);

    // Detect meaningful metric (numeric but not index/id)
    const isMetric = isNumeric && !isIndex;

    colMeta[h] = { isNumeric, isIndex, isCategorical, isDate, isMetric, uniqueVals, uniqueCount: uniqueVals.length,
      vals: isMetric ? rows.map(r => parseFloat(r[h]) || 0) : null
    };
  });

  // ── EXTRACT COLUMNS BY TYPE ──
  const metrics = allHeaders.filter(h => colMeta[h].isMetric);
  const categoricals = allHeaders.filter(h => colMeta[h].isCategorical);
  const dates = allHeaders.filter(h => colMeta[h].isDate);
  const indices = allHeaders.filter(h => colMeta[h].isIndex);

  // ── BUILD SMART CHART PLAN ──
  const chartPlan = [];
  const barColors = ['cyan','violet','emerald','amber','rose'];
  const usedTypes = { bar: 0, line: 0, donut: 0 };
  const maxCharts = 4;

  // Helper: aggregate metric by category
  function aggByCategory(cat, metric, aggFn) {
    const groups = {};
    rows.forEach(r => {
      const key = String(r[cat] || '').trim();
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(parseFloat(r[metric]) || 0);
    });
    return Object.entries(groups).map(([k, v]) => ({
      label: k,
      value: aggFn === 'sum' ? v.reduce((a, b) => a + b, 0) :
             aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length :
             aggFn === 'count' ? v.length : Math.max(...v)
    })).sort((a, b) => b.value - a.value);
  }

  // Helper: aggregate metric over time
  function aggOverTime(dateCol, metric, aggFn) {
    const groups = {};
    rows.forEach(r => {
      const key = String(r[dateCol] || '').trim();
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(parseFloat(r[metric]) || 0);
    });
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => ({
      label: k,
      value: aggFn === 'sum' ? v.reduce((a, b) => a + b, 0) :
             aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length :
             v.length
    }));
  }

  const dateCol = dates[0] || null;
  const nameCol = allHeaders.find(h => !colMeta[h].isNumeric && !colMeta[h].isIndex && !colMeta[h].isDate &&
    /name|product|item|title|description|label/i.test(h));
  const donutCats = categoricals.filter(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 10);

  // Rank metrics by business relevance
  const metricPriority = [/revenue|sales|income/i, /cost|expense|margin/i, /profit|npv|roi/i, /score|rate|compliance/i, /count|total|amount|value/i];
  function rankMetric(m) { const idx = metricPriority.findIndex(r => r.test(m)); return idx >= 0 ? idx : metricPriority.length; }
  const rankedMetrics = [...metrics].sort((a, b) => rankMetric(a) - rankMetric(b));

  // Pick primary and secondary metrics
  const primaryMetric = rankedMetrics[0] || null;
  const secondaryMetric = rankedMetrics.find(m => m !== primaryMetric) || null;

  // Find best categorical for bar charts: needs 3+ bars with non-zero values
  function bestBarCat(metric) {
    const candidates = categoricals
      .filter(c => colMeta[c].uniqueCount >= 3 && colMeta[c].uniqueCount <= 15)
      .map(c => {
        const agg = aggByCategory(c, metric, /score|rate|compliance|avg|percent/i.test(metric) ? 'avg' : 'sum');
        const nonZero = agg.filter(a => a.value > 0);
        return { col: c, agg: nonZero, count: nonZero.length };
      })
      .filter(x => x.count >= 3)
      .sort((a, b) => b.count - a.count);
    return candidates[0] || null;
  }

  // Find best categorical for multi-line: needs 2-6 unique values with data across time
  function bestLineCat(dateC, metric) {
    if (!dateC) return null;
    return categoricals
      .filter(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 6)
      .find(c => {
        // Check that at least 2 groups have non-zero data
        const groups = {};
        rows.forEach(r => {
          const gv = String(r[c] || '').trim();
          if (!gv) return;
          groups[gv] = (groups[gv] || 0) + (parseFloat(r[metric]) || 0);
        });
        return Object.values(groups).filter(v => v > 0).length >= 2;
      }) || null;
  }

  const usedCombos = new Set();

  // ── CHART 1: MULTI-LINE — Primary metric over time by category ──
  // Most insightful chart: shows trends broken down by category
  if (dateCol && primaryMetric) {
    const lineCat = bestLineCat(dateCol, primaryMetric);
    if (lineCat) {
      const seriesColors = linePalettes['GenBI'];
      const isRate = /score|rate|compliance|avg|percent/i.test(primaryMetric);
      const fn = isRate ? 'avg' : 'sum';
      // Group data
      const grouped = {};
      const groupTotals = {};
      rows.forEach(r => {
        const gv = String(r[lineCat] || '').trim();
        const xv = String(r[dateCol] || '').trim();
        if (!gv || !xv) return;
        if (!grouped[gv]) grouped[gv] = {};
        if (!grouped[gv][xv]) grouped[gv][xv] = [];
        grouped[gv][xv].push(parseFloat(r[primaryMetric]) || 0);
        groupTotals[gv] = (groupTotals[gv] || 0) + (parseFloat(r[primaryMetric]) || 0);
      });
      const topGroups = Object.entries(groupTotals).filter(e => e[1] > 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1])).slice(0, 6).map(e => e[0]);
      const allLabelsSet = new Set();
      topGroups.forEach(g => { if (grouped[g]) Object.keys(grouped[g]).forEach(x => allLabelsSet.add(x)); });
      const allLabels = Array.from(allLabelsSet).sort((a, b) => a.localeCompare(b));
      if (allLabels.length >= 3 && topGroups.length >= 2) {
        const series = topGroups.map((g, i) => {
          const data = allLabels.map(x => {
            const vals = (grouped[g] && grouped[g][x]) || [];
            if (vals.length === 0) return 0;
            return fn === 'avg' ? vals.reduce((a, b) => a + b, 0) / vals.length : vals.reduce((a, b) => a + b, 0);
          });
          return { name: g, data, color: seriesColors[i % seriesColors.length] };
        });
        chartPlan.push({
          type: 'line', title: primaryMetric.replace(/_/g, ' ') + ' Trend by ' + lineCat.replace(/_/g, ' '),
          labels: allLabels, series, data: null, color: 'cyan', suffix: '',
          xLabel: dateCol.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
          desc: 'Shows how ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' trends over time for each ' + lineCat.replace(/_/g, ' ').toLowerCase() + '.'
        });
        usedCombos.add(dateCol + '|' + primaryMetric);
      }
    }
  }

  // ── CHART 2: BAR — Primary or secondary metric by a good category ──
  if (chartPlan.length < maxCharts && primaryMetric) {
    // Try nameCol first (e.g. "Top Products by Revenue"), then other categoricals
    const barInfo = bestBarCat(primaryMetric);
    if (barInfo && !usedCombos.has(barInfo.col + '|' + primaryMetric)) {
      const isRate = /score|rate|compliance|avg|percent/i.test(primaryMetric);
      const agg = barInfo.agg.slice(0, 10);
      chartPlan.push({ type: 'bar',
        title: (nameCol && barInfo.col === nameCol ? 'Top ' : '') + primaryMetric.replace(/_/g, ' ') + ' by ' + barInfo.col.replace(/_/g, ' '),
        labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'cyan', suffix: '',
        xLabel: barInfo.col.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
        desc: 'Compares ' + (isRate ? 'average ' : 'total ') + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' across ' + barInfo.col.replace(/_/g, ' ').toLowerCase() + '.'
      });
      usedCombos.add(barInfo.col + '|' + primaryMetric);
    }
  }

  // ── CHART 3: DONUT — Revenue/metric share by a category ──
  if (chartPlan.length < maxCharts && donutCats.length > 0) {
    const donutMetric = secondaryMetric || primaryMetric;
    const donutCat = donutCats.find(c => donutMetric && !usedCombos.has(c + '|' + donutMetric)) || donutCats[0];
    if (donutMetric) {
      const isRate = /score|rate|compliance|avg|percent/i.test(donutMetric);
      const agg = aggByCategory(donutCat, donutMetric, isRate ? 'avg' : 'sum').filter(a => a.value > 0);
      if (agg.length >= 2) {
        const topN = agg.slice(0, 8);
        const rest = agg.slice(8);
        const dLabels = topN.map(a => a.label);
        const dData = topN.map(a => a.value);
        if (rest.length > 0) { dLabels.push('Other (' + rest.length + ')'); dData.push(rest.reduce((s, a) => s + a.value, 0)); }
        chartPlan.push({ type: 'donut',
          title: donutMetric.replace(/_/g, ' ') + ' by ' + donutCat.replace(/_/g, ' '),
          labels: dLabels, data: dData, color: 'multi',
          desc: 'Shows each ' + donutCat.replace(/_/g, ' ').toLowerCase() + '\'s share of ' + donutMetric.replace(/_/g, ' ').toLowerCase() + '.'
        });
      }
    } else {
      const counts = {};
      rows.forEach(r => { const v = String(r[donutCat] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      chartPlan.push({ type: 'donut', title: donutCat.replace(/_/g, ' ') + ' Breakdown',
        labels: sorted.slice(0,8).map(e => e[0]), data: sorted.slice(0,8).map(e => e[1]), color: 'multi',
        desc: 'Shows the proportion of records in each ' + donutCat.replace(/_/g, ' ').toLowerCase() + ' category.'
      });
    }
  }

  // ── FALLBACK: When no charts built (no categoricals/dates), use name/label column ──
  if (chartPlan.length === 0 && metrics.length > 0) {
    // Find a label column: name-like text, or any non-metric non-index column, or index column as last resort
    const labelCol = nameCol
      || allHeaders.find(h => !colMeta[h].isMetric && !colMeta[h].isIndex && !colMeta[h].isDate)
      || indices[0] || allHeaders.find(h => !colMeta[h].isMetric);

    if (labelCol) {
      // Chart 1: Top items by primary metric (bar)
      if (primaryMetric) {
        const items = rows.map(r => ({ label: String(r[labelCol] || '').trim(), value: parseFloat(r[primaryMetric]) || 0 }))
          .filter(a => a.label && a.value > 0)
          .sort((a, b) => b.value - a.value).slice(0, 10);
        if (items.length >= 2) {
          chartPlan.push({ type: 'bar',
            title: 'Top ' + primaryMetric.replace(/_/g, ' ') + ' by ' + labelCol.replace(/_/g, ' '),
            labels: items.map(a => a.label), data: items.map(a => a.value), color: 'cyan', suffix: '',
            xLabel: labelCol.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
            desc: 'Shows ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranked by ' + labelCol.replace(/_/g, ' ').toLowerCase() + '.'
          });
        }
      }

      // Chart 2: Secondary metric bar chart
      if (secondaryMetric && chartPlan.length < 3) {
        const items = rows.map(r => ({ label: String(r[labelCol] || '').trim(), value: parseFloat(r[secondaryMetric]) || 0 }))
          .filter(a => a.label && a.value > 0)
          .sort((a, b) => b.value - a.value).slice(0, 10);
        if (items.length >= 2) {
          chartPlan.push({ type: 'bar',
            title: 'Top ' + secondaryMetric.replace(/_/g, ' ') + ' by ' + labelCol.replace(/_/g, ' '),
            labels: items.map(a => a.label), data: items.map(a => a.value), color: 'violet', suffix: '',
            xLabel: labelCol.replace(/_/g, ' '), yLabel: secondaryMetric.replace(/_/g, ' '),
            desc: 'Shows ' + secondaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranked by ' + labelCol.replace(/_/g, ' ').toLowerCase() + '.'
          });
        }
      }

      // Chart 3: Donut of metric distribution (bucket into ranges)
      if (primaryMetric && chartPlan.length < 3) {
        const vals = rows.map(r => parseFloat(r[primaryMetric]) || 0).filter(v => v > 0);
        if (vals.length >= 5) {
          const sorted = [...vals].sort((a, b) => a - b);
          const q1 = sorted[Math.floor(sorted.length * 0.33)];
          const q2 = sorted[Math.floor(sorted.length * 0.66)];
          const buckets = { Low: 0, Medium: 0, High: 0 };
          vals.forEach(v => { if (v <= q1) buckets.Low++; else if (v <= q2) buckets.Medium++; else buckets.High++; });
          chartPlan.push({ type: 'donut',
            title: primaryMetric.replace(/_/g, ' ') + ' Distribution',
            labels: Object.keys(buckets), data: Object.values(buckets), color: 'multi',
            desc: 'Shows the distribution of records across low, medium, and high ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranges.'
          });
        }
      }
    }
  }

  // Limit to 3 auto-generated charts
  chartPlan.splice(3);

  // Store original column references for cross-filter rebuilds
  chartPlan.forEach(chart => {
    if (chart.xLabel) chart._origXCol = allHeaders.find(h => h.replace(/_/g,' ') === chart.xLabel) || chart.xLabel.replace(/ /g,'_');
    if (chart.yLabel) chart._origYCol = allHeaders.find(h => h.replace(/_/g,' ') === chart.yLabel) || chart.yLabel.replace(/ /g,'_');
    chart._origAggFn = chart.title.startsWith('Avg') ? 'avg' : chart.title.startsWith('Max') ? 'max' : 'sum';
  });

  App.excelChartConfig = { colMeta, metrics, categoricals, dates, indices, chartPlan,
    labelCol: categoricals[0] || dates[0] || nameCol || indices[0] || null,
    dataCols: metrics.slice(0,2), numericCols: metrics,
    labelCols: [...categoricals, ...dates, ...(nameCol ? [nameCol] : [])] };
  App.hasExcelData = true;
  App.drillStates = {}; // Reset drill states on new data

  if(App.chartInterval) { clearInterval(App.chartInterval); App.chartInterval = null; }

  // ── SMART STAT CARDS ──
  // Card 1: Total records
  App.stats.revenue.value = rows.length;
  App.stats.revenue.label = 'Total Records';
  App.stats.revenue.format = 'number';
  App.stats.revenue.color = 'cyan';
  App.stats.revenue.trend = 0;

  // Card 2: first metric average
  if(metrics[0]) {
    const v = colMeta[metrics[0]].vals;
    const avg = v.reduce((a,b)=>a+b,0)/v.length;
    App.stats.users.value = Math.round(avg * 100) / 100;
    App.stats.users.label = 'Avg ' + metrics[0].replace(/_/g, ' ');
    App.stats.users.format = 'number';
    App.stats.users.color = 'violet';
    const mid = Math.floor(v.length/2);
    const h1 = v.slice(0,mid).reduce((a,b)=>a+b,0)/mid;
    const h2 = v.slice(mid).reduce((a,b)=>a+b,0)/(v.length-mid);
    App.stats.users.trend = h1>0 ? Math.round((h2-h1)/h1*1000)/10 : 0;
  }

  // Card 3: unique categories, or unique labels, or total metrics
  if(categoricals[0]) {
    App.stats.uptime.value = colMeta[categoricals[0]].uniqueCount;
    App.stats.uptime.label = 'Unique ' + categoricals[0].replace(/_/g, ' ') + 's';
    App.stats.uptime.format = 'number';
    App.stats.uptime.color = 'emerald';
    App.stats.uptime.trend = 0;
  } else {
    // Fallback: count unique items in the first text/name column, or show metric count
    const nameCol = allHeaders.find(h => !colMeta[h].isNumeric && !colMeta[h].isIndex && !colMeta[h].isDate);
    if (nameCol) {
      const uniq = new Set(rows.map(r => String(r[nameCol]||'').trim()).filter(Boolean));
      App.stats.uptime.value = uniq.size;
      App.stats.uptime.label = 'Unique ' + nameCol.replace(/_/g, ' ') + 's';
    } else {
      App.stats.uptime.value = metrics.length;
      App.stats.uptime.label = 'Data Metrics';
    }
    App.stats.uptime.format = 'number';
    App.stats.uptime.color = 'emerald';
    App.stats.uptime.trend = 0;
  }

  // Card 4: second metric max or second categorical count
  if(metrics[1]) {
    const v = colMeta[metrics[1]].vals;
    App.stats.tasks.value = Math.max(...v);
    App.stats.tasks.label = 'Max ' + metrics[1].replace(/_/g, ' ');
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  } else if(categoricals[1]) {
    App.stats.tasks.value = colMeta[categoricals[1]].uniqueCount;
    App.stats.tasks.label = 'Unique ' + categoricals[1].replace(/_/g, ' ') + 's';
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  } else {
    App.stats.tasks.value = allHeaders.length;
    App.stats.tasks.label = 'Total Columns';
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  }
}

function initCounters() {
  $$('.stat-value').forEach(el => {
    const target = el.textContent;
    const fmt = el.dataset.format;
    if(!fmt) return;
    const numStr = target.replace(/[$,%]/g,'').replace(/,/g,'');
    const num = parseFloat(numStr);
    if(isNaN(num)) return;
    el.textContent = fmt==='currency'?'$0':fmt==='percent'?'0.0%':'0';
    const start = performance.now();
    function update(now) {
      const p = Math.min((now-start)/1200, 1);
      const eased = 1-Math.pow(1-p,3);
      el.textContent = formatValue(num*eased, fmt);
      if(p<1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  });
}

// ── Route-aware init ──
(function initApp() {
  const path = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  const isDashboard = path === '/dashboard';
  const isBillingSuccess = path === '/billing/success';
  const isBillingCancel = path === '/billing/cancel';
  const token = localStorage.getItem('genbi-auth-token');
  const user = getAuthUser();
  const authBar = document.getElementById('authBar');

  // Helper: set up authenticated app mode
  function enterAppMode() {
    document.body.classList.remove('landing-mode');
    document.body.classList.add('app-mode');
    App.user = user;
    const profileName = document.querySelector('.profile-name');
    const profileRole = document.querySelector('.profile-role');
    const profileAvatar = document.querySelector('.profile-avatar');
    if (profileName) profileName.textContent = user.name || 'User';
    if (profileRole) profileRole.textContent = user.email || '';
    if (profileAvatar) profileAvatar.textContent = (user.name || 'U').charAt(0).toUpperCase();
    if (authBar) authBar.innerHTML = '';
  }

  if (isBillingSuccess) {
    // ── /billing/success: post-Checkout landing ──
    if (!token || !user) { window.location.href = '/login'; return; }
    enterAppMode();
    navigate('analytics');
    // Show a success overlay and poll for subscription activation
    setTimeout(() => {
      const main = document.getElementById('mainContent');
      if (main) {
        const overlay = document.createElement('div');
        overlay.id = 'billingSuccessOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)';
        overlay.innerHTML = '<div style="text-align:center;padding:48px;border-radius:var(--radius-lg);background:var(--glass-bg);border:1px solid var(--glass-border);max-width:420px">' +
          '<div style="margin-bottom:16px"></div>' +
          '<h2 style="font-family:Inter;font-size:22px;font-weight:700;margin-bottom:8px">Payment received!</h2>' +
          '<p style="color:var(--text-secondary);font-size:14px;margin-bottom:24px">Setting up your subscription...</p>' +
          '<div id="billingSuccessStatus"><div class="billing-spinner"></div></div>' +
          '</div>';
        document.body.appendChild(overlay);
      }
      pollBillingSuccess(15);
    }, 100);

  } else if (isBillingCancel) {
    // ── /billing/cancel: user canceled Checkout ──
    if (!token || !user) { window.location.href = '/login'; return; }
    enterAppMode();
    navigate('pricing');
    setTimeout(() => toast('Checkout was canceled. You can try again anytime.', 'info'), 300);

  } else if (isDashboard) {
    // ── /dashboard: protected ──
    if (!token || !user) {
      window.location.href = '/login?next=/dashboard';
      return;
    }
    enterAppMode();
    // Handle ?billing= query params (returning from Portal or success)
    const billingParam = params.get('billing');
    if (billingParam === 'success') {
      navigate('settings');
      setTimeout(() => toast('Payment successful! Your plan has been updated.', 'success'), 300);
    } else if (billingParam === 'updated') {
      navigate('settings');
      setTimeout(() => toast('Billing updated successfully.', 'success'), 300);
    } else if (billingParam === 'canceled') {
      navigate('settings');
      setTimeout(() => toast('Checkout was canceled.', 'info'), 300);
    } else {
      navigate('analytics');
    }
    // Clean up query string
    if (billingParam) {
      window.history.replaceState({}, '', '/dashboard');
    }

  } else {
    // ── / : public homepage ──
    document.body.classList.add('landing-mode');
    document.body.classList.remove('app-mode');
    navigate('dashboard');
  }
})();

// ══════════════════════════════════════════════════════════════════════════
// VISUAL EDITOR — Floating Toolbar & Panel
// ══════════════════════════════════════════════════════════════════════════
(function() {
  'use strict';

  // ── Visual Registry ─────────────────────────────────────────────────────
  const VE = {
    registry: [],
    hoveredCardId: null,
    activeId: null,
    activeSection: null,
    exportFmt: 'png',
    _hideTimer: null,
    _panelHovered: false
  };
  window._VE = VE;

  function getStorageKey(id) {
    const user = localStorage.getItem('genbi_user');
    const uid = user ? (JSON.parse(user).id || 'anon') : 'anon';
    return 'visualSettings::' + uid + '::' + id;
  }

  function loadSettings(id) {
    try {
      var s = JSON.parse(localStorage.getItem(getStorageKey(id))) || {};
      delete s.aspectRatio; // removed feature
      delete s.density;     // removed feature
      return s;
    } catch(e) { return {}; }
  }

  function saveSettings(id, settings) {
    try { localStorage.setItem(getStorageKey(id), JSON.stringify(settings)); } catch(e) {}
  }

  function defaultSettings() {
    return {
      color: null,       // null = use chart default
      barPalette: null,  // per-bar palette name
      linePalette: null, // line series palette name
      fontFamily: 'Inter',
      titleSize: 16,
      labelSize: 11,
      fontWeight: '500',
      chartType: null,   // null = use chart default
      density: 'balanced',
      branding: false,
      aspectRatio: 'auto',
      caption: '',
      syncTitle: true
    };
  }

  // ── Register charts after they render ──────────────────────────────────
  function registerCharts() {
    VE.registry = [];
    const ec = App.excelChartConfig;
    // Analytics charts
    if (App.hasExcelData && ec.chartPlan && ec.chartPlan.length > 0) {
      ec.chartPlan.forEach((chart, i) => {
        const canvas = document.getElementById('analyticsChart' + i);
        if (!canvas) return;
        const id = 'analytics_' + i;
        const saved = loadSettings(id);
        const settings = Object.assign(defaultSettings(), saved);
        VE.registry.push({ id, kind: 'analytics', idx: i, title: chart.title || 'Chart ' + (i+1), canvas, chartRef: chart, settings });
      });
    }
    // Custom charts
    (App.customCharts || []).forEach((chart, i) => {
      const canvas = document.getElementById('customChart' + i);
      if (!canvas) return;
      const id = 'custom_' + i;
      const saved = loadSettings(id);
      const settings = Object.assign(defaultSettings(), saved);
      VE.registry.push({ id, kind: 'custom', idx: i, title: chart.title || 'Custom Chart ' + (i+1), canvas, chartRef: chart, settings });
    });
    // Attach hover listeners to chart cards
    VE.registry.forEach(v => {
      const card = v.canvas.closest('.glass-panel');
      if (!card || card._veHoverBound) return;
      card._veHoverBound = true;
      card.addEventListener('mouseenter', function() {
        card.classList.add('ve-hovered');
        showToolbar(card, v.id);
      });
      card.addEventListener('mouseleave', function() {
        card.classList.remove('ve-hovered');
        hideToolbar();
      });
      card.addEventListener('touchstart', function() {
        if (VE.hoveredCardId === v.id && document.getElementById('veToolbar').classList.contains('visible')) return;
        showToolbar(card, v.id);
      }, { passive: true });
    });
    // Apply persisted settings
    VE.registry.forEach(v => {
      applySettingsToChart(v);
      // Redraw chart if settings changed series colors or chart type
      if (v.settings.linePalette || v.settings.chartType || v.settings.color) {
        v.canvas._hasChartEvents = false;
        v.canvas._chartHit = null;
        animateChartFromPlan(v.canvas, v.chartRef, 0);
      }
    });
  }

  // ── Toolbar show/hide ─────────────────────────────────────────────────
  function showToolbar(cardEl, chartId) {
    cancelHideToolbar();
    VE.hoveredCardId = chartId;
    var toolbar = document.getElementById('veToolbar');
    positionToolbar(toolbar, cardEl);
    toolbar.classList.add('visible');
    if (VE.activeId && VE.activeId !== chartId) {
      hidePanel();
    }
  }

  function hideToolbar() {
    VE._hideTimer = setTimeout(function() {
      if (VE._panelHovered) return;
      if (VE.activeId) return;
      hideToolbarImmediate();
    }, 200);
  }

  function cancelHideToolbar() {
    if (VE._hideTimer) { clearTimeout(VE._hideTimer); VE._hideTimer = null; }
  }

  function hideToolbarImmediate() {
    cancelHideToolbar();
    document.getElementById('veToolbar').classList.remove('visible');
    VE.hoveredCardId = null;
    document.querySelectorAll('.glass-panel.ve-hovered').forEach(function(el) { el.classList.remove('ve-hovered'); });
  }

  // ── Panel show/hide ─────────────────────────────────────────────────────
  function showPanel(sectionKey) {
    if (VE.activeSection === sectionKey && VE.activeId === VE.hoveredCardId) {
      hidePanel();
      return;
    }
    VE.activeId = VE.hoveredCardId;
    VE.activeSection = sectionKey;
    var panel = document.getElementById('vePanel');
    var toolbar = document.getElementById('veToolbar');
    var body = document.getElementById('vePanelBody');
    var tplMap = { export:'veTplExport', colors:'veTplColors', fonts:'veTplFonts', layout:'veTplLayout', branding:'veTplBranding', aspect:'veTplAspect', sync:'veTplSync', info:'veTplInfo' };
    var tpl = document.getElementById(tplMap[sectionKey]);
    if (!tpl) return;
    body.innerHTML = '';
    body.appendChild(tpl.content.cloneNode(true));
    var titles = { export:'Export Visual', colors:'Colors', fonts:'Fonts', layout:'Swap Layout', branding:'Branding', aspect:'Aspect Ratio', sync:'Caption', info:'Info' };
    document.getElementById('vePanelTitle').textContent = titles[sectionKey] || sectionKey;
    var visual = getSelectedVisual();
    if (visual) populateSection(sectionKey, visual);
    bindSectionListeners(sectionKey);
    positionPanel(panel, toolbar);
    panel.classList.add('visible');
    document.querySelectorAll('.ve-toolbar-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.section === sectionKey); });
    document.querySelectorAll('.glass-panel.ve-active').forEach(function(el) { el.classList.remove('ve-active'); });
    if (visual) {
      var card = visual.canvas.closest('.glass-panel');
      if (card) card.classList.add('ve-active');
    }
  }

  function hidePanel() {
    document.getElementById('vePanel').classList.remove('visible');
    VE.activeId = null;
    VE.activeSection = null;
    document.querySelectorAll('.ve-toolbar-btn.active').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.glass-panel.ve-active').forEach(function(el) { el.classList.remove('ve-active'); });
  }

  // ── Positioning ─────────────────────────────────────────────────────────
  function positionToolbar(toolbar, cardEl) {
    var rect = cardEl.getBoundingClientRect();
    var toolbarW = 48;
    var toolbarH = toolbar.offsetHeight || 340;
    var top = rect.top + (rect.height - toolbarH) / 2;
    var left = rect.right - toolbarW - 10;
    top = Math.max(8, Math.min(top, window.innerHeight - toolbarH - 8));
    if (left < rect.left) left = rect.left;
    toolbar.style.top = top + 'px';
    toolbar.style.left = left + 'px';
  }

  function positionPanel(panel, toolbar) {
    var tRect = toolbar.getBoundingClientRect();
    var panelW = 320;
    var top = tRect.top;
    var left = tRect.left - panelW - 8;
    if (left < 8) left = tRect.right + 8;
    var panelH = Math.min(460, window.innerHeight - 16);
    top = Math.max(8, Math.min(top, window.innerHeight - panelH - 8));
    panel.style.top = top + 'px';
    panel.style.left = left + 'px';
    panel.style.maxHeight = panelH + 'px';
  }

  function updatePositions() {
    var toolbar = document.getElementById('veToolbar');
    if (!toolbar.classList.contains('visible')) return;
    var chartId = VE.activeId || VE.hoveredCardId;
    if (!chartId) return;
    var visual = VE.registry.find(function(v) { return v.id === chartId; });
    if (!visual) return;
    var card = visual.canvas.closest('.glass-panel');
    if (!card) return;
    positionToolbar(toolbar, card);
    var panel = document.getElementById('vePanel');
    if (panel.classList.contains('visible')) positionPanel(panel, toolbar);
  }

  function resizeAllCharts() {
    VE.registry.forEach(v => {
      if (v.canvas && v.canvas.parentElement) {
        v.canvas._hasChartEvents = false;
        v.canvas._chartHit = null;
        animateChartFromPlan(v.canvas, v.chartRef, 0);
      }
    });
  }

  // ── Populate section controls ────────────────────────────────────────────
  function populateSection(sectionKey, visual) {
    var s = visual.settings;
    var chart = visual.chartRef;
    var curType = chart._userType || chart.type;
    var curColor = chart._userColor || chart.color || 'cyan';
    switch (sectionKey) {
      case 'export': {
        var body = document.getElementById('vePanelBody');
        if (body) body.querySelectorAll('.ve-export-fmt').forEach(function(el) { el.classList.toggle('active', el.dataset.fmt === VE.exportFmt); });
        break;
      }
      case 'colors': {
        var swatchContainer = document.getElementById('veColorSwatches');
        var paletteGroups = [
          { label: 'Core', colors: [
            { name:'cyan', hex:'#00e5ff' }, { name:'violet', hex:'#b388ff' },
            { name:'emerald', hex:'#69f0ae' }, { name:'amber', hex:'#ffd740' },
            { name:'rose', hex:'#ff6b9d' }
          ]},
          { label: 'Blues', colors: [
            { name:'sky', hex:'#38bdf8' }, { name:'blue', hex:'#60a5fa' },
            { name:'indigo', hex:'#818cf8' }, { name:'navy', hex:'#6366f1' },
            { name:'slate', hex:'#94a3b8' }
          ]},
          { label: 'Warm', colors: [
            { name:'red', hex:'#f87171' }, { name:'orange', hex:'#fb923c' },
            { name:'gold', hex:'#facc15' }, { name:'lime', hex:'#a3e635' },
            { name:'coral', hex:'#ff7f7f' }
          ]},
          { label: 'Nature', colors: [
            { name:'teal', hex:'#2dd4bf' }, { name:'mint', hex:'#6ee7b7' },
            { name:'forest', hex:'#22c55e' }, { name:'lavender', hex:'#c4b5fd' },
            { name:'blush', hex:'#fda4af' }
          ]}
        ];
        var swatchHtml = '';
        paletteGroups.forEach(function(g) {
          swatchHtml += '<div class="ve-palette-label">' + g.label + '</div>';
          g.colors.forEach(function(c) {
            var isActive = c.name === curColor || (curColor && curColor.startsWith('#') && c.hex.toLowerCase() === curColor.toLowerCase());
            swatchHtml += '<div class="ve-swatch' + (isActive ? ' active' : '') + '" data-color="' + c.name + '" data-hex="' + c.hex + '" style="background:' + c.hex + '" title="' + c.name + '"></div>';
          });
        });
        if (swatchContainer) swatchContainer.innerHTML = swatchHtml;
        var allSwatches = paletteGroups.flatMap(function(g) { return g.colors; });
        var curSwatch = allSwatches.find(function(c) { return c.name === curColor; });
        var picker = document.getElementById('veCustomColorPicker');
        if (picker) picker.value = curSwatch ? curSwatch.hex : (curColor && curColor.startsWith('#') ? curColor : '#00e5ff');
        var lpWrap = document.getElementById('veLinePaletteWrap');
        var isSeries = chart.series && chart.series.length > 0 && curType === 'line';
        var isBar = curType === 'bar';
        var isDonut = curType === 'donut';
        var showPalette = isSeries || isBar || isDonut;
        if (lpWrap) lpWrap.style.display = showPalette ? '' : 'none';
        if (showPalette) {
          var curPalette = isSeries ? (chart._palette || 'GenBI') : (chart._barPalette || '');
          var labelEl = document.getElementById('vePaletteLabel');
          if (labelEl) labelEl.textContent = isDonut ? 'Segment Palette' : isBar ? 'Bar Palette (per-bar colors)' : 'Series Palette';
          var lpHtml = '';
          if (isBar || isDonut) {
            lpHtml += '<div class="ve-lp-row' + (!curPalette ? ' active' : '') + '" data-palette="">' +
              '<span class="ve-lp-name">' + (isDonut ? 'Default' : 'Single') + '</span>' +
              '<div class="ve-lp-band"><span style="background:' + getColorHex(curColor) + '"></span></div></div>';
          }
          Object.entries(linePalettes).forEach(function(entry) {
            var name = entry[0], colors = entry[1];
            lpHtml += '<div class="ve-lp-row' + (name === curPalette ? ' active' : '') + '" data-palette="' + name + '">' +
              '<span class="ve-lp-name">' + name + '</span>' +
              '<div class="ve-lp-band">' + colors.slice(0, 6).map(function(c) { return '<span style="background:' + c + '"></span>'; }).join('') + '</div></div>';
          });
          var lpEl = document.getElementById('veLinePalettes');
          if (lpEl) lpEl.innerHTML = lpHtml;
        }
        break;
      }
      case 'fonts': {
        var ff = document.getElementById('veFontFamily');
        if (ff) ff.value = s.fontFamily || 'Inter';
        var ts = document.getElementById('veTitleSize');
        var tsv = document.getElementById('veTitleSizeVal');
        if (ts) ts.value = s.titleSize || 16;
        if (tsv) tsv.textContent = s.titleSize || 16;
        var ls = document.getElementById('veLabelSize');
        var lsv = document.getElementById('veLabelSizeVal');
        if (ls) ls.value = s.labelSize || 11;
        if (lsv) lsv.textContent = s.labelSize || 11;
        setPillGroup('veFontWeight', s.fontWeight || '500');
        break;
      }
      case 'layout': {
        setPillGroup('veChartType', curType);
        setPillGroup('veLayoutDensity', s.density || 'balanced');
        break;
      }
      case 'branding': {
        var bt = document.getElementById('veBrandingToggle');
        if (bt) bt.checked = s.branding || false;
        break;
      }
      case 'aspect': {
        setPillGroup('veAspectRatio', s.aspectRatio || 'auto');
        break;
      }
      case 'sync': {
        var st = document.getElementById('veSyncToggle');
        if (st) st.checked = s.syncTitle !== false;
        var ci = document.getElementById('veCaptionInput');
        if (ci) ci.value = s.caption || '';
        break;
      }
      case 'info': {
        var datasetName = App.excelData && App.excelData.fileName ? App.excelData.fileName : 'N/A';
        var cols = [chart.xLabel, chart.yLabel].filter(Boolean).join(', ') || 'N/A';
        var updated = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        var infoEl = document.getElementById('veInfoTable');
        if (infoEl) infoEl.innerHTML =
          '<div class="ve-info-row"><span class="ve-info-key">Dataset</span><span class="ve-info-val">' + datasetName + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Chart Type</span><span class="ve-info-val">' + curType.charAt(0).toUpperCase() + curType.slice(1) + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Columns</span><span class="ve-info-val">' + cols + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Data Points</span><span class="ve-info-val">' + (chart.data ? chart.data.length : 0) + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Last Updated</span><span class="ve-info-val">' + updated + '</span></div>';
        break;
      }
    }
  }

  function setPillGroup(containerId, activeVal) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('.ve-pill').forEach(p => p.classList.toggle('active', p.dataset.val === activeVal));
  }

  // ── Apply settings to a chart ─────────────────────────────────────────
  function applySettingsToChart(visual) {
    const s = visual.settings;
    const chart = visual.chartRef;
    const card = visual.canvas.closest('.glass-panel');

    // Chart type
    if (s.chartType && s.chartType !== (chart._userType || chart.type)) {
      chart._userType = s.chartType;
    }

    // Color
    if (s.color && s.color !== chart.color) {
      chart.color = s.color;
      chart._userColor = s.color;
    }

    // Bar palette
    if (s.barPalette && linePalettes[s.barPalette]) {
      chart._barPalette = s.barPalette;
    }

    // Line series palette
    if (s.linePalette && linePalettes[s.linePalette] && chart.series) {
      chart._palette = s.linePalette;
      const colors = linePalettes[s.linePalette];
      chart.series.forEach((ser, i) => { ser.color = colors[i % colors.length]; });
    }

    // Sync legend dots with current series colors
    if (chart.series && card) {
      const legendDots = card.querySelectorAll('.legend-dot');
      chart.series.forEach((ser, i) => { if (legendDots[i]) legendDots[i].style.background = getColorHex(ser.color); });
    }

    // Ensure chart container keeps fixed height
    const container = visual.canvas.closest('.chart-container');
    if (container) {
      container.style.aspectRatio = '';
      container.style.height = '280px';
    }

    // Layout density — adjust container padding
    if (card) {
      card.style.padding = s.density === 'compact' ? '16px' : s.density === 'spacious' ? '36px' : '';
    }

    // Font settings on title
    if (card) {
      const titleEl = card.querySelector('.panel-title');
      if (titleEl) {
        titleEl.style.fontFamily = (s.fontFamily || 'Inter') + ', system-ui, sans-serif';
        titleEl.style.fontSize = (s.titleSize || 16) + 'px';
        titleEl.style.fontWeight = s.fontWeight || '500';
      }
    }

    // Branding
    if (card) {
      let brandEl = card.querySelector('.ve-brand-footer');
      if (s.branding) {
        if (!brandEl) {
          brandEl = document.createElement('div');
          brandEl.className = 've-brand-footer';
          brandEl.style.cssText = 'text-align:right;font-size:10px;color:var(--text-tertiary);opacity:0.5;margin-top:8px;font-family:Inter,sans-serif;position:relative;z-index:1;';
          brandEl.textContent = 'GenBI';
          card.appendChild(brandEl);
        }
      } else if (brandEl) {
        brandEl.remove();
      }
    }

    // Caption
    if (s.caption && card) {
      let capEl = card.querySelector('.ve-caption');
      if (!capEl) {
        capEl = document.createElement('div');
        capEl.className = 've-caption';
        capEl.style.cssText = 'font-size:12px;color:var(--text-tertiary);margin-top:8px;line-height:1.4;position:relative;z-index:1;';
        const container2 = card.querySelector('.chart-container');
        if (container2) container2.insertAdjacentElement('afterend', capEl);
      }
      capEl.textContent = s.caption;
    } else if (card) {
      const capEl = card.querySelector('.ve-caption');
      if (capEl) capEl.remove();
    }
  }

  function getSelectedVisual() {
    var id = VE.activeId || VE.hoveredCardId;
    return VE.registry.find(function(v) { return v.id === id; });
  }

  function updateAndRedraw(settingKey, value) {
    const visual = getSelectedVisual();
    if (!visual) return;
    visual.settings[settingKey] = value;
    saveSettings(visual.id, visual.settings);
    applySettingsToChart(visual);
    // Redraw canvas
    const chart = visual.chartRef;
    visual.canvas._hasChartEvents = false;
    visual.canvas._chartHit = null;
    animateChartFromPlan(visual.canvas, chart, 0);
  }

  // ── Bind section listeners (attached to freshly cloned template) ──────
  function bindSectionListeners(sectionKey) {
    switch (sectionKey) {
      case 'export': {
        document.querySelectorAll('#vePanelBody .ve-export-fmt').forEach(function(el) {
          el.addEventListener('click', function() {
            document.querySelectorAll('#vePanelBody .ve-export-fmt').forEach(function(f) { f.classList.remove('active'); });
            this.classList.add('active');
            VE.exportFmt = this.dataset.fmt;
          });
        });
        var btn = document.getElementById('veExportBtn');
        if (btn) btn.addEventListener('click', handleExport);
        break;
      }
      case 'colors': {
        var sc = document.getElementById('veColorSwatches');
        if (sc) sc.addEventListener('click', function(e) {
          var swatch = e.target.closest('.ve-swatch');
          if (!swatch) return;
          var visual = getSelectedVisual();
          if (!visual) return;
          var color = swatch.dataset.color;
          this.querySelectorAll('.ve-swatch').forEach(function(s) { s.classList.remove('active'); });
          swatch.classList.add('active');
          visual.chartRef.color = color;
          visual.chartRef._userColor = color;
          var headerSelect = visual.canvas.closest('.glass-panel');
          headerSelect = headerSelect ? headerSelect.querySelector('select[onchange*="ChartColor"]') : null;
          if (headerSelect) headerSelect.value = color;
          updateAndRedraw('color', color);
          var hex = swatch.dataset.hex || '#00e5ff';
          var picker = document.getElementById('veCustomColorPicker');
          if (picker) picker.value = hex;
        });
        var cp = document.getElementById('veCustomColorPicker');
        if (cp) cp.addEventListener('input', function(e) {
          var visual = getSelectedVisual();
          if (!visual) return;
          var hex = e.target.value;
          colorRgba['_custom'] = hexToRgb(hex);
          document.querySelectorAll('#veColorSwatches .ve-swatch').forEach(function(s) { s.classList.remove('active'); });
          visual.chartRef.color = hex;
          visual.chartRef._userColor = hex;
          updateAndRedraw('color', hex);
        });
        var lp = document.getElementById('veLinePalettes');
        if (lp) lp.addEventListener('click', function(e) {
          var row = e.target.closest('.ve-lp-row');
          if (!row) return;
          var visual = getSelectedVisual();
          if (!visual) return;
          var chart = visual.chartRef;
          var curType = chart._userType || chart.type;
          var paletteName = row.dataset.palette;
          if (curType === 'bar' || curType === 'donut') {
            if (paletteName === '') {
              delete chart._barPalette;
              visual.settings.barPalette = null;
            } else {
              var colors = linePalettes[paletteName];
              if (!colors) return;
              chart._barPalette = paletteName;
              visual.settings.barPalette = paletteName;
            }
            this.querySelectorAll('.ve-lp-row').forEach(function(r) { r.classList.remove('active'); });
            row.classList.add('active');
            if (curType === 'donut') {
              var card = visual.canvas.closest('.glass-panel');
              if (card && paletteName && linePalettes[paletteName]) {
                var legendDots = card.querySelectorAll('.legend-dot');
                linePalettes[paletteName].forEach(function(c, i) { if (legendDots[i]) legendDots[i].style.background = c; });
              }
            }
            visual.canvas._hasChartEvents = false;
            visual.canvas._chartHit = null;
            animateChartFromPlan(visual.canvas, chart, 0);
            saveSettings(visual.id, visual.settings);
          } else if (chart.series && chart.series.length > 0) {
            var colors2 = linePalettes[paletteName];
            if (!colors2) return;
            chart._palette = paletteName;
            visual.settings.linePalette = paletteName;
            chart.series.forEach(function(s, i) { s.color = colors2[i % colors2.length]; });
            this.querySelectorAll('.ve-lp-row').forEach(function(r) { r.classList.remove('active'); });
            row.classList.add('active');
            var card2 = visual.canvas.closest('.glass-panel');
            if (card2) {
              var legendDots2 = card2.querySelectorAll('.legend-dot');
              chart.series.forEach(function(s, i) { if (legendDots2[i]) legendDots2[i].style.background = s.color; });
            }
            visual.canvas._hasChartEvents = false;
            visual.canvas._chartHit = null;
            animateChartFromPlan(visual.canvas, chart, 0);
            saveSettings(visual.id, visual.settings);
          }
        });
        break;
      }
      case 'fonts': {
        var ff = document.getElementById('veFontFamily');
        if (ff) ff.addEventListener('change', function() { updateAndRedraw('fontFamily', this.value); });
        var ts = document.getElementById('veTitleSize');
        if (ts) ts.addEventListener('input', function() {
          document.getElementById('veTitleSizeVal').textContent = this.value;
          updateAndRedraw('titleSize', parseInt(this.value));
        });
        var ls = document.getElementById('veLabelSize');
        if (ls) ls.addEventListener('input', function() {
          document.getElementById('veLabelSizeVal').textContent = this.value;
          updateAndRedraw('labelSize', parseInt(this.value));
        });
        var fw = document.getElementById('veFontWeight');
        if (fw) fw.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          updateAndRedraw('fontWeight', pill.dataset.val);
        });
        break;
      }
      case 'layout': {
        var ct = document.getElementById('veChartType');
        if (ct) ct.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          var visual = getSelectedVisual();
          if (!visual) return;
          var newType = pill.dataset.val;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          visual.chartRef._userType = newType;
          var headerSelect = visual.canvas.closest('.glass-panel');
          headerSelect = headerSelect ? headerSelect.querySelector('select[onchange*="ChartType"]') : null;
          if (headerSelect) headerSelect.value = newType;
          updateAndRedraw('chartType', newType);
        });
        var ld = document.getElementById('veLayoutDensity');
        if (ld) ld.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          updateAndRedraw('density', pill.dataset.val);
        });
        break;
      }
      case 'branding': {
        var bt = document.getElementById('veBrandingToggle');
        if (bt) bt.addEventListener('change', function() { updateAndRedraw('branding', this.checked); });
        break;
      }
      case 'aspect': {
        var ar = document.getElementById('veAspectRatio');
        if (ar) ar.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          updateAndRedraw('aspectRatio', pill.dataset.val);
          var visual = getSelectedVisual();
          if (visual) setTimeout(function() {
            visual.canvas._hasChartEvents = false;
            visual.canvas._chartHit = null;
            animateChartFromPlan(visual.canvas, visual.chartRef, 0);
          }, 50);
        });
        break;
      }
      case 'sync': {
        var st = document.getElementById('veSyncToggle');
        if (st) st.addEventListener('change', function() { updateAndRedraw('syncTitle', this.checked); });
        var ci = document.getElementById('veCaptionInput');
        if (ci) ci.addEventListener('input', function() { updateAndRedraw('caption', this.value); });
        break;
      }
    }
  }

  // ── Export handler ────────────────────────────────────────────────────
  function handleExport() {
    var visual = getSelectedVisual();
    if (!visual || !visual.canvas) { toast('No chart selected', 'error'); return; }
    var canvas = visual.canvas;
    var titleText = visual.title || 'Chart';
    var safeTitle = titleText.replace(/[^a-zA-Z0-9]/g, '_');
    var ts = new Date().toISOString().slice(0,10);
    var filename = safeTitle + '_' + ts;
    var dpr = window.devicePixelRatio || 1;
    var isLight = document.body.classList.contains('theme-light');
    var bgColor = isLight ? '#ffffff' : '#0a0a0f';
    var textColor = isLight ? '#1a1a2e' : '#f0f0f5';
    var subtextColor = isLight ? '#888' : 'rgba(255,255,255,0.35)';

    // Layout: padding around chart + title area on top
    var pad = Math.round(32 * dpr);
    var titleH = Math.round(48 * dpr);
    var brandH = Math.round(28 * dpr);
    var chartW = canvas.width;
    var chartH = canvas.height;
    var exportW = chartW + pad * 2;
    var exportH = titleH + chartH + brandH + pad;

    var exportCanvas = document.createElement('canvas');
    exportCanvas.width = exportW;
    exportCanvas.height = exportH;
    var ectx = exportCanvas.getContext('2d');

    // Background
    ectx.fillStyle = bgColor;
    ectx.fillRect(0, 0, exportW, exportH);

    // Title
    ectx.fillStyle = textColor;
    ectx.font = 'bold ' + Math.round(18 * dpr) + 'px Inter, system-ui, sans-serif';
    ectx.textAlign = 'left';
    ectx.textBaseline = 'middle';
    ectx.fillText(titleText, pad, titleH / 2 + Math.round(4 * dpr));

    // Chart
    ectx.drawImage(canvas, pad, titleH, chartW, chartH);

    // Branding footer
    if (visual.settings.branding) {
      ectx.fillStyle = subtextColor;
      ectx.font = Math.round(11 * dpr) + 'px Inter, system-ui, sans-serif';
      ectx.textAlign = 'right';
      ectx.textBaseline = 'middle';
      ectx.fillText('GenBI', exportW - pad, titleH + chartH + brandH / 2);
    }

    if (VE.exportFmt === 'svg') {
      var logW = Math.round(exportW / dpr);
      var logH = Math.round(exportH / dpr);
      var dataUrl = exportCanvas.toDataURL('image/png');
      var svgStr = '<svg xmlns="http://www.w3.org/2000/svg" width="'+logW+'" height="'+logH+'" viewBox="0 0 '+logW+' '+logH+'"><image href="'+dataUrl+'" width="'+logW+'" height="'+logH+'"/></svg>';
      var blob = new Blob([svgStr], { type: 'image/svg+xml' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = filename + '.svg'; a.click();
      URL.revokeObjectURL(url);
    } else {
      var mime = VE.exportFmt === 'jpg' ? 'image/jpeg' : 'image/png';
      var ext = VE.exportFmt === 'jpg' ? '.jpg' : '.png';
      exportCanvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = filename + ext; a.click();
        URL.revokeObjectURL(url);
      }, mime, 0.95);
    }
    toast('Exported ' + filename, 'success');
  }

  // ── Global event listeners ────────────────────────────────────────────

  // Toolbar hover management
  document.getElementById('veToolbar').addEventListener('mouseenter', function() {
    cancelHideToolbar();
    VE._panelHovered = true;
  });
  document.getElementById('veToolbar').addEventListener('mouseleave', function() {
    VE._panelHovered = false;
    hideToolbar();
  });

  // Panel hover management
  document.getElementById('vePanel').addEventListener('mouseenter', function() {
    cancelHideToolbar();
    VE._panelHovered = true;
  });
  document.getElementById('vePanel').addEventListener('mouseleave', function() {
    VE._panelHovered = false;
    hideToolbar();
  });

  // Toolbar button clicks
  document.getElementById('veToolbar').addEventListener('click', function(e) {
    var btn = e.target.closest('.ve-toolbar-btn');
    if (!btn) return;
    showPanel(btn.dataset.section);
  });

  // Panel close button
  document.getElementById('vePanelClose').addEventListener('click', hidePanel);

  // Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (VE.activeId) { hidePanel(); return; }
      if (VE.hoveredCardId) hideToolbarImmediate();
    }
  });

  // Click outside
  document.addEventListener('mousedown', function(e) {
    if (!VE.activeId) return;
    if (e.target.closest('#veToolbar, #vePanel, .glass-panel')) return;
    hidePanel();
    hideToolbarImmediate();
  });

  // Scroll + resize repositioning (throttled with rAF)
  var _rafPending = false;
  function onScrollResize() {
    if (_rafPending) return;
    _rafPending = true;
    requestAnimationFrame(function() {
      _rafPending = false;
      updatePositions();
    });
  }
  window.addEventListener('scroll', onScrollResize, true);
  window.addEventListener('resize', onScrollResize);

  // ── Hook into navigation to register charts ───────────────────────────
  var _origNavigate = window.navigate;
  window.navigate = function(page) {
    hidePanel();
    hideToolbarImmediate();
    _origNavigate(page);
    if (page === 'analytics' || (document.body.classList.contains('app-mode') && page === 'dashboard')) {
      setTimeout(registerCharts, 600);
    }
  };

  // Also register on initial load if already on analytics
  setTimeout(function() {
    if (App.currentPage === 'analytics' || document.body.classList.contains('app-mode')) {
      registerCharts();
    }
  }, 800);

  // Expose for external use
  window.veRegisterCharts = registerCharts;
  window.veSelectVisual = function(id) {
    var visual = VE.registry.find(function(v) { return v.id === id; });
    if (!visual) return;
    var card = visual.canvas.closest('.glass-panel');
    if (!card) return;
    showToolbar(card, id);
    showPanel('export');
  };
  window.veCloseEditor = function() {
    hidePanel();
    hideToolbarImmediate();
  };

})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — GenBI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/auth.css">
</head>
<body>
<script>try{if(localStorage.getItem('genbi-theme')==='light')document.body.classList.add('theme-light');}catch(e){}</script>

<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <span class="auth-brand-name">GenBI</span>
  </div>

  <h1 class="auth-title">Choose a new password</h1>
  <p class="auth-subtitle">Enter a new password for your account.</p>

  <div class="auth-alert" id="alert"></div>

  <form id="resetForm">
    <div class="form-field">
      <label for="password">New password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-meter"><div class="strength-meter-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
    </div>

    <div class="form-field">
      <label for="confirmPassword">Confirm password</label>
      <div class="password-wrap">
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" required>
        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="auth-submit" id="submitBtn">
      <span class="btn-text">Reset password</span>
      <div class="spinner"></div>
    </button>
  </form>

  <p class="auth-footer">
    <a href="/login">Back to login</a>
  </p>
</div>

<script src="/static/auth.js"></script>
<script>
  initStrengthMeter('password', 'strengthFill', 'strengthText');

  // Extract token from URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showAlert('alert', 'Invalid reset link. No token provided.', 'error');
    document.getElementById('submitBtn').disabled = true;
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (password !== confirm) {
      showAlert('alert', 'Passwords do not match.', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    setLoading(btn, true);

    const { ok, data } = await authFetch('/api/auth/reset-password', {
      token: token,
      new_password: password,
    });

    setLoading(btn, false);

    if (ok) {
      showAlert('alert', data.message || 'Password reset successfully!', 'success');
      document.getElementById('resetForm').style.display = 'none';
      document.querySelector('.auth-footer').innerHTML = '<a href="/login">Log in with your new password</a>';
    } else {
      showAlert('alert', data.error || 'Reset failed.', 'error');
    }
  });
</script>
</body>
</html>

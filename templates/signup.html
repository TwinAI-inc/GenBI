<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — GenBI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/auth.css">
<meta name="google-client-id" content="1058293102896-e6l6t34gj9tnuf0ssq93cl35jc2hl5sa.apps.googleusercontent.com">
</head>
<body>

<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <span class="auth-brand-name">GenBI</span>
  </div>

  <h1 class="auth-title">Create your account</h1>
  <p class="auth-subtitle">Start analyzing your data with AI-powered charts.</p>

  <div class="auth-alert" id="alert"></div>

  <form id="signupForm" autocomplete="on">
    <div class="form-field">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Jane Doe" autocomplete="name" required>
    </div>

    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-meter"><div class="strength-meter-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
    </div>

    <button type="submit" class="auth-submit" id="submitBtn">
      <span class="btn-text">Create account</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="auth-divider">or</div>

  <button type="button" class="google-btn" id="googleBtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    <span>Continue with Google</span>
  </button>

  <p class="auth-footer">
    Already have an account? <a href="/login">Log in</a>
  </p>
</div>

<script src="/static/auth.js"></script>
<script>
  if (isLoggedIn()) window.location.href = '/dashboard';

  initStrengthMeter('password', 'strengthFill', 'strengthText');

  // Email + password signup
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');
    const btn = document.getElementById('submitBtn');
    setLoading(btn, true);

    const { ok, data } = await authFetch('/api/auth/signup', {
      name: document.getElementById('name').value.trim(),
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    });

    if (ok && data.token) {
      saveAuth(data.token, data.user);
      if (data.email_verification_required) {
        window.location.href = '/verify-email';
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      showAlert('alert', data.error || 'Sign up failed.', 'error');
      setLoading(btn, false);
    }
  });

  // Google OAuth button
  document.getElementById('googleBtn').addEventListener('click', () => {
    initGoogleOAuth();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — GenBI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/auth.css">
</head>
<body>
<script>try{if(localStorage.getItem('genbi-theme')==='light')document.body.classList.add('theme-light');}catch(e){}</script>

<img src="/public/images/wave-mesh.png" alt="" class="auth-wave">
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon">
      <svg width="24" height="24" viewBox="0 0 40 40" fill="none"><rect x="6" y="26" width="6" height="10" rx="1.5" fill="#06b6d4" opacity="0.3"/><rect x="14" y="20" width="6" height="16" rx="1.5" fill="#06b6d4" opacity="0.5"/><rect x="22" y="14" width="6" height="22" rx="1.5" fill="#06b6d4" opacity="0.7"/><rect x="30" y="6" width="6" height="30" rx="1.5" fill="#06b6d4"/></svg>
    </div>
    <span class="auth-brand-name">GenBI</span>
  </div>

  <h1 class="auth-title">Reset your password</h1>
  <p class="auth-subtitle">Enter your email and we'll send you a link to reset your password.</p>

  <div class="auth-alert" id="alert"></div>

  <form id="forgotForm">
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
    </div>

    <button type="submit" class="auth-submit" id="submitBtn">
      <span class="btn-text">Send reset link</span>
      <div class="spinner"></div>
    </button>
  </form>

  <p class="auth-footer">
    Remember your password? <a href="/login">Log in</a>
  </p>
</div>

<script src="/static/auth.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');
    const btn = document.getElementById('submitBtn');
    setLoading(btn, true);

    const { ok, data } = await authFetch('/api/auth/forgot-password', {
      email: document.getElementById('email').value.trim(),
    });

    setLoading(btn, false);
    showAlert('alert', data.message || 'If an account with that email exists, we sent a reset link.', 'success');
    document.getElementById('forgotForm').reset();
  });
</script>
</body>
</html>

      initAskChart(data.chart);

      if (data.chart.labels && data.chart.values && data.chart.labels.length > 0) {
        var askCustomChart = {
          type: data.chart.type === 'doughnut' || data.chart.type === 'pie' ? 'donut' : data.chart.type,
          title: question,
          labels: data.chart.labels,
          data: data.chart.values,
          color: 'cyan',
          desc: data.answer || ''
        };
        var isDup = App.customCharts.some(function(c) {
          return c.title === askCustomChart.title && c.type === askCustomChart.type;
        });
        if (!isDup) {
          App.customCharts.unshift(askCustomChart);
          navigate('analytics');
          setTimeout(function() { drawCustomCharts(); }, 200);
        }
      }
    }
  } catch(e) {
    if (e.message === 'NO_KEY') answerEl.innerHTML = aiNoAuthHTML();
    else answerEl.innerHTML = '<span style="color:var(--accent-rose);font-size:12px">' + friendlyAIError(e.message) + '</span>';

function initAskChart(chart) {
  // Save for pinning to dashboard
  App._lastAskChart = { type: chart.type || 'bar', title: chart.title || 'Ask AI Chart', labels: chart.labels, data: chart.values, color: 'cyan', desc: chart.answer || '' };
  var canvas = document.getElementById('askChartCanvas');
  if (!canvas || !chart.labels || !chart.values || chart.values.length === 0) return;
  var paletteNames = ['cyan','violet','emerald','amber','rose','sky','indigo','orange','teal','lime'];
  try {
    if (chart.type === 'bar') {
      animateBarChart(canvas, chart.labels, chart.values, 'cyan', {
        barColors: paletteNames.slice(0, chart.values.length)
      });

      animateDonutChart(canvas, chart.labels, chart.values, {
        paletteColors: paletteNames.slice(0, chart.values.length)
      });

      var clr = getColorRgb('cyan');
      drawChart(canvas, [{
        data: chart.values,
        stroke: 'rgba(' + clr + ',0.9)',
        lineWidth: 2.5,
        fillTop: 'rgba(' + clr + ',0.15)',
        fillBot: 'rgba(' + clr + ',0)',
        dotColor: 'rgba(' + clr + ',1)',

    }
  } catch(e) { console.warn('Ask chart render error:', e); }

function generateAskSuggestions() {
  const container = document.getElementById('askSuggestions');
  if (!container) return;
  const ec = App.excelChartConfig;
  if (!App.excelData || !ec) { container.innerHTML = ''; return; }

  // Filter out date/time/ID columns from metrics — only keep real measures
  const skipPattern = /\b(id|_id|date|month|year|week|day|time|timestamp|created|updated)\b/i;
  const metrics = (ec.metrics || []).filter(function(m) {
    if (skipPattern.test(m)) return false;
    var meta = ec.colMeta[m];
    if (meta && meta.isDate) return false;
    return true;
  });
  const cats = (ec.categoricals || []).filter(function(c) { return !skipPattern.test(c); });
  const questions = [];

  // Helper: make column names readable
  function pretty(col) { return col.replace(/_/g, ' '); }

  // 1. Top performer by category
  if (metrics.length > 0 && cats.length > 0) {
    questions.push('Which ' + pretty(cats[0]) + ' has the highest ' + pretty(metrics[0]) + ' and by how much?');
  }

  // 2. Summary stats with visualization
  if (metrics.length > 0) {
    questions.push('What are the total, average, min, and max of ' + pretty(metrics[0]) + '?');
  }

  // 3. Ranked breakdown
  if (cats.length > 0 && metrics.length > 0) {
    questions.push('Rank all ' + pretty(cats[0]) + ' categories by total ' + pretty(metrics[0]));
  }

  // 4. Cross-metric comparison
  if (metrics.length >= 2) {
    questions.push('Which records have the highest ' + pretty(metrics[0]) + ' relative to ' + pretty(metrics[1]) + '?');
  }

  // 5. Distribution
  if (cats.length > 0) {
    questions.push('What is the distribution of records across ' + pretty(cats[0]) + '?');
  }

  // 6. Actionable insight
  questions.push('What are the top 3 actionable insights from this dataset?');

  // Take up to 6 suggestions
  const shown = questions.slice(0, 6);
  const sparkle = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  container.innerHTML = shown.map(q => {
    const escaped = q.replace(/'/g, "&#39;").replace(/"/g, '&quot;');
    return '<button class="ask-chip" onclick="askSuggestion(this)" data-question="' + escaped + '">' + sparkle + ' ' + q + '</button>';
  }).join('');
}

async function handleForecast(chartIdx) {
  const btn = document.getElementById('forecastBtn' + chartIdx);
  if (btn) btn.textContent = 'Forecasting...';
  try {
    const data = await forecastChart(chartIdx);
    if (!data || !data.predicted) return;
    const ec = App.excelChartConfig;
    const chart = ec.chartPlan[chartIdx];
    if (!chart) return;
    // Extend chart labels and data with predictions
    const origLen = chart.labels ? chart.labels.length : 0;
    for (let p = 0; p < data.predicted.length; p++) {
      const label = 'Forecast ' + (p + 1);
      if (!chart.labels) chart.labels = [];
      chart.labels.push(label);
      if (chart.data) chart.data.push(data.predicted[p]);
      if (chart.series && chart.series[0]) chart.series[0].data.push(data.predicted[p]);
    }
    chart._forecastStartIdx = origLen;
    // Redraw chart
    const canvas = document.getElementById('analyticsChart' + chartIdx);
    if (canvas) animateChartFromPlan(canvas, chart, 0);
    const noteEl = document.getElementById('forecastNote' + chartIdx);
    if (noteEl) { noteEl.textContent = data.explanation || 'Forecast added'; noteEl.style.display = 'block'; }
    if (btn) btn.textContent = 'Forecasted';
  } catch(e) {
    if (btn) btn.textContent = 'Forecast';
    toast(friendlyAIError(e.message), 'error');
  }
}

function executeSuggestedAction(text, actionType) {
  const lower = text.toLowerCase();
  // Smart routing: detect intent from text regardless of action_type
  const isKI = lower.includes('influencer') || lower.includes('driver') || lower.includes('key factor') || lower.includes('npv') || lower.includes('what drives');
  const isDocs = lower.includes('quality') || lower.includes('document') || lower.includes('column desc');
  const isInsight = lower.includes('insight') && !lower.includes('chart');
  const isUpload = lower.includes('upload') || lower.includes('import');

  if (isKI) {
    navigate('influencers');
  } else if (isDocs) {
    navigate('documents');
  } else if (isInsight || actionType === 'insight') {
    loadBriefingCard();
    toast('Insights refreshed', 'info');
  } else if (isUpload || actionType === 'upload') {
    openPanel('upload');
  } else {
    // Default: send to Chart Assistant as a prompt
    openPanel('chartAssistant');
    setTimeout(() => {
      const input = document.getElementById('assistantInput');
      if (input) { input.value = text; sendAssistantMsg(); }
    }, 150);
  }
}

      navigate('analytics');
    } else {
      toast(data.answer || 'Could not extract filter', 'info');
    }
  } catch(e) {
    toast(friendlyAIError(e.message), 'error');
  }
}

async function loadAIUsage() {

function buildSmartExamples() {
  const ec = App.excelChartConfig;
  if (!ec || !ec.colMeta || Object.keys(ec.colMeta).length === 0) {
    return ['Revenue trends over time','Top categories by total','Compare metrics across groups','Distribution breakdown by type']
      .map(p => '<button class="assistant-prompt-chip" onclick="useExamplePrompt(this)">'+p+'</button>').join('');
  }

  // Filter to meaningful columns only — skip IDs, indexes, keys
  const skipPattern = /\b(id|key|code|index|row|number|no)\b/i;
  const metrics = (ec.metrics || []).filter(m => !skipPattern.test(m));
  const cats = (ec.categoricals || []).filter(c => {
    if (skipPattern.test(c)) return false;
    const meta = ec.colMeta[c];
    // Good categories: 2-15 unique values, not just single values
    return meta && meta.uniqueCount >= 2 && meta.uniqueCount <= 15;
  });
  const dates = Object.keys(ec.colMeta).filter(h => ec.colMeta[h].isDate);
  const fmt = s => s.replace(/_/g, ' ');

  // Rank metrics by business value — revenue/cost/profit first, scores/rates second
  const metricRank = m => {
    const l = m.toLowerCase();
    if (/revenue|sales|income|profit/.test(l)) return 0;
    if (/cost|expense|spend|price/.test(l)) return 1;
    if (/margin|roi|npv/.test(l)) return 2;
    if (/score|rate|percent|share/.test(l)) return 3;
    return 4;
  };
  metrics.sort((a, b) => metricRank(a) - metricRank(b));

  // Rank categories — prefer product/name/region/type over stage/status
  const catRank = c => {
    const l = c.toLowerCase();
    if (/product|name|brand/.test(l)) return 0;
    if (/region|area|country|location/.test(l)) return 1;
    if (/category|type|class|therapeutic/.test(l)) return 2;
    if (/stage|status|level|risk/.test(l)) return 3;
    return 4;
  };
  cats.sort((a, b) => catRank(a) - catRank(b));

  const prompts = [];
  const m1 = metrics[0]; // primary metric (e.g. Revenue)
  const m2 = metrics.length > 1 ? metrics[1] : null; // secondary metric (e.g. Cost)
  const c1 = cats[0]; // primary category (e.g. Product Name)
  const c2 = cats.length > 1 ? cats[1] : null; // secondary category
  const d1 = dates[0]; // primary date column

  // 1) Multi-line trend — most insightful: shows how each category performs over time
  if (d1 && m1 && c1) {
    prompts.push(fmt(m1) + ' trend by ' + fmt(c1));
  }

  // 2) Bar chart — rank categories by primary metric to see top/bottom performers
  if (c1 && m1) {
    prompts.push('Top ' + fmt(c1) + ' by total ' + fmt(m1));
  }

  // 3) Pie/donut — show market share or distribution by category
  if (c1 && m2) {
    prompts.push(fmt(m2) + ' share by ' + fmt(c1));
  } else if (c2 && m1) {
    prompts.push(fmt(m1) + ' breakdown by ' + fmt(c2));
  }

  // 4) Comparison — average of a score/rate metric by category for benchmarking
  if (m2 && c1) {
    const rateMetric = metrics.find(m => /score|rate|percent|margin|compliance|roi/i.test(m));
    if (rateMetric) {
      const cat = c2 || c1;
      prompts.push('Average ' + fmt(rateMetric) + ' by ' + fmt(cat));
    } else {
      prompts.push('Compare ' + fmt(m1) + ' vs ' + fmt(m2) + ' by ' + fmt(c1));
    }
  }

  // Ensure exactly 4 — fill with sensible fallbacks
  if (prompts.length < 4 && d1 && m1) prompts.push(fmt(m1) + ' trend over time');
  if (prompts.length < 4 && c2 && m1) prompts.push(fmt(m1) + ' by ' + fmt(c2));
  if (prompts.length < 4 && m2) prompts.push('Distribution of ' + fmt(m2));
  if (prompts.length < 4) prompts.push('Show me the key insights');

  return [...new Set(prompts)].slice(0, 4)
    .map(p => '<button class="assistant-prompt-chip" onclick="useExamplePrompt(this)">'+p+'</button>').join('');
}

function sendAssistantMsg() {
  const input = document.getElementById('assistantInput');
  const text = input?.value?.trim();
  if (!text) return;
  const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  App.assistantMessages.push({ role: 'user', text, time });
  const msgs = document.getElementById('assistantMessages');
  msgs.insertAdjacentHTML('beforeend', '<div class="chat-msg sent">' + text + '<div class="chat-msg-time">' + time + '</div></div>');
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;

  if (!App.excelData) {
    addAssistantReply('Please upload a dataset first (Excel or CSV) so I can create charts from your data.');
    return;
  }

  if (isLoggedIn()) {
    // AI-powered mode
    const ec = App.excelChartConfig;
    const sampleRows = App.excelData.rows.slice(0, 3);
    const token = _getAuthToken();

    // Check if this is a modify intent with a focused chart
    if (isModifyIntent(text) && App._focusedChart) {
      const fc = App._focusedChart;
      const focusedChart = getChartForAskAi(fc.source, fc.idx);
      if (!focusedChart) {
        addAssistantReply('The selected chart is no longer available. Please click the &#9889; menu on a chart first.');
        return;
      }
      addAssistantReply('<span style="color:var(--accent-amber)">Modifying chart...</span>', true);
      fetch('/api/chart-modify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          message: text,
          currentChart: {
            chartType: focusedChart._userType || focusedChart.type || 'bar',
            xCol: focusedChart.xCol || '',
            yCol: focusedChart.yCol || '',
            aggFn: focusedChart.aggFn || 'sum',
            color: focusedChart._userColor || focusedChart.color || 'cyan',
            title: focusedChart.title || '',
            groupCol: focusedChart.groupCol || null
          },
          columns: App.excelData.headers,
          sampleRows,
          colMeta: ec.colMeta || {}
        })
      })
      .then(r => r.json())
      .then(data => {
        removeThinkingMsg();
        if (data.error) { addAssistantReply(data.error); return; }
        const ok = applyChartModification(fc.source, fc.idx, data);
        if (ok) {
          addAssistantReply('&#10003; Updated <strong>' + (data.title || focusedChart.title) + '</strong>' + (data.explanation ? ': ' + data.explanation : ''));
        } else {
          addAssistantReply('Could not apply the modification. Try rephrasing your request.');
        }
      })
      .catch(err => {
        removeThinkingMsg();
        addAssistantReply('Connection error: ' + err.message);
      });
      return;
    }

    if (isModifyIntent(text) && !App._focusedChart) {
      addAssistantReply('Please click the &#9889; menu on a chart first to select it, then ask me to modify it.');
      return;
    }

    // Create new chart (existing behavior)
    addAssistantReply('<span style="color:var(--accent-amber)">Thinking...</span>', true);
    fetch('/api/chart-assist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        message: text,
        columns: App.excelData.headers,
        sampleRows,
        colMeta: ec.colMeta || {}
      })
    })
    .then(r => r.json())
    .then(data => {
      removeThinkingMsg();
      if (data.error) {
        addAssistantReply(data.error);
        return;
      }
      // Build chart from AI response
      const chart = buildChartFromAI(data);
      if (chart) {
        chart.desc = data.explanation || '';
        // Duplicate check: same type + xCol + yCol + aggFn
        const isDup = App.customCharts.some(c => c.type === chart.type && c.xCol === chart.xCol && c.yCol === chart.yCol && (c.aggFn || 'sum') === (chart.aggFn || 'sum'));
        if (isDup) {
          addAssistantReply('This chart already exists: <strong>' + data.title + '</strong>. Scroll up to see it on the Analytics page.');
          return;
        }
        App.customCharts.unshift(chart);
        addAssistantReply('Created ' + data.chartType + ' chart: <strong>' + data.title + '</strong>' + (data.explanation ? '<br><span style="font-size:11px;color:var(--text-tertiary)">' + data.explanation + '</span>' : ''));
        if (App.currentPage === 'analytics') {
          navigate('analytics');
          setTimeout(() => drawCustomCharts(), 200);
        }
      } else {
        addAssistantReply('Could not build the chart. Try rephrasing your request.');
      }
    })
    .catch(err => {
      removeThinkingMsg();
      addAssistantReply('Connection error: ' + err.message + '. Make sure the server is running.');
    });
  } else {
    // Fallback: keyword-based parsing
    setTimeout(() => {
      const result = parseChartRequest(text);
      if (result.error) {
        addAssistantReply(result.error);
      } else {
        const rc = result.chart;
        const isDup = App.customCharts.some(c => c.type === rc.type && c.xCol === rc.xCol && c.yCol === rc.yCol && (c.aggFn || 'sum') === (rc.aggFn || 'sum'));
        if (isDup) {
          addAssistantReply('This chart already exists: <strong>' + rc.title + '</strong>. Scroll up to see it on the Analytics page.');
          return;
        }
        App.customCharts.unshift(rc);
        addAssistantReply(result.message);
        if (App.currentPage === 'analytics') {
          navigate('analytics');
          setTimeout(() => drawCustomCharts(), 200);
        }
      }
    }, 400);
  }
}

function buildChartFromAI(aiResponse) {
  const rows = App.excelData.rows;
  const ec = App.excelChartConfig;
  const { chartType, xCol, yCol, aggFn, title, groupCol } = aiResponse;

  // Donut with single column (yCol is null)
  if (chartType === 'donut' && xCol && !yCol) {
    const counts = {};
    rows.forEach(r => { const v = String(r[xCol] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e[0]);
    const data = topN.map(e => e[1]);
    if (rest.length > 0) { labels.push('Other (' + rest.length + ')'); data.push(rest.reduce((s, e) => s + e[1], 0)); }
    return { type: 'donut', title, labels, data, color: 'multi' };
  }

  if (!xCol) return null;

  // Multi-series line chart when groupCol is present
  if (chartType === 'line' && groupCol && yCol) {
    const fn = aggFn || 'sum';
    const seriesColors = linePalettes['GenBI'];
    // Collect data grouped by groupCol and xCol
    const grouped = {}; // { groupVal: { xVal: [numbers] } }
    const groupTotals = {}; // { groupVal: totalValue } for ranking
    rows.forEach(r => {
      const gv = String(r[groupCol] || '').trim();
      const xv = String(r[xCol] || '').trim();
      if (!gv || !xv) return;
      if (!grouped[gv]) grouped[gv] = {};
      if (!grouped[gv][xv]) grouped[gv][xv] = [];
      grouped[gv][xv].push(parseFloat(r[yCol]) || 0);
      groupTotals[gv] = (groupTotals[gv] || 0) + (parseFloat(r[yCol]) || 0);
    });
    // Top 6 groups by total value
    const topGroups = Object.entries(groupTotals)
      .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
      .slice(0, 6)
      .map(e => e[0]);
    // Collect all unique x-labels (union across groups), sorted chronologically
    const allLabelsSet = new Set();
    topGroups.forEach(g => { if (grouped[g]) Object.keys(grouped[g]).forEach(x => allLabelsSet.add(x)); });
    const _datePat = ec.colMeta[xCol] && ec.colMeta[xCol].datePattern;
    const allLabels = Array.from(allLabelsSet).sort((a, b) => {
      if (_datePat) { const da = parseDateValue(a, _datePat), db = parseDateValue(b, _datePat); if (da && db) return da - db; }
      return a.localeCompare(b);
    });
    // Build series
    const series = topGroups.map((g, i) => {
      const data = allLabels.map(x => {
        const vals = (grouped[g] && grouped[g][x]) || [];
        if (vals.length === 0) return 0;
        if (fn === 'count') return vals.length;
        if (fn === 'avg') return vals.reduce((a, b) => a + b, 0) / vals.length;
        if (fn === 'max') return Math.max(...vals);
        return vals.reduce((a, b) => a + b, 0); // sum
      });
      return { name: g, data, color: seriesColors[i % seriesColors.length] };
    });
    return {
      type: 'line',
      title,
      labels: allLabels,
      series,
      data: null, // null signals multi-series mode
      color: 'cyan',
      suffix: '',
      xLabel: xCol.replace(/_/g, ' '),
      yLabel: yCol ? yCol.replace(/_/g, ' ') : 'Count'
    };
  }

  // Aggregate data (single series)
  const groups = {};
  rows.forEach(r => {
    const key = String(r[xCol] || '').trim();
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    if (yCol) groups[key].push(parseFloat(r[yCol]) || 0);
    else groups[key].push(1);
  });

  const fn = aggFn || 'sum';
  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k,
    value: fn === 'count' ? v.length : fn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length : fn === 'max' ? Math.max(...v) : v.reduce((a, b) => a + b, 0)
  }));

  const isDateAxis = ec.colMeta[xCol]?.isDate;
  if (isDateAxis || chartType === 'line') {
    const _dp = ec.colMeta[xCol]?.datePattern;
    entries.sort((a, b) => {
      if (_dp) { const da = parseDateValue(a.label, _dp), db = parseDateValue(b.label, _dp); if (da && db) return da - db; }
      return a.label.localeCompare(b.label);
    });
  } else {
    entries.sort((a, b) => b.value - a.value);
    entries = entries.slice(0, 15);
  }

  if (chartType === 'donut') {
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e.label);
    const data = topN.map(e => e.value);
    if (rest.length > 0) { labels.push('Other'); data.push(rest.reduce((s, e) => s + e.value, 0)); }
    return { type: 'donut', title, labels, data, color: 'multi' };
  }

  const colorNames = ['cyan', 'violet', 'emerald', 'amber', 'rose'];
  return {
    type: chartType || 'bar',
    title,
    labels: entries.map(e => e.label),
    data: entries.map(e => e.value),
    color: colorNames[App.customCharts.length % colorNames.length],
    suffix: '',
    xLabel: xCol.replace(/_/g, ' '),
    yLabel: yCol ? yCol.replace(/_/g, ' ') : 'Count'
  };
}

function _filterChartLabels(labels, data, series, fromVal, toVal) {
  // Find start/end indices by substring match against the existing (correctly ordered) labels
  if (!labels || labels.length === 0) return null;
  var startIdx = -1, endIdx = -1;
  for (var i = 0; i < labels.length; i++) {
    var lbl = String(labels[i]).toLowerCase();
    if (startIdx === -1 && fromVal && lbl.indexOf(fromVal) !== -1) startIdx = i;
    if (toVal && lbl.indexOf(toVal) !== -1) endIdx = i;
  }
  // Fallback: if exact substring not found, try prefix match
  if (startIdx === -1 && fromVal) {
    for (var j = 0; j < labels.length; j++) {
      if (String(labels[j]).toLowerCase() >= fromVal) { startIdx = j; break; }
    }
  }
  if (endIdx === -1 && toVal) {
    for (var k = labels.length - 1; k >= 0; k--) {
      if (String(labels[k]).toLowerCase() <= toVal + '\uffff') { endIdx = k; break; }
    }
  }
  if (startIdx === -1) startIdx = 0;
  if (endIdx === -1) endIdx = labels.length - 1;
  if (startIdx > endIdx) return null;

  var result = { labels: labels.slice(startIdx, endIdx + 1) };
  if (data) result.data = data.slice(startIdx, endIdx + 1);
  if (series) {
    result.series = series.map(function(s) {
      return Object.assign({}, s, { data: s.data.slice(startIdx, endIdx + 1) });
    });
  }
  return result;
}

function applyChartModification(source, idx, aiResponse) {
  var chart, canvasId;
  if (source === 'analytics') {
    chart = App.excelChartConfig.chartPlan[idx];
    canvasId = 'analyticsChart' + idx;
  } else {
    chart = (App.customCharts || [])[idx];
    canvasId = 'customChart' + idx;
  }
  if (!chart) return false;

  // Save original data so we can filter from the full dataset (not a previously filtered subset)
  if (!chart._origLabels && chart.labels) chart._origLabels = chart.labels.slice();
  if (!chart._origData && chart.data) chart._origData = chart.data.slice();
  if (!chart._origSeries && chart.series) chart._origSeries = JSON.parse(JSON.stringify(chart.series));

  // Check if structural change (xCol/yCol/aggFn changed) — need to rebuild data
  var structuralChange = (aiResponse.xCol && aiResponse.xCol !== chart.xCol)
    || (aiResponse.yCol && aiResponse.yCol !== chart.yCol)
    || (aiResponse.aggFn && aiResponse.aggFn !== (chart.aggFn || 'sum'));

  if (structuralChange) {
    var rebuilt = buildChartFromAI(aiResponse);
    if (!rebuilt) return false;
    Object.keys(rebuilt).forEach(function(k) { chart[k] = rebuilt[k]; });
    // Save new originals after structural rebuild
    chart._origLabels = chart.labels ? chart.labels.slice() : null;
    chart._origData = chart.data ? chart.data.slice() : null;
    chart._origSeries = chart.series ? JSON.parse(JSON.stringify(chart.series)) : null;
    if (aiResponse.color && aiResponse.color !== 'multi') {
      chart.color = aiResponse.color;
      chart._userColor = aiResponse.color;
    }
    if (aiResponse.title) chart.title = aiResponse.title;
  } else {
    // Simple property changes (type, color, title)
    if (aiResponse.chartType) { chart.type = aiResponse.chartType; chart._userType = aiResponse.chartType; }
    if (aiResponse.color) { chart.color = aiResponse.color; chart._userColor = aiResponse.color; }
    if (aiResponse.title) chart.title = aiResponse.title;
  }

  // Apply filterRange on the ORIGINAL (full) data to avoid cumulative slicing
  if (aiResponse.filterRange) {
    var fr = aiResponse.filterRange;
    var fromVal = String(fr.from || '').toLowerCase();
    var toVal = String(fr.to || '').toLowerCase();
    if (fromVal || toVal) {
      var srcLabels = chart._origLabels || chart.labels;
      var srcData = chart._origData || chart.data;
      var srcSeries = chart._origSeries || chart.series;
      var filtered = _filterChartLabels(srcLabels, srcData, srcSeries, fromVal, toVal);
      if (filtered) {
        chart.labels = filtered.labels;
        if (filtered.data) chart.data = filtered.data;
        if (filtered.series) chart.series = filtered.series;
      }
    }
  }

  // Apply sort only for non-time-series charts (don't scramble chronological order)
  if (aiResponse.sort && chart.labels && chart.data && !chart.series) {
    var chartType = chart._userType || chart.type || 'bar';
    var isTimeSeries = chartType === 'line' || chartType === 'area';
    if (!isTimeSeries) {
      var sortDir = aiResponse.sort;
      var indices = chart.labels.map(function(_, i) { return i; });
      if (sortDir === 'asc') indices.sort(function(a, b) { return chart.data[a] - chart.data[b]; });
      else if (sortDir === 'desc') indices.sort(function(a, b) { return chart.data[b] - chart.data[a]; });
      chart.labels = indices.map(function(i) { return chart.labels[i]; });
      chart.data = indices.map(function(i) { return chart.data[i]; });
    }
  }

  // Re-render the chart
  var canvas = document.getElementById(canvasId);
  if (canvas) {
    canvas._hasChartEvents = false;
    canvas._chartHit = null;
    canvas._lockedW = null;
    canvas._lockedH = null;
    canvas._lastHover = -1;
    if (canvas._animFrame) { cancelAnimationFrame(canvas._animFrame); canvas._animFrame = null; }
    var tt = document.getElementById('chartTooltip');
    if (tt) tt.classList.remove('visible');
    animateChartFromPlan(canvas, chart, 0);
  }
  // Update the title in the DOM if present
  var card = canvas ? canvas.closest('.glass-panel') : null;
  if (card && aiResponse.title) {
    var titleEl = card.querySelector('.panel-title');
    if (titleEl) titleEl.textContent = aiResponse.title;
  }
  return true;
}

function parseChartRequest(text) {
  const headers = App.excelData.headers;
  const rows = App.excelData.rows;
  const lower = text.toLowerCase();

  // Detect chart type
  let chartType = 'bar';
  if (/\bline\b|trend|over time|timeline/i.test(text)) chartType = 'line';
  else if (/\bdonut\b|\bpie\b|breakdown|distribution|share|split/i.test(text)) chartType = 'donut';
  else if (/\bbar\b|compare|comparison|ranking|top/i.test(text)) chartType = 'bar';

  // Fuzzy column matching: score each header by word overlap with query
  function scoreCol(query, header) {
    const qWords = query.toLowerCase().replace(/[_\-]/g, ' ').split(/\s+/).filter(w => w.length > 1);
    const hWords = header.toLowerCase().replace(/[_\-]/g, ' ').split(/\s+/).filter(w => w.length > 1);
    if (qWords.length === 0 || hWords.length === 0) return 0;
    let matched = 0;
    for (const hw of hWords) {
      if (qWords.some(qw => qw.includes(hw) || hw.includes(qw))) matched++;
    }
    if (matched === 0) return 0;
    // Use the better of: query coverage or header coverage, weighted by match count
    return Math.max(matched / hWords.length, matched / qWords.length) * matched;
  }

  function findCol(txt) {
    let best = null, bestScore = 0;
    for (const h of headers) {
      const s = scoreCol(txt, h);
      if (s > bestScore) { best = h; bestScore = s; }
    }
    return bestScore >= 0.5 ? best : null;
  }

  // Try to figure out X (group-by / label) and Y (metric / value)
  const ec = App.excelChartConfig;
  let xCol = null, yCol = null, aggFn = 'sum';

  // Detect aggregation
  if (/\bavg\b|\baverage\b|\bmean\b/i.test(text)) aggFn = 'avg';
  else if (/\bmax\b|\bmaximum\b|\bhighest\b/i.test(text)) aggFn = 'max';
  else if (/\bcount\b|\bnumber of\b|\bhow many\b/i.test(text)) aggFn = 'count';
  else if (/\bsum\b|\btotal\b/i.test(text)) aggFn = 'sum';

  // Parse structure: "Y by/over/vs X"
  const byMatch = text.match(/(.+?)\s+(?:by|per|grouped?\s*by|for each)\s+(.+)/i);
  const vsMatch = text.match(/(.+?)\s+(?:vs\.?|versus|against|compared?\s*to)\s+(.+)/i);
  const overMatch = text.match(/(.+?)\s+(?:over)\s+(.+)/i);

  // Strip chart-type keywords from the extracted phrases
  function stripNoise(s) {
    return s.replace(/\b(bar|line|donut|pie|chart|graph|show|plot|create|make|of|the|a|an|me)\b/gi, '').trim();
  }

  if (byMatch) {
    const yPhrase = stripNoise(byMatch[1]);
    const xPhrase = stripNoise(byMatch[2]);
    yCol = findCol(yPhrase);
    xCol = findCol(xPhrase);
  } else if (vsMatch) {
    const p1 = stripNoise(vsMatch[1]);
    const p2 = stripNoise(vsMatch[2]);
    yCol = findCol(p1);
    xCol = findCol(p2);
  } else if (overMatch) {
    const yPhrase = stripNoise(overMatch[1]);
    const xPhrase = stripNoise(overMatch[2]);
    yCol = findCol(yPhrase);
    xCol = findCol(xPhrase);
  }

  // If structured parse didn't find both, try matching all columns from the full text
  if (!yCol || !xCol) {
    const allScored = headers.map(h => ({ col: h, score: scoreCol(stripNoise(text), h) }))
      .filter(s => s.score >= 0.5).sort((a, b) => b.score - a.score);
    const metricsFound = allScored.filter(s => ec.colMeta[s.col]?.isMetric);
    const catsFound = allScored.filter(s => ec.colMeta[s.col]?.isCategorical || ec.colMeta[s.col]?.isDate);
    const namesFound = allScored.filter(s => !ec.colMeta[s.col]?.isMetric && !ec.colMeta[s.col]?.isIndex);
    if (!yCol) yCol = metricsFound[0]?.col || null;
    if (!xCol) xCol = catsFound[0]?.col || namesFound[0]?.col || null;
    // Avoid xCol === yCol
    if (xCol === yCol && metricsFound.length > 1) xCol = catsFound[0]?.col || null;
    if (xCol === yCol) xCol = null;
  }

  // Donut only needs one column
  if (chartType === 'donut' && !yCol && xCol) {
    // Count distribution of xCol
    const counts = {};
    rows.forEach(r => { const v = String(r[xCol] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e[0]);
    const data = topN.map(e => e[1]);
    if (rest.length > 0) { labels.push('Other (' + rest.length + ')'); data.push(rest.reduce((s, e) => s + e[1], 0)); }
    const title = xCol.replace(/_/g, ' ') + ' Breakdown';
    return { chart: { type: 'donut', title, labels, data, color: 'multi' }, message: 'Created donut chart: <strong>' + title + '</strong>' };
  }

  if (chartType === 'donut' && yCol && xCol) {
    // Aggregate yCol by xCol and show as donut
    const groups = {};
    rows.forEach(r => { const k = String(r[xCol] || '').trim(); if (!k) return; if (!groups[k]) groups[k] = []; groups[k].push(parseFloat(r[yCol]) || 0); });
    const entries = Object.entries(groups).map(([k, v]) => [k, aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length : aggFn === 'max' ? Math.max(...v) : v.reduce((a, b) => a + b, 0)]).sort((a, b) => b[1] - a[1]);
    const topN = entries.slice(0, 8);
    const rest = entries.slice(8);
    const labels = topN.map(e => e[0]);
    const data = topN.map(e => e[1]);
    if (rest.length > 0) { labels.push('Other'); data.push(rest.reduce((s, e) => s + e[1], 0)); }
    const title = yCol.replace(/_/g, ' ') + ' by ' + xCol.replace(/_/g, ' ');
    return { chart: { type: 'donut', title, labels, data, color: 'multi' }, message: 'Created donut chart: <strong>' + title + '</strong>' };
  }

  if (!yCol && !xCol) {
    return { error: 'I couldn\'t find matching columns in your data. Try using exact column names like: <strong>' + headers.slice(0, 5).map(h => h.replace(/_/g, ' ')).join('</strong>, <strong>') + '</strong>...' };
  }

  if (!xCol && yCol) {
    // Single metric - try using first categorical or date as X
    xCol = ec.categoricals[0] || ec.dates[0] || null;
    if (!xCol) {
      return { error: 'I found the metric <strong>' + yCol.replace(/_/g, ' ') + '</strong> but need a category or date column to group by. Try: "' + yCol.replace(/_/g, ' ') + ' by [column name]"' };
    }
  }

  if (!yCol && xCol && ec.colMeta[xCol]?.isMetric) {
    // Both are metrics or X is actually a metric - swap logic
    yCol = xCol;
    xCol = ec.categoricals[0] || ec.dates[0];
  }

  if (!yCol) {
    aggFn = 'count';
    yCol = xCol;
  }

  // Build chart data by aggregating
  const isDateAxis = ec.colMeta[xCol]?.isDate;
  const groups = {};
  rows.forEach(r => {
    const key = String(r[xCol] || '').trim();
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    groups[key].push(parseFloat(r[yCol]) || 0);
  });

  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k,
    value: aggFn === 'count' ? v.length : aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length : aggFn === 'max' ? Math.max(...v) : v.reduce((a, b) => a + b, 0)
  }));

  if (isDateAxis || chartType === 'line') {
    const _dp = ec.colMeta[xCol]?.datePattern;
    entries.sort((a, b) => {
      if (_dp) { const da = parseDateValue(a.label, _dp), db = parseDateValue(b.label, _dp); if (da && db) return da - db; }
      return a.label.localeCompare(b.label);
    });
    chartType = chartType === 'donut' ? 'line' : chartType;
    if (chartType !== 'bar') chartType = 'line';
  } else {
    entries.sort((a, b) => b.value - a.value);
    entries = entries.slice(0, 15);
  }

  const aggLabel = aggFn === 'count' ? 'Count' : aggFn === 'avg' ? 'Avg' : aggFn === 'max' ? 'Max' : 'Total';
  const title = aggLabel + ' ' + yCol.replace(/_/g, ' ') + ' by ' + xCol.replace(/_/g, ' ');
  const colorNames = ['cyan', 'violet', 'emerald', 'amber', 'rose'];
  const chart = {
    type: chartType,
    title,
    labels: entries.map(e => e.label),
    data: entries.map(e => e.value),
    color: colorNames[App.customCharts.length % colorNames.length],
    suffix: '',
    xLabel: xCol.replace(/_/g, ' '),
    yLabel: (aggFn === 'count' ? 'Count' : yCol.replace(/_/g, ' '))
  };

  return { chart, message: 'Created ' + chartType + ' chart: <strong>' + title + '</strong>' };
}

// Bridge: bolt menu → VE panel
function veSelectChart(chartIdx) {
  App._focusedChart = { source: 'analytics', idx: chartIdx };
  const canvas = document.getElementById('analyticsChart' + chartIdx);
  if (!canvas) return;
  const card = canvas.closest('.glass-panel');
  if (!card) return;
  const ve = window._VE;
  // Always set _activeCard and _activeBolt so panel positions next to bolt menu
  if (ve) {
    ve._activeCard = card;
    ve._activeBolt = card.querySelector('.chart-actions-bolt');
  }
  if (ve && ve.registry) {
    const entry = ve.registry.find(v => v.canvas === canvas);
    if (entry) {
      ve.hoveredCardId = entry.id;
      ve.activeId = entry.id;
      card.classList.add('ve-active');
    }
  }
}

// Hover-triggered section open with debouncing to avoid accidental fires
window._veHoverTimer = null;
function veHoverAction(chartIdx, sectionKey) {
  if (window._veHoverTimer) clearTimeout(window._veHoverTimer);
  window._veHoverTimer = setTimeout(function() {
    veSelectChart(chartIdx);
    // Pin the bolt dropdown menu so it stays visible alongside the section panel
    var canvas = document.getElementById('analyticsChart' + chartIdx);
    if (canvas) {
      var card = canvas.closest('.glass-panel');
      var bolt = card ? card.querySelector('.chart-actions-bolt') : null;

      }
    }

  }, 180);
}

// Unpin the bolt menu when the section panel closes or mouse leaves the area
function veUnpinBoltMenu() {
  document.querySelectorAll('.chart-actions-bolt.menu-pinned').forEach(function(b) { b.classList.remove('menu-pinned'); });
}

// Called when leaving the bolt dropdown menu — clears hover timer and closes
// the section panel after a small delay if user didn't move into the panel
function veMenuLeave() {
  if (window._veHoverTimer) { clearTimeout(window._veHoverTimer); window._veHoverTimer = null; }
  setTimeout(function() {
    // If user is now hovering the section panel, keep everything open
    var panelEl = document.getElementById('vePanel');
    if (panelEl && panelEl.matches(':hover')) return;
    // Otherwise close the panel and unpin bolt menu
    if (panelEl) panelEl.classList.remove('visible');
    var ve = window._VE;
    if (ve) { ve.activeId = null; ve.activeSection = null; ve._activeCard = null; ve._activeBolt = null; }
    document.querySelectorAll('.ve-toolbar-btn.active').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.glass-panel.ve-active').forEach(function(el) { el.classList.remove('ve-active'); });
    veUnpinBoltMenu();
  }, 280);
}

function veShowSection(sectionKey) {
  // Open the VE panel for the given section directly
  var ve = window._VE;
  if (ve && typeof ve._showPanel === 'function') {
    ve._showPanel(sectionKey);
  } else {
    // Fallback: simulate toolbar button click
    const btn = document.querySelector('.ve-toolbar-btn[data-section="' + sectionKey + '"]');
    if (btn) btn.click();
  }
}

// ── Genre Regenerate: replace a chart slot with a new chart from a specific family ──
function regenerateByGenre(idx, genre) {
  const ec = App.excelChartConfig;
  if (!ec || !ec.chartPlan || idx < 0 || idx >= ec.chartPlan.length) return;
  if (!isLoggedIn() || !App.excelData) { toast('Sign in to use AI refresh', 'info'); return; }
  const chart = ec.chartPlan[idx];
  const canvas = document.getElementById('analyticsChart' + idx);
  const genreLabel = genre ? genre.replace(/_/g, ' ') : 'new';
  if (canvas) { canvas.parentElement.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;gap:8px"><div class="genbi-fill-bars genbi-fill-sm"><div class="gfb"></div><div class="gfb"></div><div class="gfb"></div><div class="gfb"></div></div><span style="font-size:11px;color:rgba(255,255,255,0.35)">Generating ' + genreLabel + ' chart...</span></div>'; }

  // Close bolt menu
  document.querySelectorAll('.chart-actions-bolt.menu-pinned').forEach(el => el.classList.remove('menu-pinned'));

  const genreHint = genre
    ? 'Generate a ' + genre.toUpperCase() + ' chart (family: ' + genre + '). Use chart types from this family: ' + ({
        comparison: 'bar, hbar',
        trend: 'line, multiline, area, stacked',
        composition: 'donut, treemap, funnel',
        relationship: 'scatter',
        distribution: 'gauge, boxplot, radar',
        geographic: 'usmap, worldmap'
      }[genre] || genre) + '.'
    : 'Suggest a completely different and surprising chart.';

  const token = _getAuthToken();
  fetch('/api/ask-data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({
      question: genreHint + ' Current chart: ' + chart.title + ' (' + chart.type + '). Give me something NEW with high insight value. Return an insight-driven title.',
      columns: App.excelData.headers,
      colMeta: Object.fromEntries(Object.entries(ec.colMeta).map(([k,v]) => [k, {isMetric:v.isMetric,isCategorical:v.isCategorical,isDate:v.isDate,uniqueCount:v.uniqueCount}])),
      sampleRows: App.excelData.rows.slice(0, 3),
      summary: { rowCount: App.excelData.rows.length }
    })
  }).then(r => r.json()).then(data => {
    if (data.chart) {
      ec.chartPlan[idx] = Object.assign(ec.chartPlan[idx], data.chart);
      navigate('analytics');
      toast((genre ? genre.charAt(0).toUpperCase() + genre.slice(1) : 'New') + ' chart generated', 'success');
    } else {
      navigate('analytics');
      toast('No alternative found — keeping current chart', 'info');
    }
  }).catch(() => { navigate('analytics'); toast('Regenerate failed', 'info'); });
}

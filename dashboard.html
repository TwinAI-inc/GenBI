  }
}

function handleDonutHover(e) {
  const canvas = e.currentTarget;
  const hit = canvas._chartHit;
  if (!hit || hit.type !== 'donut') return;
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const dx = mx - hit.cx, dy = my - hit.cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  let found = -1;
  if (dist >= hit.innerR && dist <= hit.outerR) {
    let angle = Math.atan2(dy, dx);
    if (angle < -Math.PI / 2) angle += Math.PI * 2;
    for (let i = 0; i < hit.segments.length; i++) {
      let sa = hit.segments[i].startAngle, ea = hit.segments[i].endAngle;
      if (angle >= sa && angle < ea) { found = i; break; }
    }
  }
  if (found !== canvas._lastHover) {
    canvas._lastHover = found;
    drawDonutChart(canvas, hit.labels, hit.data, { _highlightIdx: found });
    const tt = document.getElementById('chartTooltip');
    if (found >= 0) {
      const seg = hit.segments[found];
      const total = hit.data.reduce((a, b) => a + b, 0);
      const pct = total > 0 ? ((seg.value / total) * 100).toFixed(1) : '0';
      const fmtVal = seg.value.toLocaleString('en-US', { maximumFractionDigits: 2 });
      const rank = hit.data.filter(v => v > seg.value).length + 1;
      // Build rich tooltip with all other segments for context
      let othersHtml = '';
      hit.segments.forEach((s, si) => {
        const sPct = total > 0 ? ((s.value / total) * 100).toFixed(1) : '0';
        const isCur = si === found;
        othersHtml += '<div class="tt-row" style="opacity:' + (isCur ? '1' : '0.5') + '"><span class="tt-row-label"><span class="tt-dot" style="background:' + s.color.fill + '"></span>' + (s.label.length > 18 ? s.label.substring(0,17)+'..' : s.label) + '</span><span class="tt-row-value">' + sPct + '%</span></div>';
      });
      tt.innerHTML =
        '<div class="tt-header">Distribution</div>' +
        '<div class="tt-body">' +
        '<div style="font-size:14px;font-weight:600;margin-bottom:2px">' + seg.label + '</div>' +
        '<div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:8px">Rank #' + rank + ' of ' + hit.data.length + '</div>' +
        '<div class="tt-row"><span class="tt-row-label">Value</span><span class="tt-row-value">' + fmtVal + '</span></div>' +
        '<div class="tt-row"><span class="tt-row-label">Share</span><span class="tt-row-value">' + pct + '%</span></div>' +
        '<div class="tt-divider"></div>' +
        othersHtml +
        '</div>';
      // AI mini-chart: mini bars comparing all segments
      const miniItems = hit.segments.map((s, si) => ({
        label: s.label, value: s.value,
        color: s.color.rgb || '6,182,212',
        active: si === found

    }
  } else if (found >= 0) {
    const tt = document.getElementById('chartTooltip');
    _posTooltip(tt, e);
  }

function handleChartLeave(e) {
  const canvas = e.currentTarget;
  const hit = canvas._chartHit;
  if (!hit) return;
  canvas._lastHover = -1;
  canvas._lastHoverKey = null;
  document.getElementById('chartTooltip').classList.remove('visible');
  if (hit.type === 'bar') drawBarChart(canvas, hit.labels, hit.data, hit.colorName, hit.opts);
  else if (hit.type === 'hbar') drawHorizontalBarChart(canvas, hit.labels, hit.data, hit.colorName, hit.opts);
  else if (hit.type === 'stacked') drawStackedBarChart(canvas, hit.labels, hit.seriesData, hit.opts);
  else if (hit.type === 'donut') drawDonutChart(canvas, hit.labels, hit.data, {});
  else if (hit.type === 'multiline') {
    // Redraw clean (no crosshair)
    const chart = hit.chart;
    const datasets = chart.series.map(s => {
      const clr = getColorRgb(s.color);
      return { data: s.data, stroke: 'rgba('+clr+',0.9)', lineWidth: 2,
        fillTop: 'rgba('+clr+',0.06)', fillBot: 'rgba('+clr+',0)',
        dotColor: 'rgba('+clr+',1)', dotGlow: 'rgba('+clr+',0.15)' };
    });
    drawChart(canvas, datasets, chart.labels, { suffix: chart.suffix||'', xLabel: chart.xLabel||'', yLabel: chart.yLabel||'' });
  }
}

function handleMultiLineHover(e) {
  const canvas = e.currentTarget;
  const hit = canvas._chartHit;
  if (!hit || hit.type !== 'multiline') return;
  const chart = hit.chart;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const w = rect.width;
  const padL = 44, padR = 16;
  const cw = w - padL - padR;
  const nLabels = chart.labels.length;
  if (nLabels < 2) return;
  const step = cw / (nLabels - 1);
  let idx = Math.round((mx - padL) / step);
  idx = Math.max(0, Math.min(nLabels - 1, idx));

  // Redraw chart with crosshair — preserve area vs line type
  const isArea = hit.chartType === 'area';
  const datasets = chart.series.map(s => {
    const clr = getColorRgb(s.color);
    return { data: s.data, stroke: 'rgba('+clr+',0.9)', lineWidth: 2,
      fillTop: isArea ? 'rgba('+clr+',0.35)' : 'rgba('+clr+',0.06)',
      fillBot: isArea ? 'rgba('+clr+',0.03)' : 'rgba('+clr+',0)',
      dotColor: 'rgba('+clr+',1)', dotGlow: 'rgba('+clr+',0.15)' };
  });
  const opts = { suffix: chart.suffix||'', xLabel: chart.xLabel||'', yLabel: chart.yLabel||'', _crosshairIdx: idx };
  if (isArea) drawAreaChart(canvas, datasets, chart.labels, opts);
  else drawChart(canvas, datasets, chart.labels, opts);

  // Draw vertical crosshair line
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const padT = 16, padB = 32, h = rect.height, ch = h - padT - padB;
  const xPos = padL + step * idx;
  ctx.beginPath();
  ctx.strokeStyle = isLightBg() ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.moveTo(xPos, padT);
  ctx.lineTo(xPos, padT + ch);
  ctx.stroke();
  ctx.setLineDash([]);

  // Highlight dots at crosshair position
  let maxVal = 0;
  datasets.forEach(ds => ds.data.forEach(v => { if (v > maxVal) maxVal = v; }));
  maxVal = Math.ceil(maxVal / 10) * 10 || 100;
  chart.series.forEach((s, si) => {
    const clr = getColorRgb(s.color);
    const val = s.data[idx];
    const yPos = padT + ch - (val / maxVal) * ch;
    ctx.beginPath(); ctx.arc(xPos, yPos, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + clr + ',1)'; ctx.fill();
    ctx.beginPath(); ctx.arc(xPos, yPos, 9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + clr + ',0.2)'; ctx.fill();
  });

  // Show tooltip
  const tt = document.getElementById('chartTooltip');
  const xLabel = chart.xLabel || 'Period';
  const yLabel = chart.yLabel || 'Value';
  const totalAtIdx = chart.series.reduce((s, sr) => s + sr.data[idx], 0);
  // Sort series by value at this index (highest first) for the tooltip
  const sorted = chart.series.map(s => ({ ...s, val: s.data[idx] })).sort((a, b) => b.val - a.val);
  let seriesRows = '';
  sorted.forEach(s => {
    const dot = getColorHex(s.color);
    const pct = totalAtIdx > 0 ? ((s.val / totalAtIdx) * 100).toFixed(1) : '0';
    seriesRows += '<div class="tt-row"><span class="tt-row-label"><span class="tt-dot" style="background:'+dot+'"></span>' + s.name + '</span><span class="tt-row-value">' + s.val.toLocaleString('en-US', {maximumFractionDigits:2}) + '<span class="tt-pct">(' + pct + '%)</span></span></div>';
  });
  tt.innerHTML =
    '<div class="tt-header">' + xLabel + ': ' + chart.labels[idx] + '</div>' +
    '<div class="tt-body">' +
    '<div class="tt-row" style="margin-bottom:6px"><span class="tt-row-label">Total ' + yLabel + '</span><span class="tt-row-value">' + totalAtIdx.toLocaleString('en-US', {maximumFractionDigits:2}) + '</span></div>' +
    '<div class="tt-divider"></div>' +
    seriesRows +
    '</div>';
  // AI mini-chart: sparkline of totals across all periods
  const allTotals = chart.labels.map((_, li) => chart.series.reduce((s, sr) => s + sr.data[li], 0));
  _appendMiniChart(tt, 'sparkline', { data: allTotals, highlightIdx: idx, color: '6,182,212' });
  _posTooltip(tt, e);
  tt.classList.add('visible');
}

  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  let found = -1, minDist = 15;
  for (let i = 0; i < hit.points.length; i++) {
    const p = hit.points[i];
    const dist = Math.sqrt((mx - p.px) * (mx - p.px) + (my - p.py) * (my - p.py));
    if (dist < minDist) { minDist = dist; found = i; }
  }
  if (found !== canvas._lastHover) {
    canvas._lastHover = found;
    drawScatterChart(canvas, hit.xData, hit.yData, hit.colorName, { ...hit.opts, _highlightIdx: found });
    const tt = document.getElementById('chartTooltip');
    if (found >= 0) {
      const p = hit.points[found];
      const xLabel = hit.opts.xLabel || 'X';
      const yLabel = hit.opts.yLabel || 'Y';
      const labelText = hit.labels[found] || ('Point ' + (found + 1));
      tt.innerHTML =
        '<div class="tt-header">' + labelText + '</div>' +
        '<div class="tt-body">' +
        '<div class="tt-row"><span class="tt-row-label">' + xLabel + '</span><span class="tt-row-value">' + (typeof p.xVal === 'number' ? p.xVal.toLocaleString('en-US',{maximumFractionDigits:2}) : p.xVal) + '</span></div>' +
        '<div class="tt-row"><span class="tt-row-label">' + yLabel + '</span><span class="tt-row-value">' + (typeof p.yVal === 'number' ? p.yVal.toLocaleString('en-US',{maximumFractionDigits:2}) : p.yVal) + '</span></div>' +
        '</div>';
      tt.classList.add('visible');
      _posTooltip(tt, e);
    } else {
      tt.classList.remove('visible');
    }
  } else if (found >= 0) {
    const tt = document.getElementById('chartTooltip');
    _posTooltip(tt, e);
  }
}

// ══════════════════════════════════════════════
// CROSS-FILTERING + DRILL-DOWN
// ══════════════════════════════════════════════
function getFilteredRows() {
  if (!App.excelData || !App.excelData.rows) return [];
  let rows = App.excelData.rows;
  if (App.crossFilter) {
    rows = rows.filter(r => String(r[App.crossFilter.column] || '').trim() === App.crossFilter.value);
  }
  return rows;
}

function setCrossFilter(column, value, sourceChartIdx) {
  if (App.crossFilter && App.crossFilter.column === column && App.crossFilter.value === value) {
    App.crossFilter = null; // toggle off
  } else {
    App.crossFilter = { column, value, sourceChartIdx };
  }
  refreshAllAnalyticsCharts();
}

function clearCrossFilter() {
  App.crossFilter = null;
  refreshAllAnalyticsCharts();
}

function _updateChartInsight(chart, idx) {
  const el = document.getElementById('aiCaption' + idx);
  if (!el) return;
  const labels = chart.labels || [];
  const hasSeries = chart.series && chart.series.length > 0;
  const totals = hasSeries
    ? labels.map((_, i) => chart.series.reduce((s, sr) => s + (sr.data[i] || 0), 0))
    : (chart.data || []);
  if (!totals.length) { el.textContent = chart.desc || ''; return; }
  const yLabel = (chart.yLabel || 'Value').replace(/_/g, ' ');
  const isCurrency = /revenue|sales|cost|expense|price|profit|income/i.test(yLabel);
  const fmt = (v) => (isCurrency ? '$' : '') + formatNumber(v, {abbreviate: true, decimals: 1});
  let peakIdx = 0, lowIdx = 0;
  totals.forEach((v, i) => { if (v > totals[peakIdx]) peakIdx = i; if (v < totals[lowIdx]) lowIdx = i; });
  const trend = totals[totals.length - 1] >= totals[0] ? 'an upward' : 'a downward';
  el.textContent = yLabel + ' peaked at ' + fmt(totals[peakIdx]) + ' in ' + labels[peakIdx] +
    ', with a low of ' + fmt(totals[lowIdx]) + ' in ' + labels[lowIdx] +
    ', showing ' + trend + ' trend overall.';
}

function refreshAllAnalyticsCharts() {
  if (App.currentPage !== 'analytics' || !App.hasExcelData) return;
  const ec = App.excelChartConfig;
  const rows = getFilteredRows();

  // Update filter indicator
  const filterBar = document.getElementById('crossFilterBar');
  if (filterBar) {
    if (App.crossFilter) {
      filterBar.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>' +
        '<span>Filtered by: <strong>' + App.crossFilter.column.replace(/_/g,' ') + '</strong> = <strong>' + App.crossFilter.value + '</strong></span>' +
        '<span class="cross-filter-clear" onclick="clearCrossFilter()">&#10005; Clear</span>';
      filterBar.style.display = 'flex';
    } else {
      filterBar.style.display = 'none';
    }
  }

  // Re-aggregate and redraw each chart + update insights
  ec.chartPlan.forEach((chart, i) => {
    const canvas = document.getElementById('analyticsChart' + i);
    if (!canvas) return;
    const rebuilt = rebuildChartData(chart, rows, i);
    canvas._hasChartEvents = false;
    canvas._chartHit = null;
    animateChartFromPlan(canvas, rebuilt, 0);
    // Update insight caption from filtered data
    _updateChartInsight(rebuilt, i);
  });

  // Redraw custom charts
  (App.customCharts || []).forEach((chart, i) => {
    const canvas = document.getElementById('customChart' + i);
    if (!canvas) return;
    const rebuilt = rebuildChartData(chart, rows, -1);
    canvas._hasChartEvents = false;
    canvas._chartHit = null;
    animateChartFromPlan(canvas, rebuilt, 0);
  });

  // Update stats with filtered data
  updateFilteredStats(rows);
}

function rebuildChartData(origChart, rows, chartIdx) {
  // Check drill state
  const drillState = App.drillStates[chartIdx];
  let xCol = origChart._origXCol || origChart.xLabel?.replace(/ /g,'_');
  const yCol = origChart._origYCol || origChart.yLabel?.replace(/ /g,'_');
  const aggFn = origChart._origAggFn || 'sum';

  // If drilled, use the drill target column and filter rows
  let drillRows = rows;
  if (drillState && drillState.path.length > 0) {
    drillState.path.forEach(p => {
      drillRows = drillRows.filter(r => String(r[p.col] || '').trim() === p.value);
    });
    xCol = drillState.hierarchy[drillState.path.length] || xCol;
  }

  if (origChart.type === 'donut' || origChart._userType === 'donut') {
    // Rebuild donut from filtered rows
    if (!xCol) {
      // Try to detect from original labels
      const ec = App.excelChartConfig;
      const cats = ec.categoricals || [];
      xCol = cats.find(c => {
        const vals = [...new Set(App.excelData.rows.map(r => String(r[c]||'').trim()))];
        return origChart.labels.some(l => vals.includes(l));
      });
    }
    if (!xCol) return origChart;
    const counts = {};
    drillRows.forEach(r => {
      const v = String(r[xCol] || '').trim();
      if (v) {
        if (yCol && App.excelChartConfig.colMeta[yCol]?.isMetric) {
          counts[v] = (counts[v] || 0) + (parseFloat(r[yCol]) || 0);
        } else {
          counts[v] = (counts[v] || 0) + 1;
        }
      }
    });
    const entries = Object.entries(counts).sort((a,b) => b[1] - a[1]);
    return { ...origChart, labels: entries.map(e=>e[0]), data: entries.map(e=>e[1]) };
  }

  if (!xCol) return origChart;

  // Rebuild bar/line from filtered rows
  const groups = {};
  drillRows.forEach(r => {
    const key = String(r[xCol] || '').trim();
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    if (yCol && App.excelChartConfig.colMeta[yCol]?.isMetric) {
      groups[key].push(parseFloat(r[yCol]) || 0);
    } else {
      groups[key].push(1);
    }
  });

  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k,
    value: aggFn === 'count' ? v.length : aggFn === 'avg' ? v.reduce((a,b)=>a+b,0)/v.length : aggFn === 'max' ? Math.max(...v) : v.reduce((a,b)=>a+b,0)
  }));

  const type = origChart._userType || origChart.type;
  if (type === 'line') {
    const _dp = App.excelChartConfig.colMeta[xCol]?.datePattern;
    entries.sort((a,b) => {
      if (_dp) { const da = parseDateValue(a.label, _dp), db = parseDateValue(b.label, _dp); if (da && db) return da - db; }
      return a.label.localeCompare(b.label);
    });
  } else entries.sort((a,b) => b.value - a.value);

  if (type !== 'line') entries = entries.slice(0, 15);

  return { ...origChart, labels: entries.map(e=>e.label), data: entries.map(e=>e.value), xLabel: xCol.replace(/_/g,' ') };
}

function updateFilteredStats(rows) {
  const statsEls = document.querySelectorAll('.stats-grid .glass-panel');
  if (!statsEls.length || !App.hasExcelData) return;
  const ec = App.excelChartConfig;
  // Update total records count
  const recordEl = statsEls[0]?.querySelector('div[style*="font-weight:700"]');
  if (recordEl) recordEl.textContent = rows.length.toLocaleString();
}

// Drill-down: detect hierarchy for a chart
function detectHierarchy(chartIdx) {
  const ec = App.excelChartConfig;
  const cats = ec.categoricals || [];
  // Sort by cardinality: low → high
  const sorted = cats.map(c => ({ col: c, card: ec.colMeta[c]?.uniqueCount || 0 }))
    .filter(c => c.card >= 2)
    .sort((a,b) => a.card - b.card);
  return sorted.map(s => s.col);
}

function initDrillState(chartIdx) {
  if (!App.drillStates[chartIdx]) {
    App.drillStates[chartIdx] = { path: [], hierarchy: detectHierarchy(chartIdx) };
  }
  return App.drillStates[chartIdx];
}

function drillDown(chartIdx, column, value) {
  const state = initDrillState(chartIdx);
  // Find where we are in hierarchy
  const currentLevel = state.path.length;
  if (currentLevel >= state.hierarchy.length - 1) return; // no deeper level
  state.path.push({ col: column, value });
  refreshAllAnalyticsCharts();
  updateDrillBreadcrumb(chartIdx);
}

function drillUp(chartIdx, toLevel) {
  const state = App.drillStates[chartIdx];
  if (!state) return;
  state.path = state.path.slice(0, toLevel);
  refreshAllAnalyticsCharts();
  updateDrillBreadcrumb(chartIdx);
}

function updateDrillBreadcrumb(chartIdx) {
  const el = document.getElementById('drillBreadcrumb' + chartIdx);
  if (!el) return;
  const state = App.drillStates[chartIdx];
  if (!state || state.path.length === 0) {
    el.innerHTML = '';
    return;
  }
  let html = '<span onclick="drillUp('+chartIdx+',0)">All</span>';
  state.path.forEach((p, i) => {
    html += '<span class="drill-sep">&#9656;</span>';
    if (i < state.path.length - 1) {
      html += '<span onclick="drillUp('+chartIdx+','+(i+1)+')">' + p.value + '</span>';
    } else {
      html += '<span class="drill-current">' + p.value + '</span>';
    }
  });
  el.innerHTML = html;
}

function toggleDrill(chartIdx) {
  const state = initDrillState(chartIdx);
  if (state.path.length > 0) {
    // Reset drill
    state.path = [];
    refreshAllAnalyticsCharts();
    updateDrillBreadcrumb(chartIdx);
    toast('Drill-down reset', 'info');
  } else {
    toast('Click a bar or segment to drill down into details', 'info');
  }
}

// Click handler for chart cross-filtering and drill-down
function handleChartClick(e) {
  const canvas = e.currentTarget;
  let hit = canvas._chartHit;
  if (!App.hasExcelData) return;
  // For charts without _chartHit (gauge, boxplot, treemap), create a minimal hit
  if (!hit) {
    const cId = canvas.id;
    let cIdx = -1;
    if (cId.startsWith('analyticsChart')) cIdx = parseInt(cId.replace('analyticsChart',''));
    if (cIdx >= 0 && App.excelChartConfig && App.excelChartConfig.chartPlan[cIdx]) {
      const c = App.excelChartConfig.chartPlan[cIdx];
      hit = { type: c._userType || c.type || 'unknown', labels: c.labels || [] };
    }
    if (!hit) return;
  }

  // Determine which chart index this is
  const id = canvas.id;
  let chartIdx = -1;
  if (id.startsWith('analyticsChart')) chartIdx = parseInt(id.replace('analyticsChart',''));

  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  let clickedLabel = null, clickedColumn = null;

  if (hit.type === 'bar' || hit.type === 'hbar') {
    for (let i = 0; i < hit.areas.length; i++) {
      const a = hit.areas[i];
      if (hit.type === 'hbar'
        ? (my >= a.y && my <= a.y + a.h && mx >= a.x && mx <= a.x + a.w + 4)
        : (mx >= a.x && mx <= a.x + a.w && my >= a.y && my <= a.y + a.h + 4)) {
        clickedLabel = a.label;
        break;
      }
    }
    // Determine the column — prefer _origXCol (exact header match) over display xLabel
    const ec1 = App.excelChartConfig;
    const chart1 = chartIdx >= 0 ? ec1.chartPlan[chartIdx] : null;
    clickedColumn = (chart1 && chart1._origXCol) || hit.opts?.xLabel?.replace(/ /g,'_') || null;
  } else if (hit.type === 'stacked') {
    for (let i = hit.areas.length - 1; i >= 0; i--) {
      const a = hit.areas[i];
      if (mx >= a.x && mx <= a.x + a.w && my >= a.y && my <= a.y + a.h) {
        clickedLabel = a.label; break;
      }
    }
    const ec2 = App.excelChartConfig;
    const chart2 = chartIdx >= 0 ? ec2.chartPlan[chartIdx] : null;
    clickedColumn = (chart2 && chart2._origXCol) || hit.opts?.xLabel?.replace(/ /g,'_') || null;
  } else if (hit.type === 'donut') {
    const dx = mx - hit.cx, dy = my - hit.cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist >= hit.innerR && dist <= hit.outerR) {
      let angle = Math.atan2(dy, dx);
      if (angle < -Math.PI / 2) angle += Math.PI * 2;
      for (let i = 0; i < hit.segments.length; i++) {
        if (angle >= hit.segments[i].startAngle && angle < hit.segments[i].endAngle) {
          clickedLabel = hit.segments[i].label;
          break;
        }
      }
    }
    // Find the categorical column this donut represents
    const ec = App.excelChartConfig;
    const cats = ec.categoricals || [];
    clickedColumn = cats.find(c => {
      const vals = [...new Set(App.excelData.rows.map(r2 => String(r2[c]||'').trim()))];
      return hit.labels.some(l => vals.includes(l));
    });
  } else if (hit.type === 'scatter' && hit.points) {
    // Find closest point to click
    let minDist = Infinity;
    for (let i = 0; i < hit.points.length; i++) {
      const p = hit.points[i];
      const d = Math.sqrt((mx - p.x) * (mx - p.x) + (my - p.y) * (my - p.y));
      if (d < minDist && d < 20) { minDist = d; clickedLabel = hit.labels[i] || String(i); }
    }
    const ecS = App.excelChartConfig;
    const chartS = chartIdx >= 0 ? ecS.chartPlan[chartIdx] : null;
    clickedColumn = (chartS && chartS._origXCol) || hit.opts?.xLabel?.replace(/ /g,'_') || null;
  } else if (hit.type === 'multiline') {
    // For line/area charts, find the nearest x-axis label
    const chartML = hit.chart;
    if (chartML && chartML.labels && chartML.labels.length > 0) {
      const cw = canvas.width / (window.devicePixelRatio || 1);
      const padL = 50, padR = 20;
      const plotW = cw - padL - padR;
      const step = plotW / Math.max(1, chartML.labels.length - 1);
      let closestIdx = Math.round((mx - padL) / step);
      closestIdx = Math.max(0, Math.min(closestIdx, chartML.labels.length - 1));
      clickedLabel = chartML.labels[closestIdx];
    }
    const ecML = App.excelChartConfig;
    const chartRef = chartIdx >= 0 ? ecML.chartPlan[chartIdx] : null;
    clickedColumn = (chartRef && chartRef._origXCol) || null;
  }

  // Generic fallback: for any chart type without specific hit detection (gauge, boxplot, treemap, etc.)
  if (!clickedLabel && chartIdx >= 0) {
    const ecG = App.excelChartConfig;
    const chartG = ecG.chartPlan[chartIdx];
    if (chartG && chartG.labels && chartG.labels.length > 0) {
      // Open drawer with the first/primary label
      clickedLabel = chartG.labels[0];
      clickedColumn = (chartG && chartG._origXCol) || chartG.xLabel?.replace(/ /g,'_') || null;
      // For single-value charts (gauge), use the chart title context instead
      if (!clickedColumn) {
        const cats = ecG.categoricals || [];
        if (cats.length > 0) clickedColumn = cats[0];
      }
    }
  }

  if (!clickedLabel || !clickedColumn) return;

  // Open explain-point drawer
  openExplainDrawer(clickedColumn, clickedLabel, chartIdx);
}

function openExplainDrawer(column, value, chartIdx) {
  if (!App._explainDrillPath) App._explainDrillPath = [];
  const ec = App.excelChartConfig;
  const chart = ec.chartPlan[chartIdx];
  const isCountChart = chart && (chart.aggFn === 'count' || chart.yLabel === 'Count');
  let yLabel = '';
  if (isCountChart) {
    // Count charts: use first metric for stats, or just count rows
    yLabel = (ec.metrics && ec.metrics[0]) || '';
  } else {
    yLabel = chart ? (chart._origYCol || chart.yCol || chart.yLabel?.replace(/ /g, '_') || '') : '';
    // Fallback: if yLabel still empty or not in data, use first metric column
    if (!yLabel || (App.excelData && App.excelData.rows[0] && !(yLabel in App.excelData.rows[0]))) {
      yLabel = (ec.metrics && ec.metrics[0]) || '';
    }
  }
  const rows = getFilteredRows();

  // Highlight the clicked bar by adding a colored border overlay
  const canvas = document.getElementById('analyticsChart' + chartIdx);
  App._explainHighlight = { chartIdx, column, value };
  if (canvas) {
    // Wait for animation to finish, then paint highlight directly
    setTimeout(function() {
      const hit = canvas._chartHit;
      if (!hit) return;
      const areas = hit.areas || [];
      // Find all hit areas matching the clicked label
      const matchAreas = areas.filter(a => a.label === value);
      if (!matchAreas.length) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      matchAreas.forEach(a => {
        // Draw a bright border around the bar
        ctx.strokeStyle = '#00e5ff';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#00e5ff';
        ctx.shadowBlur = 12;
        ctx.strokeRect(a.x + 1, a.y + 1, a.w - 2, a.h - 2);
      });
      ctx.restore();
    }, 900); // after animation completes (700ms + buffer)
  }

  // Filter to clicked point — try exact column, case-insensitive, _origXCol, then search all columns
  let resolvedColumn = column;
  const allKeys = Object.keys(rows[0] || {});
  if (rows.length && !(column in rows[0])) {
    const ciMatch = allKeys.find(k => k.toLowerCase() === column.toLowerCase());
    if (ciMatch) resolvedColumn = ciMatch;
  }
  // Also try _origXCol from chart if available
  if (chart && chart._origXCol && chart._origXCol in (rows[0] || {})) {
    resolvedColumn = chart._origXCol;
  }
  let pointRows = rows.filter(r => String(r[resolvedColumn] || '').trim() === value);
  // If no match, try finding any column that contains this value
  if (!pointRows.length && rows.length) {
    for (let ki = 0; ki < allKeys.length; ki++) {
      const tryCol = allKeys[ki];
      const tryRows = rows.filter(r => String(r[tryCol] || '').trim() === value);
      if (tryRows.length > 0 && tryRows.length < rows.length) {
        resolvedColumn = tryCol;
        pointRows = tryRows;
        break;
      }
    }
  }
  if (!pointRows.length) return;
  column = resolvedColumn;

  // Find categorical columns for breakdown (exclude clicked col and measure)
  const allHeaders = Object.keys(rows[0] || {});
  const categoricals = allHeaders.filter(h => {
    if (h === column || h === yLabel) return false;
    const meta = ec.colMeta[h];
    return meta && meta.isCategorical && meta.uniqueCount <= 30;
  });

  // Build breakdown data for top 3 categoricals
  const breakdowns = [];
  categoricals.slice(0, 3).forEach(cat => {
    const groups = {};
    pointRows.forEach(r => {
      const key = String(r[cat] || '').trim();
      if (!key) return;
      groups[key] = (groups[key] || 0) + (parseFloat(r[yLabel]) || 0);
    });
    const entries = Object.entries(groups).sort((a, b) => b[1] - a[1]).slice(0, 8);
    if (entries.length >= 2) {
      breakdowns.push({ dim: cat, entries });
    }
  });

  // Compute influencers: compare point vs baseline
  const baselineByDim = {};
  const pointByDim = {};
  const baselineTotal = rows.reduce((s, r) => s + (parseFloat(r[yLabel]) || 0), 0);
  const pointTotal = pointRows.reduce((s, r) => s + (parseFloat(r[yLabel]) || 0), 0);

  const influencers = [];
  categoricals.slice(0, 5).forEach(cat => {
    // Baseline distribution
    const blGroups = {};
    rows.forEach(r => { const k = String(r[cat] || '').trim(); if (k) blGroups[k] = (blGroups[k] || 0) + (parseFloat(r[yLabel]) || 0); });
    // Point distribution
    const ptGroups = {};
    pointRows.forEach(r => { const k = String(r[cat] || '').trim(); if (k) ptGroups[k] = (ptGroups[k] || 0) + (parseFloat(r[yLabel]) || 0); });

    const topVal = Object.entries(ptGroups).sort((a, b) => b[1] - a[1])[0];
    if (!topVal) return;
    const ptShare = pointTotal ? topVal[1] / pointTotal : 0;
    const blShare = baselineTotal ? (blGroups[topVal[0]] || 0) / baselineTotal : 0;
    const lift = blShare > 0 ? ptShare / blShare : 0;
    influencers.push({ feature: cat, topValue: topVal[0], lift: Math.round(lift * 100) / 100, share: Math.round(ptShare * 1000) / 10 });
  });
  influencers.sort((a, b) => b.lift - a.lift);

  // Build drawer HTML
  const isCurrency = /revenue|sales|cost|expense|price|profit|income/i.test(yLabel);
  const fmtVal = (v) => (isCurrency ? '$' : '') + formatNumber(v, { abbreviate: true, decimals: 1 });

  let html = '<div style="padding:4px 0 16px">';

  // Compute extra stats
  const pointNums = pointRows.map(r => parseFloat(r[yLabel]) || 0).filter(v => v);
  const ptMin = pointNums.length ? Math.min(...pointNums) : 0;
  const ptMax = pointNums.length ? Math.max(...pointNums) : 0;
  const ptAvg = pointNums.length ? pointNums.reduce((a, b) => a + b, 0) / pointNums.length : 0;
  const baselineAvg = rows.length ? rows.reduce((s, r) => s + (parseFloat(r[yLabel]) || 0), 0) / rows.length : 0;
  const vsAvgPct = baselineAvg ? Math.round((ptAvg - baselineAvg) / baselineAvg * 100) : 0;
  const vsAvgColor = vsAvgPct >= 0 ? 'var(--accent-emerald)' : 'var(--accent-rose)';
  const vsAvgSign = vsAvgPct >= 0 ? '+' : '';

  // Rank among all values of this column
  const allGroupTotals = {};
  rows.forEach(r => { const k = String(r[column] || '').trim(); if (k) allGroupTotals[k] = (allGroupTotals[k] || 0) + (parseFloat(r[yLabel]) || 0); });
  const sortedGroups = Object.entries(allGroupTotals).sort((a, b) => b[1] - a[1]);
  const rank = sortedGroups.findIndex(g => g[0] === value) + 1;

  // Summary card
  html += '<div style="background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);border-radius:12px;padding:14px 16px;margin-bottom:20px">';
  html += '<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">You clicked</div>';

function _drawExplainSunburst(breakdowns, fmtVal, chartColors) {
  const canvas = document.getElementById('explainSunburst');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.getBoundingClientRect().width;
  const h = 260;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cx = w / 2, cy = h / 2;
  const innerR = 40, midR = 85, outerR = 115;
  const colors = chartColors.map(function(hex) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',0.8)';
  });

  // Inner ring: first breakdown dimension
  const bd1 = breakdowns[0];
  const total1 = bd1.entries.reduce((s, e) => s + e[1], 0);
  let angle = -Math.PI / 2;

  // Center label
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 14px Inter'; ctx.textAlign = 'center';
  ctx.fillText(fmtVal(total1), cx, cy - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px Inter';
  ctx.fillText('Total', cx, cy + 12);

  bd1.entries.forEach(function(e, i) {
    var slice = (e[1] / total1) * Math.PI * 2;
    var endAngle = angle + slice;
    ctx.beginPath();
    ctx.arc(cx, cy, midR, angle, endAngle);
    ctx.arc(cx, cy, innerR, endAngle, angle, true);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.stroke();

    // Label if slice is big enough
    if (slice > 0.3) {
      var midAngle = angle + slice / 2;
      var lx = cx + Math.cos(midAngle) * ((innerR + midR) / 2);
      var ly = cy + Math.sin(midAngle) * ((innerR + midR) / 2);
      ctx.fillStyle = '#fff'; ctx.font = '500 10px Inter'; ctx.textAlign = 'center';
      ctx.fillText(e[0].length > 10 ? e[0].substring(0, 9) + '..' : e[0], lx, ly + 3);
    }
    angle = endAngle;
  });

  // Outer ring: second breakdown dimension (if available)
  if (breakdowns.length >= 2) {
    var bd2 = breakdowns[1];
    var total2 = bd2.entries.reduce(function(s, e) { return s + e[1]; }, 0);
    angle = -Math.PI / 2;
    bd2.entries.forEach(function(e, i) {
      var slice = (e[1] / total2) * Math.PI * 2;
      var endAngle = angle + slice;
      ctx.beginPath();
      ctx.arc(cx, cy, outerR, angle, endAngle);
      ctx.arc(cx, cy, midR + 2, endAngle, angle, true);
      ctx.closePath();
      ctx.fillStyle = colors[(i + 3) % colors.length].replace('0.8)', '0.5)');
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();

      if (slice > 0.4) {
        var midAngle = angle + slice / 2;
        var lx = cx + Math.cos(midAngle) * ((midR + outerR) / 2 + 2);
        var ly = cy + Math.sin(midAngle) * ((midR + outerR) / 2 + 2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '9px Inter'; ctx.textAlign = 'center';
        ctx.fillText(e[0].length > 10 ? e[0].substring(0, 9) + '..' : e[0], lx, ly + 3);
      }
      angle = endAngle;
    });
  }

  // Legend below
  var legY = h - 12, legX = 10;
  bd1.entries.slice(0, 6).forEach(function(e, i) {
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(legX, legY - 4, 8, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '9px Inter'; ctx.textAlign = 'left';
    var label = e[0].length > 12 ? e[0].substring(0, 11) + '..' : e[0];
    ctx.fillText(label, legX + 11, legY + 3);
    legX += ctx.measureText(label).width + 24;
  });
}

function animateBarChart(canvas, labels, data, colorName, opts = {}) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 700, stagger = 50;
  const start = performance.now();
  (function frame(now) {
    const elapsed = now - start;
    const animData = data.map((v, i) => {
      const t = Math.max(0, Math.min((elapsed - i * stagger) / dur, 1));
      return v * (1 - Math.pow(1 - t, 3)); // ease-out cubic
    });
    drawBarChart(canvas, labels, animData, colorName, opts);
    const allDone = data.every((_, i) => (elapsed - i * stagger) >= dur);
    if (!allDone) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

function animateDonutChart(canvas, labels, data, opts = {}) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 900;
  const start = performance.now();
  (function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    drawDonutChart(canvas, labels, data, { ...opts, _sweepProgress: eased });
    if (t < 1) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

function animateLineChart(canvas, chart) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 800;
  const start = performance.now();
  const isSeries = chart.series && chart.series.length > 0;
  const opts = { suffix: chart.suffix || '', xLabel: chart.xLabel || '', yLabel: chart.yLabel || '' };

  (function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    let datasets;

    if (isSeries) {
      datasets = chart.series.map(s => {
        const clr = getColorRgb(s.color);
        return {
          data: s.data.map(v => v * eased),
          stroke: 'rgba(' + clr + ',0.9)',
          lineWidth: 2,
          fillTop: 'rgba(' + clr + ',0.06)',
          fillBot: 'rgba(' + clr + ',0)',
          dotColor: 'rgba(' + clr + ',1)',
          dotGlow: 'rgba(' + clr + ',0.15)',
        };
      });
    } else {
      const clr = getColorRgb(chart.color);
      datasets = [{ data: chart.data.map(v => v * eased), stroke: 'rgba('+clr+',0.9)', lineWidth: 2.5,
        fillTop: 'rgba('+clr+',0.15)', fillBot: 'rgba('+clr+',0)',
        dotColor: 'rgba('+clr+',1)', dotGlow: 'rgba('+clr+',0.2)' }];
    }

    drawChart(canvas, datasets, chart.labels, opts);
    if (t < 1) canvas._animFrame = requestAnimationFrame(frame);
    else {
      canvas._animFrame = null;
      if (isSeries) {
        canvas._chartHit = { type: 'multiline', chart: chart, labels: chart.labels };
        if (!canvas._hasChartEvents) {
          canvas._hasChartEvents = true;
          canvas.addEventListener('mousemove', handleMultiLineHover);
          canvas.addEventListener('mouseleave', handleChartLeave);
        }
      }
    }
  })(performance.now());
}

function animateStackedBarChart(canvas, labels, seriesData, opts = {}) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 700, stagger = 50;
  const start = performance.now();
  (function frame(now) {
    const elapsed = now - start;
    const animSeries = seriesData.map(s => ({
      ...s,
      data: s.data.map((v, i) => {
        const t = Math.max(0, Math.min((elapsed - i * stagger) / dur, 1));
        return v * (1 - Math.pow(1 - t, 3));

    }));
    drawStackedBarChart(canvas, labels, animSeries, opts);
    const allDone = labels.every((_, i) => (elapsed - i * stagger) >= dur);

function animateScatterChart(canvas, xData, yData, colorName, opts = {}) {
  if (canvas._animFrame) cancelAnimationFrame(canvas._animFrame);
  const dur = 800;
  const start = performance.now();
  const n = xData.length;
  (function frame(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / dur, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const count = Math.ceil(eased * n);
    drawScatterChart(canvas, xData.slice(0, count), yData.slice(0, count), colorName, opts);
    if (progress < 1) canvas._animFrame = requestAnimationFrame(frame);
    else canvas._animFrame = null;
  })(performance.now());
}

function animateChartFromPlan(canvas, chart, delay) {
  if (!canvas) return;
  // Guard: if canvas has no dimensions yet, retry after layout
  var rect = canvas.parentElement ? canvas.parentElement.getBoundingClientRect() : null;
  if (rect && (rect.width === 0 || rect.height === 0)) {
    setTimeout(function() { animateChartFromPlan(canvas, chart, 0); }, 100);
    return;
  }
  // Cleanup from any prior map render: remove overlay divs, restore canvas visibility,
  // and detach map mouse handler so it doesn't fire on a non-map chart.
  if (canvas.parentElement) {
    canvas.parentElement.querySelectorAll('.genbi-map-overlay').forEach(function(el) { el.remove(); });
  }
  canvas.style.display = '';
  if (canvas._mapMouseHandler) {
    canvas.removeEventListener('mousemove', canvas._mapMouseHandler);
    canvas.removeEventListener('mouseleave', canvas._mapMouseHandler);
    canvas._mapMouseHandler = null;
  }
  if (canvas._mapResizeHandler) {
    window.removeEventListener('resize', canvas._mapResizeHandler);
    canvas._mapResizeHandler = null;
  }
  if (canvas._mapTimer) { clearTimeout(canvas._mapTimer); canvas._mapTimer = null; }
  if (canvas._mapAbort) { try { canvas._mapAbort.abort(); } catch (e) {} canvas._mapAbort = null; }
  const type = chart._userType || chart.type;
  const axisOpts = { suffix: chart.suffix || '', xLabel: chart.xLabel || '', yLabel: chart.yLabel || '' };
  if (chart._barPalette && linePalettes[chart._barPalette]) {
    axisOpts.barColors = linePalettes[chart._barPalette];
  }
  // Resolve data: series charts store data in chart.series, single charts in chart.data
  const hasSeries = chart.series && chart.series.length > 0;
  const flatData = hasSeries
    ? chart.labels.map(function(_, i) { return chart.series.reduce(function(sum, s) { return sum + (s.data[i] || 0); }, 0); })
    : chart.data;
  setTimeout(() => {
    if (type === 'bar') animateBarChart(canvas, flatData ? chart.labels : [], flatData || [], chart.color, axisOpts);
    else if (type === 'donut') {
      const donutOpts = {};
      if (chart._barPalette && linePalettes[chart._barPalette]) {
        donutOpts.paletteColors = linePalettes[chart._barPalette];
      } else if (chart._userColor || chart.color) {
        donutOpts.baseColor = chart._userColor || chart.color;
      }
      animateDonutChart(canvas, flatData ? chart.labels : [], flatData || [], donutOpts);
    }
    else if (type === 'line') animateLineChart(canvas, chart);
    else if (type === 'hbar') animateHorizontalBarChart(canvas, flatData ? chart.labels : [], flatData || [], chart.color, axisOpts);
    else if (type === 'area') animateAreaChart(canvas, chart);
    else if (type === 'stacked') {
      if (hasSeries) {
        animateStackedBarChart(canvas, chart.labels, chart.series, axisOpts);
      } else {
        animateStackedBarChart(canvas, chart.labels, [{ name: chart.yLabel || 'Value', data: chart.data || [], color: chart.color || 'cyan' }], axisOpts);
      }
    }
    else if (type === 'gauge') {
      const val = (flatData && flatData.length) ? flatData[0] : (chart.value || 0);
      animateGaugeChart(canvas, val, { color: chart.color, label: chart.title, min: chart.min || 0, max: chart.max || (Math.max(...(flatData||[0]))*1.2 || 100) });
    }
    else if (type === 'scatter') {
      const xd = chart.xData || flatData || []; const yd = chart.yData || flatData || [];
      animateScatterChart(canvas, xd, yd, chart.color, axisOpts);
    }
    else if (type === 'bubble') {
      const xd = chart.xData || flatData || []; const yd = chart.yData || xd; const sd = chart.sizeData || xd.map(() => 10);
      animateBubbleChart(canvas, xd, yd, sd, chart.color, axisOpts);
    }
    else if (type === 'lollipop') animateLollipopChart(canvas, flatData ? chart.labels : [], flatData || [], chart.color, axisOpts);
    else if (type === 'funnel') animateFunnelChart(canvas, flatData ? chart.labels : [], flatData || [], {});
    else if (type === 'waterfall') animateWaterfallChart(canvas, flatData ? chart.labels : [], flatData || [], chart.color, axisOpts);
    else if (type === 'radar') animateRadarChart(canvas, flatData ? chart.labels : [], flatData || [], chart.color, axisOpts);
    else if (type === 'heatmap') animateHeatmapChart(canvas, chart);
    else if (type === 'boxplot') animateBoxplotChart(canvas, chart);
    else if (type === 'treemap') animateTreemapChart(canvas, flatData ? chart.labels : [], flatData || [], {});
    else if (type === 'candlestick') animateCandlestickChart(canvas, chart);
    else if (type === 'sankey') animateSankeyChart(canvas, chart);
    else if (type === 'usmap' || type === 'worldmap') {
      // Render a real choropleth via Plotly.js using the backend /api/map/* endpoints,
      // which return a Plotly figure spec built from real geo data. The bundled
      // hand-coded polygons in map-data.js looked like blobs, so we don't use them.
      const dataMap = {};
      if (chart.labels && flatData) {
        chart.labels.forEach((l, i) => { if (l != null) dataMap[String(l)] = flatData[i]; });
      }
      // Hide the canvas and create an overlay div in its place. This is the only
      // chart type that doesn't draw to the canvas — Plotly needs its own DOM node.
      canvas.style.display = 'none';
      if (canvas._animFrame) { cancelAnimationFrame(canvas._animFrame); canvas._animFrame = null; }
      const mapDiv = document.createElement('div');
      mapDiv.className = 'genbi-map-overlay';
      const pr = canvas.parentElement.getBoundingClientRect();
      const mapH = Math.max(280, pr.height || 320);
      mapDiv.style.cssText = 'width:100%;height:' + mapH + 'px;min-height:280px;position:relative;';
      mapDiv.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);font-size:12px;font-family:Outfit,sans-serif;">Loading map…</div>';
      canvas.parentElement.appendChild(mapDiv);

      // Token guards stale renders if the user rapidly switches chart types.
      const renderToken = (canvas._mapRenderToken = (canvas._mapRenderToken || 0) + 1);
      const endpoint = type === 'usmap' ? '/api/map/us' : '/api/map/world';
      const abort = new AbortController();
      canvas._mapAbort = abort;

      fetch(endpoint, {
        method: 'POST',
        signal: abort.signal,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          data: dataMap,
          title: chart.title || '',
          valueLabel: axisOpts.yLabel || chart.yLabel || 'Value'
        })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (canvas._mapRenderToken !== renderToken) return; // user already switched away
        if (!mapDiv.isConnected) return;
        if (data && data.figure && window.Plotly) {
          mapDiv.innerHTML = '';
          window.Plotly.newPlot(mapDiv, data.figure.data, data.figure.layout, {
            displayModeBar: false,
            scrollZoom: false,
            responsive: true
          });
          // Force a relayout to fit the actual container size after insertion.
          window.Plotly.Plots.resize(mapDiv);
        } else if (data && data.error) {
          mapDiv.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.35);font-size:12px;font-family:Outfit,sans-serif;text-align:center;">Map unavailable: ' + data.error + '</div>';
        } else if (!window.Plotly) {
          mapDiv.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.35);font-size:12px;font-family:Outfit,sans-serif;text-align:center;">Plotly failed to load from CDN</div>';
        } else {
          mapDiv.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.35);font-size:12px;font-family:Outfit,sans-serif;text-align:center;">Map data unavailable</div>';
        }
      }).catch(function(e) {
        if (e.name === 'AbortError') return;
        if (!mapDiv.isConnected) return;
        mapDiv.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.35);font-size:12px;font-family:Outfit,sans-serif;text-align:center;">Map failed to load</div>';
      });

      // Re-render on window resize so Plotly fits the new container size.
      if (canvas._mapResizeHandler) window.removeEventListener('resize', canvas._mapResizeHandler);
      canvas._mapResizeHandler = function() {
        if (mapDiv.isConnected && window.Plotly) {
          try { window.Plotly.Plots.resize(mapDiv); } catch (err) {}
        }
      };
      window.addEventListener('resize', canvas._mapResizeHandler);
      canvas._chartHit = { type: 'map', chartType: type, chart: chart, labels: chart.labels };
    }
  }, delay || 0);
}

function drawDashExcelChart(animate) {

      drawBarChart(canvas, chart.labels, chart.data, chart.color, barOpts);

      const lineDs = buildLineDatasets(chart);
      drawChart(canvas, lineDs, chart.labels, { suffix: chart.suffix || '', xLabel: chart.xLabel||'', yLabel: chart.yLabel||'' });
    }
    else if (chart.type === 'hbar') {

      if (chart._barPalette && linePalettes[chart._barPalette]) barOpts.barColors = linePalettes[chart._barPalette];
      drawHorizontalBarChart(canvas, chart.labels, chart.data, chart.color, barOpts);
    }

      drawAreaChart(canvas, areaDs, chart.labels, { suffix: chart.suffix || '', xLabel: chart.xLabel||'', yLabel: chart.yLabel||'' });

function buildLineDatasets(chart) {
  if (chart.series && chart.series.length > 0) {
    return chart.series.map(s => {
      const clr = getColorRgb(s.color);
      return { data: s.data, stroke:'rgba('+clr+',0.9)', lineWidth: 2,
        fillTop:'rgba('+clr+',0.06)', fillBot:'rgba('+clr+',0)',
        dotColor:'rgba('+clr+',1)', dotGlow:'rgba('+clr+',0.15)' };
    });
  }
  const clr = getColorRgb(chart.color);
  return [{ data: chart.data, stroke:'rgba('+clr+',0.9)', lineWidth: 2.5,
    fillTop:'rgba('+clr+',0.15)', fillBot:'rgba('+clr+',0)',
    dotColor:'rgba('+clr+',1)', dotGlow:'rgba('+clr+',0.2)' }];
}

function buildAreaDatasets(chart) {
  if (chart.series && chart.series.length > 0) {
    return chart.series.map(s => {
      const clr = getColorRgb(s.color);
      return { data: s.data, stroke:'rgba('+clr+',0.9)', lineWidth: 2,
        fillTop:'rgba('+clr+',0.35)', fillBot:'rgba('+clr+',0.03)' };
    });
  }
  const clr = getColorRgb(chart.color);
  return [{ data: chart.data, stroke:'rgba('+clr+',0.9)', lineWidth: 2,
    fillTop:'rgba('+clr+',0.35)', fillBot:'rgba('+clr+',0.03)' }];
}

function initKPISparklines() {
  document.querySelectorAll('.kpi-spark').forEach(cv => {
    const rgb = cv.dataset.rgb || '6,182,212';
    const dpr = window.devicePixelRatio || 1;
    const w = cv.clientWidth, h = cv.clientHeight;
    if (!w || !h) return;
    cv.width = w * dpr; cv.height = h * dpr;
    const ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    // Generate a smooth random sparkline
    const n = 12;
    const data = [];
    let v = 40 + Math.random() * 30;
    for (let i = 0; i < n; i++) { v += (Math.random() - 0.45) * 15; v = Math.max(10, Math.min(90, v)); data.push(v); }
    const max = Math.max(...data) * 1.1, min = Math.min(...data) * 0.9;
    const range = (max - min) || 1;
    const pad = 2, cw = w - pad * 2, ch = h - pad * 2;
    const step = cw / (n - 1);
    const pts = data.map((d, i) => ({ x: pad + step * i, y: pad + ch - ((d - min) / range) * ch }));
    // Area
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) { const cp = (pts[i-1].x + pts[i].x) / 2; ctx.bezierCurveTo(cp, pts[i-1].y, cp, pts[i].y, pts[i].x, pts[i].y); }
    ctx.lineTo(pts[n-1].x, pad + ch); ctx.lineTo(pts[0].x, pad + ch); ctx.closePath();
    const g = ctx.createLinearGradient(0, pad, 0, pad + ch);
    g.addColorStop(0, 'rgba(' + rgb + ',0.12)'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
    ctx.fillStyle = g; ctx.fill();
    // Line
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) { const cp = (pts[i-1].x + pts[i].x) / 2; ctx.bezierCurveTo(cp, pts[i-1].y, cp, pts[i].y, pts[i].x, pts[i].y); }
    ctx.strokeStyle = 'rgba(' + rgb + ',0.5)'; ctx.lineWidth = 1.2; ctx.lineCap = 'round'; ctx.stroke();
    // End dot
    const last = pts[n-1];
    ctx.beginPath(); ctx.arc(last.x, last.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',0.8)'; ctx.fill();
  });
}

function initAnalyticsCharts() {

      var cv = document.getElementById('analyticsChart' + i);
      if (!cv) return;
      // If canvas has zero dimensions or no chart hit data, the chart didn't render

        var card = cv.closest('.glass-panel');

  // Enhance dashboard with AI (async, non-blocking)
  if (App.hasExcelData && !App._aiDashboardDone) {
    App._aiDashboardDone = true;
    setTimeout(() => enhanceDashboardWithAI(), 800);
  }
}

// PROJECT PERSISTENCE (localStorage)
// ══════════════════════════════════════════════
const PM_INDEX_KEY = 'genbi-saved-projects';
const PM_DATA_PREFIX = 'genbi-project-';
let _activeProjectId = null;

function getProjectIndex() {
  try {
    const raw = localStorage.getItem(PM_INDEX_KEY);
    if (!raw) return { version: 1, projects: {}, activeProjectId: null };
    const idx = JSON.parse(raw);
    if (!idx || !idx.projects) return { version: 1, projects: {}, activeProjectId: null };
    return idx;
  } catch(e) {
    console.error('Failed to read project index:', e);
    return { version: 1, projects: {}, activeProjectId: null };
  }
}

function saveProjectIndex(idx) {
  try {
    localStorage.setItem(PM_INDEX_KEY, JSON.stringify(idx));
  } catch(e) {
    if (e.name === 'QuotaExceededError') toast('Storage full — delete old projects to free space.', 'error');
    else console.error('Failed to save project index:', e);
  }
}

function serializeProjectData() {
  return {
    excelData: App.excelData,
    excelChartConfig: App.excelChartConfig,
    customCharts: App.customCharts,
    assistantMessages: App.assistantMessages,
    uploadedFiles: App.uploadedFiles,
    hasExcelData: App.hasExcelData,
    dashChartIdx: App.dashChartIdx,
    crossFilter: App.crossFilter,
    drillStates: App.drillStates,
    _cachedInsights: App._cachedInsights,
    _cachedAnomalies: App._cachedAnomalies,
    _cachedQuality: App._cachedQuality,
    _cachedDescriptions: App._cachedDescriptions,
    _cachedSuggestions: App._cachedSuggestions,
    _narrativeCache: App._narrativeCache,
    _forecastCache: App._forecastCache
  };
}

function restoreProjectData(data) {
  if (!data) return;
  App.excelData = data.excelData || null;
  App.excelChartConfig = data.excelChartConfig || { labelCol: null, dataCols: [], numericCols: [], labelCols: [], chartPlan: [], metrics: [], categoricals: [], colMeta: {} };
  App.customCharts = data.customCharts || [];
  App.assistantMessages = data.assistantMessages || [];
  App.uploadedFiles = data.uploadedFiles || [];
  App.hasExcelData = data.hasExcelData || false;
  App.dashChartIdx = data.dashChartIdx || 0;
  App.crossFilter = data.crossFilter || null;
  App.drillStates = data.drillStates || {};
  App._cachedInsights = data._cachedInsights || null;
  App._cachedAnomalies = data._cachedAnomalies || null;
  App._cachedQuality = data._cachedQuality || null;
  App._cachedDescriptions = data._cachedDescriptions || null;
  App._cachedSuggestions = data._cachedSuggestions || null;
  App._narrativeCache = data._narrativeCache || {};
  App._forecastCache = data._forecastCache || {};
}

    // Re-render charts on light backgrounds for PDF clarity
    var _origTheme = document.body.className;
    document.body.classList.add('theme-light');
    document.body.classList.remove('theme-genbi');

    canvases.forEach(function(c, ci) {
      // Create off-screen canvas for light-mode redraw
      var srcCv = c.canvas;
      var pdfCv = document.createElement('canvas');
      var dpr = window.devicePixelRatio || 1;
      var cw = srcCv._lockedW || srcCv.parentElement.getBoundingClientRect().width || 600;
      var ch = srcCv._lockedH || srcCv.parentElement.getBoundingClientRect().height || 240;
      pdfCv.width = cw * 2;
      pdfCv.height = ch * 2;
      pdfCv.style.width = cw + 'px';
      pdfCv.style.height = ch + 'px';
      pdfCv._lockedW = cw;
      pdfCv._lockedH = ch;
      var pCtx = pdfCv.getContext('2d');
      pCtx.setTransform(2, 0, 0, 2, 0, 0);

      // White background
      pCtx.fillStyle = '#ffffff';
      pCtx.fillRect(0, 0, cw, ch);

      // Re-draw chart on light canvas
      var chart = c.chartRef;
      if (chart) {
        var type = chart._userType || chart.type;
        var hasSeries = chart.series && chart.series.length > 0;
        var flatData = hasSeries
          ? (chart.labels || []).map(function(_, i) { return chart.series.reduce(function(sum, s) { return sum + (s.data[i] || 0); }, 0); })
          : chart.data;
        var axisOpts = { suffix: chart.suffix || '', xLabel: chart.xLabel || '', yLabel: chart.yLabel || '' };
        if (chart._barPalette && linePalettes[chart._barPalette]) axisOpts.barColors = linePalettes[chart._barPalette];
        try {
          if (type === 'bar') drawBarChart(pdfCv, chart.labels || [], flatData || [], chart.color || 'cyan', axisOpts);
          else if (type === 'hbar') drawHorizontalBarChart(pdfCv, chart.labels || [], flatData || [], chart.color || 'cyan', axisOpts);
          else if (type === 'donut') {
            var donutOpts = {};
            if (chart._barPalette && linePalettes[chart._barPalette]) donutOpts.paletteColors = linePalettes[chart._barPalette];
            drawDonutChart(pdfCv, chart.labels || [], flatData || [], donutOpts);
          }
          else if (type === 'stacked' && hasSeries) drawStackedBarChart(pdfCv, chart.labels || [], chart.series, axisOpts);
          else if (type === 'line') { var ds = buildLineDatasets(chart); drawChart(pdfCv, ds, chart.labels || [], axisOpts); }
          else if (type === 'area') { var ads = buildAreaDatasets(chart); drawAreaChart(pdfCv, ads, chart.labels || [], axisOpts); }
          else if (type === 'gauge') {
            var gVal = flatData && flatData.length ? flatData[0] : (chart.value || 0);
            drawGaugeChart(pdfCv, gVal, { color: chart.color, label: chart.title, min: chart.min || 0, max: chart.max || 100 });
          }
          else if (type === 'scatter') drawScatterChart(pdfCv, chart.xData || [], chart.yData || [], chart.color || 'cyan', axisOpts);
          else if (type === 'boxplot') drawBoxplotChart(pdfCv, chart);
          else if (type === 'treemap') drawTreemapChart(pdfCv, chart.labels || [], flatData || [], {});
          else {
            // Fallback: copy original canvas
            pCtx.drawImage(srcCv, 0, 0, srcCv.width, srcCv.height, 0, 0, cw, ch);
          }
        } catch(e) {
          // Fallback: copy original canvas
          pCtx.drawImage(srcCv, 0, 0, srcCv.width, srcCv.height, 0, 0, cw, ch);
        }
      } else {
        // No chart ref — copy original canvas
        pCtx.drawImage(srcCv, 0, 0, srcCv.width, srcCv.height, 0, 0, cw, ch);
      }

      var imgData = pdfCv.toDataURL('image/png');

      // Build data table for the chart
      var tableHTML = '';
      if (chart && chart.labels && chart.labels.length > 0) {
        var tData = chart.series && chart.series.length > 0
          ? chart.labels.map(function(_, i) { return chart.series.reduce(function(s, sr) { return s + (sr.data[i] || 0); }, 0); })

          tableHTML += '</tbody></table>';

      html += '<div class="chart-block">' +
        '<div class="chart-block-header">' +
        '<div class="chart-title">' + c.title + '</div>' +
        (c.desc ? '<div class="chart-desc">' + c.desc + '</div>' : '') +

        (tableHTML ? '<div class="chart-table-wrap">' + tableHTML + '</div>' : '') +
        '</div>';

    // Restore original theme
    document.body.className = _origTheme;

    html += '</div>' +

    /* Footer */

function saveProject(name) {
  const idx = getProjectIndex();
  const id = _activeProjectId || ('proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6));
  const isUpdate = !!idx.projects[id];
  const meta = {
    id: id,
    name: name,
    createdAt: isUpdate ? idx.projects[id].createdAt : new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    fileName: App.excelData ? (App.uploadedFiles.length > 0 ? App.uploadedFiles[0].name : 'Unknown') : '',
    rowCount: App.excelData ? App.excelData.rows.length : 0,
    colCount: App.excelData ? App.excelData.headers.length : 0
  };
  idx.projects[id] = meta;
  idx.activeProjectId = id;
  _activeProjectId = id;
  saveProjectIndex(idx);
  try {
    localStorage.setItem(PM_DATA_PREFIX + id, JSON.stringify(serializeProjectData()));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      toast('Storage full — delete old projects to free space.', 'error');
      return false;
    }
    console.error('Failed to save project data:', e);
    return false;
  }
  // Also download to device
  downloadProjectToDevice(name, meta);
  toast(isUpdate ? 'Project updated!' : 'Project "' + name + '" saved!', 'success');
  updateProjectIndicator();
  return true;
}

function loadProject(id) {
  const idx = getProjectIndex();
  const meta = idx.projects[id];
  if (!meta) { toast('Project not found.', 'error'); return; }
  try {
    const raw = localStorage.getItem(PM_DATA_PREFIX + id);
    if (!raw) { toast('Project data missing.', 'error'); return; }
    const data = JSON.parse(raw);
    restoreProjectData(data);
    _activeProjectId = id;
    idx.activeProjectId = id;
    saveProjectIndex(idx);
    closeProjectModal();
    navigate('analytics');
    toast('Loaded "' + meta.name + '"', 'success');
    updateProjectIndicator();
  } catch(e) {
    console.error('Failed to load project:', e);
    toast('Failed to load project — data may be corrupted.', 'error');
  }
}

async function deleteProject(id) {
  const idx = getProjectIndex();
  if (!idx.projects[id]) return;
  const name = idx.projects[id].name;
  const ok = await showConfirm('Delete Project', 'Are you sure you want to delete "' + name + '"? This cannot be undone.', 'Delete');
  if (!ok) return;
  delete idx.projects[id];
  if (idx.activeProjectId === id) { idx.activeProjectId = null; _activeProjectId = null; }
  saveProjectIndex(idx);
  try { localStorage.removeItem(PM_DATA_PREFIX + id); } catch(e) {}
  toast('Deleted "' + name + '"', 'info');
  updateProjectIndicator();
  renderProjectList();
}

function closeProjectModal() { $('#projectModalOverlay').classList.remove('open'); }

function promptSaveProject() {
  const form = document.getElementById('pmSaveForm');
  const confirm = document.getElementById('pmNewConfirm');
  if (confirm) confirm.classList.remove('open');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    setTimeout(function() { document.getElementById('pmSaveName').focus(); }, 50);
  }
}

async function confirmNewProject() {
  const form = document.getElementById('pmSaveForm');
  const confirmEl = document.getElementById('pmNewConfirm');
  if (form) form.classList.remove('open');
  const hasData = App.hasExcelData || (App.customCharts && App.customCharts.length > 0);
  if (hasData) {
    // If project modal is open, use the inline confirm UI
    if (confirmEl) {
      confirmEl.classList.toggle('open');
    } else {
      // Called from sidebar — use themed confirm dialog
      const ok = await showConfirm('New Project', 'Start fresh? Any unsaved changes to your current project will be lost.', 'Start New');
      if (ok) newProject();
    }
  } else {
    newProject();
  }
}

function doSaveProject() {
  const nameInput = document.getElementById('pmSaveName');
  const name = nameInput ? nameInput.value.trim() : '';
  if (!name) { toast('Please enter a project name.', 'error'); return; }
  if (saveProject(name)) {
    document.getElementById('pmSaveForm').classList.remove('open');
    renderProjectList();
  }
}

function timeAgo(dateStr) {
  const now = Date.now();
  const then = new Date(dateStr).getTime();
  const diff = Math.max(0, now - then);
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return Math.floor(days / 30) + 'mo ago';
}

function renderProjectList() {
  const container = document.getElementById('pmProjectList');
  if (!container) return;
  const idx = getProjectIndex();
  const projects = Object.values(idx.projects).sort(function(a, b) { return new Date(b.updatedAt) - new Date(a.updatedAt); });
  if (projects.length === 0) {
    container.innerHTML = '<div class="pm-empty">No saved projects yet.</div>';
    return;
  }
  container.innerHTML = '<div class="pm-project-list-title">Saved Projects (' + projects.length + ')</div>' +
    '<div class="pm-project-list">' + projects.map(function(p) {
      const isActive = p.id === _activeProjectId;
      return '<div class="pm-project-item' + (isActive ? ' active' : '') + '" onclick="loadProject(\'' + p.id + '\')">' +
        '<div class="pm-project-info"><div class="pm-project-name">' + p.name + '</div>' +
        '<div class="pm-project-meta"><span>' + (p.fileName || 'No file') + '</span><span>' + p.rowCount + ' rows, ' + p.colCount + ' cols</span><span>' + timeAgo(p.updatedAt) + '</span></div></div>' +
        (isActive ? '<span class="pm-project-badge">Active</span>' : '') +
        '<button class="pm-project-delete" onclick="event.stopPropagation();deleteProject(\'' + p.id + '\')" title="Delete project"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>';

}

function updateProjectIndicator() {

function createProject() {
  const name = $('#projName')?.value?.trim();
  if(!name) { toast('Please enter a project name','error'); return; }
  App.projects.unshift({ name, team: $('#projTeam').value, status: $('#projStatus').value, progress: 0 });
  toast(`Project "${name}" created!`, 'success');
  closePanel();
  if(App.currentPage === 'dashboard') navigate('dashboard');
}

function sendChat() {
  const input = $('#chatInput');
  const text = input?.value?.trim();
  if(!text) return;
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
  App.chatMessages.push({ text, sent: true, time });
  const msgs = $('#chatMessages');
  msgs.insertAdjacentHTML('beforeend', `<div class="chat-msg sent">${text}<div class="chat-msg-time">${time}</div></div>`);
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;
  // bot reply
  setTimeout(() => {
    const replies = ['Got it, thanks!','I\'ll look into that.','Sounds good, let\'s sync up later.','Nice work!','On it!','Sure, I can handle that.'];
    const reply = replies[Math.floor(Math.random()*replies.length)];
    const t2 = new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
    App.chatMessages.push({ text: reply, sent: false, time: t2 });
    msgs.insertAdjacentHTML('beforeend', `<div class="chat-msg received">${reply}<div class="chat-msg-time">${t2}</div></div>`);
    msgs.scrollTop = msgs.scrollHeight;
  }, 800 + Math.random()*1200);
}

async function fetchAI(endpoint, body) {
  const token = _getAuthToken();
  if (!token) throw new Error('AUTH_REQUIRED');
  const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
  if (csrfToken) headers['X-CSRFToken'] = csrfToken;
  const resp = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
  if (resp.status === 401) throw new Error('AUTH_REQUIRED');
  if (resp.status === 402) {
    const d = await resp.json();
    throw new Error('QUOTA:' + (d.error || 'Monthly AI query limit reached. Upgrade your plan for more.'));
  }
  if (resp.status === 429) throw new Error('RATE_LIMIT');
  if (resp.status === 503 || resp.status === 504) throw new Error('AI_UNAVAILABLE');
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function enhanceDashboardWithAI() {
  if (!App.excelData || !App.excelChartConfig) return;
  const ec = App.excelChartConfig;
  try {
    const body = {
      columns: App.excelData.headers,
      sampleRows: App.excelData.rows.slice(0, 3),
      colMeta: Object.fromEntries(Object.entries(ec.colMeta).map(([k, v]) => [k, { isMetric: v.isMetric, isCategorical: v.isCategorical, isDate: v.isDate, isIndex: v.isIndex, uniqueCount: v.uniqueCount }]))
    };
    const plan = await fetchAI('/api/dashboard-plan', body);
    if (plan.kpis && plan.kpis.length > 0) {
      const kpiRow = document.querySelector('.kpi-row-v2');
      if (kpiRow) {
        const kpis = plan.kpis.map(k => ({
          label: k.label, icon: k.icon || inferKPIIcon(k.col || k.label), color: k.format === 'currency' ? 'cyan' : k.format === 'percent' ? 'violet' : 'emerald',
          format: k.format === 'currency' ? { currency: true, abbreviate: true } : k.format === 'percent' ? { percent: true } : { abbreviate: true },
          value: (() => {
            if (!k.col) return App.excelData.rows.length;
            if (!ec.colMeta[k.col] || !ec.colMeta[k.col].vals) return App.excelData.rows.length;
            const vals = ec.colMeta[k.col].vals;
            if (!vals.length) return App.excelData.rows.length;
            if (k.aggFn === 'count') return vals.filter(v => v != null && v !== 0).length || App.excelData.rows.length;
            if (k.aggFn === 'avg') return vals.reduce((a,b)=>a+b,0) / vals.length;
            if (k.aggFn === 'max') return Math.max(...vals);
            return vals.reduce((a,b)=>a+b,0);
          })(),
          // Suppress the agg prefix when the LLM-supplied label already begins
          // with one of those words (e.g. "Total RD Cost", "Average Risk Score").
          aggType: (function() {
            const lab = String(k.label || '').trim();
            if (/^(total|sum|avg|average|mean|min|max|count|number\s+of|num)\b/i.test(lab)) return '';
            return k.aggFn === 'avg' ? 'Avg' : k.aggFn === 'max' ? 'Max' : k.aggFn === 'count' ? 'Count' : 'Total';
          })()
        }));
        kpiRow.outerHTML = renderKPICards(kpis);
        setTimeout(initKPISparklines, 100);

async function generateKPIInsights() {
  if (!App.excelData || !isLoggedIn()) return;
  try {
    const ec = App.excelChartConfig;
    const metrics = (ec.metrics || []).slice(0, 6);
    const stats = {};
    metrics.forEach(m => {
      const vals = (ec.colMeta[m] && ec.colMeta[m].vals) || [];
      if (!vals.length) return;
      const sum = vals.reduce((a,b) => a+b, 0);
      const avg = sum / vals.length;
      const sorted = [...vals].sort((a,b) => a-b);
      stats[m] = { sum: Math.round(sum), avg: Math.round(avg*100)/100, min: sorted[0], max: sorted[sorted.length-1], count: vals.length };
    });
    const prompt = 'For each metric below, write ONE short surprising insight (max 15 words). Be specific with numbers. Sound like a smart analyst.\n\nRULES:\n- Use abbreviated formats: $1.2M, $450K, 3.5B, 82%, 4.2x\n- Never write full numbers like 12,500,000 — always abbreviate\n- Use $ for currency metrics (Revenue, Cost, Profit, Sales, Price)\n- Use % for rate/score metrics\n- Be surprising or comparative, not just restating the number\n\nMetrics:\n' +
      Object.entries(stats).map(([k,v]) => k.replace(/_/g,' ') + ': sum=' + v.sum + ', avg=' + v.avg + ', min=' + v.min + ', max=' + v.max + ', n=' + v.count).join('\n') +
      '\n\nRespond as JSON: {"insights": {"metric_name": "your insight text"}}';
    const data = await fetchAI('/api/auto-insights', {
      columns: App.excelData.headers,
      colMeta: Object.fromEntries(Object.entries(ec.colMeta).map(([k,v]) => [k, {isMetric:v.isMetric}])),
      sampleRows: App.excelData.rows.slice(0,3),
      summary: { rowCount: App.excelData.rows.length, numericStats: stats }
    });
    if (data && data.insights) {
      // Update KPI card tooltips with AI insights
      document.querySelectorAll('.kpi-card-v2').forEach(card => {
        const label = card.querySelector('.kpi-label');
        if (!label) return;
        const metricName = label.textContent.replace(/^(Total|Avg|Max|Count)\s*/i, '').trim();
        // Find matching insight
        const insight = Object.entries(data.insights).find(([k]) =>
          k.toLowerCase().includes(metricName.toLowerCase()) || metricName.toLowerCase().includes(k.toLowerCase().replace(/_/g,' '))
        );
        if (insight && insight[1]) {
          card.setAttribute('onmouseenter', "showKpiTip(event,'" + insight[1].replace(/'/g, "\\'") + "')");
        }
      });
    }
  } catch(e) { /* silent — keep client-side tooltips */ }
}

function buildDataSummary() {
  if (!App.excelData) return {};
  const ec = App.excelChartConfig;
  const rows = App.excelData.rows;
  const numericStats = {};
  const categoricalDists = {};
  (ec.metrics || []).forEach(m => {
    const meta = ec.colMeta[m];
    if (!meta || !meta.vals) return;
    const vals = meta.vals.filter(v => typeof v === 'number' && !isNaN(v));
    if (vals.length === 0) return;
    const sorted = [...vals].sort((a, b) => a - b);
    const sum = vals.reduce((a, b) => a + b, 0);
    const mean = sum / vals.length;
    const variance = vals.reduce((a, v) => a + (v - mean) ** 2, 0) / vals.length;
    numericStats[m] = {
      mean: Math.round(mean * 100) / 100,
      stddev: Math.round(Math.sqrt(variance) * 100) / 100,
      min: sorted[0],
      max: sorted[sorted.length - 1],
      q1: sorted[Math.floor(sorted.length * 0.25)],
      median: sorted[Math.floor(sorted.length * 0.5)],
      q3: sorted[Math.floor(sorted.length * 0.75)],
    };
  });
  (ec.categoricals || []).forEach(c => {
    const meta = ec.colMeta[c];
    if (!meta) return;
    const counts = {};
    rows.forEach(r => { const v = String(r[c] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
    categoricalDists[c] = Object.fromEntries(entries);
  });
  return { rowCount: rows.length, numericStats, categoricalDists };
}

function buildQualityMetrics() {
  if (!App.excelData) return {};
  const rows = App.excelData.rows;
  const metrics = {};
  App.excelData.headers.forEach(h => {
    let nulls = 0, mismatches = 0;
    const meta = App.excelChartConfig.colMeta[h] || {};
    rows.forEach(r => {
      const v = r[h];
      if (v === null || v === undefined || v === '') nulls++;
      else if (meta.isMetric && isNaN(parseFloat(v))) mismatches++;
    });
    metrics[h] = { nulls, mismatches, total: rows.length };
  });
  return metrics;
}

function openAskAiModal(source, idx, event) {

  if (popup.classList.contains('open') && popup.dataset.source === source && popup.dataset.idx === String(idx)) {

  }
  App._focusedChart = { source: source, idx: idx };
  var chart = getChartForAskAi(source, idx);
  var title = chart ? chart.title : 'Chart';
  document.getElementById('askAiPopupTitle').textContent = 'Ask AI: ' + title;
  popup.dataset.source = source;
  popup.dataset.idx = idx;
  var body = document.getElementById('askAiPopupBody');
  var suggestions = getAskAiSuggestions(source, idx);
  body.innerHTML =
    '<div class="ask-ai-suggestions">' + suggestions.map(function(s) {
      return '<span class="ask-ai-chip" onclick="submitAskAiFromModal(this.textContent)">' + s + '</span>';
    }).join('') + '</div>' +

    '<div class="ask-ai-response" id="askAiPopupResp"></div>';
  // Position near the clicked button
  var btn = event ? (event.currentTarget || event.target) : null;
  if (btn) {
    var r = btn.getBoundingClientRect();
    var popupW = 380;
    var left = Math.min(r.left, window.innerWidth - popupW - 16);
    left = Math.max(8, left);
    var top = r.bottom + 8;
    if (top + 300 > window.innerHeight) top = Math.max(8, r.top - 300);
    popup.style.top = top + 'px';
    popup.style.left = left + 'px';
  }
  popup.classList.add('open');
  setTimeout(function() { var inp = document.getElementById('askAiPopupInput'); if (inp) inp.focus(); }, 50);
}

async function submitAskAiFromModal(questionOverride) {
  var popup = document.getElementById('askAiPopup');
  if (!popup) return;
  var source = popup.dataset.source;
  var idx = parseInt(popup.dataset.idx, 10);
  var inputEl = document.getElementById('askAiPopupInput');
  var respEl = document.getElementById('askAiPopupResp');
  if (!respEl) return;
  var question = questionOverride || (inputEl ? inputEl.value.trim() : '');
  if (!question) return;
  if (inputEl) inputEl.value = question;
  var cacheKey = source + '_' + idx + '_' + question;
  if (App._askAiCache[cacheKey]) {
    renderAskAiResponse(respEl, App._askAiCache[cacheKey]);
    return;
  }
  if (!isLoggedIn()) { respEl.innerHTML = aiNoAuthHTML(); return; }
  respEl.innerHTML = aiLoadingHTML('askAiPopupLoader');
  try {
    if (isModifyIntent(question)) {
      // Modify existing chart in-place
      var chart = getChartForAskAi(source, idx);
      if (!chart) { respEl.innerHTML = '<span style="color:var(--accent-rose);font-size:12px">Chart data not available.</span>'; return; }
      var ec = App.excelChartConfig || {};
      var modifyPayload = {
        message: question,
        currentChart: {
          chartType: chart._userType || chart.type || 'bar',
          xCol: chart.xCol || '',
          yCol: chart.yCol || '',
          aggFn: chart.aggFn || 'sum',
          color: chart._userColor || chart.color || 'cyan',
          title: chart.title || '',
          groupCol: chart.groupCol || null
        },
        columns: App.excelData ? App.excelData.headers.slice(0, 50) : [],
        sampleRows: App.excelData ? App.excelData.rows.slice(0, 3) : [],
        colMeta: ec.colMeta || {}
      };
      var data = await fetchAI('/api/chart-modify', modifyPayload);
      var ok = applyChartModification(source, idx, data);
      if (ok) {
        respEl.innerHTML = '<span style="color:var(--accent-emerald);font-size:12px">&#10003; ' + (data.explanation || 'Chart updated.') + '</span>';
      } else {
        respEl.innerHTML = '<span style="color:var(--accent-rose);font-size:12px">Could not apply the modification. Try rephrasing.</span>';
      }
    } else {
      // Explain chart (existing behavior)
      var payload = buildAskAiPayload(source, idx, question);
      if (!payload) { respEl.innerHTML = '<span style="color:var(--accent-rose);font-size:12px">Chart data not available.</span>'; return; }
      var data = await fetchAI('/api/chart-explain', payload);
      App._askAiCache[cacheKey] = data;
      renderAskAiResponse(respEl, data);
    }

  if (t === 'donut' || t === 'doughnut' || t === 'pie') return ['Largest segment?', 'Any surprises?', 'What stands out?'];
  return ['Why these differences?', 'What stands out?', 'Top takeaway?'];

function isModifyIntent(text) {
  // Explicit modify verbs + chart property targets
  if (/\b(change|switch|make it|convert|set|use|update|modify|turn into|swap)\b.*(color|colour|type|chart type|bar|line|donut|pie|area|hbar|title|name|column|axis|aggregat)/i.test(text)) return true;
  // "color/type to X"
  if (/\b(color|colour|type)\b.*(to|into|as)\b/i.test(text)) return true;
  // "make it/this a bar chart"
  if (/\bmake\s+(it|this|the chart)\s+(a\s+)?(bar|line|donut|pie|area|hbar|stacked|gauge|bubble|lollipop|funnel|waterfall|radar|heatmap|treemap)/i.test(text)) return true;
  // Filter/range/scope instructions: "only from...", "filter to...", "limit to...", "between X and Y"
  if (/\b(only\s+(from|show|include|between|for)|filter|limit\s+to|restrict|exclude|remove|hide|show\s+only|from\s+\w+\s+to\s+\w+|between\s+\w+\s+and\s+\w+)\b/i.test(text)) return true;
  // Desire/instruction patterns: "I want...", "I need...", "can you...", "please..."
  if (/\b(i\s+want|i\s+need|i('d| would)\s+like|can\s+you|could\s+you|please)\b.*(chart|only|from|to|show|display|instead|rather|filter|limit|color|type|title|axis|column)/i.test(text)) return true;
  // "show X instead of Y", "use X instead"
  if (/\b(instead\s+of|rather\s+than|replace\s+with|swap\s+with)\b/i.test(text)) return true;
  // "sort by...", "reverse...", "flip..."
  if (/\b(sort|reverse|flip|reorder|rearrange)\b/i.test(text)) return true;
  // "add/remove gridlines/legend/labels"
  if (/\b(add|remove|hide|show)\s+(the\s+)?(gridlines|legend|labels|title|axis)\b/i.test(text)) return true;
  // Negative check: if it's clearly a question, it's NOT a modify intent
  if (/^(why|what|how|when|where|who|which|is|are|does|do|can|could|would|should|tell me|explain|describe|summarize|summarise)\b/i.test(text.trim())) return false;
  return false;
}

  const input = document.getElementById('askDataInput');

  if (!question) return;
  if (!isLoggedIn()) { answerEl.innerHTML = aiNoAuthHTML(); answerEl.style.display = 'block'; return; }
  answerEl.innerHTML = aiLoadingHTML('askLoader');
  answerEl.style.display = 'block';
  try {
    const data = await askData(question);
    const conf = data.confidence || 'medium';
    let html = '<div style="margin-bottom:12px">' + data.answer + ' <span class="confidence-badge ' + conf + '">' + conf + '</span></div>';
    if (data.chart) html += renderAskChart(data.chart);
    if (data.filter) {
      html += '<div style="margin-top:10px"><button class="action-chip" onclick="applyAIFilter(\'' + (data.filter.column || '').replace(/'/g, "\\'") + '\',\'' + (data.filter.value || '').replace(/'/g, "\\'") + '\')">Apply Filter: ' + (data.filter.column || '') + ' = ' + (data.filter.value || '') + '</button></div>';

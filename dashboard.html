function renderPricing() {
  return `<div class="page-header" style="text-align:center;max-width:600px;margin:0 auto">
    <h1 class="page-title" style="font-size:36px;letter-spacing:-0.03em">Simple, transparent pricing</h1>
    <p class="page-subtitle">Start free. Upgrade when you need more power.</p>
  </div>
  <div class="pricing-grid" id="pricingGrid" style="margin-top:24px">
    <div style="text-align:center;padding:40px;color:var(--text-tertiary)">Loading plans...</div>
  </div>`;
}

const _checkSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
const _xSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

const _featureLabels = {
  ai_queries: 'AI chats / month',
  document_uploads: 'Document uploads / month',
  custom_charts: 'Custom charts / month',
  export: 'Exports / month',
  saved_projects: 'Saved projects',
  priority_support: 'Priority support',
};

function _renderPricingCard(plan, currentPlanCode) {
  const isFeatured = plan.code === 'pro';
  const isCurrent = plan.code === currentPlanCode;
  const fullPrice = (plan.price_cents / 100).toFixed(0);
  const price = plan.price_cents === 0
    ? '<span class="pricing-price-free">$0</span>'
    : `<span class="pricing-price">$${fullPrice}<span>/mo</span></span>`;

  const featureOrder = ['ai_queries', 'document_uploads', 'custom_charts', 'export', 'saved_projects', 'priority_support'];
  const features = featureOrder.map(fk => {
    const ent = plan.entitlements[fk];
    if (!ent) return '';
    const enabled = ent.is_enabled;
    const limit = ent.limit_value;
    const icon = enabled ? _checkSvg : _xSvg;
    const cls = enabled ? '' : ' class="disabled"';
    let label = _featureLabels[fk] || fk;
    if (enabled && limit !== null && limit !== undefined) {
      label = `${limit} ${label.toLowerCase()}`;
    } else if (enabled && limit === null) {
      label = `Unlimited ${label.toLowerCase()}`;
    }
    return `<li${cls}>${icon} ${label}</li>`;
  }).join('');

  let btnLabel = 'Get Started';
  let btnClass = '';
  let btnDisabled = '';
  let btnAction = `switchPlan('${plan.code}')`;

  if (isCurrent) {
    btnLabel = 'Current Plan';
    btnDisabled = ' disabled';
    btnAction = '';
  } else if (plan.code === 'free') {
    if (currentPlanCode === 'free') {
      btnLabel = 'Free Forever';
      btnDisabled = ' disabled';
      btnAction = '';
    } else {
      btnLabel = 'Downgrade to Free';
      btnClass = '';
      btnAction = `switchPlan('free')`;
    }
  } else {
    const planOrder = { free: 0, pro: 1, business: 2 };
    const isUpgrade = (planOrder[plan.code] || 0) > (planOrder[currentPlanCode] || 0);
    btnLabel = isUpgrade ? `Upgrade to ${plan.name}` : `Switch to ${plan.name}`;
    btnClass = ' primary';
  }

  return `<div class="pricing-card${isFeatured ? ' featured' : ''}${isCurrent ? ' current' : ''}">
    <div class="pricing-plan-name">${plan.name}</div>
    <div class="pricing-plan-desc">${plan.description || ''}</div>
    ${price}
    <div class="pricing-divider"></div>
    <ul class="pricing-features">${features}</ul>
    <button class="pricing-btn${btnClass}"${btnDisabled}${btnAction ? ` onclick="${btnAction}"` : ''}>${btnLabel}</button>
  </div>`;
}

async function loadPricingData() {
  try {
    const resp = await fetch('/api/billing/plans');
    const data = await resp.json();
    if (!data.plans) return;

    // Get current plan
    let currentPlanCode = 'free';
    const token = _getAuthToken();
    if (token) {
      try {
        const subResp = await fetch('/api/billing/subscription', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const subData = await subResp.json();
        if (subData.plan) currentPlanCode = subData.plan.plan_code;
      } catch(e) {}
    }

    const grid = document.getElementById('pricingGrid');
    if (grid) {
      grid.innerHTML = data.plans.map(p => _renderPricingCard(p, currentPlanCode)).join('');
    }
  } catch(e) {
    console.error('Failed to load pricing:', e);
  }
}

async function switchPlan(planCode) {
  const token = _getAuthToken();
  if (!token) {
    window.location.href = '/signup';
    return;
  }

  // Confirm downgrade to free
  if (planCode === 'free') {
    if (!confirm('Downgrade to Free? You\'ll keep your current plan until the end of the billing period.')) return;
  }

  try {
    const resp = await fetch('/api/billing/switch-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ plan_code: planCode }),
    });
    const data = await resp.json();
    if (data.error) {
      toast(data.error, 'error');
      return;
    }
    // Stripe redirect (Checkout or Billing Portal) — always redirect for upgrades
    if (data.redirect_url) {
      window.location.href = data.redirect_url;
      return;
    }
    // Only downgrades/cancels return immediate results (no payment needed)
    if (data.action === 'cancel' || data.action === 'noop') {
      toast(data.message || 'Plan updated.', 'success');
      if (App.currentPage === 'pricing') navigate('pricing');
      else if (App.currentPage === 'subscription') navigate('subscription');
    }
  } catch(e) {
    toast('Plan switch failed. Please try again.', 'error');
  }
}

// Legacy alias
function billingCheckout(planCode) { switchPlan(planCode); }

// ── Quota check + record (used before exports, chart saves, project creates) ──
async function checkQuota(featureKey) {
  const token = _getAuthToken();
  if (!token) return { allowed: true };
  try {
    const resp = await fetch('/api/billing/consume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ feature_key: featureKey }),
    });
    const data = await resp.json();
    if (resp.status === 402) {
      toast(data.error || 'Quota exceeded. Upgrade your plan.', 'error');
      return { allowed: false, ...data };
    }
    return { allowed: true, ...data };
  } catch(e) {
    return { allowed: true };
  }
}

// ── Billing success polling (after Stripe redirect) ────────────────────
async function pollBillingSuccess(maxAttempts) {
  const token = _getAuthToken();
  if (!token) return;
  const max = maxAttempts || 15;
  let attempts = 0;
  const poll = async () => {
    attempts++;
    try {
      const resp = await fetch('/api/billing/subscription', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await resp.json();
      const status = data.subscription?.status;
      const planCode = data.plan?.plan_code;
      if (status === 'active' && planCode !== 'free') {
        const el = document.getElementById('billingSuccessStatus');
        if (el) el.innerHTML = '<div style="color:var(--accent-emerald);font-size:16px;font-weight:600">Payment confirmed! Redirecting...</div>';
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
        return;
      }
    } catch(e) {}
    if (attempts < max) {
      setTimeout(poll, 2000);
    } else {
      const el = document.getElementById('billingSuccessStatus');
      if (el) el.innerHTML = '<div style="color:var(--accent-amber)">Still processing. Check your <a href="/dashboard" style="color:var(--accent-cyan);text-decoration:underline">dashboard</a> in a moment.</div>';
    }
  };
  poll();
}

async function billingCancel() {
  const token = _getAuthToken();
  if (!token) return;
  if (!confirm('Cancel your subscription? You\'ll keep access until the end of your billing period.')) return;
  try {
    const resp = await fetch('/api/billing/cancel', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const data = await resp.json();
    if (data.error) { toast(data.error, 'error'); return; }
    toast('Subscription will cancel at end of period.', 'success');
    navigate('subscription');
  } catch(e) { toast('Failed to cancel.', 'error'); }
}

async function billingResume() {
  const token = _getAuthToken();
  if (!token) return;
  try {
    const resp = await fetch('/api/billing/resume', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const data = await resp.json();
    if (data.error) { toast(data.error, 'error'); return; }
    toast('Subscription resumed!', 'success');
    navigate('subscription');
  } catch(e) { toast('Failed to resume.', 'error'); }
}

async function loadBillingSection() {
  const token = _getAuthToken();
  const badge = document.getElementById('billingBadge');
  const content = document.getElementById('billingContent');
  if (!badge || !content) return;

  if (!token) {
    badge.innerHTML = '<span class="billing-plan-badge free">Free</span>';
    content.innerHTML = `<p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px">Sign in to manage your subscription.</p>
      <button class="btn btn-primary" onclick="window.location.href='/login'">Log in</button>`;
    return;
  }

  try {
    const resp = await fetch('/api/billing/subscription', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    if (resp.status === 401) {
      // Token expired — prompt re-login
      badge.innerHTML = '<span class="billing-plan-badge free">Free</span>';
      content.innerHTML = `<p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px">Your session has expired. Please sign in again to view your subscription.</p>
        <button class="btn btn-primary" onclick="window.location.href='/login'">Sign in</button>`;
      return;
    }
    const planCode = data.plan ? data.plan.plan_code : 'free';
    const planName = data.plan ? data.plan.plan_name : 'Free';
    const sub = data.subscription;
    const usage = data.usage || {};

    badge.innerHTML = `<span class="billing-plan-badge ${planCode}">${planName}</span>`;

    let html = '';

    // Usage rows with circular progress rings
    const features = [
      { key: 'ai_queries', label: 'AI Chats', desc: 'AI-powered insights, explanations & recommendations', color: '#818cf8' },
      { key: 'document_uploads', label: 'Document Uploads', desc: 'Upload Excel files for analysis', color: '#60a5fa' },
      { key: 'custom_charts', label: 'Custom Charts', desc: 'Create and save personalized chart configurations per month', color: '#34d399' },
      { key: 'export', label: 'Exports', desc: 'Download charts as PNG, SVG, or JPG per month', color: '#fbbf24' },
      { key: 'saved_projects', label: 'Saved Projects', desc: 'Organize your analyses into projects', color: '#f472b6' },
    ];
    html += '<div style="display:flex;flex-direction:column;gap:0;margin-bottom:20px">';
    features.forEach((f, i) => {
      const u = usage[f.key];
      const enabled = u && u.is_enabled;
      const current = u ? (u.current_usage || 0) : 0;
      const limit = (u && u.limit_value !== undefined) ? u.limit_value : null;
      const unlimited = enabled && limit === null;
      const disabled = !enabled;
      const remaining = disabled ? 0 : (unlimited ? null : Math.max(0, (limit || 0) - current));
      const pct = disabled ? 100 : (unlimited ? 0 : (limit > 0 ? Math.min(100, (current / limit) * 100) : 0));
      const ringPct = disabled ? 0 : (unlimited ? 0 : pct);
      const circumference = 2 * Math.PI * 18;
      const dashOffset = circumference - (ringPct / 100) * circumference;
      const ringColor = disabled ? '#4b5563' : f.color;
      const trackColor = disabled ? 'rgba(75,85,99,0.15)' : (ringColor + '22');
      let valueText, statusText, statusColor;
      if (disabled) {
        valueText = '—'; statusText = 'Pro plan'; statusColor = 'var(--text-tertiary)';
      } else if (unlimited) {
        valueText = '∞'; statusText = 'Unlimited'; statusColor = f.color;
      } else {
        valueText = remaining; statusText = current + ' of ' + limit + ' used'; statusColor = 'var(--text-tertiary)';
      }
      const border = i < features.length - 1 ? 'border-bottom:1px solid var(--glass-border);' : '';
      html += `<div style="display:flex;align-items:center;gap:16px;padding:16px 0;${border}">
        <div style="flex-shrink:0;position:relative;width:48px;height:48px">
          <svg width="48" height="48" viewBox="0 0 48 48" style="transform:rotate(-90deg)">
            <circle cx="24" cy="24" r="18" fill="none" stroke="${trackColor}" stroke-width="3.5"/>
            <circle cx="24" cy="24" r="18" fill="none" stroke="${ringColor}" stroke-width="3.5"
              stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
              stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/>
          </svg>
          <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${disabled ? '14px' : (String(valueText).length > 2 ? '11px' : '14px')};font-weight:700;color:${disabled ? 'var(--text-tertiary)' : 'var(--text-primary)'}">${valueText}</span>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:2px">${f.label}</div>
          <div style="font-size:11px;color:var(--text-tertiary);line-height:1.3">${f.desc}</div>
        </div>
        <div style="flex-shrink:0;text-align:right">
          ${disabled
            ? '<span style="font-size:11px;padding:3px 8px;border-radius:10px;background:rgba(139,92,246,0.1);color:#a78bfa">Upgrade</span>'
            : '<span style="font-size:12px;color:' + statusColor + '">' + statusText + '</span>'
          }
        </div>
      </div>`;
    });
    html += '</div>';

    // Subscription info
    if (sub && planCode !== 'free') {
      const endDate = new Date(sub.current_period_end).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      if (sub.cancel_at_period_end) {
        html += `<p style="font-size:13px;color:var(--accent-rose);margin:16px 0 12px">Cancels on ${endDate}</p>
          <button class="btn btn-primary" onclick="billingResume()">Resume Subscription</button>`;
      } else {
        html += `<p style="font-size:13px;color:var(--text-tertiary);margin:16px 0 12px">Renews on ${endDate}</p>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost" onclick="navigate('pricing')">Change Plan</button>
            <button class="btn btn-ghost" style="color:var(--accent-rose);border-color:rgba(239,68,68,0.3)" onclick="billingCancel()">Cancel</button>
          </div>`;
      }
    } else {
      html += `<div style="margin-top:16px"><button class="btn btn-primary" onclick="navigate('pricing')">Upgrade Plan</button></div>`;
    }

    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = '<p style="font-size:13px;color:var(--text-tertiary)">Could not load billing info.</p>';
  }
}

// Column type SVG icons
const COL_TYPE_ICONS = {
  numeric: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>',
  currency: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  percent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>',
  date: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  text: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><text x="3" y="17" font-size="14" font-weight="600" font-family="Inter,sans-serif" fill="currentColor" stroke="none">ABC</text></svg>',
  category: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
  id: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  geo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
  boolean: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
};

function detectColumnType(colName, meta) {
  if (!meta) return { type: 'text', icon: COL_TYPE_ICONS.text };
  const low = (colName || '').toLowerCase().replace(/[_\s]+/g, '');
  if (meta.isIndex) return { type: 'id', icon: COL_TYPE_ICONS.id };
  if (meta.isDate) return { type: 'date', icon: COL_TYPE_ICONS.date };
  if (/email|mail/i.test(low)) return { type: 'email', icon: COL_TYPE_ICONS.email };
  if (/country|city|state|region|location|address|zip|postal|lat|lng|longitude|latitude/i.test(low)) return { type: 'geo', icon: COL_TYPE_ICONS.geo };
  if (meta.isMetric) {
    if (/revenue|sales|cost|price|profit|income|salary|wage|budget|spend|fee|amount/i.test(low)) return { type: 'currency', icon: COL_TYPE_ICONS.currency };
    if (/percent|pct|rate|ratio|margin/i.test(low)) return { type: 'percent', icon: COL_TYPE_ICONS.percent };
    return { type: 'numeric', icon: COL_TYPE_ICONS.numeric };
  }
  if (meta.isCategorical) return { type: 'category', icon: COL_TYPE_ICONS.category };
  // Check for boolean
  if (meta.uniqueVals && meta.uniqueVals.length <= 3) {
    const boolVals = meta.uniqueVals.map(v => String(v).toLowerCase());
    if (boolVals.every(v => ['true','false','yes','no','0','1','y','n'].includes(v))) return { type: 'boolean', icon: COL_TYPE_ICONS.boolean };
  }
  return { type: 'text', icon: COL_TYPE_ICONS.text };
}

function formatCellValue(val, colType) {
  if (val === undefined || val === null || val === '') return '<span style="opacity:0.2">—</span>';
  if (colType.type === 'currency') return formatNumber(Number(val), { currency: true, abbreviate: false, decimals: 2 });
  if (colType.type === 'percent') return Number(val).toFixed(1);
  if (colType.type === 'numeric') return typeof val === 'number' ? formatNumber(val, { abbreviate: false, decimals: val % 1 ? 2 : 0 }) : val;
  return String(val);
}

function renderExcelPreview() {
  if (!App.excelData) return '';
  const d = App.excelData;
  const ec = App.excelChartConfig;
  const maxRows = Math.min(d.rows.length, 50);
  // Detect column types
  const colTypes = {};
  d.headers.forEach(h => { colTypes[h] = detectColumnType(h, ec ? ec.colMeta[h] : null); });

  const thHTML = d.headers.map(h => {
    const ct = colTypes[h];
    const typeBadge = '<span class="col-type-icon" title="' + ct.type + '">' + ct.icon + '</span>';
    return '<th>' + typeBadge + h.replace(/_/g, ' ') + '</th>';
  }).join('');

  const tbHTML = d.rows.slice(0, maxRows).map(r =>
    '<tr>' + d.headers.map(h => {
      const ct = colTypes[h];
      const cls = ct.type === 'numeric' || ct.type === 'currency' || ct.type === 'percent' ? ' class="col-numeric"' : ct.type === 'date' ? ' class="col-date"' : '';
      return '<td' + cls + '>' + formatCellValue(r[h], ct) + '</td>';
    }).join('') + '</tr>'
  ).join('');

  const typeStats = {};
  d.headers.forEach(h => { const t = colTypes[h].type; typeStats[t] = (typeStats[t] || 0) + 1; });
  const typeSummary = Object.entries(typeStats).map(([t, c]) => c + ' ' + t).join(' · ');

  return `<div class="glass-panel" style="margin-top:20px"><div class="panel-header" style="flex-wrap:wrap;gap:8px">
    <h2 class="panel-title">Data Preview</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:11px;color:var(--text-tertiary)">${formatNumber(d.rows.length, {abbreviate:false})} rows · ${d.headers.length} cols</span>
      <span style="font-size:10px;color:var(--text-tertiary);opacity:0.6">${typeSummary}</span>
    </div></div>
    <div class="data-table-wrap" style="max-height:320px;overflow-y:auto"><table class="data-table"><thead><tr>${thHTML}</tr></thead><tbody>${tbHTML}</tbody></table></div>
    ${d.rows.length > 50 ? '<p style="text-align:center;padding:8px;font-size:11px;color:var(--text-tertiary)">Showing 50 of ' + formatNumber(d.rows.length, {abbreviate:false}) + ' rows</p>' : ''}</div>`;
}

function initSafetyCSA() {
  if (!App.hasExcelData || !isLoggedIn()) return;
  const token = _getAuthToken();
  fetch('/api/safety-compare', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ headers: App.excelData.headers, rows: App.excelData.rows.slice(0, 500) })
  }).then(r => r.json()).then(data => {
    const el = document.getElementById('safetyContent');
    if (!el) return;
    let html = '';

    // Comparison table

// STAGE ANALYTICS PAGE

function renderStageAnalytics() {
  if (!App.hasExcelData) {
    return renderOnboardingUpload({ graphic: 'analytics', steps: [{ label: 'Upload Data', active: true }, { label: 'Stage Analysis', active: false }], features: [] });
  }
  // Auto-detect phase/stage column
  const ec = App.excelChartConfig;
  const phaseCol = App.excelData.headers.find(h => /^phase$|^stage$/i.test(h.trim()));
  const entityCol = App.excelData.headers.find(h => /molecule|product|drug|entity|name/i.test(h) && ec.colMeta[h] && !ec.colMeta[h].isNumeric);
  const timeCol = ec.dates && ec.dates[0];

  if (!phaseCol) {
    return '<div class="page-header"><div><h1 class="page-title">Stage Analytics</h1><p class="page-subtitle">No phase/stage column detected in your data.</p></div></div>' +
      '<div class="glass-panel" style="padding:40px;text-align:center;color:rgba(255,255,255,0.30);">Upload data with a "Phase" or "Stage" column to use this feature.</div>';
  }

  const rows = App.excelData.rows;
  const phases = {};
  const entities = {};
  rows.forEach(r => {
    const p = String(r[phaseCol] || '').trim();
    const e = entityCol ? String(r[entityCol] || '').trim() : null;
    if (p) phases[p] = (phases[p] || 0) + 1;
    if (e && p) {
      if (!entities[e]) entities[e] = {};
      entities[e][p] = (entities[e][p] || 0) + 1;
    }
  });

  // Sort phases by a natural order if possible
  const phaseOrder = ['Discovery', 'Preclinical', 'Phase I', 'Phase II', 'Phase III', 'FDA Review', 'Approved', 'Discontinued'];
  const sortedPhases = Object.keys(phases).sort((a, b) => {
    const ia = phaseOrder.findIndex(p => a.includes(p));
    const ib = phaseOrder.findIndex(p => b.includes(p));
    return (ia >= 0 ? ia : 99) - (ib >= 0 ? ib : 99);
  });

  let html = '<div class="page-header"><div><h1 class="page-title">Stage Analytics</h1><p class="page-subtitle">Pipeline progression and phase distribution.</p></div></div>';

  // Phase funnel
  html += '<div class="glass-panel" style="padding:20px;margin-bottom:16px;">';
  html += '<div style="font-size:13px;font-weight:400;color:rgba(255,255,255,0.80);margin-bottom:16px;">Pipeline Funnel</div>';
  const maxCount = Math.max(...Object.values(phases));
  sortedPhases.forEach((p, i) => {
    const count = phases[p];
    const pct = maxCount > 0 ? Math.round(count / maxCount * 100) : 0;
    const isActive = count > maxCount * 0.5;
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">';
    html += '<div style="width:90px;font-size:11px;color:rgba(255,255,255,0.50);text-align:right;">' + p + '</div>';
    html += '<div style="flex:1;height:20px;background:rgba(255,255,255,0.03);border-radius:4px;overflow:hidden;position:relative;">';
    html += '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,rgba(6,182,212,' + (0.3 + i * 0.08) + '),rgba(6,182,212,' + (0.15 + i * 0.04) + '));border-radius:4px;transition:width 0.5s;"></div>';
    html += '<span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:400;color:rgba(255,255,255,0.60);">' + count + ' records</span>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Entity × Phase matrix
  if (entityCol && Object.keys(entities).length > 0 && Object.keys(entities).length <= 20) {
    html += '<div class="glass-panel" style="padding:20px;margin-bottom:16px;overflow-x:auto;">';
    html += '<div style="font-size:13px;font-weight:400;color:rgba(255,255,255,0.80);margin-bottom:12px;">Entity × Phase Matrix</div>';
    html += '<table style="width:100%;border-collapse:collapse;font-size:10px;">';
    html += '<tr><th style="text-align:left;padding:6px;color:rgba(255,255,255,0.30);border-bottom:1px solid rgba(255,255,255,0.06);">' + entityCol.replace(/_/g,' ') + '</th>';
    sortedPhases.forEach(p => {
      html += '<th style="text-align:center;padding:6px;color:rgba(255,255,255,0.30);border-bottom:1px solid rgba(255,255,255,0.06);">' + p + '</th>';
    });
    html += '</tr>';
    Object.entries(entities).forEach(([eName, pMap]) => {
      html += '<tr>';
      html += '<td style="padding:6px;color:rgba(255,255,255,0.60);border-bottom:1px solid rgba(255,255,255,0.03);">' + eName + '</td>';
      sortedPhases.forEach(p => {
        const v = pMap[p] || 0;
        const alpha = v > 0 ? Math.min(0.8, 0.15 + (v / maxCount) * 0.65) : 0.02;
        html += '<td style="text-align:center;padding:6px;border-bottom:1px solid rgba(255,255,255,0.03);"><span style="display:inline-block;width:28px;height:20px;line-height:20px;border-radius:4px;background:rgba(6,182,212,' + alpha.toFixed(2) + ');font-size:9px;color:rgba(255,255,255,' + (v > 0 ? 0.8 : 0.15) + ');">' + (v || '-') + '</span></td>';
      });
      html += '</tr>';
    });
    html += '</table>';
    html += '</div>';
  }

  // Phase distribution summary
  html += '<div class="glass-panel" style="padding:16px;">';
  html += '<div style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.80);margin-bottom:8px;">Summary</div>';
  html += '<div style="font-size:11px;color:rgba(255,255,255,0.50);line-height:1.6;">';
  html += sortedPhases.length + ' distinct phases detected. ';
  html += 'Most records in <strong style="color:rgba(255,255,255,0.80);">' + sortedPhases[0] + '</strong> (' + phases[sortedPhases[0]] + '). ';
  if (entityCol) html += Object.keys(entities).length + ' unique ' + entityCol.replace(/_/g,' ').toLowerCase() + 's tracked.';
  html += '</div></div>';

  return html;
}

function initCostDrivers() {
  if (!App.hasExcelData || !isLoggedIn()) return;
  const token = _getAuthToken();
  fetch('/api/cost-decompose', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ headers: App.excelData.headers, rows: App.excelData.rows.slice(0, 500) })
  }).then(r => r.json()).then(data => {
    const el = document.getElementById('costContent');
    if (!el) return;
    let html = '';

    // Total cost card
    const fmtCost = (v) => v >= 1e9 ? '$' + (v/1e9).toFixed(1) + 'B' : v >= 1e6 ? '$' + (v/1e6).toFixed(1) + 'M' : v >= 1e3 ? '$' + (v/1e3).toFixed(0) + 'K' : '$' + Math.round(v);
    html += '<div class="glass-panel" style="padding:20px;margin-bottom:16px;text-align:center">';
    html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.30);margin-bottom:8px;">Total ' + (data.primary_cost || 'Cost').replace(/_/g,' ') + '</div>';
    html += '<div style="font-size:36px;font-weight:300;color:rgba(255,255,255,0.95);">' + fmtCost(data.total_cost || 0) + '</div>';
    if (data.efficiency) {
      html += '<div style="font-size:11px;color:rgba(255,255,255,0.30);margin-top:4px;">' + fmtCost(data.efficiency.cost_per_record || 0) + ' per record · Trend: ' + (data.efficiency.cost_trend || 'stable') + '</div>';
    }
    html += '</div>';

    // Decomposition by dimension
    if (data.decomposition && data.decomposition.by_dimension) {
      data.decomposition.by_dimension.slice(0, 3).forEach(dim => {
        html += '<div class="glass-panel" style="padding:16px;margin-bottom:12px;">';
        html += '<div style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.80);margin-bottom:10px;">Cost by ' + dim.dimension.replace(/_/g, ' ') + '</div>';
        const maxCost = Math.max(...dim.breakdown.map(b => b.cost));
        dim.breakdown.slice(0, 8).forEach(b => {
          const pct = maxCost > 0 ? Math.round(b.cost / maxCost * 100) : 0;
          const changeColor = b.change_vs_prior > 5 ? 'var(--accent-rose)' : b.change_vs_prior < -5 ? 'var(--accent-emerald)' : 'rgba(255,255,255,0.30)';
          const changeStr = b.change_vs_prior != null ? (b.change_vs_prior >= 0 ? '+' : '') + b.change_vs_prior.toFixed(1) + '%' : '';
          html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
          html += '<div style="width:80px;font-size:10px;color:rgba(255,255,255,0.45);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + b.category + '</div>';
          html += '<div style="flex:1;height:12px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:rgba(6,182,212,0.5);border-radius:3px;"></div></div>';
          html += '<div style="width:55px;font-size:10px;font-weight:400;color:rgba(255,255,255,0.70);text-align:right;">' + fmtCost(b.cost) + '</div>';
          if (changeStr) html += '<div style="width:40px;font-size:9px;color:' + changeColor + ';text-align:right;">' + changeStr + '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
    }

    // Top drivers
    if (data.top_drivers && data.top_drivers.length) {
      html += '<div class="glass-panel" style="padding:16px;margin-bottom:12px;">';
      html += '<div style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.80);margin-bottom:10px;">Top Cost Drivers</div>';
      data.top_drivers.slice(0, 5).forEach(d => {
        const sColor = d.severity === 'high' ? 'var(--accent-rose)' : d.severity === 'medium' ? '#f59e0b' : 'var(--accent-cyan)';
        html += '<div style="display:flex;gap:8px;margin-bottom:6px;font-size:11px;">';
        html += '<span style="color:' + sColor + ';">&#9679;</span>';
        html += '<span style="color:rgba(255,255,255,0.60);">' + d.driver + ' — <strong>' + d.impact + '</strong></span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // AI Narrative
    if (data.narrative) {
      html += '<div class="glass-panel" style="padding:16px;">';
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.80);">AI Cost Analysis</span></div>';
      html += '<div style="font-size:12px;color:rgba(255,255,255,0.60);line-height:1.6;">' + data.narrative + '</div>';
      if (data.recommendations && data.recommendations.length) {
        html += '<div style="margin-top:10px;">';
        data.recommendations.forEach(rec => {
          html += '<div style="padding:6px 10px;margin-bottom:4px;border-radius:6px;background:rgba(6,182,212,0.06);border-left:3px solid rgba(6,182,212,0.3);font-size:11px;color:rgba(255,255,255,0.65);">' + rec + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    el.innerHTML = html;
  }).catch(err => {
    const el = document.getElementById('costContent');
    if (el) el.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.30);">Cost analysis unavailable: ' + err.message + '</div>';
  });
}

function _riskStep1_Extract() {
  _riskSetStep(1);

  const token = _getAuthToken();
  fetch('/api/risk-v2/extract', {
    method: 'POST',

    body: JSON.stringify({ headers: App.excelData.headers, rows: App.excelData.rows.slice(0, 500) })

// Hollow circle toggle
function _riskToggle(circle, idx) {
  circle.classList.toggle('checked');
  const card = document.getElementById('riskFactor' + idx);
  if (card) card.classList.toggle('unchecked', !circle.classList.contains('checked'));
}

// Select/Deselect all
function _riskSelectAll(checked) {
  document.querySelectorAll('.risk-circle').forEach(c => {
    c.classList.toggle('checked', checked);
    const idx = parseInt(c.dataset.idx);
    const card = document.getElementById('riskFactor' + idx);
    if (card) card.classList.toggle('unchecked', !checked);
  });
}

// Filter chips
function _riskFilter(filter, chipEl) {
  // Update active chip
  document.querySelectorAll('.risk-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');

  const cards = document.querySelectorAll('.risk-factor-card');
  cards.forEach(card => {
    const src = card.dataset.source;
    const cat = card.dataset.cat;
    const comp = parseInt(card.dataset.composite || 0);
    let show = true;
    if (filter === 'data') show = src === 'data';
    else if (filter === 'knowledge') show = src === 'knowledge';
    else if (filter === 'both') show = src === 'both';
    else if (filter === 'high') show = comp >= 60;
    else if (filter === 'top5') {
      // Show top 5 by composite score
      const allCards = [...document.querySelectorAll('.risk-factor-card')];
      allCards.sort((a, b) => parseInt(b.dataset.composite) - parseInt(a.dataset.composite));
      const top5 = new Set(allCards.slice(0, 5));
      show = top5.has(card);
    }
    else if (filter.startsWith('cat:')) show = cat === filter.slice(4);
    card.style.display = show ? '' : 'none';
  });
}

function _riskAddFactor() {
  const name = prompt('Risk factor name:');
  if (!name) return;
  App._riskV2.factors.push({
    id: name.toLowerCase().replace(/\s+/g, '_'),
    name: name, description: 'User-defined risk factor', source: 'user',
    category: 'operational', metric_column: null,
    impact: 5, likelihood: 5, controllability: 5, evidence: 'Added manually'
  });

}

function _riskLiveRerank() {
  // Client-side TOPSIS re-rank with current weights
  const factors = App._riskV2.factors;
  const w = App._riskV2.weights || { impact: 40, likelihood: 35, controllability: 25 };
  const wNorm = { impact: w.impact / (w.impact + w.likelihood + w.controllability), likelihood: w.likelihood / (w.impact + w.likelihood + w.controllability), controllability: w.controllability / (w.impact + w.likelihood + w.controllability) };
  const criteria = ['impact', 'likelihood', 'controllability'];
  const benefit = new Set(['impact', 'likelihood']);
  const n = factors.length;
  if (!n) return;

  // Vector normalization
  const norm = criteria.map(c => {
    const sumSq = Math.sqrt(factors.reduce((s, f) => s + Math.pow(f[c] || 5, 2), 0));
    return factors.map(f => sumSq > 0 ? (f[c] || 5) / sumSq : 0);
  });
  // Weighted
  const weighted = criteria.map((c, j) => norm[j].map(v => v * wNorm[c]));
  // Ideal best/worst
  const idealBest = criteria.map((c, j) => benefit.has(c) ? Math.max(...weighted[j]) : Math.min(...weighted[j]));
  const idealWorst = criteria.map((c, j) => benefit.has(c) ? Math.min(...weighted[j]) : Math.max(...weighted[j]));
  // Distances
  factors.forEach((f, i) => {
    const dBest = Math.sqrt(criteria.reduce((s, _, j) => s + Math.pow(weighted[j][i] - idealBest[j], 2), 0));
    const dWorst = Math.sqrt(criteria.reduce((s, _, j) => s + Math.pow(weighted[j][i] - idealWorst[j], 2), 0));
    f.topsis_score = dBest + dWorst > 0 ? dWorst / (dBest + dWorst) : 0.5;
    f.risk_pct = Math.round(f.topsis_score * 1000) / 10;
  });
  factors.sort((a, b) => b.topsis_score - a.topsis_score);
  factors.forEach((f, i) => f.rank = i + 1);

  // Update bars without full re-render
  const el = document.getElementById('riskContent');
  if (el) _riskRenderStep2(el);
}

App._riskV2.mcIterations = 10000;

function _riskStep3_MonteCarlo() {
  _riskSetStep(3);
  const el = document.getElementById('riskContent');
  if (!el) return;
  const iters = App._riskV2.mcIterations;
  el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:40px;justify-content:center;"><div class="genbi-fill-bars genbi-fill-sm"><div class="gfb"></div><div class="gfb"></div><div class="gfb"></div><div class="gfb"></div></div><span style="font-size:12px;color:rgba(255,255,255,0.35);">Running ' + iters.toLocaleString() + ' Monte Carlo iterations...</span></div>';

  const token = _getAuthToken() || '';
  const body = { factors: App._riskV2.factors, rows: App.excelData.rows.slice(0, 500), headers: App.excelData.headers, top_n: 3, n_iterations: iters };

  // MC is primary — render as soon as it returns. Tornado is optional secondary.
  App._riskV2.tornado = [];
  fetch('/api/risk-v2/simulate', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify(body) })
    .then(r => r.json()).then(mcData => {
      App._riskV2.simulations = mcData.simulations || [];
      _riskRenderStep3(el);
      // Tornado loads independently — if it fails, MC still shows
      fetch('/api/risk-v2/tornado', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify(body) })
        .then(r => r.json()).then(torData => {
          App._riskV2.tornado = torData.tornado || [];
          const torEl = document.getElementById('riskTornadoSection');
          if (torEl && App._riskV2.tornado.length) _riskRenderTornado(torEl);
        }).catch(() => {}); // tornado failure is silent
    }).catch(err => { el.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.30);">Monte Carlo failed: ' + err.message + '</div>'; });
}

function _riskDrawMCHistograms(sims) {
  sims.forEach((s, si) => {
    const canvas = document.getElementById('mcHist' + si);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width, h = 140;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);

    const bins = s.histogram;
    const maxCount = Math.max(...bins.map(b => b.count));
    const pad = { l:10, r:10, t:18, b:14 };
    const chartW = w - pad.l - pad.r;
    const chartH = h - pad.t - pad.b;
    const barW = chartW / bins.length;
    const range = bins[bins.length-1].hi - bins[0].lo;
    const toX = v => pad.l + ((v - bins[0].lo) / range) * chartW;

    // Find P5 and P95 bin positions for CI zones
    const p5x = toX(s.percentiles.p5);
    const p95x = toX(s.percentiles.p95);

    // Draw CI zone backgrounds
    // Left tail (0-5%): faded
    ctx.fillStyle = 'rgba(6,182,212,0.04)';
    ctx.fillRect(pad.l, pad.t, p5x - pad.l, chartH);
    // Middle (5-95%): highlighted
    ctx.fillStyle = 'rgba(6,182,212,0.06)';
    ctx.fillRect(p5x, pad.t, p95x - p5x, chartH);
    // Right tail (95-100%): faded red
    ctx.fillStyle = 'rgba(244,63,94,0.04)';
    ctx.fillRect(p95x, pad.t, w - pad.r - p95x, chartH);

    // CI zone labels at top
    ctx.font = '700 8px Inter,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('5%', (pad.l + p5x) / 2, pad.t - 4);
    ctx.fillStyle = '#67e8f9';
    ctx.fillText('90%', (p5x + p95x) / 2, pad.t - 4);
    ctx.fillStyle = 'rgba(244,63,94,0.5)';
    ctx.fillText('5%', (p95x + w - pad.r) / 2, pad.t - 4);

    // Draw bars
    bins.forEach((b, bi) => {
      const barH = maxCount > 0 ? (b.count / maxCount) * chartH : 0;
      const x = pad.l + bi * barW;
      const y = pad.t + chartH - barH;
      const mid = b.mid;

      // Color based on CI zone
      if (mid <= s.percentiles.p5) {
        ctx.fillStyle = 'rgba(6,182,212,0.25)';
      } else if (mid >= s.percentiles.p95) {
        ctx.fillStyle = 'rgba(244,63,94,0.5)';
      } else {
        ctx.fillStyle = 'rgba(6,182,212,0.45)';
      }
      ctx.beginPath();
      ctx.roundRect(x + 0.5, y, barW - 1, barH, 1.5);
      ctx.fill();
    });

    // P5 and P95 boundary lines with value labels
    [{ x: p5x, v: s.percentiles.p5, c: '#06b6d4', align: 'right' },
     { x: p95x, v: s.percentiles.p95, c: '#f43f5e', align: 'left' }].forEach(line => {
      ctx.strokeStyle = line.c;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(line.x, pad.t); ctx.lineTo(line.x, pad.t + chartH); ctx.stroke();
      ctx.setLineDash([]);
      // Value label
      ctx.fillStyle = line.c;
      ctx.font = '600 8px Inter,sans-serif';
      ctx.textAlign = line.align === 'right' ? 'right' : 'left';
      const lx = line.align === 'right' ? line.x - 3 : line.x + 3;
      ctx.fillText(line.v.toLocaleString(), lx, pad.t + chartH + 10);
    });

    // Mean line
    const meanX = toX(s.data_stats.mean);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 2]);
    ctx.beginPath(); ctx.moveTo(meanX, pad.t); ctx.lineTo(meanX, pad.t + chartH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '500 7px Inter,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Mean', meanX, pad.t + chartH + 10);
  });
}

function _riskRenderTornado(el) {
  const tornado = App._riskV2.tornado || [];
  if (!tornado.length) { el.innerHTML = ''; return; }
  let html = '<div class="glass-panel reveal-step" style="padding:14px;margin-bottom:10px;">';
  html += '<div style="font-size:12px;font-weight:500;color:var(--text-primary);margin-bottom:8px;">Sensitivity — Which Variables Swing the Output Most</div>';
  tornado.forEach(t => {
    const maxSwing = tornado[0].swing || 1;
    const pct = Math.round((t.swing / maxSwing) * 100);
    const corrColor = t.correlation >= 0 ? '#f43f5e' : '#06b6d4';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">';
    html += '<span style="width:100px;font-size:9px;color:var(--text-secondary);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(t.factor_name) + '</span>';
    html += '<div style="flex:1;height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;position:relative;">';
    html += '<div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,0.1);"></div>';
    if (t.correlation >= 0) {
      html += '<div style="position:absolute;left:50%;height:100%;width:' + (pct/2) + '%;background:#f43f5e;border-radius:0 4px 4px 0;"></div>';
    } else {
      html += '<div style="position:absolute;right:50%;height:100%;width:' + (pct/2) + '%;background:#06b6d4;border-radius:4px 0 0 4px;"></div>';
    }
    html += '</div>';
    html += '<span style="width:50px;font-size:8px;color:' + corrColor + ';text-align:right;">swing: ' + t.swing.toLocaleString() + '</span>';
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function _riskRunWhatIf() {
  const col = document.getElementById('whatifCol')?.value;
  const pct = parseFloat(document.getElementById('whatifPct')?.value || 20);
  const target = document.getElementById('whatifTarget')?.value;
  const el = document.getElementById('whatifResult');
  if (!el || !col || !target) return;
  el.innerHTML = '<div style="font-size:10px;color:var(--text-tertiary);">Running what-if...</div>';

  fetch('/api/risk-v2/whatif', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (_getAuthToken() || '') },
    body: JSON.stringify({ rows: App.excelData.rows.slice(0, 500), headers: App.excelData.headers, column: col, change_pct: pct, target_col: target })
  }).then(r => r.json()).then(data => {
    if (data.error) { el.innerHTML = '<div style="font-size:10px;color:var(--accent-rose);">' + escHtml(data.error) + '</div>'; return; }
    const b = data.baseline, sc = data.scenario;
    const shifted = data.shift >= 0 ? '+' : '';
    let h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;">';
    h += '<div style="padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);">';
    h += '<div style="font-size:9px;color:var(--text-tertiary);margin-bottom:4px;">Baseline</div>';
    h += '<div style="font-size:14px;font-weight:300;color:var(--text-primary);">' + b.mean.toLocaleString() + '</div>';
    h += '<div style="font-size:8px;color:var(--text-tertiary);">P5: ' + b.p5.toLocaleString() + ' — P95: ' + b.p95.toLocaleString() + '</div>';
    h += '</div>';
    h += '<div style="padding:8px;border-radius:8px;background:rgba(6,182,212,0.04);border:1px solid rgba(6,182,212,0.12);">';
    h += '<div style="font-size:9px;color:var(--accent-cyan);margin-bottom:4px;">Scenario (' + shifted + data.change_pct + '% ' + escHtml(col.replace(/_/g,' ')) + ')</div>';
    h += '<div style="font-size:14px;font-weight:300;color:#67e8f9;">' + sc.mean.toLocaleString() + ' <span style="font-size:10px;">(' + shifted + data.shift.toLocaleString() + ')</span></div>';
    h += '<div style="font-size:8px;color:var(--text-tertiary);">P5: ' + sc.p5.toLocaleString() + ' — P95: ' + sc.p95.toLocaleString() + '</div>';
    h += '</div></div>';
    h += '<div style="font-size:8px;color:var(--text-tertiary);margin-top:4px;">Correlation: r=' + data.correlation + '</div>';
    el.innerHTML = h;
  }).catch(err => { el.innerHTML = '<div style="font-size:10px;color:var(--accent-rose);">What-if failed</div>'; });
}

function renderKIList() {
  let items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return '<div style="text-align:center;padding:40px 0;color:var(--text-tertiary);font-size:13px">Click "Analyze" to discover key influencers</div>';
  const isIncDir = App.kiState.direction === 'increase';
  // Filter by search query
  const q = (App.kiState.searchQuery || '').toLowerCase();
  if (q) {
    items = items.filter(inf => inf.factor.toLowerCase().includes(q) || String(inf.value).toLowerCase().includes(q) || (inf.explanation || '').toLowerCase().includes(q));
  }
  // Sort: pinned first, then by impact
  items.sort((a, b) => {
    const aPinned = isKIPinned(a.factor, a.value) ? 1 : 0;
    const bPinned = isKIPinned(b.factor, b.value) ? 1 : 0;
    if (aPinned !== bPinned) return bPinned - aPinned;
    return isIncDir ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue;
  });
  return items.map((inf, i) => {
    const allIdx = App.kiState.influencers.indexOf(inf);
    const isInc = inf.direction === 'increase';
    const multLabel = isInc ? inf.multiplier.toFixed(2) + 'x higher' : inf.multiplier.toFixed(2) + 'x lower';
    const conf = computeKIConfidence(inf);
    const pinned = isKIPinned(inf.factor, inf.value);
    return '<div class="ki-item' + (allIdx === App.kiState.selectedIdx ? ' selected' : '') + '" onclick="selectKIItem('+allIdx+')">' +
      '<div class="ki-item-header"><span class="ki-item-factor">' + kiLabel(inf.factor, inf.value) + '</span>' +
      '<span style="display:flex;align-items:center;gap:4px">' +
        '<span class="ki-item-mult ' + inf.direction + '">' + multLabel + '</span>' +
        '<span class="ki-confidence ' + conf + '">' + conf + '</span>' +
        '<button class="ki-pin-btn' + (pinned ? ' pinned' : '') + '" onclick="event.stopPropagation();toggleKIPin(\'' + inf.factor.replace(/'/g,"\\'") + '\',\'' + String(inf.value).replace(/'/g,"\\'") + '\')">★</button>' +
      '</span></div>' +
      '<div class="ki-item-desc">' + (inf.explanation || 'When ' + inf.factor.replace(/_/g,' ') + ' is ' + inf.value + ', ' + App.kiState.metric.replace(/_/g,' ') + ' is ' + multLabel) + '</div></div>';
  }).join('');
}

function kiLabel(factor, value) {
  const f = factor.replace(/_/g, ' ');
  const v = String(value);
  if (f === v || f.toLowerCase() === v.toLowerCase()) return f;
  return f + ' = ' + v;
}

function filterKIList(query) {
  App.kiState.searchQuery = query;
  const listEl = document.getElementById('kiList');
  if (listEl) listEl.innerHTML = renderKIList();
}

function computeKIConfidence(inf) {
  const count = inf.count || 0;
  const effect = Math.abs(inf.multiplier - 1);
  if (count >= 30 && effect > 0.25) return 'high';
  if (count >= 10 && effect > 0.15) return 'medium';
  return 'low';
}

function isKIPinned(factor, value) {
  return App.kiState.pins.some(p => p.factor === factor && p.value === value);
}

function toggleKIPin(factor, value) {
  const idx = App.kiState.pins.findIndex(p => p.factor === factor && p.value === value);
  if (idx >= 0) App.kiState.pins.splice(idx, 1);
  else App.kiState.pins.push({ factor, value });
  localStorage.setItem('genbi_ki_pins', JSON.stringify(App.kiState.pins));
  const listEl = document.getElementById('kiList');
  if (listEl) listEl.innerHTML = renderKIList();
}

// Resolve the actual column name for a factor — handles cases where AI
// returns a value as the factor name (e.g. factor="Vaccines" when the
// real column is "Therapeutic_Area" which contains value "Vaccines").
function resolveKIFactorCol(factor, value) {
  if (!App.excelData) return factor;
  const headers = App.excelData.headers;
  // 1. Exact match — factor is already a valid column name
  if (headers.includes(factor)) return factor;
  // 2. Try with underscores replaced by spaces and vice-versa
  const alt = factor.includes('_') ? factor.replace(/_/g, ' ') : factor.replace(/ /g, '_');
  if (headers.includes(alt)) return alt;
  // 3. Factor is actually a value — find the column that contains it
  const rows = App.excelData.rows;
  const ec = App.excelChartConfig;
  const cats = ec ? (ec.categoricals || []) : headers;
  for (const col of cats) {
    for (let i = 0; i < Math.min(rows.length, 200); i++) {
      if (String(rows[i][col] || '').trim() === String(value || factor).trim()) return col;
    }
  }
  return factor;
}

function drawKIFactorChart() {
  const _g = isGenBI();
  const canvas = document.getElementById('kiFactorChart');
  if (!canvas) return;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf || !App.excelData) return;
  const metric = App.kiState.metric;
  const factor = resolveKIFactorCol(inf.factor, inf.value);
  const rows = App.excelData.rows;

  // Compute avg metric for each value of this factor
  const groups = {};
  rows.forEach(r => {
    const v = String(r[factor] || '').trim();
    if (!v) return;
    if (!groups[v]) groups[v] = [];
    groups[v].push(parseFloat(r[metric]) || 0);
  });
  let entries = Object.entries(groups).map(([k, v]) => ({
    label: k, value: v.reduce((a,b) => a+b, 0) / v.length
  })).sort((a,b) => b.value - a.value);
  entries = entries.slice(0, 12); // limit

  const labels = entries.map(e => e.label);
  const data = entries.map(e => Math.round(e.value * 100) / 100);

  // Highlight the selected value
  const highlightIdx = labels.indexOf(inf.value);
  const isInc = inf.direction === 'increase';
  animateBarChart(canvas, labels, data, isInc ? 'cyan' : 'rose', {
    suffix: '', xLabel: factor.replace(/_/g,' '), yLabel: metric.replace(/_/g,' '),
    _highlightIdx: highlightIdx
  });
}

function drawKIOverviewChart(canvas, animate) {
  const _g = isGenBI();
  if (!canvas) return;
  if (canvas._kiAnimId) { cancelAnimationFrame(canvas._kiAnimId); canvas._kiAnimId = null; }
  const items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return;

  // Sort: increase = highest avgWhenTrue first, decrease = lowest first
  const isInc = App.kiState.direction === 'increase';
  items.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;

  const padL = 180, padR = 70, padT = 20, padB = 30;
  const cw = w - padL - padR, ch = h - padT - padB;
  const overallAvg = items[0]?.overallAvg || 0;

  const allVals = items.map(inf => inf.avgWhenTrue);
  allVals.push(overallAvg);
  const maxVal = Math.ceil(Math.max(...allVals) * 1.15 / 10) * 10 || 100;

  const barH = Math.min(28, Math.max(14, (ch - (items.length - 1) * 6) / items.length));
  const gap = Math.min(6, (ch - items.length * barH) / Math.max(items.length - 1, 1));
  const totalH = items.length * barH + (items.length - 1) * gap;
  const startY = padT + (ch - totalH) / 2;

  function drawFrame(progress) {
    ctx.clearRect(0, 0, w, h);

    // Grid lines
    for (let i = 0; i <= 4; i++) {
      const x = padL + (cw / 4) * i;
      ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
      ctx.moveTo(x, padT); ctx.lineTo(x, h - padB); ctx.stroke();
      ctx.fillStyle = chartTextColor(0.25); ctx.font = _g ? "300 10px 'Outfit', sans-serif" : '10px Inter'; ctx.textAlign = 'center';
      ctx.fillText(Math.round((maxVal / 4) * i).toLocaleString(), x, h - padB + 14);
    }

    // Overall avg reference line
    const avgX = padL + (overallAvg / maxVal) * cw;
    ctx.globalAlpha = progress;
    ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.3); ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]); ctx.moveTo(avgX, padT - 4); ctx.lineTo(avgX, h - padB + 4); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = chartTextColor(0.5); ctx.font = _g ? "400 10px 'Outfit', sans-serif" : '500 10px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Overall Avg: ' + overallAvg.toLocaleString('en-US',{maximumFractionDigits:0}), avgX, padT - 6);
    ctx.globalAlpha = 1;

    // Bars
    items.forEach((inf, i) => {
      // Stagger each bar slightly
      const stagger = animate ? Math.max(0, Math.min(1, (progress - i * 0.04) / 0.7)) : 1;
      const easedP = 1 - Math.pow(1 - stagger, 3); // ease-out cubic
      const y = startY + i * (barH + gap);
      const fullBarW = (inf.avgWhenTrue / maxVal) * cw;
      const barW = fullBarW * easedP;
      const r = Math.min(3, barH / 2);
      const isSelected = App.kiState.influencers.indexOf(inf) === App.kiState.selectedIdx;
      const alpha = isSelected ? 0.95 : 0.70;

      // Bar with gradient colors
      if (barW > 0.5) {
        const grad = ctx.createLinearGradient(padL, 0, padL + barW, 0);
        if (isInc) {
          // Teal → Emerald → Bright green gradient
          grad.addColorStop(0, 'rgba(0,180,130,' + (alpha * 0.35) + ')');
          grad.addColorStop(0.5, 'rgba(32,201,151,' + (alpha * 0.7) + ')');
          grad.addColorStop(1, 'rgba(105,240,174,' + alpha + ')');
        } else {
          // Deep rose → Red → Warm coral gradient
          grad.addColorStop(0, 'rgba(180,40,80,' + (alpha * 0.35) + ')');
          grad.addColorStop(0.5, 'rgba(209,52,56,' + (alpha * 0.7) + ')');
          grad.addColorStop(1, 'rgba(255,107,157,' + alpha + ')');
        }
        ctx.beginPath();
        ctx.moveTo(padL, y); ctx.lineTo(padL + barW - r, y);
        ctx.quadraticCurveTo(padL + barW, y, padL + barW, y + r);
        ctx.lineTo(padL + barW, y + barH - r);
        ctx.quadraticCurveTo(padL + barW, y + barH, padL + barW - r, y + barH);
        ctx.lineTo(padL, y + barH); ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();

        if (isSelected) {
          const glowRgb = isInc ? '105,240,174' : '255,107,157';
          ctx.save(); ctx.shadowColor = 'rgba(' + glowRgb + ',0.35)'; ctx.shadowBlur = 12; ctx.fill(); ctx.restore();
          ctx.strokeStyle = 'rgba(' + glowRgb + ',0.5)'; ctx.lineWidth = 1; ctx.stroke();
        }
      }

      // Label (left side) — always visible
      ctx.fillStyle = chartTextColor(isSelected ? 0.95 : 0.6);
      ctx.font = (isSelected ? '500 ' : '') + _g ? "300 11px 'Outfit', sans-serif" : '11px Inter'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      const lbl = kiLabel(inf.factor, inf.value);
      const truncLbl = lbl.length > 24 ? lbl.substring(0, 23) + '..' : lbl;
      ctx.fillText(truncLbl, padL - 8, y + barH / 2);

      // Value (right of bar) — fade in with bar
      const valRgb = isInc ? '105,240,174' : '255,107,157';
      ctx.globalAlpha = easedP;
      ctx.fillStyle = 'rgba(' + valRgb + ',' + (isSelected ? 1 : 0.75) + ')';
      ctx.font = (isSelected ? 'bold ' : '') + _g ? "300 11px 'Outfit', sans-serif" : '11px Inter'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      const multLabel = inf.multiplier.toFixed(2) + 'x';
      ctx.fillText(inf.avgWhenTrue.toLocaleString('en-US',{maximumFractionDigits:0}) + ' (' + multLabel + ')', padL + barW + 8, y + barH / 2);
      ctx.globalAlpha = 1;
    });

    ctx.textBaseline = 'alphabetic';
  }

  if (animate) {
    const dur = 700;
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / dur);
      drawFrame(t);
      if (t < 1) canvas._kiAnimId = requestAnimationFrame(tick);
      else canvas._kiAnimId = null;
    }
    canvas._kiAnimId = requestAnimationFrame(tick);
  } else {
    drawFrame(1);
  }

  // Store hit areas for click interaction
  canvas._kiItems = items;
  canvas._kiLayout = { startY, barH, gap };
  if (!canvas._hasKIEvents) {
    canvas._hasKIEvents = true;
    canvas.addEventListener('click', function(e) {
      const r = canvas.getBoundingClientRect();
      const my = e.clientY - r.top;
      const sorted = canvas._kiItems;
      const layout = canvas._kiLayout;
      if (!sorted || !layout) return;
      for (let i = 0; i < sorted.length; i++) {
        const y = layout.startY + i * (layout.barH + layout.gap);
        if (my >= y && my <= y + layout.barH) {
          const allIdx = App.kiState.influencers.indexOf(sorted[i]);
          selectKIItem(allIdx);
          drawKIOverviewChart(canvas, false);
          return;
        }
      }
    });
  }
}

function runKeyInfluencers() {
  if (!App.hasExcelData || !App.kiState.metric) return;
  App.kiState._animateNext = true;
  const ec = App.excelChartConfig;
  const metric = App.kiState.metric;
  const rows = App.excelData.rows;

  // Show loading overlay and disable button
  App.kiState.loading = true;
  const btn = document.getElementById('kiRunBtn');
  if (btn) { btn.textContent = 'Analyzing...'; btn.disabled = true; }
  showKILoading();

  // Compute grouped averages for the prompt / local fallback
  const overallVals = rows.map(r => parseFloat(r[metric]) || 0);
  const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;
  const cats = ec.categoricals || [];
  const groupedAvgs = {};
  cats.forEach(cat => {
    const groups = {};
    rows.forEach(r => {
      const v = String(r[cat] || '').trim();
      if (!v) return;
      if (!groups[v]) groups[v] = [];
      groups[v].push(parseFloat(r[metric]) || 0);
    });
    groupedAvgs[cat] = {};
    Object.entries(groups).forEach(([val, vals]) => {
      groupedAvgs[cat][val] = { avg: vals.reduce((a,b)=>a+b,0)/vals.length, count: vals.length };
    });
  });

  if (isLoggedIn()) {
    // AI-powered analysis
    const colMetaClean = {};
    Object.entries(ec.colMeta).forEach(([k, v]) => {
      colMetaClean[k] = { ...v, vals: undefined, uniqueVals: v.uniqueVals?.slice(0,15) };
    });
    const token = _getAuthToken();

    fetch('/api/key-influencers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        metric,
        columns: App.excelData.headers,
        colMeta: colMetaClean,
        summary: {
          rowCount: rows.length,
          [metric]: { avg: overallAvg, min: Math.min(...overallVals), max: Math.max(...overallVals) },
          groupedAvgs
        }
      })
    })
    .then(r => r.json())
    .then(data => {
      App.kiState.loading = false;
      hideKILoading();
      if (data.error) {
        toast(data.error, 'error');
        computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      } else {
        App.kiState.influencers = data.influencers || [];
        App.kiState.selectedIdx = -1;
      }
      navigate('influencers');
    })
    .catch(err => {
      App.kiState.loading = false;
      hideKILoading();
      toast('AI request failed, using local analysis. ' + err.message, 'info');
      computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      navigate('influencers');
    });
  } else {
    // Local fallback — brief delay so the loading animation is visible
    setTimeout(() => {
      computeLocalInfluencers(metric, overallAvg, groupedAvgs);
      App.kiState.loading = false;
      hideKILoading();
      navigate('influencers');
    }, 1200);
  }
}

function computeLocalInfluencers(metric, overallAvg, groupedAvgs) {
  const influencers = [];
  Object.entries(groupedAvgs).forEach(([col, groups]) => {
    Object.entries(groups).forEach(([val, stats]) => {
      if (stats.count < 2) return; // skip tiny groups
      const mult = overallAvg > 0 ? stats.avg / overallAvg : 1;
      if (Math.abs(mult - 1) < 0.10) return; // skip insignificant
      influencers.push({
        factor: col,
        value: val,
        direction: mult >= 1 ? 'increase' : 'decrease',
        avgWhenTrue: Math.round(stats.avg * 100) / 100,
        overallAvg: Math.round(overallAvg * 100) / 100,
        multiplier: Math.round(mult * 100) / 100,
        count: stats.count,
        explanation: 'When ' + col.replace(/_/g,' ') + ' is ' + val + ', average ' + metric.replace(/_/g,' ') + ' is ' + (mult >= 1 ? (mult.toFixed(2) + 'x higher') : (mult.toFixed(2) + 'x lower')) + ' than overall.'
      });
    });
  });

  // Sort by absolute deviation from 1.0
  influencers.sort((a, b) => Math.abs(b.multiplier - 1) - Math.abs(a.multiplier - 1));
  App.kiState.influencers = influencers.slice(0, 10);
  App.kiState.selectedIdx = -1;
}

function drawKIWaterfallChart() {
  const _g = isGenBI();
  const canvas = document.getElementById('kiWaterfallChart');
  if (!canvas) return;
  const items = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (items.length === 0) return;
  const isInc = App.kiState.direction === 'increase';
  items.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);
  const overallAvg = items[0]?.overallAvg || 0;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const padL = 30, padR = 20, padT = 30, padB = 80;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Build waterfall data: start with overall avg, each factor adds its delta
  const wfData = [{ label: 'Overall Avg', value: overallAvg, isTotal: true }];
  let running = overallAvg;
  items.slice(0, 8).forEach(inf => {
    const delta = inf.avgWhenTrue - overallAvg;
    wfData.push({ label: kiLabel(inf.factor, inf.value), value: delta, start: running, isTotal: false });
    running += delta;
  });
  wfData.push({ label: 'Combined', value: running, isTotal: true });

  const allVals = [];
  let run2 = overallAvg;
  wfData.forEach(d => {
    if (d.isTotal) { allVals.push(d.value); }
    else { allVals.push(run2); allVals.push(run2 + d.value); run2 += d.value; }
  });
  const minVal = Math.min(0, ...allVals) * 0.9;
  const maxVal = Math.max(...allVals) * 1.15 || 100;
  const range = maxVal - minVal;

  const barW = Math.min(40, (cw - (wfData.length - 1) * 4) / wfData.length);
  const gap = 4;
  const totalW = wfData.length * barW + (wfData.length - 1) * gap;
  const startX = padL + (cw - totalW) / 2;

  ctx.clearRect(0, 0, w, h);
  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    const val = maxVal - (range / 4) * i;
    ctx.fillStyle = chartTextColor(0.25); ctx.font = _g ? "300 10px 'Outfit', sans-serif" : '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(val).toLocaleString(), padL - 4, y + 3);
  }

  let runStart = overallAvg;
  wfData.forEach((d, i) => {
    const x = startX + i * (barW + gap);
    let barTop, barBot;
    if (d.isTotal) {
      barTop = padT + ((maxVal - d.value) / range) * ch;
      barBot = padT + ((maxVal - 0) / range) * ch;
      ctx.fillStyle = 'rgba(150,150,150,0.5)';
    } else {
      const top = Math.max(d.start, d.start + d.value);
      const bot = Math.min(d.start, d.start + d.value);
      barTop = padT + ((maxVal - top) / range) * ch;
      barBot = padT + ((maxVal - bot) / range) * ch;
      ctx.fillStyle = d.value >= 0 ? 'rgba(16,124,16,0.7)' : 'rgba(209,52,56,0.7)';
      runStart += d.value;
    }
    const bh = Math.max(2, barBot - barTop);
    const r2 = Math.min(3, bh / 2);
    ctx.beginPath(); ctx.moveTo(x + r2, barTop); ctx.lineTo(x + barW - r2, barTop); ctx.quadraticCurveTo(x + barW, barTop, x + barW, barTop + r2); ctx.lineTo(x + barW, barTop + bh - r2); ctx.quadraticCurveTo(x + barW, barTop + bh, x + barW - r2, barTop + bh); ctx.lineTo(x + r2, barTop + bh); ctx.quadraticCurveTo(x, barTop + bh, x, barTop + bh - r2); ctx.lineTo(x, barTop + r2); ctx.quadraticCurveTo(x, barTop, x + r2, barTop); ctx.closePath();
    ctx.fill();

    // Value label
    ctx.fillStyle = chartTextColor(0.6); ctx.font = _g ? "400 10px 'Outfit', sans-serif" : '500 10px Inter'; ctx.textAlign = 'center';
    const valStr = d.isTotal ? Math.round(d.value).toLocaleString() : (d.value >= 0 ? '+' : '') + Math.round(d.value).toLocaleString();
    ctx.fillText(valStr, x + barW / 2, barTop - 4);

    // X label (rotated)
    ctx.save();
    ctx.translate(x + barW / 2, h - padB + 8);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = chartTextColor(0.4); ctx.font = _g ? "300 10px 'Outfit', sans-serif" : '10px Inter'; ctx.textAlign = 'right';
    const lbl = d.label.length > 18 ? d.label.slice(0, 16) + '..' : d.label;
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });
}

function drawKIScatterChart() {
  const _g = isGenBI();
  const canvas = document.getElementById('kiScatterChart');
  if (!canvas || !App.excelData) return;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];
  if (!inf) return;
  const metric = App.kiState.metric;
  const factor = resolveKIFactorCol(inf.factor, inf.value);
  const rows = App.excelData.rows;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = rect.width, h = rect.height;
  const padL = 50, padR = 30, padT = 20, padB = 80;
  const cw = w - padL - padR, ch = h - padT - padB;

  // Collect unique factor values and metric values
  const factorVals = [];
  const points = [];
  rows.forEach(r => {
    const fv = String(r[factor] || '').trim();
    const mv = parseFloat(r[metric]);
    if (!fv || isNaN(mv)) return;
    if (!factorVals.includes(fv)) factorVals.push(fv);
    points.push({ fv, mv, fvIdx: factorVals.indexOf(fv) });
  });
  // Update indices after all values collected
  points.forEach(p => p.fvIdx = factorVals.indexOf(p.fv));

  // Limit to 10 categories max; keep the highlighted value always visible
  let displayVals = factorVals.slice(0, 10);
  if (!displayVals.includes(inf.value) && factorVals.includes(inf.value)) {
    displayVals[displayVals.length - 1] = inf.value;
  }
  const displayPoints = points.filter(p => displayVals.includes(p.fv));
  displayPoints.forEach(p => p.fvIdx = displayVals.indexOf(p.fv));

  if (displayPoints.length === 0) return;
  const minY = Math.min(...displayPoints.map(p => p.mv));
  const maxY = Math.max(...displayPoints.map(p => p.mv)) || 1;
  const rangeY = maxY - minY || 1;

  ctx.clearRect(0, 0, w, h);
  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    const val = maxY - (rangeY / 4) * i;
    ctx.fillStyle = chartTextColor(0.25); ctx.font = _g ? "300 10px 'Outfit', sans-serif" : '10px Inter'; ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0), padL - 6, y + 3);
  }

  // Overall avg reference line
  const clampedAvg = Math.max(minY, Math.min(maxY, inf.overallAvg));
  const avgY = padT + ((maxY - clampedAvg) / rangeY) * ch;
  ctx.beginPath(); ctx.strokeStyle = chartTextColor(0.3); ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]); ctx.moveTo(padL, avgY); ctx.lineTo(w - padR, avgY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = chartTextColor(0.4); ctx.font = _g ? "300 10px 'Outfit', sans-serif" : '10px Inter'; ctx.textAlign = 'left';
  ctx.fillText('Avg: ' + inf.overallAvg.toFixed(0), w - padR + 2, avgY + 3);

  // Column dividers + dots
  const colW = cw / Math.max(displayVals.length, 1);
  // Light vertical separators
  displayVals.forEach((fv, i) => {
    const x = padL + i * colW;
    ctx.beginPath(); ctx.strokeStyle = chartGridColor(); ctx.lineWidth = 1;
    ctx.moveTo(x, padT); ctx.lineTo(x, padT + ch); ctx.stroke();
  });

  // Draw dots with jitter (seeded per-point for stable rendering)
  displayPoints.forEach((p, pi) => {
    const jitter = ((pi * 2654435761 >>> 0) % 1000) / 1000 - 0.5; // deterministic jitter
    const x = padL + p.fvIdx * colW + colW / 2 + jitter * colW * 0.5;
    const y = padT + ((maxY - p.mv) / rangeY) * ch;
    const isHighlight = p.fv === inf.value;
    ctx.beginPath(); ctx.arc(x, y, isHighlight ? 4.5 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = isHighlight ? 'rgba(0,229,255,0.85)' : 'rgba(150,150,150,0.25)';
    ctx.fill();
    if (isHighlight) { ctx.strokeStyle = 'rgba(0,229,255,0.4)'; ctx.lineWidth = 1; ctx.stroke(); }
  });

  // X-axis labels — rotated -45°
  displayVals.forEach((fv, i) => {
    const x = padL + i * colW + colW / 2;
    const y = padT + ch + 10;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = fv === inf.value ? 'rgba(0,229,255,0.9)' : chartTextColor(0.45);
    ctx.font = (fv === inf.value ? '600 ' : '') + _g ? "300 10px 'Outfit', sans-serif" : '10px Inter';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    const lbl = fv.length > 14 ? fv.slice(0, 12) + '..' : fv;
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  });
}

// ── A6: Sensitivity Slider ──
function updateKISensitivity(pct) {
  const el = document.getElementById('kiSensePct');
  const res = document.getElementById('kiSenseResult');
  if (el) el.textContent = pct;
  const inf = App.kiState.influencers[App.kiState.selectedIdx];

// ── A8: Copy Insight as Text ──
function copyKIInsight() {
  const dirItems = App.kiState.influencers.filter(inf => inf.direction === App.kiState.direction);
  if (dirItems.length === 0) { toast('No influencers to copy', 'error'); return; }
  const isInc = App.kiState.direction === 'increase';
  dirItems.sort((a, b) => isInc ? b.avgWhenTrue - a.avgWhenTrue : a.avgWhenTrue - b.avgWhenTrue);
  const top = dirItems[0];
  let text = 'Key Influencers Analysis for ' + (App.kiState.metric || '').replace(/_/g, ' ') + ' (' + App.kiState.direction + ')\n\n';
  text += 'Strongest factor: ' + top.factor + '=' + top.value + ' (' + top.multiplier.toFixed(2) + 'x ' + (isInc ? 'higher' : 'lower') + ')\n\n';
  dirItems.forEach((inf, i) => {
    text += (i + 1) + '. ' + inf.factor + '=' + inf.value + ' → ' + inf.multiplier.toFixed(2) + 'x ' + (inf.direction === 'increase' ? 'higher' : 'lower') + ' (avg: ' + (typeof inf.avgWhenTrue === 'number' ? inf.avgWhenTrue.toFixed(1) : inf.avgWhenTrue) + ')\n';
  });
  text += '\nOverall avg: ' + (top.overallAvg || 0).toFixed(1);
  navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard', 'success')).catch(() => toast('Copy failed', 'error'));

// ── B2: Interaction Effects ──
async function runKIInteractions() {
  const tabContent = document.getElementById('kiTabContent');
  if (!tabContent || !App.excelData) return;
  const metric = App.kiState.metric;
  const rows = App.excelData.rows;
  const topInfs = App.kiState.influencers.slice(0, 5);
  if (topInfs.length < 2) { var rc = document.getElementById('kiTabResults') || tabContent; rc.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">Need at least 2 influencers for interaction analysis.</div>'; return; }

  // Compute cross-tab averages locally
  const overallVals = rows.map(r => parseFloat(r[metric]) || 0);
  const overallAvg = overallVals.reduce((a,b) => a+b, 0) / overallVals.length;
  const crossTab = [];
  for (let i = 0; i < topInfs.length; i++) {
    for (let j = i + 1; j < topInfs.length; j++) {
      const inf1 = topInfs[i], inf2 = topInfs[j];
      const matchRows = rows.filter(r => String(r[inf1.factor] || '').trim() === inf1.value && String(r[inf2.factor] || '').trim() === inf2.value);
      if (matchRows.length < 2) continue;
      const vals = matchRows.map(r => parseFloat(r[metric]) || 0);
      const combinedAvg = vals.reduce((a,b) => a+b, 0) / vals.length;
      crossTab.push({ factor1: inf1.factor, value1: inf1.value, factor2: inf2.factor, value2: inf2.value, combinedAvg, count: matchRows.length });
    }
  }

  var resContainer = document.getElementById('kiTabResults') || tabContent;
  if (!isLoggedIn()) {
    renderKIInteractionsLocal(resContainer, crossTab, overallAvg);
    return;
  }

  try {
    const data = await fetchAI('/api/ki-interactions', {
      metric,
      crossTabData: crossTab,
      overallAvg,
      singleFactorInfluencers: topInfs.map(inf => ({ factor: inf.factor, value: inf.value, multiplier: inf.multiplier, avgWhenTrue: inf.avgWhenTrue }))
    });
    App.kiState.interactions = data.interactions || [];
    renderKIInteractionsAI(resContainer);
  } catch(e) {
    renderKIInteractionsLocal(resContainer, crossTab, overallAvg);
  }
}

function renderKIInteractionsLocal(container, crossTab, overallAvg) {
  if (crossTab.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No significant interaction pairs found.</div>'; return; }
  crossTab.sort((a, b) => Math.abs(b.combinedAvg - overallAvg) - Math.abs(a.combinedAvg - overallAvg));
  container.innerHTML = crossTab.slice(0, 8).map(ct => {
    const mult = overallAvg > 0 ? (ct.combinedAvg / overallAvg).toFixed(2) : '?';
    const dir = ct.combinedAvg >= overallAvg ? 'higher' : 'lower';
    return '<div class="ki-interaction-card"><div class="ki-int-factors">' + ct.factor1.replace(/_/g,' ') + '=' + ct.value1 + ' AND ' + ct.factor2.replace(/_/g,' ') + '=' + ct.value2 + '</div>' +
      '<div class="ki-int-effect">' + App.kiState.metric.replace(/_/g,' ') + ' is <strong>' + mult + 'x ' + dir + '</strong> (' + ct.count + ' data points, avg: ' + ct.combinedAvg.toFixed(1) + ')</div></div>';
  }).join('');
}

function renderKIInteractionsAI(container) {
  const ints = App.kiState.interactions;
  if (!ints || ints.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:12px">No significant interactions found.</div>'; return; }
  container.innerHTML = ints.map(int => {
    const synergy = int.synergy || 'additive';
    return '<div class="ki-interaction-card"><div class="ki-int-factors">' + (int.factor1 || '').replace(/_/g,' ') + '=' + (int.value1 || '') + ' AND ' + (int.factor2 || '').replace(/_/g,' ') + '=' + (int.value2 || '') + '</div>' +
      '<div class="ki-int-effect">' + (int.explanation || 'Combined multiplier: ' + (int.combinedMultiplier || '?') + 'x') + '</div>' +
      '<span class="ki-int-synergy ' + synergy + '">' + synergy + '</span></div>';
  }).join('');
}

function toggleProfileMenu() {
  const menu = document.getElementById('profileMenu');
  if (menu) menu.classList.toggle('open');
}
// Close profile menu when clicking outside
document.addEventListener('click', function(e) {
  const menu = document.getElementById('profileMenu');
  const profile = document.querySelector('.sidebar-profile');
  if (menu && menu.classList.contains('open') && profile && !profile.contains(e.target)) {
    menu.classList.remove('open');
  }
});

// ── Route-aware init ──
(function initApp() {
  const path = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  const isDashboard = path === '/dashboard';
  const isBillingSuccess = path === '/billing/success';
  const isBillingCancel = path === '/billing/cancel';
  const token = _getAuthToken();
  const user = getAuthUser();
  const authBar = document.getElementById('authBar');

  // Helper: set up authenticated app mode
  function enterAppMode() {
    document.body.classList.remove('landing-mode');
    document.body.classList.add('app-mode');
    App.user = user;
    const profileName = document.querySelector('.profile-name');
    const profileRole = document.querySelector('.profile-role');
    const profileAvatar = document.querySelector('.profile-avatar');
    if (profileName) profileName.textContent = user.name || 'User';
    if (profileRole) profileRole.textContent = user.email || '';
    if (profileAvatar) profileAvatar.textContent = (user.name || 'U').charAt(0).toUpperCase();
    if (authBar) authBar.innerHTML = '';
    var sidebarAuth = document.getElementById('sidebarAuthButtons');
    var sidebarProfile = document.getElementById('sidebarProfile');
    if (sidebarAuth) sidebarAuth.style.display = 'none';
    if (sidebarProfile) sidebarProfile.style.display = '';
  }

  if (isBillingSuccess) {
    // ── /billing/success: post-Checkout landing ──
    if (!token || !user) { window.location.href = '/login'; return; }
    enterAppMode();
    navigate('analytics');
    // Show a success overlay and poll for subscription activation
    setTimeout(() => {
      const main = document.getElementById('mainContent');
      if (main) {
        const overlay = document.createElement('div');
        overlay.id = 'billingSuccessOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)';
        overlay.innerHTML = '<div style="text-align:center;padding:48px;border-radius:var(--radius-lg);background:var(--glass-bg);border:1px solid var(--glass-border);max-width:420px">' +
          '<div style="margin-bottom:16px"></div>' +
          '<h2 style="font-family:Inter;font-size:22px;font-weight:700;margin-bottom:8px">Payment received!</h2>' +
          '<p style="color:var(--text-secondary);font-size:14px;margin-bottom:24px">Setting up your subscription...</p>' +
          '<div id="billingSuccessStatus"><div class="billing-spinner"></div></div>' +
          '</div>';
        document.body.appendChild(overlay);
      }
      pollBillingSuccess(15);
    }, 100);

  } else if (isBillingCancel) {
    // ── /billing/cancel: user canceled Checkout ──
    if (!token || !user) { window.location.href = '/login'; return; }
    enterAppMode();
    navigate('pricing');
    setTimeout(() => toast('Checkout was canceled. You can try again anytime.', 'info'), 300);

  } else if (isDashboard) {
    // ── /dashboard: protected — verify token with server ──
    if (!token || !user) {
      window.location.href = '/login?next=/dashboard';
      return;
    }
    // Validate token is still valid
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => { if (!r.ok) throw new Error('invalid'); return r.json(); })
      .then(data => { if (data.user) App.user = data.user; })
      .catch(() => {
        sessionStorage.removeItem('genbi-auth-token');
        sessionStorage.removeItem('genbi-auth-user');
        localStorage.removeItem('genbi-auth-token');
        localStorage.removeItem('genbi-auth-user');
        window.location.href = '/login?next=/dashboard';
      });
    enterAppMode();
    // Handle ?stripe= query params (returning from Stripe Checkout)
    const stripeParam = params.get('stripe');
    const sessionId = params.get('session_id');
    // Handle ?billing= query params (returning from Portal)
    const billingParam = params.get('billing');

    if (stripeParam === 'success' && sessionId) {
      // Verify checkout session with backend, then refresh subscription
      navigate('subscription');
      setTimeout(async () => {
        try {
          const resp = await fetch('/api/billing/checkout-status?session_id=' + encodeURIComponent(sessionId), {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const data = await resp.json();
          if (data.paid) {
            toast('Payment confirmed! Your plan has been upgraded.', 'success');
          } else {
            toast('Payment is being processed. Your plan will update shortly.', 'info');
          }
        } catch(e) {
          toast('Checking payment status...', 'info');
        }
        // Clean URL
        window.history.replaceState({}, '', '/dashboard');
        // Reload subscription page to show updated plan
        navigate('subscription');
      }, 500);
    } else if (stripeParam === 'cancel') {
      navigate('pricing');
      window.history.replaceState({}, '', '/dashboard');
      setTimeout(() => toast('Checkout was canceled. You can try again anytime.', 'info'), 300);
    } else if (billingParam === 'updated') {
      navigate('settings');
      setTimeout(() => toast('Billing updated successfully.', 'success'), 300);
    } else {
      navigate('analytics');
    }
    // Clean up query string
    if (billingParam) {
      window.history.replaceState({}, '', '/dashboard');
    }

  } else if (path === '/pricing') {
    // ── /pricing: public pricing page (works for both logged-in and anonymous) ──
    document.body.classList.remove('landing-mode');
    document.body.classList.add('app-mode');
    if (token && user) {
      enterAppMode();
    } else {
      // Not logged in: hide nav sections, show only sign in/up
      var navMain = document.getElementById('navSectionMain');
      var navWork = document.getElementById('navSectionWorkspace');
      var navProj = document.getElementById('navSectionProjects');
      if (navMain) navMain.style.display = 'none';
      if (navWork) navWork.style.display = 'none';
      if (navProj) navProj.style.display = 'none';
      // Replace sidebar profile with login/signup buttons
      const sidebarProfile = document.querySelector('.sidebar-profile');
      if (sidebarProfile) {
        sidebarProfile.onclick = null;
        sidebarProfile.style.cssText = 'display:flex;flex-direction:column;gap:8px;padding:14px;cursor:default;';
        sidebarProfile.innerHTML =
          '<a href="/login" style="display:block;width:100%;padding:10px 0;text-align:center;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-primary);font-size:14px;font-weight:500;text-decoration:none;transition:background .2s">Log in</a>' +
          '<a href="/signup" style="display:block;width:100%;padding:10px 0;text-align:center;border-radius:var(--radius-md);background:var(--accent-cyan);border:none;color:#000;font-size:14px;font-weight:600;text-decoration:none;transition:opacity .2s">Sign up</a>';
      }
    }
    navigate('pricing');

  } else {
    // ── / : public homepage ──
    document.body.classList.add('landing-mode');
    document.body.classList.remove('app-mode');
    navigate('dashboard');
  }
})();

// ══════════════════════════════════════════════════════════════════════════
// VISUAL EDITOR — Floating Toolbar & Panel
// ══════════════════════════════════════════════════════════════════════════
(function() {
  'use strict';

  // ── Visual Registry ─────────────────────────────────────────────────────
  const VE = {
    registry: [],
    hoveredCardId: null,
    activeId: null,
    activeSection: null,
    exportFmt: 'png',
    _hideTimer: null,
    _panelHovered: false
  };
  window._VE = VE;

  function getStorageKey(id) {
    const user = localStorage.getItem('genbi_user');
    const uid = user ? (JSON.parse(user).id || 'anon') : 'anon';
    return 'visualSettings::' + uid + '::' + id;
  }

  function loadSettings(id) {
    try {
      var s = JSON.parse(localStorage.getItem(getStorageKey(id))) || {};
      delete s.aspectRatio; // removed feature
      delete s.density;     // removed feature
      return s;
    } catch(e) { return {}; }
  }

  function saveSettings(id, settings) {
    try { localStorage.setItem(getStorageKey(id), JSON.stringify(settings)); } catch(e) {}
  }

  function defaultSettings() {
    return {
      color: null,       // null = use chart default
      barPalette: null,  // per-bar palette name
      linePalette: null, // line series palette name
      fontFamily: 'Inter',
      titleSize: 16,
      labelSize: 11,
      fontWeight: '500',
      chartType: null,   // null = use chart default
      density: 'balanced',
      branding: false,
      aspectRatio: 'auto',
      caption: '',
      syncTitle: true
    };
  }

  // ── Register charts after they render ──────────────────────────────────
  function registerCharts() {
    VE.registry = [];
    const ec = App.excelChartConfig;
    // Analytics charts
    if (App.hasExcelData && ec.chartPlan && ec.chartPlan.length > 0) {
      ec.chartPlan.forEach((chart, i) => {
        const canvas = document.getElementById('analyticsChart' + i);
        if (!canvas) return;
        const id = 'analytics_' + i;
        const saved = loadSettings(id);
        const settings = Object.assign(defaultSettings(), saved);
        VE.registry.push({ id, kind: 'analytics', idx: i, title: chart.title || 'Chart ' + (i+1), canvas, chartRef: chart, settings });
      });
    }
    // Custom charts
    (App.customCharts || []).forEach((chart, i) => {
      const canvas = document.getElementById('customChart' + i);
      if (!canvas) return;
      const id = 'custom_' + i;
      const saved = loadSettings(id);
      const settings = Object.assign(defaultSettings(), saved);
      VE.registry.push({ id, kind: 'custom', idx: i, title: chart.title || 'Custom Chart ' + (i+1), canvas, chartRef: chart, settings });
    });
    // Attach hover listeners to chart cards
    VE.registry.forEach(v => {
      const card = v.canvas.closest('.glass-panel');
      if (!card || card._veHoverBound) return;
      card._veHoverBound = true;
      /* Toolbar removed — bolt menu is the single entry point */
    });
    // Apply persisted settings
    VE.registry.forEach(v => {
      applySettingsToChart(v);
      // Redraw chart if settings changed series colors or chart type
      if (v.settings.linePalette || v.settings.chartType || v.settings.color) {
        v.canvas._hasChartEvents = false;
        v.canvas._chartHit = null;
        animateChartFromPlan(v.canvas, v.chartRef, 0);
      }
    });
  }

  // ── Toolbar show/hide ─────────────────────────────────────────────────
  function showToolbar(cardEl, chartId) {
    cancelHideToolbar();
    VE.hoveredCardId = chartId;
    var toolbar = document.getElementById('veToolbar');
    positionToolbar(toolbar, cardEl);
    toolbar.classList.add('visible');
    if (VE.activeId && VE.activeId !== chartId) {
      hidePanel();
    }
  }

  function hideToolbar() {
    VE._hideTimer = setTimeout(function() {
      if (VE._panelHovered) return;
      if (VE.activeId) return;
      hideToolbarImmediate();
    }, 200);
  }

  function cancelHideToolbar() {
    if (VE._hideTimer) { clearTimeout(VE._hideTimer); VE._hideTimer = null; }
  }

  function hideToolbarImmediate() {
    cancelHideToolbar();
    document.getElementById('veToolbar').classList.remove('visible');
    VE.hoveredCardId = null;
    document.querySelectorAll('.glass-panel.ve-hovered').forEach(function(el) { el.classList.remove('ve-hovered'); });
  }

  // ── Panel show/hide ─────────────────────────────────────────────────────
  function showPanel(sectionKey) {
    if (VE.activeSection === sectionKey && VE.activeId === VE.hoveredCardId) {
      hidePanel();
      return;
    }
    VE.activeId = VE.hoveredCardId;
    VE.activeSection = sectionKey;
    var panel = document.getElementById('vePanel');
    var toolbar = document.getElementById('veToolbar');
    var body = document.getElementById('vePanelBody');
    var tplMap = { export:'veTplExport', colors:'veTplColors', fonts:'veTplFonts', layout:'veTplLayout', branding:'veTplBranding', aspect:'veTplAspect', sync:'veTplSync', info:'veTplInfo' };
    var tpl = document.getElementById(tplMap[sectionKey]);
    if (!tpl) return;
    body.innerHTML = '';
    body.appendChild(tpl.content.cloneNode(true));
    var titles = { export:'Export Visual', colors:'Colors', fonts:'Fonts', layout:'Charts', branding:'Branding', aspect:'Aspect Ratio', sync:'Caption', info:'Info' };
    document.getElementById('vePanelTitle').textContent = titles[sectionKey] || sectionKey;
    // Apply light-theme inline styles to panel
    var isLightTheme = document.body.classList.contains('theme-pastel') || document.body.classList.contains('theme-light');
    if (isLightTheme) {
      panel.style.background = '#fff';
      panel.style.borderColor = 'rgba(0,0,0,0.1)';
      panel.style.boxShadow = '0 12px 48px rgba(0,0,0,0.12)';
      panel.style.color = '#2d3142';
      var hdr = panel.querySelector('.ve-panel-header');
      if (hdr) hdr.style.borderBottomColor = 'rgba(0,0,0,0.08)';
      var title = document.getElementById('vePanelTitle');
      if (title) title.style.color = '#2d3142';
      panel.querySelectorAll('.ve-label').forEach(function(el) { el.style.color = '#666'; });
      panel.querySelectorAll('.ve-hint').forEach(function(el) { el.style.color = '#888'; });
      panel.querySelectorAll('.ve-palette-label').forEach(function(el) { el.style.color = 'rgba(0,0,0,0.4)'; });
      panel.querySelectorAll('.ve-select').forEach(function(el) { el.style.background = 'rgba(0,0,0,0.04)'; el.style.borderColor = 'rgba(0,0,0,0.1)'; el.style.color = '#2d3142'; });
      panel.querySelectorAll('.ve-slider').forEach(function(el) { el.style.background = 'rgba(0,0,0,0.1)'; });
      panel.querySelectorAll('.ve-custom-color span').forEach(function(el) { el.style.color = 'rgba(0,0,0,0.5)'; });
    } else {
      panel.style.background = '';
      panel.style.borderColor = '';
      panel.style.boxShadow = '';
      panel.style.color = '';
    }
    var visual = getSelectedVisual();
    if (visual) populateSection(sectionKey, visual);
    bindSectionListeners(sectionKey);
    positionPanel(panel, toolbar);
    panel.classList.add('visible');
    document.querySelectorAll('.ve-toolbar-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.section === sectionKey); });
    document.querySelectorAll('.glass-panel.ve-active').forEach(function(el) { el.classList.remove('ve-active'); });
    if (visual) {
      var card = visual.canvas.closest('.glass-panel');
      if (card) card.classList.add('ve-active');
    }
  }

  function hidePanel() {
    document.getElementById('vePanel').classList.remove('visible');
    VE.activeId = null;
    VE.activeSection = null;
    VE._activeCard = null;
    VE._activeBolt = null;
    document.querySelectorAll('.ve-toolbar-btn.active').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.glass-panel.ve-active').forEach(function(el) { el.classList.remove('ve-active'); });
    // Unpin any pinned bolt menus
    if (typeof veUnpinBoltMenu === 'function') veUnpinBoltMenu();
  }

  // ── Positioning ─────────────────────────────────────────────────────────
  function positionToolbar(toolbar, cardEl) {
    var rect = cardEl.getBoundingClientRect();
    var toolbarW = 48;
    var toolbarH = toolbar.offsetHeight || 340;
    var top = rect.top + (rect.height - toolbarH) / 2;
    var left = rect.right - toolbarW - 10;
    top = Math.max(8, Math.min(top, window.innerHeight - toolbarH - 8));
    if (left < rect.left) left = rect.left;
    toolbar.style.top = top + 'px';
    toolbar.style.left = left + 'px';
  }

  function positionPanel(panel, toolbar) {
    var panelW = 260;
    var panelH = Math.min(460, window.innerHeight - 16);
    var top, left;
    // Find bolt button from active card (DOM query as robust fallback)
    var activeCard = VE._activeCard || document.querySelector('.glass-panel.ve-active');
    var boltEl = activeCard ? activeCard.querySelector('.chart-actions-bolt') : null;
    if (boltEl && boltEl.getBoundingClientRect().width > 0) {
      var bRect = boltEl.getBoundingClientRect();
      // Position panel to the LEFT of the dropdown menu so the menu stays visible
      var menuEl = boltEl.querySelector('.chart-actions-menu');
      var menuRect = menuEl ? menuEl.getBoundingClientRect() : null;
      var menuLeft = menuRect && menuRect.width > 0 ? menuRect.left : bRect.left;
      top = bRect.top;
      // Place panel just to the left of the dropdown menu, with a small gap
      left = menuLeft - panelW - 8;
      // If no room on left (sidebar), clamp to just right of sidebar
      if (left < 250) left = 250;
    } else if (activeCard) {
      var aRect = activeCard.getBoundingClientRect();
      top = aRect.top;
      left = aRect.right + 12;
      if (left + panelW > window.innerWidth - 8) left = aRect.left - panelW - 12;
    } else {
      var tRect = toolbar.getBoundingClientRect();
      if (tRect.width > 0) {
        top = tRect.top;
        left = tRect.left - panelW - 8;
        if (left < 8) left = tRect.right + 8;
      } else {
        top = (window.innerHeight - panelH) / 2;
        left = (window.innerWidth - panelW) / 2;
      }
    }
    top = Math.max(8, Math.min(top, window.innerHeight - panelH - 8));
    panel.style.top = top + 'px';
    panel.style.left = left + 'px';
    panel.style.maxHeight = panelH + 'px';
  }

  function updatePositions() {
    var panel = document.getElementById('vePanel');
    if (!panel.classList.contains('visible')) return;
    var toolbar = document.getElementById('veToolbar');
    positionPanel(panel, toolbar);
  }

  function resizeAllCharts() {
    VE.registry.forEach(v => {
      if (v.canvas && v.canvas.parentElement) {
        v.canvas._hasChartEvents = false;
        v.canvas._chartHit = null;
        animateChartFromPlan(v.canvas, v.chartRef, 0);
      }
    });
  }

  // ── Populate section controls ────────────────────────────────────────────
  // ==========================================================================
  // CHART RECOMMENDATION ENGINE
  // --------------------------------------------------------------------------
  // Computes an "Insight Score" (0..100) for every chart type based on the
  // dataset slice bound to the currently selected visual, then surfaces the
  // top 5 in the Swap Layout panel's "Recommended" section.
  //
  // Generic by design — no hardcoded column names. Profiling reads from
  // App.excelChartConfig.colMeta (already classified) plus the chart's bound
  // x/y/series, and runs entirely client-side (<5 ms typical) so there's no
  // backend roundtrip.
  //
  // ── Adding a new chart type ──
  //   1. Push an entry into CHART_REGISTRY: { id, label, category, score }.
  //   2. Implement scoreXxx(profile) returning { score: 0..100, reasons: [] }.
  //      Return score 0 when the chart's hard requirements aren't met.
  //   3. Add a corresponding pill to the #veChartType template.
  // ==========================================================================

  // ── geo helpers (used by profiler) ────────────────────────────────────────
  var _US_STATE_NAMES = new Set(['alabama','alaska','arizona','arkansas','california','colorado','connecticut','delaware','florida','georgia','hawaii','idaho','illinois','indiana','iowa','kansas','kentucky','louisiana','maine','maryland','massachusetts','michigan','minnesota','mississippi','missouri','montana','nebraska','nevada','new hampshire','new jersey','new mexico','new york','north carolina','north dakota','ohio','oklahoma','oregon','pennsylvania','rhode island','south carolina','south dakota','tennessee','texas','utah','vermont','virginia','washington','west virginia','wisconsin','wyoming','district of columbia']);
  var _US_STATE_CODES = new Set(['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC']);
  var _COMMON_COUNTRIES = new Set(['united states','usa','us','united kingdom','uk','china','india','japan','germany','france','italy','spain','canada','australia','brazil','mexico','russia','south korea','korea','indonesia','netherlands','switzerland','sweden','belgium','poland','turkey','saudi arabia','argentina','south africa','egypt','nigeria','singapore','ireland','denmark','norway','finland','greece','portugal','israel','thailand','vietnam','philippines','malaysia','new zealand','chile','colombia','peru','pakistan','bangladesh','ukraine','austria','czech republic','romania','hungary']);

  function _isUSStateColumn(name, uniqueVals) {
    if (/^state$|^us[_ ]?state$|^province$/i.test((name || '').trim())) return true;
    if (!uniqueVals || uniqueVals.length === 0) return false;
    var hits = 0;
    for (var i = 0; i < uniqueVals.length; i++) {
      var s = String(uniqueVals[i]).trim();
      if (_US_STATE_NAMES.has(s.toLowerCase()) || _US_STATE_CODES.has(s.toUpperCase())) hits++;
    }
    return hits / uniqueVals.length >= 0.5;
  }
  function _isCountryColumn(name, uniqueVals) {
    if (/^country$|^nation$|^country[_ ]?name$/i.test((name || '').trim())) return true;
    if (!uniqueVals || uniqueVals.length === 0) return false;
    var hits = 0;
    for (var i = 0; i < uniqueVals.length; i++) {
      if (_COMMON_COUNTRIES.has(String(uniqueVals[i]).trim().toLowerCase())) hits++;
    }
    return hits / uniqueVals.length >= 0.4;
  }
  function _maxLabelLen(uniqueVals) {
    if (!uniqueVals || uniqueVals.length === 0) return 0;
    var m = 0;
    for (var i = 0; i < uniqueVals.length; i++) { var l = String(uniqueVals[i]).length; if (l > m) m = l; }
    return m;
  }
  function _pearsonR(xs, ys) {
    var n = Math.min(xs.length, ys.length);
    if (n < 3) return 0;
    var sx = 0, sy = 0, sxx = 0, syy = 0, sxy = 0, k = 0;
    for (var i = 0; i < n; i++) {
      var x = parseFloat(xs[i]), y = parseFloat(ys[i]);
      if (!isFinite(x) || !isFinite(y)) continue;
      sx += x; sy += y; sxx += x * x; syy += y * y; sxy += x * y; k++;
    }
    if (k < 3) return 0;
    var num = k * sxy - sx * sy;
    var den = Math.sqrt((k * sxx - sx * sx) * (k * syy - sy * sy));
    if (den === 0) return 0;
    return num / den;
  }
  function _summarizeNumeric(vals) {
    if (!vals || vals.length === 0) return null;
    var min = Infinity, max = -Infinity, sum = 0, n = 0, neg = 0, zero = 0;
    for (var i = 0; i < vals.length; i++) {
      var v = parseFloat(vals[i]);
      if (!isFinite(v)) continue;
      if (v < min) min = v;
      if (v > max) max = v;
      if (v < 0) neg++;
      if (v === 0) zero++;
      sum += v; n++;
    }
    if (n === 0) return null;
    return { min: min, max: max, mean: sum / n, count: n, hasNegatives: neg > 0, zeroFraction: zero / n };
  }

  // ── Profiler: builds a generic profile of the slice driving this chart ───
  function profileChartContext(visual) {
    var ec = App.excelChartConfig || {};
    var colMeta = ec.colMeta || {};
    var headers = (App.excelData && App.excelData.headers) || Object.keys(colMeta);
    var rows = (App.excelData && App.excelData.rows) || [];
    var chart = (visual && visual.chartRef) || {};

    // Sample cap for cardinality-heavy datasets — keeps profiling <300ms
    var SAMPLE_CAP = 10000;
    var sampleRows = rows.length > SAMPLE_CAP ? rows.slice(0, SAMPLE_CAP) : rows;

    var allCols = headers.map(function (h) {
      var meta = colMeta[h] || {};
      var uvs = meta.uniqueVals || [];
      return {
        name: h,
        isNumeric: !!meta.isMetric,
        isCategorical: !!meta.isCategorical && !meta.isDate,
        isDate: !!meta.isDate,
        isIndex: !!meta.isIndex,
        uniqueCount: meta.uniqueCount || 0,
        uniqueVals: uvs,
        maxLabelLen: _maxLabelLen(uvs),
        isUSState: _isUSStateColumn(h, uvs),
        isCountry: _isCountryColumn(h, uvs)
      };
    });

    var numericCols = allCols.filter(function (c) { return c.isNumeric && !c.isIndex; });
    var categoricalCols = allCols.filter(function (c) { return c.isCategorical && !c.isDate; });
    var dateCols = allCols.filter(function (c) { return c.isDate; });
    var geoUSStateCol = null, geoCountryCol = null;
    for (var i = 0; i < allCols.length; i++) {
      if (!geoUSStateCol && allCols[i].isUSState) geoUSStateCol = allCols[i];
      if (!geoCountryCol && allCols[i].isCountry) geoCountryCol = allCols[i];
    }

    // Resolve current bound x/y from chart spec
    var xName = chart._origXCol || chart.xCol || null;
    var yName = chart._origYCol || chart.yCol || null;
    var xCol = xName ? (allCols.find(function (c) { return c.name === xName; }) || null) : null;
    var yCol = yName ? (allCols.find(function (c) { return c.name === yName; }) || null) : null;

    var seriesCount = (chart.series && chart.series.length) || 0;

    // Pearson correlation when both bound axes are numeric
    var correlation = null;
    if (xCol && yCol && xCol.isNumeric && yCol.isNumeric) {
      var xs = sampleRows.map(function (r) { return r[xCol.name]; });
      var ys = sampleRows.map(function (r) { return r[yCol.name]; });
      correlation = Math.abs(_pearsonR(xs, ys));
    }

    // Aggregated y-axis stats from chart's already-computed flat data
    var flat = (function () {
      if (chart.series && chart.series.length) {
        var out = [];
        chart.series.forEach(function (s) { (s.data || []).forEach(function (v) { out.push(v); }); });
        return out;
      }
      return chart.data || [];
    })();
    var ySummary = _summarizeNumeric(flat);

    return {
      rowCount: rows.length,
      sampledRows: sampleRows.length,
      chartLabelCount: (chart.labels && chart.labels.length) || 0,
      seriesCount: seriesCount,
      xCol: xCol,
      yCol: yCol,
      numericCols: numericCols,
      categoricalCols: categoricalCols,
      dateCols: dateCols,
      geoUSStateCol: geoUSStateCol,
      geoCountryCol: geoCountryCol,
      correlation: correlation,
      ySummary: ySummary,
      title: chart.title || ''
    };
  }

  // ── Scoring helpers ───────────────────────────────────────────────────────
  function _clamp(v) { return Math.max(0, Math.min(100, Math.round(v))); }
  function _result(score, reasons) { return { score: _clamp(score), reasons: reasons.slice(0, 3) }; }
  function _categoricalLikeX(p) {
    if (p.xCol && (p.xCol.isCategorical || p.xCol.isDate)) return p.xCol;
    if (p.categoricalCols.length > 0) return p.categoricalCols[0];
    return null;
  }
  function _numericLikeY(p) {
    if (p.yCol && p.yCol.isNumeric) return p.yCol;
    if (p.numericCols.length > 0) return p.numericCols[0];
    return null;
  }

  // ── Scoring functions per chart type ──────────────────────────────────────
  function scoreBar(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    var s = 60, reasons = ['Compares ' + (y.name || 'value') + ' across ' + (x.name || 'categories')];
    if (card >= 4 && card <= 15) { s += 18; reasons.push('Sweet-spot category count (' + card + ')'); }
    else if (card >= 2 && card <= 25) { s += 8; }
    if ((x.maxLabelLen || 0) <= 12) s += 6;
    if (card > 25) { s -= 15; reasons.push('Crowded — consider H-Bar or Treemap'); }
    if (card > 40) s -= 25;
    return _result(s, reasons);
  }
  function scoreHBar(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    var longLabels = (x.maxLabelLen || 0) > 12;
    var s = 55, reasons = ['Ranks ' + (x.name || 'categories') + ' by ' + (y.name || 'value')];
    if (longLabels) { s += 22; reasons.push('Long labels read better horizontally'); }
    if (card >= 6 && card <= 20) s += 12;
    if (card > 25) s -= 12;
    if (card > 50) s -= 25;
    return _result(s, reasons);
  }
  function scoreLine(p) {
    // The CURRENT chart's x must be date-like. Don't fall back to "any date
    // column in the dataset" — that would recommend a line chart for
    // "Revenue by State" just because the dataset also has a date column.
    var dateX = p.xCol ? (p.xCol.isDate ? p.xCol : null) : (p.dateCols.length > 0 ? p.dateCols[0] : null);
    var y = _numericLikeY(p);
    if (!dateX || !y) return _result(0, ['Needs a date/time column on the x-axis']);
    var points = p.chartLabelCount || p.rowCount || 0;
    if (points < 4) return _result(0, ['Not enough time points for a trend']);
    var s = 70, reasons = ['Shows trend of ' + (y.name || 'value') + ' over time'];
    if (points >= 12) { s += 12; reasons.push('Plenty of points (' + points + ') for a clear trend'); }
    if (p.seriesCount >= 2 && p.seriesCount <= 5) { s += 8; reasons.push(p.seriesCount + ' series — easy side-by-side trend'); }
    if (p.seriesCount > 6) { s -= 25; reasons.push('Too many series for a readable line chart'); }
    return _result(s, reasons);
  }
  function scoreArea(p) {
    // Same logic as Line: only if the chart's bound x is date-like.
    var dateX = p.xCol ? (p.xCol.isDate ? p.xCol : null) : (p.dateCols.length > 0 ? p.dateCols[0] : null);
    var y = _numericLikeY(p);
    if (!dateX || !y) return _result(0, ['Needs a date/time column on the x-axis']);
    var points = p.chartLabelCount || p.rowCount || 0;
    if (points < 4) return _result(0, ['Not enough time points']);
    var s = 60, reasons = ['Emphasizes magnitude over time'];
    if (p.seriesCount <= 1) s += 8;
    if (p.seriesCount > 3) { s -= 20; reasons.push('Stacked areas can occlude — consider Stacked or Line'); }
    return _result(s, reasons);
  }
  function scoreDonut(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    if (card < 2) return _result(0, ['Needs at least 2 categories']);
    if (card > 12) return _result(0, ['Too many slices — donuts read poorly above ~8 categories']);
    var s = 50, reasons = ['Shows ' + (y.name || 'value') + ' share by ' + (x.name || 'category')];
    if (card >= 3 && card <= 5) { s += 22; reasons.push('Ideal slice count (' + card + ')'); }
    else if (card <= 7) s += 8;
    if (card > 8) s -= 25;
    if (p.ySummary && p.ySummary.hasNegatives) { s -= 50; reasons.push("Negative values can't be shown in a donut"); }
    return _result(s, reasons);
  }
  function scoreStacked(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    if (p.seriesCount < 2) return _result(15, ['Needs a second grouping column to stack — currently only one series']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    var s = 65, reasons = ['Compares ' + p.seriesCount + ' series across ' + (x.name || 'categories')];
    if (p.seriesCount >= 2 && p.seriesCount <= 5) s += 12;
    if (p.seriesCount > 6) s -= 25;
    if (card > 25) s -= 15;
    return _result(s, reasons);
  }
  function scoreGauge(p) {
    var y = _numericLikeY(p);
    if (!y) return _result(0, ['Needs a numeric measure']);
    var s = 25, reasons = ['Highlights a single KPI value'];
    if (p.chartLabelCount <= 1) { s += 25; reasons.push('Single value fits a gauge well'); }
    if (p.chartLabelCount > 4) { s -= 30; reasons.push('Multiple data points — pick a chart that shows them all'); }
    return _result(s, reasons);
  }
  function scoreLollipop(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    var s = 45, reasons = ['Cleaner than bar for ranking similar values'];
    if (card >= 4 && card <= 18) s += 15;
    if (card > 25) s -= 20;
    return _result(s, reasons);
  }
  function scoreFunnel(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a stage/step column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    if (card > 8) return _result(0, ['Too many stages for a funnel']);
    var s = 25, reasons = ['Shows drop-off through sequential stages'];
    if (/stage|phase|step|funnel|pipeline|status/i.test(x.name || '')) { s += 35; reasons.push('"' + x.name + '" looks like a stage column'); }
    if (card >= 3 && card <= 6) s += 10;
    return _result(s, reasons);
  }
  function scoreUSMap(p) {
    // The chart's x-axis must actually be a US state column.
    // Three cases:
    //   1. xCol is bound and IS a state col → score it
    //   2. xCol is bound and is NOT a state col → 0
    //   3. xCol is null — chart has no tracked x. If the chart already has
    //      data/labels, we can't confirm they're states, so score 0.
    //      Only fall back to dataset-level detection for empty/new charts.
    if (p.xCol) {
      if (!p.xCol.isUSState) return _result(0, ['Current x-axis (' + (p.xCol.name || '') + ') is not a US state column']);
    } else {
      if (p.chartLabelCount > 0) return _result(0, ['Chart data is not bound to a US state column']);
      if (!p.geoUSStateCol) return _result(0, ['No US state column detected in this dataset']);
    }
    var y = _numericLikeY(p);
    if (!y) return _result(0, ['Needs a numeric measure to color states']);
    var geoCol = p.xCol || p.geoUSStateCol;
    var s = 78, reasons = ['Shows ' + y.name + ' geographically across US states'];
    if (geoCol && geoCol.uniqueCount >= 8) { s += 12; reasons.push(geoCol.uniqueCount + ' states with data'); }
    return _result(s, reasons);
  }
  function scoreWorldMap(p) {
    // Same logic as US Map — only recommend when the chart's own data is countries.
    if (p.xCol) {
      if (!p.xCol.isCountry) return _result(0, ['Current x-axis (' + (p.xCol.name || '') + ') is not a country column']);
    } else {
      if (p.chartLabelCount > 0) return _result(0, ['Chart data is not bound to a country column']);
      if (!p.geoCountryCol) return _result(0, ['No country column detected in this dataset']);
    }
    var y = _numericLikeY(p);
    if (!y) return _result(0, ['Needs a numeric measure to color countries']);
    var geoCol = p.xCol || p.geoCountryCol;
    var s = 78, reasons = ['Shows ' + y.name + ' globally by country'];
    if (geoCol && geoCol.uniqueCount >= 5) { s += 12; reasons.push(geoCol.uniqueCount + ' countries with data'); }
    return _result(s, reasons);
  }
  function scoreWaterfall(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    if (card > 14) return _result(0, ['Too many bars for a waterfall']);
    var s = 30, reasons = ['Visualizes additive contributions or net change'];
    if (p.ySummary && p.ySummary.hasNegatives) { s += 30; reasons.push('Negative values fit a waterfall naturally'); }
    if (/change|delta|net|gain|loss|variance|impact/i.test((y.name || '') + ' ' + (x.name || ''))) { s += 15; reasons.push('Column names suggest deltas / change'); }
    return _result(s, reasons);
  }
  function scoreRadar(p) {
    if (p.numericCols.length < 3) return _result(0, ['Needs at least 3 numeric metrics']);
    // Radar is unreadable with more than ~10 data points. If the current chart
    // has many labels (e.g., 50 states), reject immediately — don't scan dataset
    // for some other low-cardinality column that has nothing to do with this chart.
    if (p.chartLabelCount > 10) return _result(0, ['Too many data points (' + p.chartLabelCount + ') for a radar chart']);
    // If the chart has a bound x with high cardinality, reject.
    if (p.xCol && p.xCol.uniqueCount > 10) return _result(0, ['Too many categories (' + p.xCol.uniqueCount + ') for a radar chart']);
    var lowCardCat = null;
    // Prefer the chart's own bound x if it qualifies.
    if (p.xCol && p.xCol.isCategorical && p.xCol.uniqueCount >= 2 && p.xCol.uniqueCount <= 6) {
      lowCardCat = p.xCol;
    } else {
      for (var i = 0; i < p.categoricalCols.length; i++) {
        var c = p.categoricalCols[i];
        if (c.uniqueCount >= 2 && c.uniqueCount <= 6) { lowCardCat = c; break; }
      }
    }
    if (!lowCardCat) return _result(0, ['Needs a low-cardinality category (2\u20136) to compare profiles']);
    var s = 40, reasons = ['Compares ' + lowCardCat.name + ' across ' + p.numericCols.length + ' metrics'];
    if (p.numericCols.length >= 5) s += 15;
    if (lowCardCat.uniqueCount <= 4) s += 8;
    return _result(s, reasons);
  }
  function scoreTreemap(p) {
    var x = _categoricalLikeX(p), y = _numericLikeY(p);
    if (!x || !y) return _result(0, ['Needs a categorical column and a numeric measure']);
    var card = x.uniqueCount || p.chartLabelCount || 0;
    if (card < 4) return _result(0, ['Treemap needs at least 4 categories']);
    var s = 50, reasons = ['Shows ' + y.name + ' share by ' + x.name];
    if (card >= 5 && card <= 30) { s += 20; reasons.push('Handles ' + card + ' categories better than a bar chart'); }
    if (p.categoricalCols.length >= 2) { s += 10; reasons.push('Multiple categorical columns enable hierarchy'); }
    if (p.ySummary && p.ySummary.hasNegatives) { s -= 30; reasons.push("Treemaps don't handle negatives"); }
    return _result(s, reasons);
  }
  function scoreScatter(p) {
    if (p.numericCols.length < 2) return _result(0, ['Needs at least 2 numeric columns']);
    var s = 55, reasons = ['Reveals relationships between two numeric variables'];
    if (p.xCol && p.yCol && p.xCol.isNumeric && p.yCol.isNumeric) {
      s += 20; reasons.push('Both bound axes are numeric');
      if (p.correlation != null && p.correlation >= 0.3) {
        s += 15; reasons.push('Detected correlation r≈' + p.correlation.toFixed(2));
      }
    }
    if (p.rowCount < 12) { s -= 25; reasons.push('Few data points may obscure patterns'); }
    return _result(s, reasons);
  }
  function scoreBubble(p) {
    if (p.numericCols.length < 3) return _result(0, ['Needs at least 3 numeric columns']);
    var s = 40, reasons = ['Like scatter, plus a third numeric encoded as bubble size'];
    if (p.xCol && p.yCol && p.xCol.isNumeric && p.yCol.isNumeric) s += 15;
    if (p.rowCount < 12) s -= 25;
    return _result(s, reasons);
  }

  // ── Registry (single source of truth) ────────────────────────────────────
  var CHART_REGISTRY = [
    { id: 'bar',       label: 'Bar',       category: 'comparison',   score: scoreBar },
    { id: 'hbar',      label: 'H-Bar',     category: 'comparison',   score: scoreHBar },
    { id: 'line',      label: 'Line',      category: 'trend',        score: scoreLine },
    { id: 'area',      label: 'Area',      category: 'trend',        score: scoreArea },
    { id: 'donut',     label: 'Donut',     category: 'distribution', score: scoreDonut },
    { id: 'stacked',   label: 'Stacked',   category: 'comparison',   score: scoreStacked },
    { id: 'gauge',     label: 'Gauge',     category: 'kpi',          score: scoreGauge },
    { id: 'lollipop',  label: 'Lollipop',  category: 'comparison',   score: scoreLollipop },
    { id: 'funnel',    label: 'Funnel',    category: 'flow',         score: scoreFunnel },
    { id: 'usmap',     label: 'US Map',    category: 'geo',          score: scoreUSMap },
    { id: 'worldmap',  label: 'World Map', category: 'geo',          score: scoreWorldMap },
    { id: 'waterfall', label: 'Waterfall', category: 'change',       score: scoreWaterfall },
    { id: 'radar',     label: 'Radar',     category: 'profile',      score: scoreRadar },
    { id: 'treemap',   label: 'Treemap',   category: 'hierarchy',    score: scoreTreemap },
    { id: 'scatter',   label: 'Scatter',   category: 'relationship', score: scoreScatter },
    { id: 'bubble',    label: 'Bubble',    category: 'relationship', score: scoreBubble }
  ];

  // ── Public: get top-5 + full ranking, cached per chart-state signature ───
  function getChartRecommendations(visual) {
    var chart = (visual && visual.chartRef) || {};
    var sig = [
      chart._origXCol || chart.xCol || '',
      chart._origYCol || chart.yCol || '',
      (chart.series && chart.series.length) || 0,
      (App.excelData && App.excelData.rows && App.excelData.rows.length) || 0,
      (App.excelData && App.excelData.headers && App.excelData.headers.length) || 0
    ].join('|');
    if (chart._recCache && chart._recCache.sig === sig) return chart._recCache.value;

    var t0 = (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;
    var profile = profileChartContext(visual);
    var scored = CHART_REGISTRY.map(function (def) {
      var res;
      try { res = def.score(profile); }
      catch (e) { res = { score: 0, reasons: ['scoring error'] }; }
      return { id: def.id, label: def.label, category: def.category, score: res.score, reasons: res.reasons };
    });
    scored.sort(function (a, b) { return b.score - a.score; });
    var recommended = scored.filter(function (c) { return c.score > 0; }).slice(0, 5);
    var value = {
      recommended: recommended,
      all: scored,
      profile: profile,
      computeMs: t0 ? Math.round((performance.now() - t0) * 10) / 10 : null
    };
    chart._recCache = { sig: sig, value: value };
    return value;
  }

  // ── Public: paint the Recommended section into #veRecommended ────────────
  function renderChartRecommendations(visual) {
    var host = document.getElementById('veRecommended');
    if (!host) return;
    var chart = (visual && visual.chartRef) || {};
    var curType = chart._userType || chart.type;
    var result = getChartRecommendations(visual);

    // Smart filter: hide chart types that don't make sense for current data
    var ec = App.excelChartConfig || {};
    var colMeta = ec.colMeta || {};
    var hasGeo = Object.keys(colMeta).some(function(h) {
      var m = colMeta[h] || {};
      if (m.uniqueVals) {
        for (var i = 0; i < Math.min(m.uniqueVals.length, 20); i++) {
          var v = String(m.uniqueVals[i]).toLowerCase();
          if (_US_STATE_NAMES.has(v) || _US_STATE_CODES.has(v.toUpperCase()) || _COMMON_COUNTRIES.has(v)) return true;
        }
      }
      return /\bstate\b|\bcountry\b|\bnation\b/i.test(h);
    });
    var hasNumericPair = (ec.metrics || []).length >= 2;
    var geoGroup = document.querySelector('.ve-chart-group-geo');
    if (geoGroup) geoGroup.style.display = hasGeo ? '' : 'none';
    // Hide scatter/bubble if no numeric pair
    var ctEl = document.getElementById('veChartType');
    if (ctEl) {
      ctEl.querySelectorAll('.ve-chart-card').forEach(function(card) {
        var v = card.dataset.val;
        if ((v === 'scatter' || v === 'bubble') && !hasNumericPair) card.classList.add('ve-chart-hidden');
        else card.classList.remove('ve-chart-hidden');
      });
    }
    if (!result.recommended.length) {
      host.innerHTML = '<div class="ve-rec-empty">No clear recommendations for this chart\u2019s columns yet — pick from the full list below.</div>';
      return;
    }
    var html = '<div class="ve-label" style="margin-bottom:4px;display:flex;align-items:center;gap:4px;">Recommended <span style="font-size:8px;color:var(--text-tertiary);font-weight:500;text-transform:none;letter-spacing:0;">(top ' + result.recommended.length + ')</span></div>';
    html += '<div class="ve-pills" style="gap:3px">';
    result.recommended.forEach(function (rec) {
      var isActive = rec.id === curType;
      var tip = rec.reasons.join(' \u2022 ').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      html += '<div class="ve-pill ve-rec-pill' + (isActive ? ' active' : '') + '" data-val="' + rec.id + '" title="' + tip + '">' + rec.label + '<span class="ve-rec-score">' + rec.score + '</span></div>';
    });
    html += '</div>';
    host.innerHTML = html;
  }

          var lpHtml = '';
          if (isBar || isDonut) {
            lpHtml += '<div class="ve-lp-row' + (!curPalette ? ' active' : '') + '" data-palette="">' +
              '<span class="ve-lp-name">' + (isDonut ? 'Default' : 'Single') + '</span>' +
              '<div class="ve-lp-band"><span style="background:' + getColorHex(curColor) + '"></span></div></div>';
          }
          Object.entries(linePalettes).forEach(function(entry) {
            var name = entry[0], colors = entry[1];
            lpHtml += '<div class="ve-lp-row' + (name === curPalette ? ' active' : '') + '" data-palette="' + name + '">' +
              '<span class="ve-lp-name">' + name + '</span>' +
              '<div class="ve-lp-band">' + colors.slice(0, 6).map(function(c) { return '<span style="background:' + c + '"></span>'; }).join('') + '</div></div>';
          });
          var lpEl = document.getElementById('veLinePalettes');
          if (lpEl) lpEl.innerHTML = lpHtml;
        }
        break;
      }
      case 'fonts': {
        var ff = document.getElementById('veFontFamily');
        if (ff) ff.value = s.fontFamily || 'Inter';
        var ts = document.getElementById('veTitleSize');
        var tsv = document.getElementById('veTitleSizeVal');
        if (ts) ts.value = s.titleSize || 16;
        if (tsv) tsv.textContent = s.titleSize || 16;
        var ls = document.getElementById('veLabelSize');
        var lsv = document.getElementById('veLabelSizeVal');
        if (ls) ls.value = s.labelSize || 11;
        if (lsv) lsv.textContent = s.labelSize || 11;
        setPillGroup('veFontWeight', s.fontWeight || '500');
        break;
      }
      case 'layout': {
        setPillGroup('veChartType', curType);
        setPillGroup('veLayoutDensity', s.density || 'balanced');
        renderChartRecommendations(visual);
        break;
      }
      case 'branding': {
        var bt = document.getElementById('veBrandingToggle');
        if (bt) bt.checked = s.branding || false;
        break;
      }
      case 'aspect': {
        setPillGroup('veAspectRatio', s.aspectRatio || 'auto');
        break;
      }
      case 'sync': {
        var st = document.getElementById('veSyncToggle');
        if (st) st.checked = s.syncTitle !== false;
        var ci = document.getElementById('veCaptionInput');
        if (ci) ci.value = s.caption || '';
        break;
      }
      case 'info': {
        var datasetName = (App.uploadedFiles && App.uploadedFiles.length > 0) ? App.uploadedFiles[0].name : (App.excelData && App.excelData.sheetName ? App.excelData.sheetName : 'Uploaded Dataset');
        var cols = [chart.xLabel, chart.yLabel].filter(Boolean).join(', ') || 'N/A';
        var updated = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        var dataPoints = chart.labels ? chart.labels.length : (chart.data ? chart.data.length : 0);
        if (chart.series && chart.series.length > 0 && chart.labels) {
          dataPoints = chart.labels.length + ' x ' + chart.series.length + ' series';
        }
        var infoEl = document.getElementById('veInfoTable');
        if (infoEl) infoEl.innerHTML =
          '<div class="ve-info-row"><span class="ve-info-key">Dataset</span><span class="ve-info-val">' + datasetName + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Chart Type</span><span class="ve-info-val">' + curType.charAt(0).toUpperCase() + curType.slice(1) + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Columns</span><span class="ve-info-val">' + cols + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Data Points</span><span class="ve-info-val">' + dataPoints + '</span></div>' +
          '<div class="ve-info-row"><span class="ve-info-key">Last Updated</span><span class="ve-info-val">' + updated + '</span></div>';
        break;
      }
    }
  }

  function setPillGroup(containerId, activeVal) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('.ve-pill').forEach(p => p.classList.toggle('active', p.dataset.val === activeVal));
  }

  // ── Apply settings to a chart ─────────────────────────────────────────
  function applySettingsToChart(visual) {
    const s = visual.settings;
    const chart = visual.chartRef;
    const card = visual.canvas.closest('.glass-panel');

    // Chart type
    if (s.chartType && s.chartType !== (chart._userType || chart.type)) {
      chart._userType = s.chartType;
    }

    // Color
    if (s.color && s.color !== chart.color) {
      chart.color = s.color;
      chart._userColor = s.color;
    }

    // Bar palette
    if (s.barPalette && linePalettes[s.barPalette]) {
      chart._barPalette = s.barPalette;
    }

    // Line series palette
    if (s.linePalette && linePalettes[s.linePalette] && chart.series) {
      chart._palette = s.linePalette;
      const colors = linePalettes[s.linePalette];
      chart.series.forEach((ser, i) => { ser.color = colors[i % colors.length]; });
    }

    // Sync legend dots with current series colors
    if (chart.series && card) {
      const legendDots = card.querySelectorAll('.legend-dot');
      chart.series.forEach((ser, i) => { if (legendDots[i]) legendDots[i].style.background = getColorHex(ser.color); });
    }

    // Ensure chart container keeps fixed height
    const container = visual.canvas.closest('.chart-container');
    if (container) {
      container.style.aspectRatio = '';
      container.style.height = '280px';
    }

    // Layout density — adjust container padding
    if (card) {
      card.style.padding = s.density === 'compact' ? '16px' : s.density === 'spacious' ? '36px' : '';
    }

    // Font settings on title
    if (card) {
      const titleEl = card.querySelector('.panel-title');
      if (titleEl) {
        titleEl.style.fontFamily = (s.fontFamily || 'Inter') + ', system-ui, sans-serif';
        titleEl.style.fontSize = (s.titleSize || 16) + 'px';
        titleEl.style.fontWeight = s.fontWeight || '500';
      }
    }

    // Branding
    if (card) {
      let brandEl = card.querySelector('.ve-brand-footer');
      if (s.branding) {
        if (!brandEl) {
          brandEl = document.createElement('div');
          brandEl.className = 've-brand-footer';
          brandEl.style.cssText = 'text-align:right;font-size:10px;color:var(--text-tertiary);opacity:0.5;margin-top:8px;font-family:Inter,sans-serif;position:relative;z-index:1;';
          brandEl.textContent = 'GenBI';
          card.appendChild(brandEl);
        }
      } else if (brandEl) {
        brandEl.remove();
      }
    }

    // Caption
    if (s.caption && card) {
      let capEl = card.querySelector('.ve-caption');
      if (!capEl) {
        capEl = document.createElement('div');
        capEl.className = 've-caption';
        capEl.style.cssText = 'font-size:12px;color:var(--text-tertiary);margin-top:8px;line-height:1.4;position:relative;z-index:1;';
        const container2 = card.querySelector('.chart-container');
        if (container2) container2.insertAdjacentElement('afterend', capEl);
      }
      capEl.textContent = s.caption;
    } else if (card) {
      const capEl = card.querySelector('.ve-caption');
      if (capEl) capEl.remove();
    }
  }

  function getSelectedVisual() {
    var id = VE.activeId || VE.hoveredCardId;
    return VE.registry.find(function(v) { return v.id === id; });
  }

  function updateAndRedraw(settingKey, value) {
    const visual = getSelectedVisual();
    if (!visual) return;
    visual.settings[settingKey] = value;
    saveSettings(visual.id, visual.settings);
    applySettingsToChart(visual);
    // Redraw canvas
    const chart = visual.chartRef;
    visual.canvas._hasChartEvents = false;
    visual.canvas._chartHit = null;
    animateChartFromPlan(visual.canvas, chart, 0);
  }

  // ── Bind section listeners (attached to freshly cloned template) ──────
  function bindSectionListeners(sectionKey) {
    switch (sectionKey) {
      case 'export': {
        document.querySelectorAll('#vePanelBody .ve-export-fmt').forEach(function(el) {
          el.addEventListener('click', function() {
            document.querySelectorAll('#vePanelBody .ve-export-fmt').forEach(function(f) { f.classList.remove('active'); });
            this.classList.add('active');
            VE.exportFmt = this.dataset.fmt;
          });
        });
        var btn = document.getElementById('veExportBtn');
        if (btn) btn.addEventListener('click', handleExport);
        break;
      }
      case 'colors': {
        var sc = document.getElementById('veColorSwatches');
        if (sc) sc.addEventListener('click', function(e) {
          var swatch = e.target.closest('.ve-swatch');
          if (!swatch) return;
          var visual = getSelectedVisual();
          if (!visual) return;
          var color = swatch.dataset.color;
          this.querySelectorAll('.ve-swatch').forEach(function(s) { s.classList.remove('active'); });
          swatch.classList.add('active');
          visual.chartRef.color = color;
          visual.chartRef._userColor = color;
          // For multi-series charts, apply the single color to all series
          if (visual.chartRef.series && visual.chartRef.series.length > 0) {
            var hex = swatch.dataset.hex || getColorHex(color);
            visual.chartRef.series.forEach(function(s) {
              s.color = hex;
            });
            // Clear any bar palette so single color takes effect
            delete visual.chartRef._barPalette;
            if (visual.settings) visual.settings.barPalette = null;
            var card = visual.canvas.closest('.glass-panel');
            if (card) {
              var legendDots = card.querySelectorAll('.legend-dot');
              visual.chartRef.series.forEach(function(s, i) { if (legendDots[i]) legendDots[i].style.background = s.color; });
            }
            // Update palette UI to show "Single" as active
            var lpRows = document.querySelectorAll('#veLinePalettes .ve-lp-row');
            lpRows.forEach(function(r) { r.classList.toggle('active', r.dataset.palette === ''); });
          }
          var headerSelect = visual.canvas.closest('.glass-panel');
          headerSelect = headerSelect ? headerSelect.querySelector('select[onchange*="ChartColor"]') : null;
          if (headerSelect) headerSelect.value = color;
          updateAndRedraw('color', color);
          var hex = swatch.dataset.hex || '#00e5ff';
          var picker = document.getElementById('veCustomColorPicker');
          if (picker) picker.value = hex;
        });
        var cp = document.getElementById('veCustomColorPicker');
        if (cp) cp.addEventListener('input', function(e) {
          var visual = getSelectedVisual();
          if (!visual) return;
          var hex = e.target.value;
          colorRgba['_custom'] = hexToRgb(hex);
          document.querySelectorAll('#veColorSwatches .ve-swatch').forEach(function(s) { s.classList.remove('active'); });
          visual.chartRef.color = hex;
          visual.chartRef._userColor = hex;
          updateAndRedraw('color', hex);
        });
        var lp = document.getElementById('veLinePalettes');
        if (lp) lp.addEventListener('click', function(e) {
          var row = e.target.closest('.ve-lp-row');
          if (!row) return;
          var visual = getSelectedVisual();
          if (!visual) return;
          var chart = visual.chartRef;
          var curType = chart._userType || chart.type;
          var paletteName = row.dataset.palette;
          if (curType === 'bar' || curType === 'donut') {
            if (paletteName === '') {
              delete chart._barPalette;
              visual.settings.barPalette = null;
              // Apply current single color to all series
              if (chart.series && chart.series.length > 0) {
                var singleHex = getColorHex(chart._userColor || chart.color || 'cyan');
                chart.series.forEach(function(s) { s.color = singleHex; });
                var card0 = visual.canvas.closest('.glass-panel');
                if (card0) {
                  var dots0 = card0.querySelectorAll('.legend-dot');
                  chart.series.forEach(function(s, i) { if (dots0[i]) dots0[i].style.background = s.color; });
                }
              }
            } else {
              var colors = linePalettes[paletteName];
              if (!colors) return;
              chart._barPalette = paletteName;
              visual.settings.barPalette = paletteName;
            }
            this.querySelectorAll('.ve-lp-row').forEach(function(r) { r.classList.remove('active'); });
            row.classList.add('active');
            if (curType === 'donut' || curType === 'stacked') {
              var card = visual.canvas.closest('.glass-panel');
              if (card && paletteName && linePalettes[paletteName]) {
                if (chart.series && chart.series.length > 0) {
                  var palColors = linePalettes[paletteName];
                  chart.series.forEach(function(s, i) { s.color = palColors[i % palColors.length]; });
                }
                var legendDots = card.querySelectorAll('.legend-dot');
                (chart.series || []).forEach(function(s, i) { if (legendDots[i]) legendDots[i].style.background = s.color; });
              }
            }
            visual.canvas._hasChartEvents = false;
            visual.canvas._chartHit = null;
            animateChartFromPlan(visual.canvas, chart, 0);
            saveSettings(visual.id, visual.settings);
          } else if (chart.series && chart.series.length > 0) {
            var colors2 = linePalettes[paletteName];
            if (!colors2) return;
            chart._palette = paletteName;
            visual.settings.linePalette = paletteName;
            chart.series.forEach(function(s, i) { s.color = colors2[i % colors2.length]; });
            this.querySelectorAll('.ve-lp-row').forEach(function(r) { r.classList.remove('active'); });
            row.classList.add('active');
            var card2 = visual.canvas.closest('.glass-panel');
            if (card2) {
              var legendDots2 = card2.querySelectorAll('.legend-dot');
              chart.series.forEach(function(s, i) { if (legendDots2[i]) legendDots2[i].style.background = s.color; });
            }
            visual.canvas._hasChartEvents = false;
            visual.canvas._chartHit = null;
            animateChartFromPlan(visual.canvas, chart, 0);
            saveSettings(visual.id, visual.settings);
          }
        });
        break;
      }
      case 'fonts': {
        var ff = document.getElementById('veFontFamily');
        if (ff) ff.addEventListener('change', function() { updateAndRedraw('fontFamily', this.value); });
        var ts = document.getElementById('veTitleSize');
        if (ts) ts.addEventListener('input', function() {
          document.getElementById('veTitleSizeVal').textContent = this.value;
          updateAndRedraw('titleSize', parseInt(this.value));
        });
        var ls = document.getElementById('veLabelSize');
        if (ls) ls.addEventListener('input', function() {
          document.getElementById('veLabelSizeVal').textContent = this.value;
          updateAndRedraw('labelSize', parseInt(this.value));
        });
        var fw = document.getElementById('veFontWeight');
        if (fw) fw.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          updateAndRedraw('fontWeight', pill.dataset.val);
        });
        break;
      }
      case 'layout': {
        // Shared selection logic for both the Recommended pills and the All grid
        var applyChartType = function(newType) {
          var visual = getSelectedVisual();
          if (!visual) return;
          // Sync active state across both lists
          var ctEl = document.getElementById('veChartType');
          if (ctEl) ctEl.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.toggle('active', p.dataset.val === newType); });
          var recEl = document.getElementById('veRecommended');
          if (recEl) recEl.querySelectorAll('.ve-rec-pill').forEach(function(p) { p.classList.toggle('active', p.dataset.val === newType); });
          visual.chartRef._userType = newType;
          var headerSelect = visual.canvas.closest('.glass-panel');
          headerSelect = headerSelect ? headerSelect.querySelector('select[onchange*="ChartType"]') : null;
          if (headerSelect) headerSelect.value = newType;
          updateAndRedraw('chartType', newType);
        };
        var ct = document.getElementById('veChartType');
        if (ct) ct.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          applyChartType(pill.dataset.val);
        });
        var rec = document.getElementById('veRecommended');
        if (rec) rec.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-rec-pill');
          if (!pill) return;
          applyChartType(pill.dataset.val);
        });
        var ld = document.getElementById('veLayoutDensity');
        if (ld) ld.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          updateAndRedraw('density', pill.dataset.val);
        });
        break;
      }
      case 'branding': {
        var bt = document.getElementById('veBrandingToggle');
        if (bt) bt.addEventListener('change', function() { updateAndRedraw('branding', this.checked); });
        break;
      }
      case 'aspect': {
        var ar = document.getElementById('veAspectRatio');
        if (ar) ar.addEventListener('click', function(e) {
          var pill = e.target.closest('.ve-pill');
          if (!pill) return;
          this.querySelectorAll('.ve-pill').forEach(function(p) { p.classList.remove('active'); });
          pill.classList.add('active');
          updateAndRedraw('aspectRatio', pill.dataset.val);
          var visual = getSelectedVisual();
          if (visual) setTimeout(function() {
            visual.canvas._hasChartEvents = false;
            visual.canvas._chartHit = null;
            animateChartFromPlan(visual.canvas, visual.chartRef, 0);
          }, 50);
        });
        break;
      }
      case 'sync': {
        var st = document.getElementById('veSyncToggle');
        if (st) st.addEventListener('change', function() { updateAndRedraw('syncTitle', this.checked); });
        var ci = document.getElementById('veCaptionInput');
        if (ci) ci.addEventListener('input', function() { updateAndRedraw('caption', this.value); });
        break;
      }
    }
  }

  // ── Export handler ────────────────────────────────────────────────────
  async function handleExport() {
    var visual = getSelectedVisual();
    if (!visual || !visual.canvas) { toast('No chart selected', 'error'); return; }
    try { await checkQuota('export'); } catch(e) { /* proceed anyway */ }
    var canvas = visual.canvas;
    var chart = visual.chartRef;
    var titleText = visual.title || 'Chart';
    var safeTitle = titleText.replace(/[^a-zA-Z0-9]/g, '_');
    var ts = new Date().toISOString().slice(0,10);
    var filename = safeTitle + '_' + ts;
    var dpr = window.devicePixelRatio || 1;

    // Always export on a clean white background for readability
    var bgColor = '#ffffff';
    var textColor = '#0f172a';
    var subtextColor = '#94a3b8';
    var accentColor = '#06b6d4';

    // Compute legend height
    var hasSeries = chart && chart.series && chart.series.length > 0;
    var legendH = hasSeries ? Math.round(36 * dpr) : 0;

    // Layout
    var pad = Math.round(36 * dpr);
    var titleH = Math.round(56 * dpr);
    var descH = (chart && chart.desc) ? Math.round(28 * dpr) : 0;
    var axisInfoH = Math.round(24 * dpr);
    var brandH = Math.round(32 * dpr);
    var chartW = canvas.width;
    var chartH = canvas.height;
    var exportW = chartW + pad * 2;
    var exportH = titleH + descH + chartH + axisInfoH + legendH + brandH + pad;

    var exportCanvas = document.createElement('canvas');
    exportCanvas.width = exportW;
    exportCanvas.height = exportH;
    var ectx = exportCanvas.getContext('2d');

    // White background
    ectx.fillStyle = bgColor;
    ectx.fillRect(0, 0, exportW, exportH);

    // Accent line at top
    ectx.fillStyle = accentColor;
    ectx.fillRect(0, 0, exportW, Math.round(3 * dpr));

    // Title
    ectx.fillStyle = textColor;
    ectx.font = 'bold ' + Math.round(18 * dpr) + 'px Inter, system-ui, sans-serif';
    ectx.textAlign = 'left';
    ectx.textBaseline = 'middle';
    ectx.fillText(titleText, pad, Math.round(3 * dpr) + titleH / 2);

    // Description
    var yOff = Math.round(3 * dpr) + titleH;
    if (chart && chart.desc) {
      ectx.fillStyle = subtextColor;
      ectx.font = Math.round(11 * dpr) + 'px Inter, system-ui, sans-serif';
      ectx.fillText(chart.desc.length > 120 ? chart.desc.substring(0, 117) + '...' : chart.desc, pad, yOff - Math.round(8 * dpr));
      yOff += descH;
    }

    // Re-draw chart on light background
    var lightCv = document.createElement('canvas');
    lightCv.width = chartW;
    lightCv.height = chartH;
    lightCv._lockedW = canvas._lockedW || Math.round(chartW / dpr);
    lightCv._lockedH = canvas._lockedH || Math.round(chartH / dpr);
    var _origTheme = document.body.className;
    document.body.classList.add('theme-light');
    document.body.classList.remove('theme-genbi');
    try {
      if (chart) {
        var type = chart._userType || chart.type;
        var seriesData = hasSeries;
        var flatData = seriesData
          ? (chart.labels || []).map(function(_, i) { return chart.series.reduce(function(sum, s) { return sum + (s.data[i] || 0); }, 0); })
          : chart.data;
        var axisOpts = { suffix: chart.suffix || '', xLabel: chart.xLabel || '', yLabel: chart.yLabel || '' };
        if (chart._barPalette && linePalettes[chart._barPalette]) axisOpts.barColors = linePalettes[chart._barPalette];
        if (type === 'bar') drawBarChart(lightCv, chart.labels || [], flatData || [], chart.color || 'cyan', axisOpts);
        else if (type === 'hbar') drawHorizontalBarChart(lightCv, chart.labels || [], flatData || [], chart.color || 'cyan', axisOpts);
        else if (type === 'stacked' && seriesData) drawStackedBarChart(lightCv, chart.labels || [], chart.series, axisOpts);
        else if (type === 'donut') drawDonutChart(lightCv, chart.labels || [], flatData || [], {});
        else if (type === 'line') { var ds = buildLineDatasets(chart); drawChart(lightCv, ds, chart.labels || [], axisOpts); }
        else if (type === 'area') { var ads = buildAreaDatasets(chart); drawAreaChart(lightCv, ads, chart.labels || [], axisOpts); }
        else if (type === 'gauge') { var gv = flatData && flatData.length ? flatData[0] : 0; drawGaugeChart(lightCv, gv, { color: chart.color, label: chart.title }); }
        else { var lCtx = lightCv.getContext('2d'); lCtx.drawImage(canvas, 0, 0); }
      } else {
        var lCtx2 = lightCv.getContext('2d'); lCtx2.drawImage(canvas, 0, 0);
      }
    } catch(e) {
      var lCtx3 = lightCv.getContext('2d'); lCtx3.drawImage(canvas, 0, 0);
    }
    document.body.className = _origTheme;

    ectx.drawImage(lightCv, pad, yOff, chartW, chartH);
    yOff += chartH;

    // Axis info line
    if (chart && (chart.xLabel || chart.yLabel)) {
      ectx.fillStyle = subtextColor;
      ectx.font = Math.round(10 * dpr) + 'px Inter, system-ui, sans-serif';
      ectx.textAlign = 'center';
      var axisText = '';
      if (chart.xLabel && chart.yLabel) axisText = 'X: ' + chart.xLabel + '  |  Y: ' + chart.yLabel;
      else if (chart.xLabel) axisText = 'X: ' + chart.xLabel;
      else axisText = 'Y: ' + chart.yLabel;
      ectx.fillText(axisText, exportW / 2, yOff + axisInfoH / 2);
      yOff += axisInfoH;
    }

    // Series legend
    if (hasSeries) {
      var legX = pad;
      var legY = yOff + Math.round(14 * dpr);
      ectx.font = Math.round(10 * dpr) + 'px Inter, system-ui, sans-serif';
      ectx.textBaseline = 'middle';
      chart.series.forEach(function(s) {
        var hex = getColorHex(s.color);
        ectx.fillStyle = hex;
        ectx.fillRect(legX, legY - Math.round(4 * dpr), Math.round(10 * dpr), Math.round(10 * dpr));
        ectx.fillStyle = textColor;
        ectx.textAlign = 'left';
        ectx.fillText(s.name, legX + Math.round(14 * dpr), legY + Math.round(1 * dpr));
        legX += ectx.measureText(s.name).width + Math.round(30 * dpr);
      });
      yOff += legendH;
    }

    // Branding footer
    ectx.fillStyle = subtextColor;
    ectx.font = Math.round(10 * dpr) + 'px Inter, system-ui, sans-serif';
    ectx.textAlign = 'left';
    ectx.fillText('Generated by GenBI', pad, exportH - Math.round(12 * dpr));
    ectx.textAlign = 'right';
    ectx.fillText(new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}), exportW - pad, exportH - Math.round(12 * dpr));

    // Download
    try {
      if (VE.exportFmt === 'svg') {
        var logW = Math.round(exportW / dpr);
        var logH = Math.round(exportH / dpr);
        var dataUrl = exportCanvas.toDataURL('image/png');
        var svgStr = '<svg xmlns="http://www.w3.org/2000/svg" width="'+logW+'" height="'+logH+'" viewBox="0 0 '+logW+' '+logH+'"><image href="'+dataUrl+'" width="'+logW+'" height="'+logH+'"/></svg>';
        var blob = new Blob([svgStr], { type: 'image/svg+xml' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = filename + '.svg'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } else {
        var mime = VE.exportFmt === 'jpg' ? 'image/jpeg' : 'image/png';
        var ext = VE.exportFmt === 'jpg' ? '.jpg' : '.png';
        exportCanvas.toBlob(function(blob) {
          if (!blob) { toast('Export failed — empty image', 'error'); return; }
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a'); a.href = url; a.download = filename + ext; document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, mime, 0.95);
      }
      toast('Exported ' + filename, 'success');
    } catch(e) {
      console.error('Export error:', e);
      toast('Export failed: ' + e.message, 'error');
    }
  }

  // ── Global event listeners ────────────────────────────────────────────

  // Toolbar hover management
  document.getElementById('veToolbar').addEventListener('mouseenter', function() {
    cancelHideToolbar();
    VE._panelHovered = true;
  });
  document.getElementById('veToolbar').addEventListener('mouseleave', function() {
    VE._panelHovered = false;
    hideToolbar();
  });

  // Panel hover management
  document.getElementById('vePanel').addEventListener('mouseenter', function() {
    cancelHideToolbar();
    VE._panelHovered = true;
    // Cancel any pending panel-close timer
    if (VE._panelCloseTimer) { clearTimeout(VE._panelCloseTimer); VE._panelCloseTimer = null; }
  });
  document.getElementById('vePanel').addEventListener('mouseleave', function() {
    VE._panelHovered = false;
    hideToolbar();
    // Schedule panel close — cancelled if mouse re-enters panel or bolt menu
    if (VE._panelCloseTimer) clearTimeout(VE._panelCloseTimer);
    VE._panelCloseTimer = setTimeout(function() {
      // Check if bolt menu is still being hovered
      var hoveredMenu = document.querySelector('.chart-actions-menu:hover, .chart-actions-bolt:hover');
      if (!hoveredMenu) hidePanel();
    }, 250);
  });

  // Toolbar button clicks
  document.getElementById('veToolbar').addEventListener('click', function(e) {
    var btn = e.target.closest('.ve-toolbar-btn');
    if (!btn) return;
    showPanel(btn.dataset.section);
  });

  // Panel close button
  document.getElementById('vePanelClose').addEventListener('click', hidePanel);

  // Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (VE.activeId) { hidePanel(); return; }
      if (VE.hoveredCardId) hideToolbarImmediate();
    }
  });

  // Click outside
  document.addEventListener('mousedown', function(e) {
    if (!VE.activeId) return;
    if (e.target.closest('#veToolbar, #vePanel, .glass-panel, .chart-actions-bolt')) return;
    hidePanel();
    hideToolbarImmediate();
  });

  // Scroll + resize repositioning (throttled with rAF)
  var _rafPending = false;
  function onScrollResize() {
    if (_rafPending) return;
    _rafPending = true;
    requestAnimationFrame(function() {
      _rafPending = false;
      updatePositions();
    });
  }
  window.addEventListener('scroll', onScrollResize, true);
  window.addEventListener('resize', onScrollResize);

  // ── Hook into navigation to register charts ───────────────────────────
  var _origNavigate = window.navigate;
  window.navigate = function(page) {
    hidePanel();
    hideToolbarImmediate();
    _origNavigate(page);
    if (page === 'analytics' || (document.body.classList.contains('app-mode') && page === 'dashboard')) {
      setTimeout(registerCharts, 600);
    }
  };

  // Also register on initial load if already on analytics
  setTimeout(function() {
    if (App.currentPage === 'analytics' || document.body.classList.contains('app-mode')) {
      registerCharts();
    }
  }, 800);

  // Expose showPanel on VE for bolt menu bridge
  VE._showPanel = showPanel;
  // Expose for external use
  window.veRegisterCharts = registerCharts;
  window.veSelectVisual = function(id) {
    var visual = VE.registry.find(function(v) { return v.id === id; });
    if (!visual) return;
    var card = visual.canvas.closest('.glass-panel');
    if (!card) return;
    VE.hoveredCardId = id;
    VE.activeId = id;
    VE._activeCard = card;
    card.classList.add('ve-active');
    showPanel('export');
  };
  window.veCloseEditor = function() {
    hidePanel();
    hideToolbarImmediate();
  };

})();
</script>

<div class="ask-ai-popup" id="askAiPopup">
  <div class="ask-ai-popup-header">
    <span class="ask-ai-popup-title" id="askAiPopupTitle">Ask AI</span>
    <button class="ask-ai-popup-close" onclick="closeAskAiModal()">&times;</button>
  </div>
  <div id="askAiPopupBody"></div>
</div>

</body>

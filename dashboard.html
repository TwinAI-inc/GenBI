function handleFiles(files) {
  Array.from(files).forEach(file => {
    App.uploadedFiles.push({ name: file.name, size: file.size, type: file.type });
    const ext = file.name.split('.').pop().toLowerCase();
    if(['xlsx','xls','csv'].includes(ext)) {
      showUploadProgress(file.name);
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          let json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

          // ── FIX: Detect __EMPTY headers (title rows before actual data) ──
          if (json.length > 0) {
            const firstHeaders = Object.keys(json[0]);
            const hasEmpty = firstHeaders.some(h => /^__EMPTY/.test(h) || h === '');
            if (hasEmpty) {
              const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
              let headerIdx = -1;
              for (let ri = 0; ri < Math.min(raw.length, 20); ri++) {
                const row = raw[ri];
                const nonEmpty = row.filter(v => v !== '' && v !== null && v !== undefined);
                // Header row: ≥3 non-empty string cells and majority are strings
                if (nonEmpty.length >= 3 && nonEmpty.filter(v => typeof v === 'string').length >= nonEmpty.length * 0.7) {
                  headerIdx = ri; break;
                }
              }
              if (headerIdx >= 0) {
                const hdrs = raw[headerIdx].map((h, ci) => {
                  if (!h && h !== 0) return null;
                  return String(h).replace(/[\r\n]+/g, ' ').trim();
                });
                // Build cleaned rows from data below header
                const cleaned = [];
                for (let ri = headerIdx + 1; ri < raw.length; ri++) {
                  const row = raw[ri];
                  const hasData = row.some(v => v !== '' && v !== null && v !== undefined);
                  if (!hasData) continue;
                  const obj = {};
                  hdrs.forEach((h, ci) => { if (h) obj[h] = row[ci] !== undefined ? row[ci] : ''; });
                  cleaned.push(obj);
                }
                if (cleaned.length > 0) json = cleaned;
              }
            }
            // Also clean any remaining newlines in headers
            if (json.length > 0) {
              const rawHeaders = Object.keys(json[0]);
              const needsClean = rawHeaders.some(h => /[\r\n]/.test(h));
              if (needsClean) {
                json = json.map(row => {
                  const obj = {};
                  rawHeaders.forEach(h => { obj[h.replace(/[\r\n]+/g, ' ').trim()] = row[h]; });
                  return obj;
                });
              }
            }
          }

          if(json.length > 0) {
            App.excelData = { headers: Object.keys(json[0]), rows: json, sheetName: wb.SheetNames[0] };
            App.dashChartIdx = 0;
            // Clear AI caches on new data
            App._cachedInsights = null; App._cachedAnomalies = null; App._cachedQuality = null;
            App._cachedDescriptions = null; App._cachedSuggestions = null;
            App._forecastCache = {}; App._narrativeCache = {};
            // Use LLM-driven chart intelligence (falls back to rule engine)
            smartAutoMap(json).then(() => {
              renderUploadPreview();
              showUploadSuccess(json.length, file.name);
            }).catch(() => {
              renderUploadPreview();
              showUploadSuccess(json.length, file.name);
            });
          }
        } catch(err) {
          toast('Error reading file: ' + err.message, 'error');
          closeUploadModal();
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      toast(`Uploaded "${file.name}"`, 'success');
      setTimeout(() => closeUploadModal(), 800);
    }
  });
  renderUploadFileList();
}

// ── LLM-Driven Chart Intelligence ──
async function smartAutoMap(rows) {
  if (!rows.length) return autoMapExcelData(rows); // fallback
  const token = _getAuthToken();
  if (!token) return autoMapExcelData(rows); // no auth, use rule engine

  try {
    const resp = await fetch('/api/ai/chart-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ headers: Object.keys(rows[0]), rows: rows.slice(0, 200) })
    });
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();
    if (!data.chart_plan || !data.chart_plan.length) throw new Error('Empty plan');

    // ── Derived Column Creation: create features the LLM requested ──
    const allHeaders = Object.keys(rows[0]);
    for (const chart of data.chart_plan) {
      const dc = chart.derived_column;
      if (!dc) continue;
      const dcLower = dc.toLowerCase();

      // Extract time parts: Quarter, Month, Year, DayOfWeek
      const timeExtractMatch = dcLower.match(/extract\s+(quarter|month|year|day\s*of\s*week|weekday|hour)\s+from\s+(.+)/i);
      if (timeExtractMatch) {
        const part = timeExtractMatch[1].toLowerCase().replace(/\s+/g, '');
        const srcCol = chart.xCol || allHeaders.find(h => data.profile?.column_types?.[h] === 'date');
        if (srcCol && !allHeaders.includes(part.charAt(0).toUpperCase() + part.slice(1))) {
          const newCol = part === 'quarter' ? 'Quarter' : part === 'month' ? 'Month' : part === 'year' ? 'Year' : part === 'dayofweek' || part === 'weekday' ? 'DayOfWeek' : part.charAt(0).toUpperCase() + part.slice(1);
          rows.forEach(r => {
            const d = new Date(r[srcCol]);
            if (isNaN(d.getTime())) { r[newCol] = 'Unknown'; return; }
            if (part === 'quarter') r[newCol] = 'Q' + (Math.floor(d.getMonth() / 3) + 1);
            else if (part === 'month') r[newCol] = d.toLocaleString('en', { month: 'short' });
            else if (part === 'year') r[newCol] = String(d.getFullYear());
            else if (part === 'dayofweek' || part === 'weekday') r[newCol] = d.toLocaleString('en', { weekday: 'short' });
            else r[newCol] = String(d.getFullYear());
          });
          if (!allHeaders.includes(newCol)) allHeaders.push(newCol);
          chart.xCol = newCol;
        }
        continue;
      }

      // Bin numeric into High/Medium/Low (or custom bins)
      const binMatch = dcLower.match(/bin\s+(.+?)\s+into\s+(high|low|.+)/i);
      if (binMatch) {
        const srcCol = chart.yCol || chart.xCol;
        if (srcCol && allHeaders.includes(srcCol)) {
          const newCol = srcCol + '_Bin';
          const vals = rows.map(r => parseFloat(r[srcCol]) || 0).filter(v => !isNaN(v));
          if (vals.length > 0) {
            vals.sort((a, b) => a - b);
            const p33 = vals[Math.floor(vals.length * 0.33)];
            const p66 = vals[Math.floor(vals.length * 0.66)];
            rows.forEach(r => {
              const v = parseFloat(r[srcCol]) || 0;
              r[newCol] = v <= p33 ? 'Low' : v <= p66 ? 'Medium' : 'High';
            });
            if (!allHeaders.includes(newCol)) allHeaders.push(newCol);
            chart.xCol = newCol;
          }
        }
        continue;
      }

      // Boolean flag: "Above Average", "True/False" based on threshold
      const boolMatch = dcLower.match(/(above|below|over|under)\s*(average|mean|median|\d+)/i);
      if (boolMatch) {
        const direction = boolMatch[1].toLowerCase();
        const threshold = boolMatch[2].toLowerCase();
        const srcCol = chart.yCol || chart.xCol;
        if (srcCol && allHeaders.includes(srcCol)) {
          const vals = rows.map(r => parseFloat(r[srcCol]) || 0);
          let cutoff;
          if (threshold === 'average' || threshold === 'mean') cutoff = vals.reduce((a, b) => a + b, 0) / vals.length;
          else if (threshold === 'median') { const s = [...vals].sort((a, b) => a - b); cutoff = s[Math.floor(s.length / 2)]; }
          else cutoff = parseFloat(threshold) || 0;
          const newCol = (direction === 'above' || direction === 'over' ? 'Above ' : 'Below ') + (threshold === 'average' || threshold === 'mean' ? 'Avg' : threshold === 'median' ? 'Median' : threshold) + ' ' + srcCol;
          rows.forEach(r => {
            const v = parseFloat(r[srcCol]) || 0;
            r[newCol] = (direction === 'above' || direction === 'over') ? (v > cutoff ? 'Yes' : 'No') : (v < cutoff ? 'Yes' : 'No');
          });
          if (!allHeaders.includes(newCol)) allHeaders.push(newCol);
          chart.xCol = newCol;
        }
        continue;
      }

      // Top N + Other grouping
      const topNMatch = dcLower.match(/(?:top|group)\s*(\d+)\s*\+?\s*other/i);
      if (topNMatch) {
        const n = parseInt(topNMatch[1]) || 5;
        const srcCol = chart.xCol || chart.groupCol;
        if (srcCol && allHeaders.includes(srcCol)) {
          const counts = {};
          rows.forEach(r => { const v = String(r[srcCol] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
          const topValues = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, n).map(e => e[0]);
          const topSet = new Set(topValues);
          const newCol = srcCol + '_Top' + n;
          rows.forEach(r => { r[newCol] = topSet.has(String(r[srcCol] || '').trim()) ? String(r[srcCol]).trim() : 'Other'; });
          if (!allHeaders.includes(newCol)) allHeaders.push(newCol);
          chart.xCol = newCol;
        }
      }
    }

    // Build chart config from LLM plan
    const chartPlan = data.chart_plan.map(chart => {
      const xCol = chart.xCol || chart.groupCol;
      const yCol = chart.yCol;
      const groupCol = chart.groupCol;
      const aggFn = chart.aggFn || 'sum';
      const maxItems = chart.maxItems || 8;
      const type = chart.type || 'bar';

      // Build chart data based on type
      let labels = [], chartData = [], series = null;

      if (type === 'usmap' || type === 'worldmap') {
        // Map: aggregate by geographic column
        const geoCol = xCol;
        if (geoCol) {
          const agg = {};
          rows.forEach(r => {
            const k = String(r[geoCol] || '').trim();
            if (!k) return;
            const v = yCol ? (parseFloat(r[yCol]) || 0) : 1;
            agg[k] = (agg[k] || 0) + (aggFn === 'count' ? 1 : v);
          });
          if (aggFn === 'avg') {
            const counts = {};
            rows.forEach(r => { const k = String(r[geoCol] || '').trim(); if (k) counts[k] = (counts[k] || 0) + 1; });
            Object.keys(agg).forEach(k => { agg[k] = agg[k] / (counts[k] || 1); });
          }
          const sorted = Object.entries(agg).sort((a, b) => b[1] - a[1]);
          labels = sorted.map(e => e[0]);
          chartData = sorted.map(e => Math.round(e[1] * 100) / 100);
        }
      } else if (type === 'multiline' || type === 'stacked') {
        // Multi-series: group by groupCol, x-axis from xCol
        if (xCol && yCol && groupCol) {
          const grouped = {};
          rows.forEach(r => {
            const g = String(r[groupCol] || '').trim();
            const x = String(r[xCol] || '').trim();
            if (!g || !x) return;
            if (!grouped[g]) grouped[g] = {};
            if (!grouped[g][x]) grouped[g][x] = [];
            grouped[g][x].push(parseFloat(r[yCol]) || 0);
          });
          const allX = [...new Set(rows.map(r => String(r[xCol] || '').trim()).filter(Boolean))].sort();
          const groupTotals = {};
          Object.entries(grouped).forEach(([g, xmap]) => {
            groupTotals[g] = Object.values(xmap).flat().reduce((a, b) => a + b, 0);
          });
          const topGroups = Object.entries(groupTotals).sort((a, b) => b[1] - a[1]).slice(0, maxItems).map(e => e[0]);
          const seriesColors = linePalettes['GenBI'];
          series = topGroups.map((g, i) => ({
            name: g,
            data: allX.map(x => {
              const vals = (grouped[g] && grouped[g][x]) || [];
              if (!vals.length) return 0;
              return aggFn === 'avg' ? vals.reduce((a, b) => a + b, 0) / vals.length : vals.reduce((a, b) => a + b, 0);
            }),
            color: seriesColors[i % seriesColors.length]
          }));
          labels = allX;
        }
      } else if (type === 'scatter') {
        // Scatter: raw x/y values
        const xData = rows.map(r => parseFloat(r[xCol]) || 0);
        const yData = rows.map(r => parseFloat(r[yCol]) || 0);
        return {
          type: 'scatter', title: chart.title, desc: chart.desc || '',
          xData, yData, labels: [], data: xData, color: chart.color || 'cyan',
          xLabel: (xCol || '').replace(/_/g, ' '), yLabel: (yCol || '').replace(/_/g, ' '),
          xCol, yCol
        };
      } else if (type === 'gauge') {
        const vals = rows.map(r => parseFloat(r[yCol || xCol]) || 0).filter(v => v > 0);
        const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
        return {
          type: 'gauge', title: chart.title, desc: chart.desc || '',
          labels: [yCol || xCol], data: [avg], value: avg, color: chart.color || 'cyan',
          min: 0, max: /percent|pct|rate/i.test(yCol || xCol || '') ? 100 : Math.ceil(Math.max(...vals) * 1.2)
        };
      } else {
        // Bar, hbar, donut, treemap, funnel, etc: aggregate by category
        const catCol = xCol || groupCol;
        const metricCol = yCol || xCol;
        if (catCol && metricCol) {
          const agg = {};
          const counts = {};
          rows.forEach(r => {
            const k = String(r[catCol] || '').trim();
            if (!k) return;
            const v = parseFloat(r[metricCol]) || 0;
            agg[k] = (agg[k] || 0) + (aggFn === 'count' ? 1 : v);
            counts[k] = (counts[k] || 0) + 1;
          });
          if (aggFn === 'avg') {
            Object.keys(agg).forEach(k => { agg[k] = agg[k] / (counts[k] || 1); });
          }
          let sorted = Object.entries(agg).sort((a, b) => b[1] - a[1]);
          // Top N + Other
          if (sorted.length > maxItems) {
            const top = sorted.slice(0, maxItems - 1);
            const rest = sorted.slice(maxItems - 1);
            const otherVal = rest.reduce((s, e) => s + e[1], 0);
            top.push(['Other (' + rest.length + ')', otherVal]);
            sorted = top;
          }
          labels = sorted.map(e => e[0]);
          chartData = sorted.map(e => Math.round(e[1] * 100) / 100);
        }
      }

      return {
        type, title: chart.title, desc: chart.desc || '',
        insight_score: chart.insight_score || null, category: chart.category || null,
        scores: chart.scores || null,
        labels, data: chartData, series,
        color: chart.color || 'cyan', suffix: '',
        xCol: xCol, yCol: yCol, groupCol: groupCol, aggFn: aggFn,
        xLabel: (xCol || '').replace(/_/g, ' '), yLabel: (yCol || '').replace(/_/g, ' ')
      };
    }).filter(Boolean);

    // Assign deterministic colors by index so charts don't change color on re-run
    const stableColors = ['cyan', 'violet', 'emerald', 'amber', 'rose', 'teal', 'indigo', 'lime'];
    chartPlan.forEach((c, i) => { c.color = stableColors[i % stableColors.length]; });

    // Set _origXCol/_origYCol for explain sidebar
    chartPlan.forEach(chart => {
      if (chart.xCol) chart._origXCol = chart.xCol;
      if (chart.yCol) chart._origYCol = chart.yCol;
      if (!chart._origAggFn) chart._origAggFn = chart.aggFn || 'sum';
    });

    // Store config — enrich colMeta with uniqueVals, uniqueCount, vals for explain sidebar
    const colMeta = {};
    const colTypes = {};
    allHeaders.forEach(h => {
      const ct = data.profile?.column_types?.[h] || 'text';
      const rawVals = rows.map(r => r[h]).filter(v => v !== '' && v !== null && v !== undefined);
      const uniqueVals = [...new Set(rawVals.map(String))];
      const isNumeric = ct === 'numeric';
      colMeta[h] = {
        isNumeric, isDate: ct === 'date', isCategorical: ct === 'categorical' || (!isNumeric && ct !== 'date'),
        isMetric: isNumeric, isIndex: false,
        uniqueVals, uniqueCount: uniqueVals.length,
        vals: isNumeric ? rows.map(r => parseFloat(r[h]) || 0) : null
      };
      colTypes[h] = ct;
    });
    const metrics = allHeaders.filter(h => colMeta[h].isNumeric);
    const categoricals = allHeaders.filter(h => colMeta[h].isCategorical);
    const dates = allHeaders.filter(h => colMeta[h].isDate);

    App.excelChartConfig = {
      colMeta, colTypes, metrics, categoricals, dates, indices: [],
      chartPlan, labelCol: categoricals[0] || dates[0],
      dataCols: metrics.slice(0, 2), numericCols: metrics,
      labelCols: [...categoricals, ...dates]
    };
    App.hasExcelData = true;
    App.drillStates = {};

    console.log('Smart chart plan:', chartPlan.length, 'charts from LLM');
    return;
  } catch (err) {
    console.warn('Smart chart plan failed, falling back to rule engine:', err);
    return autoMapExcelData(rows);
  }
}

function autoMapExcelData(rows) {
  if(!rows.length) return;
  const allHeaders = Object.keys(rows[0]);
  const sample = rows.slice(0, Math.min(rows.length, 30));

  // ── CLASSIFY EVERY COLUMN ──
  const colMeta = {};
  allHeaders.forEach(h => {
    const vals = rows.map(r => r[h]).filter(v => v !== '' && v !== null && v !== undefined);
    const numCount = vals.filter(v => !isNaN(parseFloat(v))).length;
    const isNumeric = numCount > vals.length * 0.8;
    const uniqueVals = [...new Set(vals.map(String))];
    const uniqueRatio = uniqueVals.length / Math.max(vals.length, 1);

    // Detect index/id columns: sequential integers, named id/index/#, or text IDs like "P101"
    const isNamedId = /\b(id|index|#|row|sr|sno|s\.no|serial|number|code|sku)\b/i.test(h.trim());
    const isIndex = (isNumeric && (
      isNamedId ||
      /^[0-9.]+$/.test(String(h).trim()) ||
      (uniqueRatio > 0.9 && vals.length > 10 && vals.every((v,i) => i === 0 || parseFloat(v) >= parseFloat(vals[i-1])))
    )) || (!isNumeric && isNamedId && uniqueRatio > 0.85);

    // Detect categorical: text with few unique values (not IDs)
    const isCategorical = !isNumeric && !isIndex && uniqueVals.length <= Math.max(20, vals.length * 0.3) && uniqueVals.length >= 2;

    // Detect date — by name AND by values
    const isDateByName = /date|month|year|week|day|time|period|quarter/i.test(h);
    const datePattern = detectDateByValues(vals);
    const isDate = isDateByName || !!datePattern;

    // If date detected, override numeric (e.g. "2024-01" parses as 2024 but is a date)
    const finalNumeric = isDate ? false : isNumeric;

    // Detect meaningful metric (numeric but not index/id)
    const isMetric = finalNumeric && !isIndex;

    colMeta[h] = { isNumeric: finalNumeric, isIndex, isCategorical: isCategorical || isDate, isDate, isMetric, uniqueVals, uniqueCount: uniqueVals.length,
      vals: isMetric ? rows.map(r => parseFloat(r[h]) || 0) : null,
      datePattern: datePattern || null
    };
  });

  // ── EXTRACT COLUMNS BY TYPE ──
  const metrics = allHeaders.filter(h => colMeta[h].isMetric);
  const categoricals = allHeaders.filter(h => colMeta[h].isCategorical);
  const dates = allHeaders.filter(h => colMeta[h].isDate);
  const indices = allHeaders.filter(h => colMeta[h].isIndex);

  // ── BUILD SMART CHART PLAN ──
  const chartPlan = [];
  const barColors = ['cyan','violet','emerald','amber','rose'];
  const usedTypes = { bar: 0, line: 0, donut: 0 };
  const maxCharts = 6;

  // Helper: aggregate metric by category
  function aggByCategory(cat, metric, aggFn) {
    const groups = {};
    rows.forEach(r => {
      const key = String(r[cat] || '').trim();
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(parseFloat(r[metric]) || 0);
    });
    return Object.entries(groups).map(([k, v]) => ({
      label: k,
      value: aggFn === 'sum' ? v.reduce((a, b) => a + b, 0) :
             aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length :
             aggFn === 'count' ? v.length : Math.max(...v)
    })).sort((a, b) => b.value - a.value);
  }

  // Helper: aggregate metric over time (with date-aware sorting)
  function aggOverTime(dateCol, metric, aggFn) {
    const groups = {};
    rows.forEach(r => {
      const key = String(r[dateCol] || '').trim();
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(parseFloat(r[metric]) || 0);
    });
    const pat = colMeta[dateCol] && colMeta[dateCol].datePattern;
    return Object.entries(groups).sort((a, b) => {
      if (pat) {
        const da = parseDateValue(a[0], pat), db = parseDateValue(b[0], pat);
        if (da && db) return da - db;
      }
      return a[0].localeCompare(b[0]);
    }).map(([k, v]) => ({
      label: k,
      value: aggFn === 'sum' ? v.reduce((a, b) => a + b, 0) :
             aggFn === 'avg' ? v.reduce((a, b) => a + b, 0) / v.length :
             v.length
    }));
  }

  const dateCol = dates[0] || null;
  const nameCol = allHeaders.find(h => !colMeta[h].isNumeric && !colMeta[h].isIndex && !colMeta[h].isDate &&
    /name|product|item|title|description|label/i.test(h));
  const donutCats = categoricals.filter(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 10);

  // Rank metrics by business relevance
  const metricPriority = [/revenue|sales|income/i, /cost|expense|margin/i, /profit|npv|roi/i, /score|rate|compliance/i, /count|total|amount|value/i];
  function rankMetric(m) { const idx = metricPriority.findIndex(r => r.test(m)); return idx >= 0 ? idx : metricPriority.length; }
  const rankedMetrics = [...metrics].sort((a, b) => rankMetric(a) - rankMetric(b));

  // Pick primary and secondary metrics
  const primaryMetric = rankedMetrics[0] || null;
  const secondaryMetric = rankedMetrics.find(m => m !== primaryMetric) || null;

  // Find best categorical for bar charts: needs 3+ bars with non-zero values
  function bestBarCat(metric) {
    const candidates = categoricals
      .filter(c => colMeta[c].uniqueCount >= 3 && colMeta[c].uniqueCount <= 15)
      .map(c => {
        const agg = aggByCategory(c, metric, /score|rate|compliance|avg|percent/i.test(metric) ? 'avg' : 'sum');
        const nonZero = agg.filter(a => a.value > 0);
        return { col: c, agg: nonZero, count: nonZero.length };
      })
      .filter(x => x.count >= 3)
      .sort((a, b) => b.count - a.count);
    return candidates[0] || null;
  }

  // Find best categorical for multi-line: needs 2-6 unique values with data across time
  function bestLineCat(dateC, metric) {
    if (!dateC) return null;
    return categoricals
      .filter(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 6)
      .find(c => {
        // Check that at least 2 groups have non-zero data
        const groups = {};
        rows.forEach(r => {
          const gv = String(r[c] || '').trim();
          if (!gv) return;
          groups[gv] = (groups[gv] || 0) + (parseFloat(r[metric]) || 0);
        });
        return Object.values(groups).filter(v => v > 0).length >= 2;
      }) || null;
  }

  const usedCombos = new Set();

  // ── CHART 1: MULTI-LINE — Primary metric over time by category ──
  // Most insightful chart: shows trends broken down by category
  if (dateCol && primaryMetric) {
    const lineCat = bestLineCat(dateCol, primaryMetric);
    if (lineCat) {
      const seriesColors = linePalettes['GenBI'];
      const isRate = /score|rate|compliance|avg|percent/i.test(primaryMetric);
      const fn = isRate ? 'avg' : 'sum';
      // Group data
      const grouped = {};
      const groupTotals = {};
      rows.forEach(r => {
        const gv = String(r[lineCat] || '').trim();
        const xv = String(r[dateCol] || '').trim();
        if (!gv || !xv) return;
        if (!grouped[gv]) grouped[gv] = {};
        if (!grouped[gv][xv]) grouped[gv][xv] = [];
        grouped[gv][xv].push(parseFloat(r[primaryMetric]) || 0);
        groupTotals[gv] = (groupTotals[gv] || 0) + (parseFloat(r[primaryMetric]) || 0);
      });
      const topGroups = Object.entries(groupTotals).filter(e => e[1] > 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1])).slice(0, 6).map(e => e[0]);
      const allLabelsSet = new Set();
      topGroups.forEach(g => { if (grouped[g]) Object.keys(grouped[g]).forEach(x => allLabelsSet.add(x)); });
      const datePat = colMeta[dateCol] && colMeta[dateCol].datePattern;
      const allLabels = Array.from(allLabelsSet).sort((a, b) => {
        if (datePat) { const da = parseDateValue(a, datePat), db = parseDateValue(b, datePat); if (da && db) return da - db; }
        return a.localeCompare(b);
      });
      if (allLabels.length >= 3 && topGroups.length >= 2) {
        const series = topGroups.map((g, i) => {
          const data = allLabels.map(x => {
            const vals = (grouped[g] && grouped[g][x]) || [];
            if (vals.length === 0) return 0;
            return fn === 'avg' ? vals.reduce((a, b) => a + b, 0) / vals.length : vals.reduce((a, b) => a + b, 0);
          });
          return { name: g, data, color: seriesColors[i % seriesColors.length] };
        });
        // Compute insight from aggregated data
        const monthTotals = allLabels.map((lbl, li) => series.reduce((s, sr) => s + (sr.data[li] || 0), 0));
        let peakIdx = 0, lowIdx = 0;
        monthTotals.forEach((v, i) => { if (v > monthTotals[peakIdx]) peakIdx = i; if (v < monthTotals[lowIdx]) lowIdx = i; });
        const trendDir = monthTotals[monthTotals.length - 1] >= monthTotals[0] ? 'an upward' : 'a downward';
        const metricLabel = primaryMetric.replace(/_/g, ' ');
        const isCurrency = /revenue|sales|cost|expense|price|profit|income/i.test(primaryMetric);
        const fmtInsight = (v) => isCurrency ? '$' + formatNumber(v, {abbreviate: true, decimals: 1}) : formatNumber(v, {abbreviate: true, decimals: 1});
        const insightText = metricLabel + ' peaked at ' + fmtInsight(monthTotals[peakIdx]) + ' in ' + allLabels[peakIdx] +
          ', with a low of ' + fmtInsight(monthTotals[lowIdx]) + ' in ' + allLabels[lowIdx] +
          ', showing ' + trendDir + ' trend overall.';

        chartPlan.push({
          type: 'stacked', title: metricLabel + ' Trend by ' + lineCat.replace(/_/g, ' '),
          labels: allLabels, series, data: null, color: 'cyan', suffix: '',
          xCol: dateCol, yCol: primaryMetric, groupCol: lineCat, aggFn: fn,
          xLabel: dateCol.replace(/_/g, ' '), yLabel: metricLabel,
          desc: insightText
        });
        usedCombos.add(dateCol + '|' + primaryMetric);
      }
    }
  }

  // ── CHART 2: HBAR — Primary metric by category (horizontal for readability) ──
  if (chartPlan.length < maxCharts && primaryMetric) {
    // Try nameCol first (e.g. "Top Products by Revenue"), then other categoricals
    const barInfo = bestBarCat(primaryMetric);
    if (barInfo && !usedCombos.has(barInfo.col + '|' + primaryMetric)) {
      const isRate = /score|rate|compliance|avg|percent/i.test(primaryMetric);
      const agg = barInfo.agg.slice(0, 10);
      chartPlan.push({ type: 'hbar',
        title: (nameCol && barInfo.col === nameCol ? 'Top ' : '') + primaryMetric.replace(/_/g, ' ') + ' by ' + barInfo.col.replace(/_/g, ' '),
        labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'cyan', suffix: '',
        xLabel: barInfo.col.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
        desc: 'Compares ' + (isRate ? 'average ' : 'total ') + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' across ' + barInfo.col.replace(/_/g, ' ').toLowerCase() + '.'
      });
      usedCombos.add(barInfo.col + '|' + primaryMetric);
    }
  }

  // ── CHART 3: DONUT — Revenue/metric share by a category ──
  if (chartPlan.length < maxCharts && donutCats.length > 0) {
    const donutMetric = secondaryMetric || primaryMetric;
    const donutCat = donutCats.find(c => donutMetric && !usedCombos.has(c + '|' + donutMetric)) || donutCats[0];
    if (donutMetric) {
      const isRate = /score|rate|compliance|avg|percent/i.test(donutMetric);
      const agg = aggByCategory(donutCat, donutMetric, isRate ? 'avg' : 'sum').filter(a => a.value > 0);
      if (agg.length >= 2) {
        const topN = agg.slice(0, 8);
        const rest = agg.slice(8);
        const dLabels = topN.map(a => a.label);
        const dData = topN.map(a => a.value);
        if (rest.length > 0) { dLabels.push('Other (' + rest.length + ')'); dData.push(rest.reduce((s, a) => s + a.value, 0)); }
        chartPlan.push({ type: 'donut',
          title: donutMetric.replace(/_/g, ' ') + ' by ' + donutCat.replace(/_/g, ' '),
          labels: dLabels, data: dData, color: 'multi',
          xCol: donutCat, yCol: donutMetric,
          xLabel: donutCat.replace(/_/g, ' '), yLabel: donutMetric.replace(/_/g, ' '),
          desc: 'Shows each ' + donutCat.replace(/_/g, ' ').toLowerCase() + '\'s share of ' + donutMetric.replace(/_/g, ' ').toLowerCase() + '.'
        });
      }
    } else {
      const counts = {};
      rows.forEach(r => { const v = String(r[donutCat] || '').trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      chartPlan.push({ type: 'donut', title: donutCat.replace(/_/g, ' ') + ' Breakdown',
        labels: sorted.slice(0,8).map(e => e[0]), data: sorted.slice(0,8).map(e => e[1]), color: 'multi',
        xCol: donutCat, yCol: null, aggFn: 'count', xLabel: donutCat.replace(/_/g, ' '), yLabel: 'Count',
        desc: 'Shows the proportion of records in each ' + donutCat.replace(/_/g, ' ').toLowerCase() + ' category.'
      });
    }
  }

  // ── FALLBACK: When no charts built (no categoricals/dates), use name/label column ──
  if (chartPlan.length === 0 && metrics.length > 0) {
    // Find a label column: name-like text, or any non-metric non-index column, or index column as last resort
    const labelCol = nameCol
      || allHeaders.find(h => !colMeta[h].isMetric && !colMeta[h].isIndex && !colMeta[h].isDate)
      || indices[0] || allHeaders.find(h => !colMeta[h].isMetric);

    if (labelCol) {
      // Chart 1: Top items by primary metric (bar)
      if (primaryMetric) {
        const items = rows.map(r => ({ label: String(r[labelCol] || '').trim(), value: parseFloat(r[primaryMetric]) || 0 }))
          .filter(a => a.label && a.value > 0)
          .sort((a, b) => b.value - a.value).slice(0, 10);
        if (items.length >= 2) {
          chartPlan.push({ type: 'bar',
            title: 'Top ' + primaryMetric.replace(/_/g, ' ') + ' by ' + labelCol.replace(/_/g, ' '),
            labels: items.map(a => a.label), data: items.map(a => a.value), color: 'cyan', suffix: '',
            xLabel: labelCol.replace(/_/g, ' '), yLabel: primaryMetric.replace(/_/g, ' '),
            desc: 'Shows ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranked by ' + labelCol.replace(/_/g, ' ').toLowerCase() + '.'
          });
        }
      }

      // Chart 2: Secondary metric bar chart
      if (secondaryMetric && chartPlan.length < 3) {
        const items = rows.map(r => ({ label: String(r[labelCol] || '').trim(), value: parseFloat(r[secondaryMetric]) || 0 }))
          .filter(a => a.label && a.value > 0)
          .sort((a, b) => b.value - a.value).slice(0, 10);
        if (items.length >= 2) {
          chartPlan.push({ type: 'bar',
            title: 'Top ' + secondaryMetric.replace(/_/g, ' ') + ' by ' + labelCol.replace(/_/g, ' '),
            labels: items.map(a => a.label), data: items.map(a => a.value), color: 'violet', suffix: '',
            xLabel: labelCol.replace(/_/g, ' '), yLabel: secondaryMetric.replace(/_/g, ' '),
            desc: 'Shows ' + secondaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranked by ' + labelCol.replace(/_/g, ' ').toLowerCase() + '.'
          });
        }
      }

      // Chart 3: Donut of metric distribution (bucket into ranges)
      if (primaryMetric && chartPlan.length < 3) {
        const vals = rows.map(r => parseFloat(r[primaryMetric]) || 0).filter(v => v > 0);
        if (vals.length >= 5) {
          const sorted = [...vals].sort((a, b) => a - b);
          const q1 = sorted[Math.floor(sorted.length * 0.33)];
          const q2 = sorted[Math.floor(sorted.length * 0.66)];
          const buckets = { Low: 0, Medium: 0, High: 0 };
          vals.forEach(v => { if (v <= q1) buckets.Low++; else if (v <= q2) buckets.Medium++; else buckets.High++; });
          chartPlan.push({ type: 'donut',
            title: primaryMetric.replace(/_/g, ' ') + ' Distribution',
            labels: Object.keys(buckets), data: Object.values(buckets), color: 'multi',
            desc: 'Shows the distribution of records across low, medium, and high ' + primaryMetric.replace(/_/g, ' ').toLowerCase() + ' ranges.'
          });
        }
      }
    }
  }

  // ── SMART CHART SELECTION: Build candidate pool, rank by insight value, pick best 3-4 ──
  const candidates = [];

  // CANDIDATE: Scatter — correlation between 2 metrics
  if (metrics.length >= 2) {
    const scX = primaryMetric;
    const scY = metrics.find(m => m !== scX && !/id|index|key/i.test(m));
    if (scX && scY) {
      candidates.push({ type: 'scatter', insight: 8, title: scX.replace(/_/g,' ') + ' vs ' + scY.replace(/_/g,' '),
        labels: [], data: rows.map(r => parseFloat(r[scX]) || 0), xData: rows.map(r => parseFloat(r[scX]) || 0), yData: rows.map(r => parseFloat(r[scY]) || 0),
        color: 'violet', xLabel: scX.replace(/_/g,' '), yLabel: scY.replace(/_/g,' '),
        desc: 'Scatter showing correlation between ' + scX.replace(/_/g,' ').toLowerCase() + ' and ' + scY.replace(/_/g,' ').toLowerCase() + '.' });
    }
  }

  // CANDIDATE: Gauge — rate/percent/score KPI
  const rateMet = metrics.find(m => /rate|percent|pct|score|satisfaction|compliance|yield|roi|margin/i.test(m));
  if (rateMet) {
    const vals = colMeta[rateMet].vals;
    const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
    const isPercent = /percent|pct|rate/i.test(rateMet);
    candidates.push({ type: 'gauge', insight: 6, title: 'Avg ' + rateMet.replace(/_/g, ' '),
      labels: [rateMet], data: [avg], value: avg, color: 'cyan',
      min: 0, max: isPercent ? 100 : Math.ceil(Math.max(...vals) * 1.2),
      desc: 'Gauge showing average ' + rateMet.replace(/_/g, ' ').toLowerCase() + '.' });
  }

  // CANDIDATE: Boxplot — distribution analysis
  if (primaryMetric && categoricals.length > 0) {
    const bpCat = categoricals.find(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 8);
    if (bpCat) {
      const groups = {};
      rows.forEach(r => { const k = String(r[bpCat]||'').trim(); if (!k) return; if (!groups[k]) groups[k] = []; groups[k].push(parseFloat(r[primaryMetric]) || 0); });
      const boxes = Object.entries(groups).filter(([,v]) => v.length >= 3).map(([label, vals]) => {
        vals.sort((a,b) => a - b);
        const q1 = vals[Math.floor(vals.length * 0.25)], median = vals[Math.floor(vals.length * 0.5)], q3 = vals[Math.floor(vals.length * 0.75)];
        const iqr = q3 - q1;
        return { label, q1, median, q3, whiskerLow: Math.max(vals[0], q1 - 1.5 * iqr), whiskerHigh: Math.min(vals[vals.length-1], q3 + 1.5 * iqr) };
      });
      if (boxes.length >= 2) {
        candidates.push({ type: 'boxplot', insight: 7, title: primaryMetric.replace(/_/g,' ') + ' Distribution by ' + bpCat.replace(/_/g,' '),
          boxes, color: 'amber', labels: boxes.map(b => b.label), data: boxes.map(b => b.median),
          desc: 'Box plot showing statistical distribution of ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' per ' + bpCat.replace(/_/g,' ').toLowerCase() + '.' });
      }
    }
  }

  // CANDIDATE: Candlestick — OHLC stock data
  if (dateCol) {
    const oCol = allHeaders.find(h => /^open$/i.test(h.trim()));
    const hCol = allHeaders.find(h => /^high$/i.test(h.trim()));
    const lCol = allHeaders.find(h => /^low$/i.test(h.trim()));
    const cCol = allHeaders.find(h => /^close$/i.test(h.trim()));
    if (oCol && hCol && lCol && cCol) {
      const grouped = {};
      rows.forEach(r => { const dt = String(r[dateCol]||'').trim(); if (!dt) return; if (!grouped[dt]) grouped[dt] = {o:[],h:[],l:[],c:[]}; grouped[dt].o.push(parseFloat(r[oCol])||0); grouped[dt].h.push(parseFloat(r[hCol])||0); grouped[dt].l.push(parseFloat(r[lCol])||0); grouped[dt].c.push(parseFloat(r[cCol])||0); });
      const pat = colMeta[dateCol] && colMeta[dateCol].datePattern;
      const candles = Object.entries(grouped).sort((a,b) => { if (pat) { const da = parseDateValue(a[0],pat), db = parseDateValue(b[0],pat); if (da && db) return da - db; } return a[0].localeCompare(b[0]); })
        .map(([dt, g]) => ({ label: dt, open: g.o[g.o.length-1], high: Math.max(...g.h), low: Math.min(...g.l), close: g.c[g.c.length-1] }));
      if (candles.length >= 5) {
        candidates.push({ type: 'candlestick', insight: 10, title: 'Price Chart (OHLC)',
          candles, labels: candles.map(c => c.label), data: candles.map(c => c.close), color: 'emerald',
          desc: 'Candlestick chart showing Open-High-Low-Close price action over time.' });
      }
    }
  }

  // CANDIDATE: Treemap — many-category proportional view
  if (primaryMetric) {
    const tmCat = categoricals.find(c => colMeta[c].uniqueCount >= 5 && colMeta[c].uniqueCount <= 30);
    if (tmCat) {
      const agg = aggByCategory(tmCat, primaryMetric, /score|rate|avg|percent/i.test(primaryMetric) ? 'avg' : 'sum').filter(a => a.value > 0).slice(0, 20);
      if (agg.length >= 5) {
        candidates.push({ type: 'treemap', insight: 5, title: primaryMetric.replace(/_/g,' ') + ' by ' + tmCat.replace(/_/g,' '),
          labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'multi',
          desc: 'Treemap showing proportional ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' by ' + tmCat.replace(/_/g,' ').toLowerCase() + '.' });
      }
    }
  }

  // CANDIDATE: Radar — multi-metric profile
  if (metrics.length >= 4 && categoricals.length > 0) {
    const radarCat = categoricals.find(c => colMeta[c].uniqueCount >= 2 && colMeta[c].uniqueCount <= 6);
    if (radarCat) {
      const topGroup = rows.reduce((acc, r) => { const k = String(r[radarCat] || '').trim(); acc[k] = (acc[k]||0)+1; return acc; }, {});
      const bestGroup = Object.entries(topGroup).sort((a,b)=>b[1]-a[1])[0];
      if (bestGroup) {
        const groupRows = rows.filter(r => String(r[radarCat]||'').trim() === bestGroup[0]);
        const radarMetrics = metrics.slice(0, 6);
        const radarData = radarMetrics.map(m => { const v = groupRows.map(r => parseFloat(r[m]) || 0); return v.reduce((a,b)=>a+b,0) / v.length; });
        candidates.push({ type: 'radar', insight: 4, title: bestGroup[0] + ' — Metric Profile',
          labels: radarMetrics.map(m => m.replace(/_/g, ' ')), data: radarData, color: 'emerald',
          desc: 'Radar showing ' + bestGroup[0] + ' across ' + radarMetrics.length + ' metrics.' });
      }
    }
  }

  // CANDIDATE: US Map — if State column exists
  const stateCol = allHeaders.find(h => /^state$/i.test(h.trim()));
  if (stateCol && primaryMetric) {
    const agg = aggByCategory(stateCol, primaryMetric, /score|rate|percent/i.test(primaryMetric) ? 'avg' : 'sum').filter(a => a.value > 0);
    if (agg.length >= 3) {
      candidates.push({ type: 'usmap', insight: 9, title: primaryMetric.replace(/_/g,' ') + ' by State',
        labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'cyan',
        desc: 'US map showing ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' distribution across states.' });
    }
  }

  // CANDIDATE: World Map — if Country column exists
  const countryCol = allHeaders.find(h => /^country$|^nation$|^location$/i.test(h.trim()));
  if (countryCol && primaryMetric) {
    const agg = aggByCategory(countryCol, primaryMetric, /score|rate|percent/i.test(primaryMetric) ? 'avg' : 'sum').filter(a => a.value > 0);
    if (agg.length >= 2) {
      candidates.push({ type: 'worldmap', insight: 8, title: primaryMetric.replace(/_/g,' ') + ' by ' + countryCol.replace(/_/g,' '),
        labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'cyan',
        desc: 'World map showing ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' distribution globally.' });
    }
  }

  // CANDIDATE: Treemap — share of metric by category
  if (categoricals.length > 0 && primaryMetric) {
    const tmCat = categoricals.find(c => colMeta[c].uniqueCount >= 3 && colMeta[c].uniqueCount <= 12 && !usedCombos.has(c + '|tm'));
    if (tmCat) {
      const agg = aggByCategory(tmCat, primaryMetric, /score|rate|percent/i.test(primaryMetric) ? 'avg' : 'sum').filter(a => a.value > 0).slice(0, 10);
      if (agg.length >= 3) {
        candidates.push({ type: 'treemap', insight: 5, title: primaryMetric.replace(/_/g,' ') + ' Treemap by ' + tmCat.replace(/_/g,' '),
          labels: agg.map(a => a.label), data: agg.map(a => a.value),
          desc: 'Treemap showing relative size of ' + primaryMetric.replace(/_/g,' ').toLowerCase() + ' across ' + tmCat.replace(/_/g,' ').toLowerCase() + '.' });
      }
    }
  }

  // CANDIDATE: Bar — secondary metric (since chart 2 is hbar)
  if (secondaryMetric) {
    const barInfo2 = bestBarCat(secondaryMetric);
    if (barInfo2 && !usedCombos.has(barInfo2.col + '|' + secondaryMetric)) {
      const agg = barInfo2.agg.slice(0, 10);
      candidates.push({ type: 'bar', insight: 6, title: secondaryMetric.replace(/_/g, ' ') + ' by ' + barInfo2.col.replace(/_/g, ' '),
        labels: agg.map(a => a.label), data: agg.map(a => a.value), color: 'teal', suffix: '',
        xLabel: barInfo2.col.replace(/_/g, ' '), yLabel: secondaryMetric.replace(/_/g, ' '),
        desc: 'Compares ' + secondaryMetric.replace(/_/g, ' ').toLowerCase() + ' across ' + barInfo2.col.replace(/_/g, ' ').toLowerCase() + '.' });
    }
  }

  // ── RANK & PICK: Sort candidates by insight score, ensure type variety, pick best to add after core 3 ──
  candidates.sort((a, b) => b.insight - a.insight);
  const usedChartTypes = new Set(chartPlan.map(c => c.type));
  let added = 0;
  for (const cand of candidates) {
    if (chartPlan.length >= 6) break;
    if (usedChartTypes.has(cand.type)) continue; // ensure variety
    chartPlan.push(cand);
    usedChartTypes.add(cand.type);
    added++;
  }

  // Hard limit: 6 charts for diverse dashboard
  chartPlan.splice(6);

  // Filter out empty or invalid charts
  for (let ci = chartPlan.length - 1; ci >= 0; ci--) {
    const c = chartPlan[ci];
    const cType = c._userType || c.type;
    const hasLabels = c.labels && c.labels.length > 0 && c.labels.some(l => l !== undefined && l !== null && l !== 'undefined');
    const hasSeries = c.series && c.series.length > 0;
    const hasData = (c.data && c.data.length > 0 && c.data.some(v => v > 0)) || hasSeries;
    // Remove charts with no meaningful data
    if (!hasLabels && cType !== 'gauge') { chartPlan.splice(ci, 1); continue; }
    if (!hasData && cType !== 'gauge') { chartPlan.splice(ci, 1); continue; }
    // Clean up undefined labels
    if (c.labels) {
      c.labels = c.labels.map(l => (l === undefined || l === null) ? '' : l);
    }
  }

  // Store original column references for cross-filter rebuilds
  chartPlan.forEach(chart => {
    if (chart.xLabel) chart._origXCol = allHeaders.find(h => h.replace(/_/g,' ') === chart.xLabel) || allHeaders.find(h => h.replace(/_/g,' ').toLowerCase() === chart.xLabel.toLowerCase()) || chart.xLabel.replace(/ /g,'_');
    if (chart.yLabel) chart._origYCol = allHeaders.find(h => h.replace(/_/g,' ') === chart.yLabel) || allHeaders.find(h => h.replace(/_/g,' ').toLowerCase() === chart.yLabel.toLowerCase()) || chart.yLabel.replace(/ /g,'_');
    chart._origAggFn = chart.title.startsWith('Avg') ? 'avg' : chart.title.startsWith('Max') ? 'max' : 'sum';
  });

  // Store detected column types for data table icons
  const colTypes = {};
  allHeaders.forEach(h => { colTypes[h] = detectColumnType(h, colMeta[h]); });

  App.excelChartConfig = { colMeta, colTypes, metrics, categoricals, dates, indices, chartPlan,
    labelCol: categoricals[0] || dates[0] || nameCol || indices[0] || null,
    dataCols: metrics.slice(0,2), numericCols: metrics,
    labelCols: [...categoricals, ...dates, ...(nameCol ? [nameCol] : [])] };
  App.hasExcelData = true;
  App.drillStates = {}; // Reset drill states on new data

  if(App.chartInterval) { clearInterval(App.chartInterval); App.chartInterval = null; }

  // ── SMART STAT CARDS ──
  // Card 1: Total records
  App.stats.revenue.value = rows.length;
  App.stats.revenue.label = 'Total Records';
  App.stats.revenue.format = 'number';
  App.stats.revenue.color = 'cyan';
  App.stats.revenue.trend = 0;

  // Card 2: first metric average
  if(metrics[0]) {
    const v = colMeta[metrics[0]].vals;
    const avg = v.reduce((a,b)=>a+b,0)/v.length;
    App.stats.users.value = Math.round(avg * 100) / 100;
    App.stats.users.label = 'Avg ' + metrics[0].replace(/_/g, ' ');
    App.stats.users.format = 'number';
    App.stats.users.color = 'violet';
    const mid = Math.floor(v.length/2);
    const h1 = v.slice(0,mid).reduce((a,b)=>a+b,0)/mid;
    const h2 = v.slice(mid).reduce((a,b)=>a+b,0)/(v.length-mid);
    App.stats.users.trend = h1>0 ? Math.round((h2-h1)/h1*1000)/10 : 0;
  }

  // Card 3: unique categories, or unique labels, or total metrics
  if(categoricals[0]) {
    App.stats.uptime.value = colMeta[categoricals[0]].uniqueCount;
    App.stats.uptime.label = 'Unique ' + categoricals[0].replace(/_/g, ' ') + 's';
    App.stats.uptime.format = 'number';
    App.stats.uptime.color = 'emerald';
    App.stats.uptime.trend = 0;
  } else {
    // Fallback: count unique items in the first text/name column, or show metric count
    const nameCol = allHeaders.find(h => !colMeta[h].isNumeric && !colMeta[h].isIndex && !colMeta[h].isDate);
    if (nameCol) {
      const uniq = new Set(rows.map(r => String(r[nameCol]||'').trim()).filter(Boolean));
      App.stats.uptime.value = uniq.size;
      App.stats.uptime.label = 'Unique ' + nameCol.replace(/_/g, ' ') + 's';
    } else {
      App.stats.uptime.value = metrics.length;
      App.stats.uptime.label = 'Data Metrics';
    }
    App.stats.uptime.format = 'number';
    App.stats.uptime.color = 'emerald';
    App.stats.uptime.trend = 0;
  }

  // Card 4: second metric max or second categorical count
  if(metrics[1]) {
    const v = colMeta[metrics[1]].vals;
    App.stats.tasks.value = Math.max(...v);
    App.stats.tasks.label = 'Max ' + metrics[1].replace(/_/g, ' ');
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  } else if(categoricals[1]) {
    App.stats.tasks.value = colMeta[categoricals[1]].uniqueCount;
    App.stats.tasks.label = 'Unique ' + categoricals[1].replace(/_/g, ' ') + 's';
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  } else {
    App.stats.tasks.value = allHeaders.length;
    App.stats.tasks.label = 'Total Columns';
    App.stats.tasks.format = 'number';
    App.stats.tasks.color = 'amber';
    App.stats.tasks.trend = 0;
  }
}

function initCounters() {
  $$('.stat-value').forEach(el => {
    const target = el.textContent;
    const fmt = el.dataset.format;
    if(!fmt) return;
    const numStr = target.replace(/[$,%]/g,'').replace(/,/g,'');
    const num = parseFloat(numStr);
    if(isNaN(num)) return;
    el.textContent = fmt==='currency'?'$0':fmt==='percent'?'0.0%':'0';
    const start = performance.now();
    function update(now) {
      const p = Math.min((now-start)/1200, 1);
      const eased = 1-Math.pow(1-p,3);
      el.textContent = formatValue(num*eased, fmt);
      if(p<1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  });
}

}

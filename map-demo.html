<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenBI US State Map</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;font-weight:300;background:#000;color:rgba(255,255,255,0.80);padding:2rem;}
h1{font-size:1.5rem;font-weight:300;color:rgba(255,255,255,0.90);text-align:center;margin-bottom:0.3rem;}
p{font-size:0.8rem;color:rgba(255,255,255,0.30);text-align:center;margin-bottom:1.5rem;}
.map-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.5rem;max-width:960px;margin:0 auto;}
.map-title{font-size:0.85rem;font-weight:400;color:rgba(255,255,255,0.80);margin-bottom:0.5rem;}
#mapContainer{position:relative;}
#mapContainer svg{width:100%;height:auto;}
/* Style all state paths */
#mapContainer svg path{transition:opacity 0.15s,stroke 0.15s;cursor:pointer;stroke:#000;stroke-width:0.5;}
#mapContainer svg path:hover{stroke:rgba(103,232,249,0.9)!important;stroke-width:1.5!important;filter:brightness(1.3);}
.tooltip{position:fixed;z-index:100;pointer-events:none;background:rgba(0,0,0,0.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 12px;font-size:12px;opacity:0;transition:opacity 0.12s;}
.tooltip.visible{opacity:1;}
.tooltip .name{font-weight:400;color:rgba(255,255,255,0.90);}
.tooltip .val{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}
.legend{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:12px;}
.legend-bar{width:160px;height:8px;border-radius:4px;}
.legend-label{font-size:9px;color:rgba(255,255,255,0.25);}
#status{text-align:center;font-size:11px;color:rgba(255,255,255,0.30);margin-top:8px;}
</style>
</head>
<body>
<h1>US Revenue by State</h1>
<p>Real SVG map — hover states to explore</p>

<div class="map-card">
  <div id="mapContainer">Loading map...</div>
  <div class="legend">
    <span class="legend-label">$100K</span>
    <div class="legend-bar" id="legendBar"></div>
    <span class="legend-label">$886K</span>
  </div>
  <div id="status"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="name" id="ttName"></div>
  <div class="val" id="ttVal"></div>
</div>

<script>
const STATE_NAMES = {
  al:'Alabama',ak:'Alaska',az:'Arizona',ar:'Arkansas',ca:'California',
  co:'Colorado',ct:'Connecticut',de:'Delaware',fl:'Florida',ga:'Georgia',
  hi:'Hawaii',id:'Idaho',il:'Illinois','in':'Indiana',ia:'Iowa',
  ks:'Kansas',ky:'Kentucky',la:'Louisiana',me:'Maine',md:'Maryland',
  ma:'Massachusetts',mi:'Michigan',mn:'Minnesota',ms:'Mississippi',
  mo:'Missouri',mt:'Montana',ne:'Nebraska',nv:'Nevada',nh:'New Hampshire',
  nj:'New Jersey',nm:'New Mexico',ny:'New York',nc:'North Carolina',
  nd:'North Dakota',oh:'Ohio',ok:'Oklahoma',or:'Oregon',pa:'Pennsylvania',
  ri:'Rhode Island',sc:'South Carolina',sd:'South Dakota',tn:'Tennessee',
  tx:'Texas',ut:'Utah',vt:'Vermont',va:'Virginia',wa:'Washington',
  wv:'West Virginia',wi:'Wisconsin',wy:'Wyoming',dc:'DC'
};

const DATA = {
  'California':886,'Texas':720,'New York':650,'Florida':580,
  'Illinois':490,'Pennsylvania':445,'Ohio':410,'Georgia':395,
  'Michigan':370,'North Carolina':355,'New Jersey':340,
  'Virginia':330,'Washington':520,'Arizona':310,'Massachusetts':480,
  'Tennessee':290,'Indiana':275,'Missouri':260,'Maryland':310,
  'Wisconsin':250,'Colorado':440,'Minnesota':350,'South Carolina':240,
  'Alabama':220,'Louisiana':770,'Kentucky':210,'Oregon':380,
  'Oklahoma':200,'Connecticut':360,'Utah':280,'Iowa':190,
  'Nevada':320,'Arkansas':175,'Mississippi':160,'Kansas':185,
  'New Mexico':170,'Nebraska':165,'Idaho':155,'Hawaii':145,
  'Maine':135,'Montana':125,'Delaware':140,'South Dakota':115,
  'Alaska':150,'North Dakota':120,'Vermont':105,'Wyoming':100,
  'Rhode Island':130,'New Hampshire':200,'West Virginia':110
};

const vals = Object.values(DATA);
const mn = Math.min(...vals), mx = Math.max(...vals);

const tt = document.getElementById('tooltip');

function colorForValue(v) {
  if (v == null) return 'rgba(255,255,255,0.05)';
  const t = (v - mn) / (mx - mn);
  // Cyan gradient: dark teal → bright cyan
  const r = Math.round(6 + (1 - t) * 2);
  const g = Math.round(100 + t * 132);
  const b = Math.round(150 + t * 62);
  return `rgb(${r},${g},${b})`;
}

// Build legend gradient
const legendBar = document.getElementById('legendBar');
legendBar.style.background = `linear-gradient(to right, ${colorForValue(mn)}, ${colorForValue((mn+mx)/2)}, ${colorForValue(mx)})`;

// Load the SVG
async function loadMap() {
  try {
    const resp = await fetch('public/data/us-map.svg');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const svgText = await resp.text();

    const container = document.getElementById('mapContainer');
    container.innerHTML = svgText;

    const svg = container.querySelector('svg');
    // Set dark background
    svg.style.background = 'transparent';

    // Remove any existing fills, set background rect to transparent
    svg.querySelectorAll('rect').forEach(r => r.setAttribute('fill', 'transparent'));

    // Color each state
    let colored = 0;
    svg.querySelectorAll('path').forEach(path => {
      const classes = path.getAttribute('class') || '';
      const stateCode = classes.split(' ').find(c => c.length === 2 && STATE_NAMES[c]);
      if (stateCode) {
        const name = STATE_NAMES[stateCode];
        const val = DATA[name];
        path.setAttribute('fill', colorForValue(val));
        path.setAttribute('stroke', 'rgba(0,0,0,0.6)');
        path.setAttribute('stroke-width', '0.5');

        path.addEventListener('mousemove', (e) => {
          document.getElementById('ttName').textContent = name;
          document.getElementById('ttVal').textContent = val ? '$' + val + 'K' : 'No data';
          tt.style.left = (e.clientX + 14) + 'px';
          tt.style.top = (e.clientY - 40) + 'px';
          tt.classList.add('visible');
        });
        path.addEventListener('mouseleave', () => tt.classList.remove('visible'));
        colored++;
      }
    });

    document.getElementById('status').textContent = colored + ' states colored. Hover to explore.';

  } catch (err) {
    document.getElementById('mapContainer').innerHTML = '<div style="padding:3rem;text-align:center;color:rgba(255,255,255,0.3)">Error: ' + err.message + '</div>';
  }
}

loadMap();
</script>
</body>
</html>

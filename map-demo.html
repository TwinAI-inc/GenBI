<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenBI Real Map Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;font-weight:300;background:#000;color:rgba(255,255,255,0.80);}
.header{padding:2rem 2rem 1rem;text-align:center;}
.header h1{font-size:1.8rem;font-weight:300;color:rgba(255,255,255,0.90);}
.header p{font-size:0.8rem;color:rgba(255,255,255,0.30);margin-top:0.3rem;}
.map-wrap{max-width:960px;margin:1rem auto;padding:0 1rem;}
.map-label{font-size:0.7rem;font-weight:400;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.25);margin-bottom:0.5rem;}
.map-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1rem;margin-bottom:2rem;overflow:hidden;}
svg{width:100%;display:block;}
.state-path{stroke:rgba(0,0,0,0.4);stroke-width:0.5;cursor:pointer;transition:stroke 0.15s, stroke-width 0.15s;}
.state-path:hover{stroke:rgba(103,232,249,0.9);stroke-width:1.5;}
.country-path{stroke:rgba(0,0,0,0.3);stroke-width:0.3;cursor:pointer;transition:stroke 0.15s;}
.country-path:hover{stroke:rgba(103,232,249,0.8);stroke-width:1;}
.mesh-path{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:0.5;pointer-events:none;}
.tooltip{position:fixed;z-index:100;pointer-events:none;background:rgba(0,0,0,0.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 12px;font-family:'Outfit',sans-serif;opacity:0;transition:opacity 0.12s;max-width:200px;}
.tooltip.visible{opacity:1;}
.tooltip .tt-name{font-size:12px;font-weight:400;color:rgba(255,255,255,0.90);}
.tooltip .tt-val{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}
.legend{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:8px;}
.legend-bar{width:160px;height:8px;border-radius:4px;background:linear-gradient(to right, rgba(6,182,212,0.10), rgba(6,182,212,0.90));}
.legend-label{font-size:9px;color:rgba(255,255,255,0.25);font-family:'Outfit',sans-serif;}
.loading{text-align:center;padding:3rem;color:rgba(255,255,255,0.20);font-size:0.85rem;}
</style>
</head>
<body>
<div class="header">
  <h1>Real Geographic Maps</h1>
  <p>Actual GeoJSON boundaries with D3 projection — hover to explore</p>
</div>
<div class="map-wrap">
  <div class="map-label">US Revenue by State</div>
  <div class="map-card">
    <div id="usMapContainer"><div class="loading">Loading US map...</div></div>
    <div class="legend"><span class="legend-label">$100K</span><div class="legend-bar"></div><span class="legend-label">$886K</span></div>
  </div>

  <div class="map-label">Global R&D Cost by Country</div>
  <div class="map-card">
    <div id="worldMapContainer"><div class="loading">Loading world map...</div></div>
    <div class="legend"><span class="legend-label">$70M</span><div class="legend-bar"></div><span class="legend-label">$3.6B</span></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-val" id="ttVal"></div>
</div>

<script>
// ── FIPS to State Name ──
const FIPS = {'01':'Alabama','02':'Alaska','04':'Arizona','05':'Arkansas','06':'California','08':'Colorado','09':'Connecticut','10':'Delaware','11':'DC','12':'Florida','13':'Georgia','15':'Hawaii','16':'Idaho','17':'Illinois','18':'Indiana','19':'Iowa','20':'Kansas','21':'Kentucky','22':'Louisiana','23':'Maine','24':'Maryland','25':'Massachusetts','26':'Michigan','27':'Minnesota','28':'Mississippi','29':'Missouri','30':'Montana','31':'Nebraska','32':'Nevada','33':'New Hampshire','34':'New Jersey','35':'New Mexico','36':'New York','37':'North Carolina','38':'North Dakota','39':'Ohio','40':'Oklahoma','41':'Oregon','42':'Pennsylvania','44':'Rhode Island','45':'South Carolina','46':'South Dakota','47':'Tennessee','48':'Texas','49':'Utah','50':'Vermont','51':'Virginia','53':'Washington','54':'West Virginia','55':'Wisconsin','56':'Wyoming'};

// ── ISO numeric to Country Name ──
const ISO = {'840':'United States','826':'United Kingdom','392':'Japan','276':'Germany','250':'France','156':'China','124':'Canada','356':'India','036':'Australia','076':'Brazil','410':'South Korea','702':'Singapore','528':'Netherlands','752':'Sweden','376':'Israel','208':'Denmark','056':'Belgium','372':'Ireland','724':'Spain','380':'Italy','578':'Norway','484':'Mexico','643':'Russia','792':'Turkey','682':'Saudi Arabia','710':'South Africa','566':'Nigeria','818':'Egypt','032':'Argentina','756':'Switzerland','404':'Kenya','604':'Peru','170':'Colombia','862':'Venezuela','152':'Chile','764':'Thailand','704':'Vietnam','608':'Philippines','458':'Malaysia','586':'Pakistan','050':'Bangladesh','364':'Iran','368':'Iraq','784':'UAE','616':'Poland','804':'Ukraine','642':'Romania','300':'Greece','203':'Czech Republic','348':'Hungary'};

// ── Sample Data ──
const usData = {'California':886000,'Texas':720000,'New York':650000,'Florida':580000,'Illinois':490000,'Pennsylvania':445000,'Ohio':410000,'Georgia':395000,'Michigan':370000,'North Carolina':355000,'New Jersey':340000,'Virginia':330000,'Washington':520000,'Arizona':310000,'Massachusetts':480000,'Tennessee':290000,'Indiana':275000,'Missouri':260000,'Maryland':310000,'Wisconsin':250000,'Colorado':440000,'Minnesota':350000,'South Carolina':240000,'Alabama':220000,'Louisiana':770000,'Kentucky':210000,'Oregon':380000,'Oklahoma':200000,'Connecticut':360000,'Utah':280000,'Iowa':190000,'Nevada':320000,'Arkansas':175000,'Mississippi':160000,'Kansas':185000,'New Mexico':170000,'Nebraska':165000,'Idaho':155000,'Hawaii':145000,'Maine':135000,'Montana':125000,'Delaware':140000,'South Dakota':115000,'Alaska':150000,'North Dakota':120000,'Vermont':105000,'Wyoming':100000,'Rhode Island':130000,'New Hampshire':200000,'West Virginia':110000};

const worldData = {'United States':3600,'Switzerland':890,'United Kingdom':720,'Japan':650,'Germany':580,'China':950,'France':490,'Canada':420,'India':380,'Australia':350,'Brazil':280,'South Korea':520,'Netherlands':250,'Sweden':230,'Israel':210,'Denmark':190,'Belgium':180,'Ireland':270,'Spain':220,'Italy':240,'Norway':200,'Mexico':150,'Russia':320,'Turkey':130,'Saudi Arabia':160,'South Africa':110,'Nigeria':80,'Egypt':70,'Argentina':100,'Poland':95,'Ukraine':75,'Romania':65,'Greece':85,'Czech Republic':90,'Hungary':60};

// ── Tooltip ──
const tt = document.getElementById('tooltip');
function showTT(e, name, val, prefix, suffix) {
  document.getElementById('ttName').textContent = name;
  document.getElementById('ttVal').textContent = val != null ? prefix + Number(val).toLocaleString() + suffix : 'No data';
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 44) + 'px';
  tt.classList.add('visible');
}
function hideTT() { tt.classList.remove('visible'); }

// ── Color Scale ──
function cyanScale(val, min, max) {
  if (val == null) return 'rgba(255,255,255,0.02)';
  const t = Math.max(0, Math.min(1, (val - min) / ((max - min) || 1)));
  const a = 0.10 + t * 0.80;
  return `rgba(6,182,212,${a.toFixed(2)})`;
}

// ══════════════════════════════════════
// US MAP — D3 Albers USA projection
// ══════════════════════════════════════
async function drawUSMap() {
  try {
    const us = await d3.json('public/data/us-states.json');
    const states = topojson.feature(us, us.objects.states).features;
    const borders = topojson.mesh(us, us.objects.states, (a, b) => a !== b);

    const container = document.getElementById('usMapContainer');
    container.innerHTML = '';

    const w = 960, h = 600;
    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${w} ${h}`)
      .style('background', '#000');

    const path = d3.geoPath();

    const vals = Object.values(usData);
    const mn = Math.min(...vals), mx = Math.max(...vals);

    // Draw states
    svg.selectAll('.state-path')
      .data(states)
      .join('path')
      .attr('class', 'state-path')
      .attr('d', path)
      .attr('fill', d => {
        const name = FIPS[String(d.id).padStart(2, '0')];
        return cyanScale(usData[name], mn, mx);
      })
      .on('mousemove', (e, d) => {
        const name = FIPS[String(d.id).padStart(2, '0')] || 'Unknown';
        showTT(e, name, usData[name], '$', '');
      })
      .on('mouseleave', hideTT);

    // State borders
    svg.append('path')
      .datum(borders)
      .attr('class', 'mesh-path')
      .attr('d', path);

  } catch (err) {
    document.getElementById('usMapContainer').innerHTML = '<div class="loading">Failed to load US map: ' + err.message + '</div>';
  }
}

// ══════════════════════════════════════
// WORLD MAP — D3 Natural Earth projection
// ══════════════════════════════════════
async function drawWorldMap() {
  try {
    const world = await d3.json('public/data/world-countries.json');
    const countries = topojson.feature(world, world.objects.countries).features;
    const borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

    const container = document.getElementById('worldMapContainer');
    container.innerHTML = '';

    const w = 960, h = 500;
    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${w} ${h}`)
      .style('background', '#000');

    const projection = d3.geoNaturalEarth1()
      .scale(160)
      .translate([w / 2, h / 2]);
    const path = d3.geoPath(projection);

    const vals = Object.values(worldData);
    const mn = Math.min(...vals), mx = Math.max(...vals);

    // Draw countries
    svg.selectAll('.country-path')
      .data(countries)
      .join('path')
      .attr('class', 'country-path')
      .attr('d', path)
      .attr('fill', d => {
        const name = ISO[String(d.id).padStart(3,'0')];
        return cyanScale(worldData[name], mn, mx);
      })
      .on('mousemove', (e, d) => {
        const name = ISO[String(d.id).padStart(3,'0')] || '';
        if (name) showTT(e, name, worldData[name], '$', 'M');
      })
      .on('mouseleave', hideTT);

    // Country borders
    svg.append('path')
      .datum(borders)
      .attr('class', 'mesh-path')
      .attr('d', path)
      .attr('stroke-width', '0.3');

    // Graticule (subtle grid lines)
    const graticule = d3.geoGraticule10();
    svg.insert('path', ':first-child')
      .datum(graticule)
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(255,255,255,0.03)')
      .attr('stroke-width', '0.3');

  } catch (err) {
    document.getElementById('worldMapContainer').innerHTML = '<div class="loading">Failed to load world map: ' + err.message + '</div>';
  }
}

// Load both
drawUSMap();
drawWorldMap();
</script>
</body>
</html>
